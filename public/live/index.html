<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="/favicon.ico"/>
<meta name="robots" content="noindex, nofollow"/>
<title>BDG · En Vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=Jost:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080808; --s1:#0f0f0f; --s2:#161616; --s3:#1c1c1c;
  --line:rgba(255,255,255,.07); --muted:rgba(255,255,255,.22); --sub:rgba(255,255,255,.5);
  --terra:#c16452; --green:#3ecf8e; --yellow:#f5c518; --blue:#5b9cf6; --red:#f26b6b;
  --fh:'Archivo',sans-serif; --fl:'Jost',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:#e8e4de;font-family:var(--fh);overflow:hidden;}
body{display:flex;flex-direction:column;}

/* ── TOPBAR ──────────────────────────────────────────────────── */
.topbar{height:44px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0;gap:12px;}
.logo{font-family:var(--fl);font-size:12px;font-weight:700;color:#fff;letter-spacing:.18em;}
.logo span{color:var(--terra);}
.pill{display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;background:rgba(62,207,142,.08);border:1px solid rgba(62,207,142,.18);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(62,207,142,.5)}60%{opacity:.7;box-shadow:0 0 0 4px rgba(62,207,142,0)}}
.pill-lbl{font-size:8px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--green);}
.topbar-r{display:flex;align-items:center;gap:10px;}
.countdown{font-size:9px;color:var(--muted);min-width:130px;text-align:right;}
.btn{padding:3px 10px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:3px;color:var(--muted);font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;font-family:var(--fh);transition:all .12s;}
.btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.btn.tv-on{background:rgba(193,100,82,.12);border-color:rgba(193,100,82,.3);color:var(--terra);}
.back{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .12s;}
.back:hover{color:#fff;}

/* ── GRID ────────────────────────────────────────────────────── */
.grid{flex:1;display:grid;grid-template-columns:320px 1fr 300px;gap:1px;background:var(--line);min-height:0;}
.col{background:var(--bg);display:flex;flex-direction:column;min-height:0;overflow:hidden;}

/* ── COL 1: HERO ─────────────────────────────────────────────── */
.hero-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 16px 14px;border-bottom:1px solid var(--line);flex-shrink:0;position:relative;}
.goal-hint{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

/* Progress ring */
.ring-wrap{position:relative;width:180px;height:180px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:8;}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s ease,stroke .4s;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.ring-gmv{font-size:22px;font-weight:900;letter-spacing:-.04em;line-height:1;color:var(--green);}
.ring-gmv.warn{color:var(--yellow);}
.ring-lbl{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.ring-pct{font-size:11px;font-weight:700;color:var(--muted);margin-top:2px;}

/* Delta vs ayer */
.delta-row{display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:10px;width:100%;}
.delta-main{display:flex;align-items:center;gap:6px;}
.delta{font-size:11px;font-weight:700;padding:2px 8px;border-radius:3px;}
.delta.up{color:var(--green);background:rgba(62,207,142,.1);}
.delta.down{color:var(--red);background:rgba(242,107,107,.1);}
.delta.flat{color:var(--muted);background:rgba(255,255,255,.05);}
.delta-lbl{font-size:9px;color:var(--muted);}
/* Same-hour row */
.delta-samehour{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);width:calc(100% - 24px);}
.delta-sh-ico{font-size:10px;flex-shrink:0;}
.delta-sh-lbl{font-size:8px;color:var(--muted);flex:1;}
.delta-sh-val{font-size:11px;font-weight:900;color:var(--sub);}
.delta-sh-val.sh-up{color:var(--green);}
.delta-sh-val.sh-down{color:var(--red);}

/* KPI pills */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-bottom:1px solid var(--line);flex-shrink:0;}
.kpi{padding:11px 14px;background:var(--bg);}
.kpi-lbl{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px;}
.kpi-val{font-size:18px;font-weight:900;letter-spacing:-.03em;line-height:1;}
.kpi-val.blue{color:var(--blue);}
.kpi-val.yellow{color:var(--yellow);}
.kpi-val.green{color:var(--green);}
.kpi-val.red{color:var(--red);}
.kpi-d{font-size:8px;margin-top:3px;}

/* Channels */
.channels{padding:12px 14px;border-bottom:1px solid var(--line);flex-shrink:0;}
.ch-lbl{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:8px;}
.ch-bar{height:6px;border-radius:3px;overflow:hidden;display:flex;gap:1px;margin-bottom:8px;}
.ch-seg{height:100%;border-radius:2px;transition:width .8s ease;}
.ch-legend{display:flex;flex-wrap:wrap;gap:6px 12px;}
.ch-item{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--muted);}
.ch-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* Meta mini */
.meta-mini{padding:12px 14px;flex-shrink:0;}
.meta-mini-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.meta-mini-lbl{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700;}
.roas-track{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;margin:0 10px;overflow:hidden;}
.roas-fill{height:100%;border-radius:2px;transition:width .8s ease;}
.roas-val{font-size:10px;font-weight:700;}

/* ── COL 2: ACTIVIDAD ────────────────────────────────────────── */
.col-hdr{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.col-title{font-size:8px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--sub);}
.col-meta{font-size:9px;color:var(--muted);}

/* SVG area chart */
.chart-wrap{padding:14px 16px 10px;border-bottom:1px solid var(--line);flex-shrink:0;}
.chart-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.chart-lbl{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700;}
.chart-peak{font-size:9px;color:var(--muted);}
#areaSvg{width:100%;height:80px;display:block;overflow:visible;}

/* Products */
.prod-list{flex:1;overflow-y:auto;padding:4px 0;}
.prod-row{display:flex;align-items:center;gap:10px;padding:7px 16px;transition:background .1s;}
.prod-row:hover{background:rgba(255,255,255,.02);}
.medal{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.rank-num{font-size:10px;font-weight:900;color:var(--muted);width:20px;text-align:center;flex-shrink:0;}
.prod-img{width:34px;height:34px;border-radius:4px;object-fit:cover;background:var(--s2);flex-shrink:0;}
.prod-img-ph{width:34px;height:34px;border-radius:4px;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:rgba(255,255,255,.1);}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:10px;font-weight:700;color:#e8e4de;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.prod-track{height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;}
.prod-fill{height:100%;border-radius:1px;background:var(--terra);}
.prod-r{text-align:right;flex-shrink:0;}
.prod-gmv{font-size:11px;font-weight:900;color:#fff;}
.prod-units{font-size:8px;color:var(--muted);margin-top:1px;}

/* ── COL 3: ADS ──────────────────────────────────────────────── */
.ads-uncfg{padding:30px 16px;text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ads-uncfg-ico{font-size:28px;opacity:.15;margin-bottom:10px;}
.ads-uncfg-txt{font-size:9px;color:var(--muted);line-height:1.7;}
.ads-uncfg-txt code{font-size:8px;background:rgba(255,255,255,.07);padding:1px 5px;border-radius:3px;color:var(--sub);}

/* Summary strip */
.ads-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border-bottom:1px solid var(--line);flex-shrink:0;}
.ads-sum-cell{background:var(--bg);padding:8px 10px;text-align:center;}
.ads-sum-val{font-size:14px;font-weight:900;letter-spacing:-.02em;line-height:1;}
.ads-sum-lbl{font-size:6.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

/* Scroll container */
.ads-scroll{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}

/* Section divider */
.ads-section-hdr{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.18);font-weight:700;padding:4px 2px 2px;}

/* ── AD ROW (con y sin data) ─────────────────── */
.ad-row{display:flex;align-items:center;gap:8px;padding:6px 6px;border-radius:6px;background:var(--s2);border:1px solid rgba(255,255,255,.05);transition:border-color .12s;}
.ad-row:hover{border-color:rgba(255,255,255,.12);}
.ad-row-thumb{width:40px;height:40px;border-radius:4px;flex-shrink:0;background:var(--s3);background-size:cover;background-position:center;}
.ad-row-body{flex:1;min-width:0;}
.ad-row-top{display:flex;align-items:center;gap:4px;margin-bottom:3px;}
.ad-row-rank{font-size:10px;line-height:1;flex-shrink:0;}
.ad-row-name{font-size:8px;font-weight:700;color:#e8e4de;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ad-row-stats{display:flex;align-items:center;gap:6px;}
.ad-row-stat{font-size:9px;font-weight:700;line-height:1;}
.ad-row-stat span{font-size:7px;font-weight:400;color:var(--muted);margin-left:1px;}
.ad-row-bar{height:2px;background:rgba(255,255,255,.06);border-radius:1px;overflow:hidden;margin-top:4px;}
.ad-row-bar-fill{height:100%;border-radius:1px;}
/* no-data variant */
.ad-row.no-data .ad-row-name{color:rgba(255,255,255,.3);}
.ad-row-dot{width:5px;height:5px;border-radius:50%;background:rgba(62,207,142,.35);flex-shrink:0;}

/* ── SALE FLASH ─────────────────────────────────────────────── */
#saleFlash{position:fixed;inset:0;pointer-events:none;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;}
#saleFlash.fire{animation:salePop .8s ease-out forwards;}
@keyframes salePop{
  0%  {opacity:0;transform:scale(.8);}
  15% {opacity:1;transform:scale(1.08);}
  40% {opacity:1;transform:scale(1);}
  100%{opacity:0;transform:scale(1.05);}
}
.sale-badge{background:linear-gradient(135deg,#1a3a28,#0d2018);border:1px solid rgba(62,207,142,.35);border-radius:12px;padding:14px 22px;display:flex;align-items:center;gap:10px;box-shadow:0 0 40px rgba(62,207,142,.25),0 4px 24px rgba(0,0,0,.6);}
.sale-icon{font-size:22px;}
.sale-txt{font-size:13px;font-weight:900;color:var(--green);letter-spacing:.04em;}
.sale-amt{font-size:11px;color:rgba(62,207,142,.7);font-weight:700;}
/* Green border pulse on ring when sale fires */
@keyframes ringPulse{0%,100%{filter:drop-shadow(0 0 0 transparent)}50%{filter:drop-shadow(0 0 12px rgba(62,207,142,.6))}}
.ring-wrap.pulse svg{animation:ringPulse .7s ease-out;}

/* ── PROYECCIÓN ──────────────────────────────────────────────── */
.proyec-row{padding:10px 14px;border-bottom:1px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.proyec-lbl{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:3px;}
.proyec-val{font-size:17px;font-weight:900;letter-spacing:-.03em;line-height:1;}
.proyec-sub{font-size:7px;color:var(--muted);}

/* ── VELOCIDAD badge ─────────────────────────────────────────── */
.vel-badge{font-size:8px;font-weight:700;padding:2px 8px;border-radius:3px;white-space:nowrap;}
.vel-badge.up{color:var(--green);background:rgba(62,207,142,.1);}
.vel-badge.down{color:var(--red);background:rgba(242,107,107,.1);}
.vel-badge.flat{color:var(--muted);background:rgba(255,255,255,.05);}

/* ── HEAT MAP ────────────────────────────────────────────────── */
.heat-row{display:flex;gap:2px;padding:5px 16px 7px;border-bottom:1px solid var(--line);flex-shrink:0;}
.heat-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.heat-bar{width:100%;height:12px;border-radius:2px;transition:background .4s;}
.heat-lbl{font-size:5.5px;color:rgba(255,255,255,.18);text-align:center;}

/* ── TICKER ──────────────────────────────────────────────────── */
.ticker-strip{height:30px;border-top:1px solid var(--line);display:flex;align-items:center;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.012);}
.ticker-label{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);padding:0 14px;flex-shrink:0;border-right:1px solid var(--line);height:100%;display:flex;align-items:center;white-space:nowrap;font-weight:700;}
.ticker-overflow{flex:1;overflow:hidden;mask-image:linear-gradient(to right,transparent 0%,black 4%,black 96%,transparent 100%);}
.ticker-track{display:flex;align-items:center;animation:tickScroll 35s linear infinite;will-change:transform;}
@keyframes tickScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.t-item{display:flex;align-items:center;gap:7px;padding:0 20px;white-space:nowrap;}
.t-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.t-prod{color:rgba(255,255,255,.65);font-weight:700;font-size:9px;max-width:180px;overflow:hidden;text-overflow:ellipsis;}
.t-amt{color:var(--green);font-weight:900;font-size:10px;}
.t-time{color:rgba(255,255,255,.2);font-size:8px;}
.t-sep{color:rgba(255,255,255,.07);font-size:16px;padding:0 4px;}

/* ── SK ──────────────────────────────────────────────────────── */
.sk{background:linear-gradient(90deg,#111 25%,#1a1a1a 50%,#111 75%);background-size:200% 100%;animation:sh 1.3s infinite;border-radius:4px;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* goal modal removed — meta fija */

/* ── TV MODE ─────────────────────────────────────────────────── */
body.tv .topbar{height:36px;}
body.tv .grid{grid-template-columns:360px 1fr 340px;}
body.tv .ring-wrap{width:220px;height:220px;}
body.tv .ring-gmv{font-size:28px;}
body.tv .kpi-val{font-size:24px;}
body.tv .prod-name{font-size:12px;}
body.tv .prod-gmv{font-size:13px;}
body.tv .prod-img{width:40px;height:40px;}
body.tv .ticker-strip{height:36px;}
body.tv .t-prod{font-size:11px;}
body.tv .t-amt{font-size:12px;}

/* Scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.07);border-radius:2px;}

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:1000px){
  html,body{overflow:auto;}
  .grid{grid-template-columns:1fr 1fr;grid-template-rows:auto auto;}
  .col:last-child{grid-column:1/-1;}
  .ads-col{flex-direction:row;}
  .ad-featured{min-height:220px;}
}
@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
  .col:last-child{grid-column:1;}
}
</style>
</head>
<body>

<!-- SALE FLASH OVERLAY -->
<div id="saleFlash">
  <div class="sale-badge">
    <div class="sale-icon">💰</div>
    <div>
      <div class="sale-txt" id="saleFlashTxt">¡Venta nueva!</div>
      <div class="sale-amt" id="saleFlashAmt"></div>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="logo">BDG<span>·</span>HQ</div>
    <div class="pill"><div class="dot"></div><div class="pill-lbl">En Vivo</div></div>
  </div>
  <div class="topbar-r">
    <span class="countdown" id="countdown">Cargando…</span>
    <button class="btn" onclick="load(true)">↻ Refresh</button>
    <button class="btn" id="tvBtn" onclick="toggleTV()">⛶ TV</button>
    <a class="back" href="/">← HQ</a>
  </div>
</div>

<!-- GRID -->
<div class="grid">

  <!-- ── COL 1: HERO ───────────────────────────────────────────── -->
  <div class="col">

    <!-- Ring + GMV -->
    <div class="hero-wrap">
      <div class="goal-hint">Meta diaria $133,333</div>
      <div class="ring-wrap">
        <svg viewBox="0 0 180 180" width="180" height="180">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#3ecf8e"/>
              <stop offset="100%" stop-color="#5b9cf6"/>
            </linearGradient>
          </defs>
          <circle class="ring-bg"   cx="90" cy="90" r="82"/>
          <circle class="ring-fill" cx="90" cy="90" r="82" id="ringFill"
            stroke="url(#ringGrad)"
            stroke-dasharray="515 515"
            stroke-dashoffset="515"/>
        </svg>
        <div class="ring-center">
          <div class="ring-gmv" id="ringGmv"><div class="sk" style="width:90px;height:22px;"></div></div>
          <div class="ring-lbl">GMV Hoy</div>
          <div class="ring-pct" id="ringPct"></div>
        </div>
      </div>
      <div class="delta-row" id="deltaRow">
        <div class="sk" style="width:80px;height:16px;"></div>
      </div>
      <div id="sameHourRow" style="display:none;width:calc(100% - 24px);margin-top:2px;"></div>
    </div>

    <!-- KPIs 2×2 -->
    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi"><div class="kpi-lbl">Órdenes</div><div class="sk" style="height:18px;width:50px;"></div></div>
      <div class="kpi"><div class="kpi-lbl">Ticket Prom.</div><div class="sk" style="height:18px;width:70px;"></div></div>
      <div class="kpi"><div class="kpi-lbl">Gasto Meta</div><div class="sk" style="height:18px;width:70px;"></div></div>
      <div class="kpi"><div class="kpi-lbl">ROAS</div><div class="sk" style="height:18px;width:40px;"></div></div>
    </div>

    <!-- Proyección cierre -->
    <div class="proyec-row" id="proyecRow" style="display:none;"></div>

    <!-- Channels -->
    <div class="channels" id="channels">
      <div class="ch-lbl">Canal de venta</div>
      <div class="ch-bar"><div class="sk" style="width:100%;height:6px;border-radius:3px;"></div></div>
    </div>

    <!-- Meta ROAS mini -->
    <div class="meta-mini" id="metaMini" style="display:none;">
      <div class="meta-mini-row">
        <div class="meta-mini-lbl">Meta ROAS</div>
        <div class="roas-track"><div class="roas-fill" id="roasFill"></div></div>
        <div class="roas-val" id="roasVal"></div>
      </div>
    </div>

  </div>

  <!-- ── COL 2: ACTIVIDAD ───────────────────────────────────────── -->
  <div class="col">

    <div class="col-hdr">
      <div class="col-title">Ventas por hora</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="velocidadBadge" class="vel-badge"></span>
        <div class="col-meta" id="chartMeta">—</div>
      </div>
    </div>

    <!-- SVG Area Chart -->
    <div class="chart-wrap">
      <div class="chart-top">
        <div class="chart-lbl">MXN · hoy</div>
        <div class="chart-peak" id="chartPeak"></div>
      </div>
      <svg id="areaSvg" viewBox="0 0 560 80" preserveAspectRatio="none">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#c16452" stop-opacity=".35"/>
            <stop offset="100%" stop-color="#c16452" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#c16452"/>
            <stop offset="100%" stop-color="#5b9cf6"/>
          </linearGradient>
        </defs>
        <path id="areaPath" fill="url(#areaGrad)"/>
        <path id="linePath" fill="none" stroke="url(#lineGrad)" stroke-width="1.5" stroke-linecap="round"/>
        <circle id="nowDot" r="3" fill="var(--green)" style="display:none;"/>
      </svg>
    </div>

    <!-- Heat map horario -->
    <div class="heat-row" id="heatRow"></div>

    <!-- Products -->
    <div class="col-hdr">
      <div class="col-title">Más vendidos hoy</div>
      <div class="col-meta" id="prodMeta">—</div>
    </div>
    <div class="prod-list" id="prodList">
      <div style="padding:14px;"><div class="sk" style="height:240px;"></div></div>
    </div>

  </div>

  <!-- ── COL 3: ADS ─────────────────────────────────────────────── -->
  <div class="col">
    <div class="col-hdr" style="flex-shrink:0;">
      <div class="col-title">Meta Ads</div>
      <div class="col-meta" id="adsMeta">—</div>
    </div>
    <div id="adsSummary" style="display:none;" class="ads-summary"></div>
    <div class="ads-scroll" id="adsScroll">
      <div style="padding:20px;"><div class="sk" style="height:200px;border-radius:6px;"></div></div>
    </div>
  </div>

</div>

<!-- TICKER -->
<div class="ticker-strip" id="tickerStrip" style="display:none;">
  <div class="ticker-label">🛍 Órdenes</div>
  <div class="ticker-overflow">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>
</div>

<script>
// ── Utils ──────────────────────────────────────────────────────────────────────
const MXN  = n => '$' + Math.round(n).toLocaleString('es-MX');
const N    = n => parseInt(n).toLocaleString('es-MX');
const PERC = n => (n >= 0 ? '+' : '') + n.toFixed(1) + '%';

// Animated counter
function animCount(el, target, fmt, duration = 900) {
  const start = performance.now();
  const from  = 0;
  function step(now) {
    const p = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3); // ease-out cubic
    el.textContent = fmt(from + (target - from) * ease);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// ── Meta fija ──────────────────────────────────────────────────────────────────
const _goal = 133333;

// ── TV mode ────────────────────────────────────────────────────────────────────
let _tv = false;
function toggleTV() {
  _tv = !_tv;
  document.body.classList.toggle('tv', _tv);
  document.getElementById('tvBtn').classList.toggle('tv-on', _tv);
  document.getElementById('tvBtn').textContent = _tv ? '✕ TV' : '⛶ TV';
}

// ── Countdown ─────────────────────────────────────────────────────────────────
let _timer = null, _cd = 60;
function startCountdown() {
  clearInterval(_timer); _cd = 60;
  _timer = setInterval(() => {
    _cd--;
    document.getElementById('countdown').textContent = `Actualiza en ${_cd}s`;
    if (_cd <= 0) { clearInterval(_timer); load(); }
  }, 1000);
}

// ── Sale sound (Web Audio API — sin archivos externos) ────────────────────────
let _audioCtx = null;
function getSaleSound() {
  // Lazy-create context on first user gesture or on first sale
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
  }
  return _audioCtx;
}
function playSaleSound(newOrders = 1) {
  const ctx = getSaleSound();
  if (!ctx) return;
  // Cha-ching: two quick high tones + resonance
  const now = ctx.currentTime;
  [[660, 0, 0.12, 0.08], [880, 0.1, 0.12, 0.07], [1100, 0.18, 0.09, 0.06]].forEach(([freq, delay, dur, vol]) => {
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now + delay);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.92, now + delay + dur);
    gain.gain.setValueAtTime(vol, now + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, now + delay + dur + 0.15);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now + delay);
    osc.stop(now + delay + dur + 0.2);
  });
}

// ── Sale flash animation ───────────────────────────────────────────────────────
let _flashTimeout = null;
function fireSaleFlash(newCount, lastTopProduct) {
  const flash   = document.getElementById('saleFlash');
  const txtEl   = document.getElementById('saleFlashTxt');
  const amtEl   = document.getElementById('saleFlashAmt');
  const ringWrap = document.querySelector('.ring-wrap');

  txtEl.textContent = newCount === 1 ? '¡Venta nueva!' : `¡+${newCount} ventas!`;
  amtEl.textContent = lastTopProduct ? lastTopProduct : '';

  flash.classList.remove('fire');
  void flash.offsetWidth; // reflow
  flash.classList.add('fire');

  // Ring pulse
  if (ringWrap) {
    ringWrap.classList.add('pulse');
    setTimeout(() => ringWrap.classList.remove('pulse'), 800);
  }

  clearTimeout(_flashTimeout);
  _flashTimeout = setTimeout(() => flash.classList.remove('fire'), 900);

  playSaleSound(newCount);
}

// ── Data ───────────────────────────────────────────────────────────────────────
let _lastGmv    = null;
let _lastOrders = null;   // track order count between refreshes

async function load(force = false) {
  clearInterval(_timer);
  document.getElementById('countdown').textContent = 'Actualizando…';
  try {
    const res  = await fetch('/api/live' + (force ? '?t=' + Date.now() : ''));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const newOrders = data.shopify?.orders || 0;
    const prevOrders = _lastOrders;

    _lastGmv    = data.shopify?.gmv    || 0;
    _lastOrders = newOrders;

    renderAll(data);

    // Detect new sales (skip on very first load)
    if (prevOrders !== null && newOrders > prevOrders) {
      const diff = newOrders - prevOrders;
      const top  = data.shopify?.top_products?.[0]?.title || '';
      fireSaleFlash(diff, top);
    }
  } catch (e) {
    document.getElementById('ringGmv').textContent = '—';
    document.getElementById('countdown').textContent = 'Error: ' + e.message;
  }
  startCountdown();
}

// Init AudioContext on first interaction so it's ready when a sale fires
document.addEventListener('click', () => getSaleSound(), { once: true });

function renderAll(data) {
  const sh   = data.shopify || {};
  const meta = data.meta   || {};
  const nowH = parseInt(new Date().toLocaleTimeString('en-US', { timeZone: 'America/Mexico_City', hour: '2-digit', hour12: false }));
  renderHero(sh, meta);
  renderKPIs(sh, meta);
  renderProyeccion(sh.gmv || 0, sh.by_hour || {}, nowH);
  renderChannels(sh.by_channel || {});
  renderChart(sh.by_hour || {}, sh.gmv || 0);
  renderHeatMap(sh.by_hour || {}, nowH);
  renderVelocidad(sh.by_hour || {}, sh.yesterday?.by_hour || {}, nowH);
  renderProducts(sh.top_products || [], sh.gmv || 0);
  renderTicker(sh.recent_orders || []);
  renderAds(meta);
  if (meta.configured && !meta.error && meta.spend > 0) renderMetaMini(meta);
}

// ── Proyección cierre del día ──────────────────────────────────────────────────
const GOAL = 133333;
const DAY_START = 7, DAY_END = 23;   // horas hábiles MX

function renderProyeccion(gmv, byHour, nowH) {
  const el = document.getElementById('proyecRow');
  if (!el) return;
  if (!gmv || nowH < DAY_START) { el.style.display = 'none'; return; }
  el.style.display = '';

  if (nowH >= DAY_END) {
    el.innerHTML = `<div><div class="proyec-lbl">Proyección cierre</div><div class="proyec-sub">Día terminado</div></div>
      <div class="proyec-val" style="color:var(--sub)">${MXN(gmv)}</div>`;
    return;
  }
  const elapsed   = Math.max(0.5, nowH - DAY_START + 0.5);
  const totalH    = DAY_END - DAY_START;
  const pace      = gmv / elapsed;           // $/hora actual
  const projected = Math.round(pace * totalH);
  const hoursLeft = DAY_END - nowH;
  const pctGoal   = projected / GOAL * 100;
  const clr       = projected >= GOAL ? 'var(--green)' : projected >= GOAL * .7 ? 'var(--yellow)' : 'var(--red)';
  const tag       = projected >= GOAL ? '🎯 Meta' : Math.round(pctGoal) + '% meta';

  el.innerHTML = `
    <div>
      <div class="proyec-lbl">Proyección cierre</div>
      <div class="proyec-sub">${MXN(Math.round(pace))}/hr · ${hoursLeft}h restantes</div>
    </div>
    <div style="text-align:right;">
      <div class="proyec-val" style="color:${clr}">${MXN(projected)}</div>
      <div class="proyec-sub">${tag}</div>
    </div>`;
}

// ── Heat map horario ───────────────────────────────────────────────────────────
function renderHeatMap(byHour, nowH) {
  const el    = document.getElementById('heatRow');
  if (!el) return;
  const hours = Array.from({length: DAY_END - DAY_START + 1}, (_, i) => i + DAY_START);
  const vals  = hours.map(h => byHour[h]?.gmv || 0);
  const maxV  = Math.max(1, ...vals);

  el.innerHTML = hours.map((h, i) => {
    const v       = vals[i];
    const pct     = v / maxV;
    const past    = h < nowH;
    const current = h === nowH;
    let bg;
    if (current)   bg = `rgba(62,207,142,${Math.max(.18, pct)})`;
    else if (past) bg = `rgba(193,100,82,${Math.max(.07, pct * .9)})`;
    else           bg = 'rgba(255,255,255,.03)';
    const border = current ? 'border:1px solid rgba(62,207,142,.45);box-sizing:border-box;' : '';
    return `<div class="heat-col">
      <div class="heat-bar" title="${h}:00 · ${v > 0 ? MXN(v) : '—'}" style="background:${bg};${border}"></div>
      <div class="heat-lbl">${h}</div>
    </div>`;
  }).join('');
}

// ── Velocidad de hora ──────────────────────────────────────────────────────────
function renderVelocidad(byHour, yesterdayByHour, nowH) {
  const el = document.getElementById('velocidadBadge');
  if (!el) return;
  const todayGmvH  = byHour[nowH]?.gmv          || 0;
  const yesterGmvH = yesterdayByHour?.[nowH]?.gmv || 0;
  if (!yesterGmvH || !todayGmvH) { el.textContent = ''; el.className = 'vel-badge'; return; }
  const diff = ((todayGmvH - yesterGmvH) / yesterGmvH) * 100;
  const cls  = diff > 5 ? 'up' : diff < -5 ? 'down' : 'flat';
  const icon = diff > 5 ? '🔥' : diff < -5 ? '❄️' : '→';
  el.className = `vel-badge ${cls}`;
  el.textContent = `${icon} ${diff > 0 ? '+' : ''}${diff.toFixed(0)}% esta hora`;
}

// ── Ticker de órdenes ──────────────────────────────────────────────────────────
function renderTicker(orders) {
  const strip = document.getElementById('tickerStrip');
  const track = document.getElementById('tickerTrack');
  if (!strip || !track || !orders?.length) { if (strip) strip.style.display = 'none'; return; }
  strip.style.display = '';

  // Triple para loop seamless
  const all = [...orders, ...orders, ...orders];
  track.innerHTML = all.map(o => {
    const col = CH_COLORS[o.channel] || '#888';
    return `<div class="t-item">
      <div class="t-dot" style="background:${col}"></div>
      <span class="t-prod">${o.product}</span>
      <span class="t-amt">${MXN(o.amount)}</span>
      <span class="t-time">${o.time}</span>
    </div><div class="t-sep">|</div>`;
  }).join('');

  track.style.animationDuration = `${Math.max(25, orders.length * 4)}s`;
}

// ── Ring + GMV ─────────────────────────────────────────────────────────────────
function updateRing(gmv) {
  const goal  = _goal || 0;
  const pct   = goal > 0 ? Math.min(gmv / goal, 1) : 0;
  const circ  = 2 * Math.PI * 82;  // r=82
  const offset = circ * (1 - pct);
  const fill   = document.getElementById('ringFill');
  fill.style.strokeDashoffset = offset;

  const pctEl = document.getElementById('ringPct');
  if (goal > 0) {
    pctEl.textContent = Math.round(pct * 100) + '% de ' + MXN(goal);
    // Color warning si <50%
    const gmvEl = document.getElementById('ringGmv');
    gmvEl.className = 'ring-gmv' + (pct < 0.5 && goal > 0 ? ' warn' : '');
  } else {
    pctEl.textContent = 'Toca ▸ Meta diaria para fijar objetivo';
    pctEl.style.fontSize = '7px';
  }
}

function renderHero(sh, meta) {
  const gmv  = sh.gmv || 0;
  const ayer = sh.yesterday || {};
  const el   = document.getElementById('ringGmv');
  animCount(el, gmv, v => MXN(v));
  updateRing(gmv);

  // Delta vs ayer (total del día)
  const deltaEl = document.getElementById('deltaRow');
  if (ayer.gmv > 0) {
    const diff  = ((gmv - ayer.gmv) / ayer.gmv) * 100;
    const cls   = diff > 2 ? 'up' : diff < -2 ? 'down' : 'flat';
    const arrow = diff > 2 ? '▲' : diff < -2 ? '▼' : '→';
    deltaEl.innerHTML = `
      <div class="delta-main">
        <div class="delta ${cls}">${arrow} ${PERC(diff)}</div>
        <div class="delta-lbl">vs ayer total ${MXN(ayer.gmv)}</div>
      </div>`;
  } else {
    deltaEl.innerHTML = `<div class="delta-lbl" style="font-size:8px;">Sin datos de ayer</div>`;
  }

  // Ayer a esta misma hora
  const shRow = document.getElementById('sameHourRow');
  if (ayer.gmv_same_hour !== undefined) {
    const shGmv  = ayer.gmv_same_hour || 0;
    const shTime = ayer.same_hour_time || '';
    // Compare current GMV vs yesterday-same-hour GMV
    const shDiff  = shGmv > 0 ? ((gmv - shGmv) / shGmv) * 100 : null;
    const shCls   = shDiff === null ? '' : shDiff > 2 ? 'sh-up' : shDiff < -2 ? 'sh-down' : '';
    const shArrow = shDiff === null ? '' : shDiff > 2 ? '▲' : shDiff < -2 ? '▼' : '→';
    const shPct   = shDiff !== null ? ` <span style="font-size:9px;font-weight:700;">${shArrow} ${Math.abs(shDiff).toFixed(1)}%</span>` : '';
    shRow.style.display = '';
    shRow.innerHTML = `
      <div class="delta-samehour">
        <div class="delta-sh-ico">🕐</div>
        <div class="delta-sh-lbl">Ayer a las ${shTime} · ${N(ayer.orders_same_hour || 0)} órdenes</div>
        <div class="delta-sh-val ${shCls}">${MXN(shGmv)}${shPct}</div>
      </div>`;
  } else {
    shRow.style.display = 'none';
  }
}

// ── KPIs ───────────────────────────────────────────────────────────────────────
function renderKPIs(sh, meta) {
  const spend = meta.spend || 0;
  const roas  = spend > 0 ? sh.gmv / spend : null;
  const roasC = roas === null ? '' : roas >= 5 ? 'green' : roas >= 2.5 ? 'yellow' : 'red';
  const roasT = roas !== null ? roas.toFixed(2) + '×' : '—';

  // Delta órdenes vs ayer
  const ayer = sh.yesterday || {};
  const ordDiff = ayer.orders > 0 ? ((sh.orders - ayer.orders) / ayer.orders * 100) : null;
  const ordDelta = ordDiff !== null
    ? `<div class="kpi-d" style="color:${ordDiff >= 0 ? 'var(--green)' : 'var(--red)'}">${PERC(ordDiff)} vs ayer</div>` : '';

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi">
      <div class="kpi-lbl">Órdenes</div>
      <div class="kpi-val">${N(sh.orders || 0)}</div>
      ${ordDelta}
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Ticket Prom.</div>
      <div class="kpi-val blue">${MXN(sh.aov || 0)}</div>
      <div class="kpi-d" style="color:var(--muted)">por orden</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Gasto Meta</div>
      <div class="kpi-val yellow">${spend > 0 ? MXN(spend) : '—'}</div>
      <div class="kpi-d" style="color:var(--muted)">${spend > 0 ? N(meta.impressions || 0) + ' impr.' : 'sin datos'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">ROAS · Shopify/Meta</div>
      <div class="kpi-val ${roasC}">${roasT}</div>
      <div class="kpi-d" style="color:var(--muted)">${roas !== null ? (roas >= 5 ? '🔥 Excelente' : roas >= 2.5 ? '✓ Positivo' : '⚠ Bajo') : 'sin Meta'}</div>
    </div>`;
}

// ── Channels ───────────────────────────────────────────────────────────────────
const CH_COLORS = { tiktok: '#ff3b5c', web: '#5b9cf6', pos: '#f5c518', android: '#3ecf8e', ios: '#a78bfa', shopify_draft_orders: '#c16452' };
const CH_LABELS = { tiktok: 'TikTok', web: 'Web', pos: 'POS', android: 'Android', ios: 'iOS', shopify_draft_orders: 'Draft' };

function renderChannels(byChannel) {
  const entries = Object.entries(byChannel).sort((a, b) => b[1].gmv - a[1].gmv);
  const total   = entries.reduce((s, [, v]) => s + v.gmv, 0);
  if (!total) return;

  const bar = entries.map(([ch, v]) => {
    const pct = (v.gmv / total * 100).toFixed(1);
    const col = CH_COLORS[ch] || '#888';
    return `<div class="ch-seg" style="width:${pct}%;background:${col};"></div>`;
  }).join('');

  const legend = entries.map(([ch, v]) => {
    const pct = (v.gmv / total * 100).toFixed(0);
    const col = CH_COLORS[ch] || '#888';
    const lbl = CH_LABELS[ch] || ch;
    return `<div class="ch-item"><div class="ch-dot" style="background:${col}"></div>${lbl} <span style="color:var(--sub);font-weight:700">${pct}%</span></div>`;
  }).join('');

  document.getElementById('channels').innerHTML = `
    <div class="ch-lbl">Canal de venta</div>
    <div class="ch-bar">${bar}</div>
    <div class="ch-legend">${legend}</div>`;
}

// ── SVG Area Chart ─────────────────────────────────────────────────────────────
function renderChart(byHour, totalGmv) {
  const W = 560, H = 80;
  const hours = Array.from({ length: 17 }, (_, i) => i + 7); // 7–23
  const vals  = hours.map(h => byHour[h]?.gmv || 0);
  const max   = Math.max(1, ...vals);
  const nowH  = parseInt(new Date().toLocaleTimeString('en-US', { timeZone: 'America/Mexico_City', hour: '2-digit', hour12: false }));

  document.getElementById('chartMeta').textContent  = totalGmv > 0 ? MXN(totalGmv) + ' · hoy' : '';
  document.getElementById('chartPeak').textContent  = max > 0 ? 'Pico ' + MXN(max) : '';

  // Smooth bezier points
  const pts = hours.map((h, i) => {
    const x = (i / (hours.length - 1)) * W;
    const y = H - (vals[i] / max) * (H - 8);
    return { x, y: vals[i] > 0 ? y : H };
  });

  let area = `M 0 ${H}`;
  let line = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 0; i < pts.length; i++) {
    if (i === 0) { area += ` L ${pts[0].x} ${pts[0].y}`; continue; }
    const cp1x = pts[i-1].x + (pts[i].x - pts[i-1].x) * 0.4;
    const cp2x = pts[i].x   - (pts[i].x - pts[i-1].x) * 0.4;
    area += ` C ${cp1x} ${pts[i-1].y} ${cp2x} ${pts[i].y} ${pts[i].x} ${pts[i].y}`;
    line += ` C ${cp1x} ${pts[i-1].y} ${cp2x} ${pts[i].y} ${pts[i].x} ${pts[i].y}`;
  }
  area += ` L ${W} ${H} Z`;

  document.getElementById('areaPath').setAttribute('d', area);
  document.getElementById('linePath').setAttribute('d', line);

  // Current hour dot
  const nowIdx = hours.indexOf(nowH);
  const dot    = document.getElementById('nowDot');
  if (nowIdx >= 0 && vals[nowIdx] > 0) {
    dot.setAttribute('cx', pts[nowIdx].x);
    dot.setAttribute('cy', pts[nowIdx].y);
    dot.style.display = '';
  } else {
    dot.style.display = 'none';
  }
}

// ── Products ───────────────────────────────────────────────────────────────────
const MEDALS = ['🥇', '🥈', '🥉'];

function renderProducts(products, totalGmv) {
  const metaEl = document.getElementById('prodMeta');
  if (!products.length) {
    metaEl.textContent = '';
    document.getElementById('prodList').innerHTML =
      `<div style="padding:30px 16px;text-align:center;color:var(--muted);font-size:11px;">Sin ventas aún hoy.</div>`;
    return;
  }
  metaEl.textContent = N(products.reduce((s, p) => s + p.units, 0)) + ' pares · ' + MXN(products.reduce((s, p) => s + p.gmv, 0));
  const maxGmv = products[0].gmv;

  document.getElementById('prodList').innerHTML = products.map((p, i) => {
    const medal = i < 3 ? `<div class="medal">${MEDALS[i]}</div>` : `<div class="rank-num">${i+1}</div>`;
    const img   = p.image
      ? `<img class="prod-img" src="${p.image}" loading="lazy" onerror="this.outerHTML='<div class=prod-img-ph>👟</div>'"/>`
      : `<div class="prod-img-ph">👟</div>`;
    return `<div class="prod-row">
      ${medal}
      ${img}
      <div class="prod-info">
        <div class="prod-name">${p.title}</div>
        <div class="prod-track"><div class="prod-fill" style="width:${Math.round(p.gmv/maxGmv*100)}%"></div></div>
      </div>
      <div class="prod-r">
        <div class="prod-gmv">${MXN(p.gmv)}</div>
        <div class="prod-units">${p.units} par${p.units !== 1 ? 'es' : ''}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Ads — card list ────────────────────────────────────────────────────────────
function renderAds(meta) {
  const scroll  = document.getElementById('adsScroll');
  const summary = document.getElementById('adsSummary');

  if (!meta || meta.configured === false) {
    summary.style.display = 'none';
    scroll.innerHTML = `<div class="ads-uncfg">
      <div class="ads-uncfg-ico">📡</div>
      <div class="ads-uncfg-txt">Agrega en Vercel:<br><br><code>META_TOKEN</code><br><code>META_ACCOUNT_ID</code></div>
    </div>`;
    return;
  }
  if (meta.error) {
    summary.style.display = 'none';
    scroll.innerHTML = `<div style="padding:16px;font-size:11px;color:var(--red);">Error Meta: ${meta.error}</div>`;
    return;
  }

  const ads = meta.active_ads || [];
  document.getElementById('adsMeta').textContent = ads.length ? `${ads.length} activo${ads.length !== 1 ? 's' : ''}` : 'sin anuncios';

  if (!ads.length) {
    summary.style.display = 'none';
    scroll.innerHTML = `<div class="ads-uncfg"><div class="ads-uncfg-ico">🎯</div><div class="ads-uncfg-txt">Sin anuncios activos.</div></div>`;
    return;
  }

  // ── Summary strip (account-level) ──────────────────────────────────────────
  const totalSpend  = meta.spend          || 0;
  const totalPurch  = meta.purchases      || 0;
  const roasShopify = totalSpend > 0 && _lastGmv ? _lastGmv / totalSpend : null;
  const roasC       = roasShopify === null ? 'var(--sub)' : roasShopify >= 5 ? 'var(--green)' : roasShopify >= 2.5 ? 'var(--yellow)' : 'var(--red)';

  summary.style.display = '';
  summary.innerHTML = `
    <div class="ads-sum-cell">
      <div class="ads-sum-val" style="color:var(--yellow)">${totalSpend > 0 ? MXN(totalSpend) : '—'}</div>
      <div class="ads-sum-lbl">Gasto total</div>
    </div>
    <div class="ads-sum-cell">
      <div class="ads-sum-val" style="color:${roasC}">${roasShopify !== null ? roasShopify.toFixed(1) + '×' : '—'}</div>
      <div class="ads-sum-lbl">ROAS real</div>
    </div>
    <div class="ads-sum-cell">
      <div class="ads-sum-val">${totalPurch > 0 ? totalPurch : '—'}</div>
      <div class="ads-sum-lbl">Compras Meta</div>
    </div>`;

  // ── Per-ad rows ─────────────────────────────────────────────────────────────
  const withData    = ads.filter(a => a.insights?.spend > 0);
  const withoutData = ads.filter(a => !(a.insights?.spend > 0));
  const maxSpend    = Math.max(1, ...withData.map(a => a.insights.spend));
  const MEDALS      = ['🥇','🥈','🥉'];

  const dataRows = withData.map((ad, i) => {
    const ins      = ad.insights;
    const roas     = ins.revenue > 0 ? ins.revenue / ins.spend : null;
    const roasClr  = roas === null ? 'var(--muted)' : roas >= 5 ? 'var(--green)' : roas >= 2.5 ? 'var(--yellow)' : 'var(--red)';
    const spendPct = Math.round(ins.spend / maxSpend * 100);
    const rank     = MEDALS[i] || `<span style="font-size:8px;color:var(--muted)">#${i+1}</span>`;
    const bg       = ad.thumbnail ? `background-image:url('${ad.thumbnail}')` : '';

    return `<div class="ad-row">
      <div class="ad-row-thumb" style="${bg}"></div>
      <div class="ad-row-body">
        <div class="ad-row-top">
          <div class="ad-row-rank">${rank}</div>
          <div class="ad-row-name">${ad.name}</div>
        </div>
        <div class="ad-row-stats">
          <div class="ad-row-stat" style="color:var(--yellow)">${MXN(ins.spend)}<span>gasto</span></div>
          <div style="width:1px;height:10px;background:rgba(255,255,255,.08);flex-shrink:0;"></div>
          <div class="ad-row-stat" style="color:${roasClr}">${roas !== null ? roas.toFixed(1)+'×' : '—'}<span>ROAS</span></div>
          ${ins.purchases > 0 ? `<div style="width:1px;height:10px;background:rgba(255,255,255,.08);flex-shrink:0;"></div>
          <div class="ad-row-stat" style="color:var(--green)">${ins.purchases}<span>comp.</span></div>` : ''}
        </div>
        <div class="ad-row-bar"><div class="ad-row-bar-fill" style="width:${spendPct}%;background:${roasClr};"></div></div>
      </div>
    </div>`;
  }).join('');

  const noDataRows = withoutData.map(ad => {
    const bg = ad.thumbnail ? `background-image:url('${ad.thumbnail}')` : '';
    return `<div class="ad-row no-data">
      <div class="ad-row-thumb" style="${bg}"></div>
      <div class="ad-row-name" style="flex:1;font-size:8px;">${ad.name}</div>
      <div class="ad-row-dot"></div>
    </div>`;
  }).join('');

  let html = '';
  if (withData.length) {
    html += `<div class="ads-section-hdr">Con gasto hoy · ${withData.length} anuncio${withData.length !== 1 ? 's' : ''}</div>`;
    html += dataRows;
  }
  if (withoutData.length) {
    html += `<div class="ads-section-hdr" style="margin-top:${withData.length ? '6px' : '0'};">Sin gasto hoy · ${withoutData.length} activo${withoutData.length !== 1 ? 's' : ''}</div>`;
    html += noDataRows;
  }
  scroll.innerHTML = html;
}

// ── Meta ROAS mini ─────────────────────────────────────────────────────────────
function renderMetaMini(meta) {
  const roas  = meta.purchase_value > 0 && meta.spend > 0 ? meta.purchase_value / meta.spend : null;
  const el    = document.getElementById('metaMini');
  if (!roas) return;
  el.style.display = '';
  const clr   = roas >= 5 ? 'var(--green)' : roas >= 2.5 ? 'var(--yellow)' : 'var(--red)';
  const pct   = Math.min(roas / 8 * 100, 100);
  document.getElementById('roasFill').style.cssText = `width:${pct}%;background:${clr};`;
  document.getElementById('roasVal').style.color = clr;
  document.getElementById('roasVal').textContent  = roas.toFixed(2) + '×';
}

load();
</script>
</body>
</html>
