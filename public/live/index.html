<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<link rel="icon" href="/favicon.ico"/>
<meta name="robots" content="noindex, nofollow"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>BDG · En Vivo</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── TOKENS ──────────────────────────────────────────────── */
:root{
  --bg:#0A0A0A;    --s1:#111111;    --s2:#1A1A1A;    --s3:#222222;
  --line:rgba(255,255,255,.07);
  --line2:rgba(255,255,255,.12);
  --muted:rgba(255,255,255,.3);
  --sub:rgba(255,255,255,.55);
  --txt:rgba(255,255,255,.92);
  --oxide:#B8432A;   --oxide2:#D4573E;  --oxide-dim:rgba(184,67,42,.12);
  --green:#3ECF8E;   --green-dim:rgba(62,207,142,.1);
  --yellow:#F5C518;  --yellow-dim:rgba(245,197,24,.1);
  --red:#F26B6B;     --red-dim:rgba(242,107,107,.1);
  --tiktok:#FF3B5C;  --tiktok-dim:rgba(255,59,92,.1);
  --web:#B8432A;
  --fn:'Jost',sans-serif;
  --fv:'EB Garamond',Georgia,serif;
  --r:4px;
  --chart-stroke:rgba(255,255,255,.55);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--fn);overflow:hidden;}
body{display:flex;flex-direction:column;}

/* ── TOPBAR ──────────────────────────────────────────────── */
.topbar{
  height:48px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);flex-shrink:0;
  background:rgba(10,10,10,.95);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
.tb-left{display:flex;align-items:center;gap:10px;}
.logo-img{height:16px;width:auto;display:block;filter:brightness(0) invert(1);}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid rgba(62,207,142,.25);background:rgba(62,207,142,.07);}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(62,207,142,.5)}60%{opacity:.6;box-shadow:0 0 0 4px rgba(62,207,142,0)}}
.pill-lbl{font-size:8px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:var(--green);}
.pill-hist{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid rgba(91,156,246,.2);background:rgba(91,156,246,.07);}
.pill-hist .pill-lbl{color:#5b9cf6;}
.tb-mid{display:flex;align-items:center;gap:4px;}
.date-nav-btn{padding:3px 8px;background:transparent;border:1px solid var(--line2);color:var(--muted);font-size:12px;cursor:pointer;font-family:var(--fn);line-height:1.4;transition:all .12s;}
.date-nav-btn:hover{background:rgba(255,255,255,.07);color:var(--txt);}
#datePicker{background:transparent;border:1px solid var(--line2);color:var(--txt);font-size:9px;font-family:var(--fn);padding:3px 6px;outline:none;cursor:pointer;letter-spacing:.04em;}
#datePicker::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer;}
.tb-right{display:flex;align-items:center;gap:8px;}
.countdown{font-size:9px;color:var(--muted);white-space:nowrap;}
.btn{padding:4px 10px;background:transparent;border:1px solid var(--line2);color:var(--muted);font-size:9px;font-weight:600;letter-spacing:.1em;cursor:pointer;font-family:var(--fn);transition:all .12s;}
.btn:hover{background:rgba(255,255,255,.07);color:var(--txt);}
.btn.tv-on{border-color:rgba(184,67,42,.4);color:var(--oxide);}
.btn-today{display:none;}
.back{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);text-decoration:none;}
.back:hover{color:var(--txt);}

/* ── PAGE — mobile: single column ───────────────────────── */
.page{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  display:flex;flex-direction:column;gap:8px;
  padding:10px 10px calc(10px + env(safe-area-inset-bottom));
  background:var(--bg);
}

/* ── CARDS / SHARED ──────────────────────────────────────── */
.card{background:var(--s1);border:1px solid var(--line);padding:16px;}
.sec-lbl{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px;}
.val{font-family:var(--fv);letter-spacing:-.01em;}

/* ── HERO CARD ───────────────────────────────────────────── */
.hero-card{background:var(--s1);border:1px solid var(--line);padding:20px 16px 16px;border-radius:var(--r);}
.hero-eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:12px;}
.hero-gmv{
  font-family:var(--fv);font-size:52px;font-weight:600;
  letter-spacing:-.03em;line-height:1;color:var(--txt);margin-bottom:2px;
}
.hero-gmv.warn{color:var(--yellow);}
.hero-goal{font-size:10px;color:var(--muted);margin-bottom:14px;}
/* Progress bar */
.prog-wrap{height:8px;background:rgba(255,255,255,.07);margin-bottom:14px;overflow:hidden;border-radius:4px;}
.prog-fill{height:100%;background:var(--oxide);transition:width 1s ease;width:0%;border-radius:4px;}
.prog-fill.done{background:var(--green);}
/* Deltas */
.delta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.delta{font-size:11px;font-weight:700;padding:3px 8px;letter-spacing:.02em;}
.delta.up{color:var(--green);background:var(--green-dim);}
.delta.down{color:var(--red);background:var(--red-dim);}
.delta.flat{color:var(--muted);background:rgba(255,255,255,.05);}
.delta-lbl{font-size:9px;color:var(--muted);}
/* Same hour */
.same-hour{
  margin-top:10px;padding:8px 12px;
  background:rgba(255,255,255,.03);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.sh-left{font-size:9px;color:var(--muted);}
.sh-val{font-family:var(--fv);font-size:15px;font-weight:600;color:var(--sub);}
.sh-val.sh-up{color:var(--green);}
.sh-val.sh-down{color:var(--red);}

/* ── CANAL SPLIT ─────────────────────────────────────────── */
.chan-split{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.chan-card{background:var(--s1);border:1px solid var(--line);padding:14px 14px 12px;position:relative;overflow:hidden;border-radius:var(--r);}
.chan-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.chan-card.tiktok::before{background:var(--tiktok);}
.chan-card.web::before{background:var(--oxide);}
.chan-card.other::before{background:var(--muted);}
.chan-name{font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:10px;}
.chan-card.tiktok .chan-name{color:var(--tiktok);}
.chan-card.web .chan-name{color:var(--oxide);}
.chan-card.other .chan-name{color:var(--muted);}
.chan-gmv{font-family:var(--fv);font-size:24px;font-weight:600;letter-spacing:-.02em;line-height:1;color:var(--txt);margin-bottom:4px;}
.chan-orders{font-size:9px;color:var(--muted);margin-bottom:6px;}
.chan-share{font-size:10px;font-weight:700;color:var(--sub);}
/* Split bar at bottom of section */
.chan-bar-wrap{height:2px;background:rgba(255,255,255,.06);display:flex;overflow:hidden;margin-top:-4px;}
.chan-bar-seg{height:100%;transition:width .9s ease;}

/* ── KPI ROW ─────────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.kpi{background:var(--s1);border:1px solid var(--line);padding:12px 12px 10px;border-radius:var(--r);transition:border-color .2s,box-shadow .2s;}
.kpi.alert-red{border-color:rgba(242,107,107,.4);box-shadow:0 0 12px rgba(242,107,107,.12);}
.kpi-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px;}
.kpi-val{font-family:var(--fv);font-size:22px;font-weight:600;letter-spacing:-.02em;line-height:1;}
.kpi-val.green{color:var(--green);}
.kpi-val.yellow{color:var(--yellow);}
.kpi-val.red{color:var(--red);}
.kpi-val.oxide{color:var(--oxide);}
.kpi-d{font-size:9px;color:var(--muted);margin-top:4px;}

/* ── INVENTARIO + PACING ─────────────────────────────────── */
.inv-card{background:var(--s1);border:1px solid var(--line);padding:12px 14px;border-radius:var(--r);}
.inv-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.inv-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;}
.inv-pills{display:flex;gap:5px;flex-wrap:wrap;}
.inv-pill{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;background:var(--s2);border:1px solid var(--line);border-radius:4px;min-width:36px;}
.inv-pill.critical{background:rgba(242,107,107,.1);border-color:rgba(242,107,107,.4);animation:pulseRed 1.8s infinite;}
.inv-pill.warn{background:rgba(245,197,24,.08);border-color:rgba(245,197,24,.3);}
@keyframes pulseRed{0%,100%{box-shadow:0 0 0 0 rgba(242,107,107,.3)}50%{box-shadow:0 0 0 4px rgba(242,107,107,0)}}
.inv-talla{font-size:8px;color:var(--muted);font-weight:600;letter-spacing:.06em;}
.inv-qty{font-family:var(--fv);font-size:15px;font-weight:600;line-height:1;}
.inv-pill.critical .inv-qty{color:var(--red);}
.inv-pill.warn .inv-qty{color:var(--yellow);}
/* Pacing */
.pace-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);}
.pace-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.pace-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;}
.pace-val{font-size:10px;font-weight:700;color:var(--sub);}
.pace-bar-wrap{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.pace-bar-fill{height:100%;border-radius:3px;transition:width .9s ease;}

/* ── PROYECCIÓN ──────────────────────────────────────────── */
.proj-card{background:var(--s1);border:1px solid var(--line);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-radius:var(--r);}
.proj-left .proj-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px;}
.proj-sub{font-size:9px;color:var(--muted);}
.proj-val{font-family:var(--fv);font-size:28px;font-weight:600;letter-spacing:-.02em;line-height:1;}
.proj-tag{font-size:9px;color:var(--muted);text-align:right;margin-top:2px;}

/* ── CHART ───────────────────────────────────────────────── */
.chart-card{background:var(--s1);border:1px solid var(--line);padding:14px 14px 10px;border-radius:var(--r);}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.chart-lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;}
.chart-peak{font-size:9px;color:var(--muted);}
.chart-vel{font-size:9px;font-weight:700;padding:2px 7px;}
.chart-vel.up{color:var(--green);background:var(--green-dim);}
.chart-vel.down{color:var(--red);background:var(--red-dim);}
.chart-vel.flat{color:var(--muted);background:rgba(255,255,255,.04);}
#areaSvg{width:100%;height:72px;display:block;overflow:visible;}
/* Heatmap (oculto en mobile, visible en desktop) */
.heat-row{display:none;gap:2px;padding:8px 14px 2px;}
.heat-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.heat-bar{width:100%;height:10px;transition:background .4s;}
.heat-lbl{font-size:7px;color:rgba(255,255,255,.22);text-align:center;}

/* ── PRODUCTS ────────────────────────────────────────────── */
.prod-card{background:var(--s1);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;}
.prod-hdr{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.prod-meta{font-size:9px;color:var(--muted);}
.prod-list{padding:4px 0;}
.prod-row{display:flex;align-items:center;gap:10px;padding:8px 14px;transition:background .1s;}
.prod-row:hover{background:rgba(255,255,255,.02);}
.medal{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.rank-num{font-size:10px;font-weight:700;color:var(--muted);width:18px;text-align:center;flex-shrink:0;}
.prod-img{width:36px;height:36px;border-radius:4px;object-fit:cover;background:var(--s2);flex-shrink:0;}
.prod-img-ph{width:36px;height:36px;border-radius:4px;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:rgba(255,255,255,.1);}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:10px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.prod-track{height:2px;background:rgba(255,255,255,.06);overflow:hidden;}
.prod-fill{height:100%;background:var(--oxide);}
.prod-r{text-align:right;flex-shrink:0;}
.prod-gmv{font-family:var(--fv);font-size:14px;font-weight:600;color:var(--txt);}
.prod-units{font-size:8px;color:var(--muted);margin-top:2px;}

/* ── ADS ─────────────────────────────────────────────────── */
.ads-card{background:var(--s1);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;}
.ads-hdr{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.ads-meta{font-size:9px;color:var(--muted);}
/* Summary strip */
.ads-strip{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--line);}
.ads-strip-cell{padding:10px 10px;text-align:center;}
.ads-strip-cell:not(:last-child){border-right:1px solid var(--line);}
.ads-strip-val{font-family:var(--fv);font-size:18px;font-weight:600;letter-spacing:-.02em;line-height:1;}
.ads-strip-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:3px;}
/* Ad rows */
.ads-list{padding:6px 8px;display:flex;flex-direction:column;gap:5px;}
.ad-row{display:flex;align-items:center;gap:10px;padding:8px 8px;background:var(--s2);border:1px solid rgba(255,255,255,.04);border-radius:4px;transition:border-color .12s;}
.ad-row:hover{border-color:var(--line2);}
.ad-thumb{width:52px;height:52px;border-radius:4px;flex-shrink:0;background:var(--s3);background-size:cover;background-position:center;}
.ad-body{flex:1;min-width:0;}
.ad-name{font-size:9px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
.ad-stats{display:flex;align-items:center;gap:6px;}
.ad-stat{font-size:9px;font-weight:700;}
.ad-stat span{font-size:7px;font-weight:400;color:var(--muted);margin-left:1px;}
.ad-sep{width:1px;height:10px;background:rgba(255,255,255,.08);flex-shrink:0;}
.ad-bar{height:3px;background:rgba(255,255,255,.06);margin-top:5px;overflow:hidden;border-radius:2px;}
.ad-bar-fill{height:100%;border-radius:2px;}
.ads-empty{padding:20px 14px;text-align:center;font-size:11px;color:var(--muted);}
.ads-uncfg{padding:24px 14px;text-align:center;}
.ads-uncfg-ico{font-size:24px;opacity:.15;margin-bottom:8px;}
.ads-uncfg-txt{font-size:9px;color:var(--muted);line-height:1.7;}
.ads-uncfg-txt code{font-size:8px;background:rgba(255,255,255,.07);padding:1px 5px;color:var(--sub);}

/* ── ALERTAS ─────────────────────────────────────────────── */
.ads-alerts{padding:6px 8px;display:flex;flex-direction:column;gap:3px;border-bottom:1px solid var(--line);}
.alert-pill{display:flex;align-items:flex-start;gap:6px;padding:5px 8px;border-radius:3px;font-size:9px;line-height:1.4;}
.alert-pill.red{background:rgba(242,107,107,.1);border:1px solid rgba(242,107,107,.25);color:var(--red);}
.alert-pill.yellow{background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.2);color:var(--yellow);}
.alert-ico{flex-shrink:0;font-size:10px;margin-top:1px;}

/* ── CAMPAÑAS ────────────────────────────────────────────── */
.camp-section{border-bottom:1px solid var(--line);}
.camp-hdr{padding:8px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.camp-hdr-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;}
.camp-toggle{font-size:8px;color:var(--muted);}
.camp-list{padding:0 8px 6px;}
.camp-row{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:3px;transition:background .1s;}
.camp-row:hover{background:rgba(255,255,255,.03);}
.camp-name{flex:1;min-width:0;font-size:9px;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.camp-kpis{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.camp-kpi{font-size:9px;font-weight:700;text-align:right;}
.camp-kpi span{font-size:7px;font-weight:400;color:var(--muted);display:block;}
.camp-pace-wrap{width:48px;height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;flex-shrink:0;}
.camp-pace-fill{height:100%;border-radius:2px;transition:width .6s ease;}

/* ── FREQUENCY BADGE ─────────────────────────────────────── */
.freq-badge{font-size:7px;font-weight:700;padding:1px 5px;border-radius:2px;flex-shrink:0;}
.freq-badge.ok{color:var(--green);background:var(--green-dim);}
.freq-badge.warn{color:var(--yellow);background:var(--yellow-dim);}
.freq-badge.hot{color:var(--red);background:var(--red-dim);}

/* ── TICKER ──────────────────────────────────────────────── */
.ticker-strip{display:none;height:30px;border-top:1px solid var(--line);align-items:center;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,.012);}
.ticker-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:0 14px;flex-shrink:0;border-right:1px solid var(--line);height:100%;display:flex;align-items:center;font-weight:600;}
.ticker-overflow{flex:1;overflow:hidden;mask-image:linear-gradient(to right,transparent 0%,black 5%,black 95%,transparent 100%);}
.ticker-track{display:flex;align-items:center;animation:tickScroll 35s linear infinite;will-change:transform;}
@keyframes tickScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.t-item{display:flex;align-items:center;gap:7px;padding:0 20px;white-space:nowrap;}
.t-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.t-prod{color:rgba(255,255,255,.6);font-weight:600;font-size:9px;max-width:180px;overflow:hidden;text-overflow:ellipsis;}
.t-amt{color:var(--green);font-weight:700;font-size:10px;}
.t-time{color:rgba(255,255,255,.2);font-size:8px;}
.t-sep{color:rgba(255,255,255,.07);font-size:16px;padding:0 4px;}

/* ── SALE FLASH ──────────────────────────────────────────── */
#saleFlash{position:fixed;inset:0;pointer-events:none;z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;}
#saleFlash.fire{animation:salePop .8s ease-out forwards;}
@keyframes salePop{0%{opacity:0;transform:scale(.8);}15%{opacity:1;transform:scale(1.06);}40%{opacity:1;transform:scale(1);}100%{opacity:0;transform:scale(1.04);}}
.sale-badge{background:linear-gradient(135deg,#0d2018,#1a3a28);border:1px solid rgba(62,207,142,.3);border-radius:var(--r);padding:14px 22px;display:flex;align-items:center;gap:10px;box-shadow:0 0 40px rgba(62,207,142,.2),0 4px 24px rgba(0,0,0,.6);}
.sale-icon{font-size:22px;}
.sale-txt{font-size:13px;font-weight:700;color:var(--green);letter-spacing:.04em;}
.sale-amt{font-size:11px;color:rgba(62,207,142,.7);font-weight:600;}

/* ── SKELETON ────────────────────────────────────────────── */
.sk{background:linear-gradient(90deg,#161616 25%,#222 50%,#161616 75%);background-size:200% 100%;animation:sh 1.3s infinite;}
@keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── TV MODE ─────────────────────────────────────────────── */
body.tv .hero-gmv{font-size:72px;}
body.tv .kpi-val{font-size:32px;}
body.tv .chan-gmv{font-size:34px;}
body.tv .prod-name{font-size:13px;}
body.tv .prod-gmv{font-size:17px;}
body.tv .prod-img{width:44px;height:44px;}
body.tv .ticker-strip{display:flex;}
body.tv .heat-row{display:flex;}

/* ── DESKTOP (≥900px): 3-column grid ────────────────────── */
@media(min-width:900px){
  html,body{overflow:hidden;}
  .page{
    display:grid;
    grid-template-columns:310px 1fr 300px;
    grid-template-rows:auto;
    grid-template-areas:
      "hero   chart  ads"
      "chans  chart  ads"
      "kpis   prods  ads"
      "inv    prods  ads"
      "proj   prods  ads";
    gap:1px;
    padding:0;
    background:var(--line);
    overflow:hidden;
  }
  .hero-card { grid-area:hero;  overflow:hidden; }
  .chan-split { grid-area:chans; display:flex; gap:1px; background:var(--line); }
  .chan-card  { flex:1; border:none; }
  .kpi-row   { grid-area:kpis;  display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); }
  .kpi       { border:none; }
  .inv-card  { grid-area:inv;   border:none; border-top:1px solid var(--line); border-radius:0; }
  .proj-card { grid-area:proj;  border:none; border-top:1px solid var(--line); border-radius:0; }
  .chart-card{ grid-area:chart; border:none; border-right:1px solid var(--line); border-left:1px solid var(--line); }
  .heat-row  { display:flex; }
  .prod-card { grid-area:prods; border:none; border-right:1px solid var(--line); border-left:1px solid var(--line); overflow-y:auto; }
  .ads-card  { grid-area:ads;   border:none; overflow-y:auto; display:flex; flex-direction:column; }
  .ads-list  { flex:1; overflow-y:auto; }
  .ticker-strip { display:flex; }
  .chan-bar-wrap { display:none; }
  .page>*{background:var(--s1);}
}

/* Scrollbar */
::-webkit-scrollbar{width:2px;height:2px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);}
</style>
</head>

<!-- TOPBAR -->
<div class="topbar">

<!-- PAGE -->

<!-- TICKER (desktop/TV) -->

<script>
// ── Utils ──────────────────────────────────────────────────
const MXN  = n => '$' + Math.round(n).toLocaleString('es-MX');
const N    = n => parseInt(n).toLocaleString('es-MX');
const PERC = n => (n >= 0 ? '+' : '') + n.toFixed(1) + '%';

function animCount(el, target, fmt, dur = 900) {
  const start = performance.now();
  (function step(now) {
    const p = Math.min((now - start) / dur, 1);
    const e = 1 - Math.pow(1 - p, 3);
    el.textContent = fmt(target * e);
    if (p < 1) requestAnimationFrame(step);
  })(performance.now());
}

// ── Meta fija ──────────────────────────────────────────────
const GOAL = 133333;
const DAY_START = 7, DAY_END = 23;

// ── Date state ─────────────────────────────────────────────
function mxToday() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'America/Mexico_City' });
}
let _selectedDate = mxToday();

function initDatePicker() {
  const p = document.getElementById('datePicker');
  p.max = p.value = _selectedDate;
}

function onDateChange() {
  _selectedDate = document.getElementById('datePicker').value || mxToday();
  updateDateUI(); load(true);
}

function changeDate(d) {
  const nd = new Date(_selectedDate + 'T12:00:00');
  nd.setDate(nd.getDate() + d);
  const s = nd.toISOString().slice(0, 10);
  if (s > mxToday()) return;
  _selectedDate = s;
  document.getElementById('datePicker').value = s;
  updateDateUI(); load(true);
}

function goToday() {
  _selectedDate = mxToday();
  document.getElementById('datePicker').value = _selectedDate;
  updateDateUI(); load(true);
}

function updateDateUI() {
  const today   = mxToday();
  const isToday = _selectedDate === today;
  const nextBtn = document.getElementById('dateNextBtn');
  const todayBtn = document.getElementById('todayBtn');
  const pill = document.getElementById('livePill');
  nextBtn.disabled = isToday;
  nextBtn.style.opacity = isToday ? '.3' : '';
  todayBtn.style.display = isToday ? 'none' : '';
  if (isToday) {
    pill.className = 'pill';
    pill.innerHTML = '<div class="dot"></div><div class="pill-lbl">En Vivo</div>';
  } else {
    const [y, m, dd] = _selectedDate.split('-');
    pill.className = 'pill-hist';
    pill.innerHTML = `<div class="pill-lbl">📅 ${dd}/${m}/${y}</div>`;
  }
  document.getElementById('datePicker').max = today;
}

// ── TV mode ────────────────────────────────────────────────
let _tv = false;
function toggleTV() {
  _tv = !_tv;
  document.body.classList.toggle('tv', _tv);
  const b = document.getElementById('tvBtn');
  b.classList.toggle('tv-on', _tv);
  b.textContent = _tv ? '✕ TV' : 'TV';
}

// ── Countdown ──────────────────────────────────────────────
let _timer = null, _cd = 60;
function startCountdown() {
  clearInterval(_timer); _cd = 60;
  _timer = setInterval(() => {
    _cd--;
    document.getElementById('countdown').textContent = `${_cd}s`;
    if (_cd <= 0) { clearInterval(_timer); load(); }
  }, 1000);
}

// ── Sale sound ─────────────────────────────────────────────
let _audioCtx = null;
function getAudio() {
  if (!_audioCtx) try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  return _audioCtx;
}
function playSaleSound() {
  const ctx = getAudio(); if (!ctx) return;
  const now = ctx.currentTime;
  [[660,0,.12,.08],[880,.1,.12,.07],[1100,.18,.09,.06]].forEach(([freq,delay,dur,vol]) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(freq, now+delay);
    o.frequency.exponentialRampToValueAtTime(freq*.92, now+delay+dur);
    g.gain.setValueAtTime(vol, now+delay);
    g.gain.exponentialRampToValueAtTime(.001, now+delay+dur+.15);
    o.connect(g); g.connect(ctx.destination);
    o.start(now+delay); o.stop(now+delay+dur+.2);
  });
}

// ── Sale flash ─────────────────────────────────────────────
let _flashTO = null;
function fireSaleFlash(n, prod) {
  const flash = document.getElementById('saleFlash');
  document.getElementById('saleFlashTxt').textContent = n === 1 ? '¡Venta nueva!' : `¡+${n} ventas!`;
  document.getElementById('saleFlashAmt').textContent = prod || '';
  flash.classList.remove('fire');
  void flash.offsetWidth;
  flash.classList.add('fire');
  clearTimeout(_flashTO);
  _flashTO = setTimeout(() => flash.classList.remove('fire'), 900);
  playSaleSound();
}

// ── Load ───────────────────────────────────────────────────
let _lastGmv = null, _lastOrders = null;

async function load(force = false) {
  clearInterval(_timer);
  const today = mxToday(), isToday = _selectedDate === today;
  document.getElementById('countdown').textContent = '…';
  try {
    let url = '/api/live';
    const p = []; if (!isToday) p.push('date='+_selectedDate); if (force) p.push('t='+Date.now());
    if (p.length) url += '?' + p.join('&');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const newOrders = data.shopify?.orders || 0;
    const prevOrders = _lastOrders;
    _lastGmv    = data.shopify?.gmv || 0;
    _lastOrders = newOrders;
    renderAll(data, isToday);
    if (isToday && prevOrders !== null && newOrders > prevOrders) {
      fireSaleFlash(newOrders - prevOrders, data.shopify?.top_products?.[0]?.title || '');
    }
  } catch(e) {
    document.getElementById('heroGmv').textContent = '—';
    document.getElementById('countdown').textContent = 'Error: ' + e.message;
  }
  if (isToday) startCountdown();
  else document.getElementById('countdown').textContent = _selectedDate;
}

document.addEventListener('click', () => getAudio(), { once: true });
initDatePicker(); updateDateUI();

// ── Render all ─────────────────────────────────────────────
function renderAll(data, isToday = true) {
  const sh   = data.shopify || {};
  const meta = data.meta    || {};
  const nowH = isToday
    ? parseInt(new Date().toLocaleTimeString('en-US', { timeZone:'America/Mexico_City', hour:'2-digit', hour12:false }))
    : 23;

  renderHero(sh, isToday);
  renderChannelSplit(sh.by_channel || {}, sh.gmv || 0);
  renderKPIs(sh, meta, isToday);
  renderInventarioPacing(sh);
  if (isToday) renderProyeccion(sh.gmv || 0, sh.by_hour || {}, nowH);
  else { const el = document.getElementById('projCard'); if(el) el.style.display='none'; }
  renderChart(sh.by_hour || {}, sh.gmv || 0, isToday ? nowH : -1);
  renderHeatMap(sh.by_hour || {}, isToday ? nowH : 24);
  if (isToday) renderVelocidad(sh.by_hour || {}, sh.yesterday?.by_hour || {}, nowH);
  renderProducts(sh.top_products || [], sh.gmv || 0);
  renderTicker(sh.recent_orders || []);
  renderAds(meta, isToday);
}

// ── Hero ───────────────────────────────────────────────────
function renderHero(sh, isToday) {
  const gmv  = sh.gmv || 0;
  const ayer = sh.yesterday || {};
  const el   = document.getElementById('heroGmv');
  animCount(el, gmv, v => MXN(v));

  // Progress bar
  const pct  = Math.min(gmv / GOAL, 1);
  const fill = document.getElementById('progFill');
  fill.style.width = (pct * 100).toFixed(1) + '%';
  fill.className   = 'prog-fill' + (pct >= 1 ? ' done' : '');
  document.getElementById('heroGmv').className = 'hero-gmv' + (pct < .5 && isToday ? ' warn' : '');
  document.getElementById('heroGoal').textContent = Math.round(pct * 100) + '% de ' + MXN(GOAL);

  // Delta vs ayer
  const dRow = document.getElementById('deltaRow');
  if (ayer.gmv > 0) {
    const diff = (gmv - ayer.gmv) / ayer.gmv * 100;
    const cls  = diff > 2 ? 'up' : diff < -2 ? 'down' : 'flat';
    const arr  = diff > 2 ? '▲' : diff < -2 ? '▼' : '→';
    dRow.innerHTML = `<div class="delta ${cls}">${arr} ${PERC(diff)}</div><div class="delta-lbl">vs ayer (${MXN(ayer.gmv)})</div>`;
  } else {
    dRow.innerHTML = `<div class="delta-lbl">Sin datos de ayer</div>`;
  }

  // Same-hour
  const shWrap = document.getElementById('sameHourWrap');
  if (isToday && ayer.gmv_same_hour !== undefined) {
    const shGmv = ayer.gmv_same_hour || 0;
    const shDiff = shGmv > 0 ? (gmv - shGmv) / shGmv * 100 : null;
    const shCls  = shDiff === null ? '' : shDiff > 2 ? 'sh-up' : shDiff < -2 ? 'sh-down' : '';
    const shArr  = shDiff === null ? '' : shDiff > 2 ? ' ▲' : shDiff < -2 ? ' ▼' : ' →';
    const shPctTxt = shDiff !== null ? `${shArr} ${Math.abs(shDiff).toFixed(1)}%` : '';
    shWrap.innerHTML = `<div class="same-hour">
      <div class="sh-left">Ayer a las ${ayer.same_hour_time || '--'} · ${N(ayer.orders_same_hour||0)} órdenes</div>
      <div class="sh-val ${shCls}">${MXN(shGmv)}${shPctTxt}</div>
    </div>`;
  } else {
    shWrap.innerHTML = '';
  }
}

// ── Canal Split ────────────────────────────────────────────
const CHAN_CFG = {
  tiktok: { label: 'TikTok',        cls: 'tiktok', color: '#FF3B5C' },
  web:    { label: 'Online Store',   cls: 'web',    color: '#B8432A' },
};

function renderChannelSplit(byChannel, totalGmv) {
  const wrap = document.getElementById('chanSplit');
  if (!totalGmv) return;

  const main = ['tiktok', 'web'];
  // "Otros" = everything else with GMV
  const otherGmv    = Object.entries(byChannel)
    .filter(([k]) => !main.includes(k))
    .reduce((s, [,v]) => s + (v.gmv||0), 0);
  const otherOrders = Object.entries(byChannel)
    .filter(([k]) => !main.includes(k))
    .reduce((s, [,v]) => s + (v.orders||0), 0);

  const cards = main.map(key => {
    const cfg = CHAN_CFG[key];
    const d   = byChannel[key] || { gmv: 0, orders: 0 };
    const pct = totalGmv > 0 ? (d.gmv / totalGmv * 100) : 0;
    return `<div class="chan-card ${cfg.cls}">
      <div class="chan-name">${cfg.label}</div>
      <div class="chan-gmv">${MXN(d.gmv)}</div>
      <div class="chan-orders">${N(d.orders)} orden${d.orders !== 1 ? 'es' : ''}</div>
      <div class="chan-share">${pct.toFixed(1)}%</div>
    </div>`;
  }).join('');

  // Bar showing split
  const tiktokPct = totalGmv > 0 ? ((byChannel.tiktok?.gmv||0) / totalGmv * 100).toFixed(1) : 0;
  const webPct    = totalGmv > 0 ? ((byChannel.web?.gmv||0) / totalGmv * 100).toFixed(1) : 0;
  const otherPct  = totalGmv > 0 ? (otherGmv / totalGmv * 100).toFixed(1) : 0;

  const bar = `<div class="chan-bar-wrap">
    <div class="chan-bar-seg" style="width:${tiktokPct}%;background:#FF3B5C;"></div>
    <div class="chan-bar-seg" style="width:${webPct}%;background:#B8432A;"></div>
    ${otherPct > 0 ? `<div class="chan-bar-seg" style="width:${otherPct}%;background:rgba(255,255,255,.2);"></div>` : ''}
  </div>`;

  wrap.innerHTML = cards + bar;
}

// ── KPIs ───────────────────────────────────────────────────
function renderKPIs(sh, meta, isToday) {
  const spend = isToday ? (meta.spend || 0) : 0;
  const roas  = spend > 0 ? sh.gmv / spend : null;
  const roasC = roas === null ? '' : roas >= 5 ? 'green' : roas >= 2.5 ? 'yellow' : 'red';
  const ayer  = sh.yesterday || {};
  const ordDiff = ayer.orders > 0 ? ((sh.orders - ayer.orders) / ayer.orders * 100) : null;

  const roasAlert = roas !== null && roas < 2.5 ? ' alert-red' : '';
  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi">
      <div class="kpi-lbl">Órdenes</div>
      <div class="kpi-val">${N(sh.orders || 0)}</div>
      ${ordDiff !== null ? `<div class="kpi-d" style="color:${ordDiff>=0?'var(--green)':'var(--red)'}">${PERC(ordDiff)} ayer</div>` : ''}
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Ticket prom.</div>
      <div class="kpi-val oxide">${MXN(sh.aov || 0)}</div>
      <div class="kpi-d">por orden</div>
    </div>
    <div class="kpi${roasAlert}">
      <div class="kpi-lbl">ROAS</div>
      <div class="kpi-val ${roasC}">${roas !== null ? roas.toFixed(2)+'×' : '—'}</div>
      <div class="kpi-d">${roas !== null ? (roas>=5?'🔥 Excelente':roas>=2.5?'✓ Positivo':'⚠ Bajo') : 'sin Meta'}</div>
    </div>`;
}

// ── Inventario + Pacing ────────────────────────────────────
const PROD_TECHO = 90;
function renderInventarioPacing(sh) {
  const card = document.getElementById('invCard');
  const inventory = sh.inventory || [];
  if (!inventory.length) { card.style.display = 'none'; return; }
  card.style.display = '';

  const total = inventory.reduce((s, t) => s + (t.quantity || 0), 0);
  document.getElementById('invMeta').textContent = total + ' pares totales';

  document.getElementById('invPills').innerHTML = inventory.map(t => {
    const q = t.quantity || 0;
    const cls = q === 0 ? 'critical' : q < 20 ? 'critical' : q < 40 ? 'warn' : '';
    return `<div class="inv-pill ${cls}">
      <div class="inv-talla">${t.size || t.name}</div>
      <div class="inv-qty">${q}</div>
    </div>`;
  }).join('');

  // Pacing: pares vendidos hoy vs techo
  const pares = sh.units_sold || 0;
  if (pares > 0) {
    const paceWrap = document.getElementById('paceWrap');
    const pct = Math.min(pares / PROD_TECHO, 1);
    const clr = pct >= 1 ? 'var(--red)' : pct >= .8 ? 'var(--yellow)' : 'var(--green)';
    paceWrap.style.display = '';
    document.getElementById('paceVal').textContent = `${pares} / ${PROD_TECHO} pares`;
    document.getElementById('paceVal').style.color = clr;
    document.getElementById('paceBar').style.width = (pct * 100).toFixed(1) + '%';
    document.getElementById('paceBar').style.background = clr;
  }
}

// ── Proyección ─────────────────────────────────────────────
function renderProyeccion(gmv, byHour, nowH) {
  const el = document.getElementById('projCard');
  if (!el) return;
  if (!gmv || nowH < DAY_START) { el.style.display = 'none'; return; }
  el.style.display = '';
  if (nowH >= DAY_END) {
    el.innerHTML = `<div class="proj-left"><div class="proj-lbl">Proyección cierre</div><div class="proj-sub">Día terminado</div></div><div class="proj-val" style="color:var(--sub)">${MXN(gmv)}</div>`;
    return;
  }
  const elapsed   = Math.max(.5, nowH - DAY_START + .5);
  const pace      = gmv / elapsed;
  const projected = Math.round(pace * (DAY_END - DAY_START));
  const hoursLeft = DAY_END - nowH;
  const pctGoal   = projected / GOAL * 100;
  const clr = projected >= GOAL ? 'var(--green)' : projected >= GOAL*.7 ? 'var(--yellow)' : 'var(--red)';
  const tag = projected >= GOAL ? '🎯 Meta' : Math.round(pctGoal) + '% meta';
  el.innerHTML = `
    <div class="proj-left">
      <div class="proj-lbl">Proyección cierre</div>
      <div class="proj-sub">${MXN(Math.round(pace))}/hr · ${hoursLeft}h restantes</div>
    </div>
    <div style="text-align:right;">
      <div class="proj-val" style="color:${clr}">${MXN(projected)}</div>
      <div class="proj-tag">${tag}</div>
    </div>`;
}

// ── Velocidad ──────────────────────────────────────────────
function renderVelocidad(byHour, yesterByHour, nowH) {
  const el = document.getElementById('velBadge');
  if (!el) return;
  const hoy   = byHour[nowH]?.gmv        || 0;
  const ayer  = yesterByHour?.[nowH]?.gmv || 0;
  if (!ayer || !hoy) { el.textContent = ''; el.className = 'chart-vel'; return; }
  const diff = (hoy - ayer) / ayer * 100;
  const cls  = diff > 5 ? 'up' : diff < -5 ? 'down' : 'flat';
  const ico  = diff > 5 ? '🔥' : diff < -5 ? '❄️' : '→';
  el.className = `chart-vel ${cls}`;
  el.textContent = `${ico} ${diff > 0 ? '+' : ''}${diff.toFixed(0)}% esta hora`;
}

// ── Chart ──────────────────────────────────────────────────
function renderChart(byHour, totalGmv, nowH = -1) {
  const W = 560, H = 72;
  const hours = Array.from({length:17}, (_, i) => i + 7);
  const vals  = hours.map(h => byHour[h]?.gmv || 0);
  const max   = Math.max(1, ...vals);
  document.getElementById('chartPeak').textContent = max > 1 ? 'pico ' + MXN(max) : '';
  const pts = hours.map((h, i) => ({
    x: (i / (hours.length - 1)) * W,
    y: vals[i] > 0 ? H - (vals[i] / max) * (H - 8) : H
  }));
  let area = `M 0 ${H}`, line = `M ${pts[0].x} ${pts[0].y}`;
  for (let i = 1; i < pts.length; i++) {
    const cp1x = pts[i-1].x + (pts[i].x - pts[i-1].x) * .4;
    const cp2x = pts[i].x   - (pts[i].x - pts[i-1].x) * .4;
    area += ` C ${cp1x} ${pts[i-1].y} ${cp2x} ${pts[i].y} ${pts[i].x} ${pts[i].y}`;
    line += ` C ${cp1x} ${pts[i-1].y} ${cp2x} ${pts[i].y} ${pts[i].x} ${pts[i].y}`;
    if (i === 0) area += ` L ${pts[0].x} ${pts[0].y}`;
  }
  area += ` L ${W} ${H} Z`;
  document.getElementById('areaPath').setAttribute('d', area);
  document.getElementById('linePath').setAttribute('d', line);
  const nowIdx = hours.indexOf(nowH);
  const dot = document.getElementById('nowDot');
  if (nowIdx >= 0 && vals[nowIdx] > 0) {
    dot.setAttribute('cx', pts[nowIdx].x); dot.setAttribute('cy', pts[nowIdx].y); dot.style.display = '';
  } else dot.style.display = 'none';
}

// ── Heat map ───────────────────────────────────────────────
function renderHeatMap(byHour, nowH) {
  const el = document.getElementById('heatRow');
  if (!el) return;
  const hours = Array.from({length: DAY_END - DAY_START + 1}, (_, i) => i + DAY_START);
  const vals  = hours.map(h => byHour[h]?.gmv || 0);
  const maxV  = Math.max(1, ...vals);
  el.innerHTML = hours.map((h, i) => {
    const v = vals[i], pct = v / maxV;
    const past = h < nowH, cur = h === nowH;
    let bg = cur ? `rgba(62,207,142,${Math.max(.2,pct)})` : past ? `rgba(184,67,42,${Math.max(.08,pct*.9)})` : 'rgba(255,255,255,.03)';
    const bdr = cur ? 'border:1px solid rgba(62,207,142,.4);' : '';
    return `<div class="heat-col"><div class="heat-bar" title="${h}:00 · ${v>0?MXN(v):'—'}" style="background:${bg};${bdr}"></div><div class="heat-lbl">${h}</div></div>`;
  }).join('');
}

// ── Products ───────────────────────────────────────────────
const MEDALS = ['🥇','🥈','🥉'];
function renderProducts(products, totalGmv) {
  const meta = document.getElementById('prodMeta');
  if (!products.length) {
    meta.textContent = '';
    document.getElementById('prodList').innerHTML = `<div style="padding:24px;text-align:center;font-size:11px;color:var(--muted);">Sin ventas aún hoy</div>`;
    return;
  }
  meta.textContent = N(products.reduce((s,p)=>s+p.units,0)) + ' pares';
  const maxGmv = products[0].gmv;
  document.getElementById('prodList').innerHTML = products.slice(0, 8).map((p, i) => {
    const badge = i < 3 ? `<div class="medal">${MEDALS[i]}</div>` : `<div class="rank-num">${i+1}</div>`;
    const img   = p.image
      ? `<img class="prod-img" src="${p.image}" loading="lazy" onerror="this.outerHTML='<div class=prod-img-ph>👟</div>'"/>`
      : `<div class="prod-img-ph">👟</div>`;
    return `<div class="prod-row">
      ${badge}${img}
      <div class="prod-info">
        <div class="prod-name">${p.title}</div>
        <div class="prod-track"><div class="prod-fill" style="width:${Math.round(p.gmv/maxGmv*100)}%"></div></div>
      </div>
      <div class="prod-r">
        <div class="prod-gmv">${MXN(p.gmv)}</div>
        <div class="prod-units">${p.units} par${p.units!==1?'es':''}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Ticker ─────────────────────────────────────────────────
const CH_COLORS = { tiktok:'#FF3B5C', web:'#B8432A', pos:'#F5C518', android:'#3ECF8E', ios:'#a78bfa', shopify_draft_orders:'#F5C518' };
function renderTicker(orders) {
  const strip = document.getElementById('tickerStrip');
  const track = document.getElementById('tickerTrack');
  if (!strip || !track || !orders?.length) { if(strip) strip.style.display='none'; return; }
  // Ticker only shows in TV/desktop via CSS
  const all = [...orders,...orders,...orders];
  track.innerHTML = all.map(o => {
    const col = CH_COLORS[o.channel] || '#888';
    return `<div class="t-item"><div class="t-dot" style="background:${col}"></div><span class="t-prod">${o.product}</span><span class="t-amt">${MXN(o.amount)}</span><span class="t-time">${o.time}</span></div><div class="t-sep">|</div>`;
  }).join('');
  track.style.animationDuration = `${Math.max(25, orders.length*4)}s`;
}

// ── Ads ────────────────────────────────────────────────────
const CPM_BENCH = 67;

function renderAds(meta, isToday) {
  const inner = document.getElementById('adsInner');
  const metaEl = document.getElementById('adsMeta');

  if (!meta || meta.configured === false) {
    inner.innerHTML = `<div class="ads-uncfg"><div class="ads-uncfg-ico">📡</div><div class="ads-uncfg-txt">Configura <code>META_TOKEN</code> y <code>META_ACCOUNT_ID</code> en Vercel</div></div>`;
    return;
  }
  if (meta.error) {
    inner.innerHTML = `<div style="padding:14px;font-size:11px;color:var(--red);">Error Meta: ${meta.error}</div>`;
    return;
  }

  const ads       = meta.active_ads  || [];
  const campaigns = meta.campaigns   || [];
  const anomalies = meta.anomalies   || [];
  metaEl.textContent = ads.length ? `${ads.length} ads · ${campaigns.length} camps` : '';

  const totalSpend = meta.spend || 0;
  const totalPurch = meta.purchases || 0;
  const roasShop   = totalSpend > 0 && _lastGmv ? _lastGmv / totalSpend : null;
  const roasC = roasShop === null ? 'var(--sub)' : roasShop>=5?'var(--green)':roasShop>=2.5?'var(--yellow)':'var(--red)';

  // ── Summary strip
  const strip = `<div class="ads-strip">
    <div class="ads-strip-cell">
      <div class="ads-strip-val" style="color:var(--yellow)">${totalSpend>0?MXN(totalSpend):'—'}</div>
      <div class="ads-strip-lbl">Gasto</div>
    </div>
    <div class="ads-strip-cell">
      <div class="ads-strip-val" style="color:${roasC}">${roasShop!==null?roasShop.toFixed(1)+'×':'—'}</div>
      <div class="ads-strip-lbl">ROAS caja</div>
    </div>
    <div class="ads-strip-cell">
      <div class="ads-strip-val">${meta.ctr>0?meta.ctr.toFixed(2)+'%':'—'}</div>
      <div class="ads-strip-lbl">CTR cta.</div>
    </div>
  </div>`;

  // ── Alertas
  const alertsHtml = anomalies.length ? `<div class="ads-alerts">
    ${anomalies.map(a => `<div class="alert-pill ${a.level}">
      <div class="alert-ico">${a.level==='red'?'🔴':'🟡'}</div>
      <div>${a.msg}</div>
    </div>`).join('')}
  </div>` : '';

  // ── Campañas (colapsable)
  let campHtml = '';
  if (campaigns.length) {
    const rows = campaigns.map(c => {
      const pct     = c.pacing !== null ? Math.min(c.pacing, 1) : 0;
      const expPct  = c.pacing_expected || 0;
      const behind  = c.pacing !== null && c.pacing < expPct * 0.5;
      const over    = c.pacing !== null && c.pacing > 1.02;
      const pClr    = over ? 'var(--red)' : behind ? 'var(--yellow)' : 'var(--green)';
      const cpmClr  = c.cpm > CPM_BENCH * 1.8 ? 'var(--red)' : c.cpm > CPM_BENCH * 1.3 ? 'var(--yellow)' : 'var(--sub)';
      const budgetTxt = c.budget > 0 ? `${Math.round(pct*100)}% de ${MXN(c.budget)}` : 'sin budget';
      return `<div class="camp-row" title="${budgetTxt}">
        <div class="camp-name">${c.name}</div>
        <div class="camp-kpis">
          <div class="camp-kpi" style="color:${cpmClr}">$${Math.round(c.cpm)}<span>CPM</span></div>
          <div class="camp-kpi" style="color:var(--muted)">${c.ctr>0?c.ctr.toFixed(2)+'%':'—'}<span>CTR</span></div>
          <div class="camp-kpi" style="color:var(--yellow)">${MXN(c.spend)}<span>gasto</span></div>
          <div class="camp-pace-wrap" title="${budgetTxt}">
            <div class="camp-pace-fill" style="width:${(pct*100).toFixed(1)}%;background:${pClr};"></div>
          </div>
        </div>
      </div>`;
    }).join('');
    campHtml = `<div class="camp-section">
      <div class="camp-hdr" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none';this.querySelector('.camp-toggle').textContent=this.nextElementSibling.style.display===''?'▲':'▼'">
        <div class="camp-hdr-lbl">Campañas · ${campaigns.length}</div>
        <div class="camp-toggle">▼</div>
      </div>
      <div class="camp-list">${rows}</div>
    </div>`;
  }

  if (!ads.length) {
    inner.innerHTML = strip + alertsHtml + campHtml + `<div class="ads-empty">Sin anuncios activos</div>`;
    return;
  }

  const withData    = ads.filter(a => a.insights?.spend > 0);
  const withoutData = ads.filter(a => !(a.insights?.spend > 0));
  const maxSpend    = Math.max(1, ...withData.map(a => a.insights.spend));

  const rows = withData.slice(0, 5).map((ad, i) => {
    const ins   = ad.insights;
    const roas  = ins.revenue > 0 ? ins.revenue / ins.spend : null;
    const rClr  = roas===null?'var(--muted)':roas>=5?'var(--green)':roas>=2.5?'var(--yellow)':'var(--red)';
    const spPct = Math.round(ins.spend / maxSpend * 100);
    const rank  = i < 3 ? ['🥇','🥈','🥉'][i] : `#${i+1}`;
    const bg    = ad.thumbnail ? `background-image:url('${ad.thumbnail}')` : '';
    const freq  = ins.frequency || 0;
    const freqCls = freq >= 2.5 ? 'hot' : freq >= 1.8 ? 'warn' : 'ok';
    const freqTxt = freq > 0 ? `freq ${freq.toFixed(1)}` : '';
    return `<div class="ad-row">
      <div class="ad-thumb" style="${bg}"></div>
      <div class="ad-body">
        <div class="ad-name" style="display:flex;align-items:center;gap:5px;">
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;">${rank} ${ad.name}</span>
          ${freqTxt ? `<span class="freq-badge ${freqCls}">${freqTxt}</span>` : ''}
        </div>
        <div class="ad-stats">
          <div class="ad-stat" style="color:var(--yellow)">${MXN(ins.spend)}<span>gasto</span></div>
          <div class="ad-sep"></div>
          <div class="ad-stat" style="color:${rClr}">${roas!==null?roas.toFixed(1)+'×':'—'}<span>ROAS</span></div>
          ${ins.cpc>0?`<div class="ad-sep"></div><div class="ad-stat" style="color:var(--sub)">${MXN(ins.cpc)}<span>CPC</span></div>`:''}
          ${ins.purchases>0?`<div class="ad-sep"></div><div class="ad-stat" style="color:var(--green)">${ins.purchases}<span>comp.</span></div>`:''}
        </div>
        <div class="ad-bar"><div class="ad-bar-fill" style="width:${spPct}%;background:${rClr};"></div></div>
      </div>
    </div>`;
  }).join('');

  const noData = withoutData.length
    ? `<div style="padding:6px 8px 2px;font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.18);font-weight:600;">Sin gasto hoy · ${withoutData.length}</div>`
      + withoutData.slice(0,3).map(ad => {
        const bg = ad.thumbnail ? `background-image:url('${ad.thumbnail}')` : '';
        return `<div class="ad-row" style="opacity:.5;padding:5px 8px;">
          <div class="ad-thumb" style="${bg};width:28px;height:28px;"></div>
          <div class="ad-name" style="font-size:8px;color:var(--muted);">${ad.name}</div>
        </div>`;
      }).join('')
    : '';

  inner.innerHTML = strip + alertsHtml + campHtml + `<div class="ads-list">${rows}${noData}</div>`;
}

// ── Boot ───────────────────────────────────────────────────
load();
</script>
