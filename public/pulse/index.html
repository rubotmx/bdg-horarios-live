<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="/favicon.ico"/>
<meta name="robots" content="noindex, nofollow"/>
<title>BDG · Pulse</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;500;600;700&family=Archivo:wght@400;500;600;700;800&family=Jost:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
:root{
  --terra:#c16452;--dark:#171717;--dark2:#1e1e1e;
  --beige:#faf2e6;--cream:#fff;--line:#e8e2da;--muted:#9a9590;
  --green:#3a9e6f;--red:#d94f3a;
  --fn:'Archivo Narrow',sans-serif;--fh:'Archivo',sans-serif;--fl:'Jost',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fn);background:#f0ece6;color:var(--dark);min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--dark);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:var(--fl);font-size:17px;font-weight:700;color:#fff;letter-spacing:.12em;}
.topbar-logo span{color:var(--terra);}
.topbar-right{display:flex;align-items:center;gap:20px;}
.back{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:var(--fh);text-decoration:none;transition:color .12s;}
.back:hover{color:#fff;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* PAGE */
.page{max-width:1400px;margin:0 auto;padding:24px 24px 56px;}

/* PERIOD BAR */
.period-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.period-btn{padding:6px 16px;border-radius:20px;border:1px solid var(--line);background:var(--cream);font-family:var(--fn);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;color:var(--dark);}
.period-btn.active,.period-btn:hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.refresh-btn{margin-left:auto;padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:transparent;font-family:var(--fn);font-size:11px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;}
.refresh-btn:hover{color:var(--dark);}
.spin{display:inline-block;}
.spinning{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.last-upd{font-size:10px;color:var(--muted);}

/* WEEK NAV BAR */
.week-nav-bar{display:none;align-items:center;justify-content:space-between;background:var(--cream);border:1px solid var(--line);border-radius:8px;padding:10px 16px;margin-bottom:16px;}
.week-nav-bar.show{display:flex;}
.week-nav-arrow{width:34px;height:34px;border-radius:6px;border:1px solid var(--line);background:transparent;font-size:18px;cursor:pointer;color:var(--dark);display:flex;align-items:center;justify-content:center;transition:all .12s;font-family:var(--fh);}
.week-nav-arrow:hover:not(:disabled){background:var(--dark);color:#fff;border-color:var(--dark);}
.week-nav-arrow:disabled{opacity:.25;cursor:default;}
.week-nav-center{text-align:center;}
.week-nav-title{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--dark);}
.week-nav-dates{font-size:11px;color:var(--muted);margin-top:2px;font-family:var(--fn);}

/* REPORTS */
.drop-zone{border:2px dashed var(--line);border-radius:8px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s;}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--terra);background:rgba(193,100,82,.04);}
.drop-zone-label{font-size:13px;color:var(--dark);font-family:var(--fh);font-weight:600;}
.drop-zone-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.report-result{display:none;margin-top:14px;background:#f7f3ee;border-radius:6px;padding:16px 18px;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.report-result.show{display:flex;}
.report-result-source{font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-family:var(--fh);color:var(--muted);margin-bottom:4px;}
.report-result-gmv{font-family:var(--fh);font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--dark);}
.report-result-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.report-apply-btn{padding:10px 22px;background:var(--terra);color:#fff;border:none;border-radius:5px;font-family:var(--fh);font-size:13px;font-weight:700;cursor:pointer;transition:background .12s;}
.report-apply-btn:hover{background:#a8543f;}
.report-apply-btn:disabled{opacity:.5;cursor:default;}
.report-dismiss-btn{width:30px;height:30px;border:none;background:transparent;font-size:18px;color:var(--muted);cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.report-dismiss-btn:hover{background:rgba(0,0,0,.06);}
.report-error{color:var(--red);}
.report-form{display:flex;flex-wrap:wrap;align-items:flex-end;gap:10px;}
.report-form-row{display:flex;flex-direction:column;gap:4px;}
.report-form-label{font-size:9px;letter-spacing:.16em;text-transform:uppercase;font-family:var(--fh);color:var(--muted);}
.report-form-input{padding:8px 12px;border:1px solid var(--line);border-radius:5px;font-family:var(--fn);font-size:13px;color:var(--dark);background:var(--cream);outline:none;transition:border-color .12s;}
.report-form-input:focus{border-color:var(--terra);}
select.report-form-input{min-width:160px;cursor:pointer;}

/* CHANNEL GRID */
.channels-wrap{overflow-x:auto;margin-bottom:16px;}
.channels-table{border-collapse:collapse;width:100%;min-width:900px;background:var(--cream);border-radius:8px;overflow:hidden;border:1px solid var(--line);}
.ch-head th{padding:14px 16px;text-align:left;font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-family:var(--fh);font-weight:600;color:var(--muted);border-bottom:1px solid var(--line);white-space:nowrap;background:var(--cream);}
.ch-head th.tiktok-col{background:#fdf6f4;}
.ch-body td{padding:0;vertical-align:top;border-right:1px solid var(--line);}
.ch-body td:last-child{border-right:none;}

/* Channel cell */
.ch-cell{padding:16px 16px 14px;}
.ch-amount{font-family:var(--fh);font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--dark);line-height:1;}
.ch-amount.zero{color:#ccc;}
.ch-source{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:var(--fh);margin-top:6px;display:flex;align-items:center;gap:4px;}
.dot-auto{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}
.dot-manual{width:5px;height:5px;border-radius:50%;background:#c18a32;flex-shrink:0;}

/* Editable manual field */
.ch-input-wrap{position:relative;}
.ch-input{width:100%;background:transparent;border:none;border-bottom:1px dashed #d0cbc4;font-family:var(--fh);font-size:22px;font-weight:800;letter-spacing:-.03em;color:var(--dark);padding:0 0 2px;outline:none;transition:border-color .15s;}
.ch-input:focus{border-bottom-color:var(--terra);}
.ch-input::placeholder{color:#d0cbc4;}
.ch-saving{font-size:9px;color:var(--terra);position:absolute;right:0;top:0;opacity:0;transition:opacity .2s;}
.ch-saving.show{opacity:1;}

/* TikTok sub-rows */
.tiktok-cell{background:#fdf6f4;}
.tiktok-sub{display:flex;flex-direction:column;gap:0;}
.tiktok-row{padding:10px 16px;border-bottom:1px solid #f0e8e4;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.tiktok-row:last-child{border-bottom:none;}
.tiktok-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-family:var(--fh);color:var(--muted);white-space:nowrap;}
.tiktok-val{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--dark);}
.tiktok-val.zero{color:#ccc;}
.tiktok-input{background:transparent;border:none;border-bottom:1px dashed #d0cbc4;font-family:var(--fh);font-size:14px;font-weight:700;color:var(--dark);width:90px;text-align:right;outline:none;}
.tiktok-input:focus{border-bottom-color:var(--terra);}
.tiktok-total-row{padding:10px 16px;background:rgba(193,100,82,.06);border-top:2px solid rgba(193,100,82,.2);}
.tiktok-total-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-family:var(--fh);color:var(--terra);}
.tiktok-total-val{font-family:var(--fh);font-size:16px;font-weight:800;color:var(--terra);}

/* TOTAL BAR */
.total-bar{background:var(--dark);border-radius:6px;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.total-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-family:var(--fh);color:rgba(255,255,255,.4);}
.total-amount{font-family:var(--fh);font-size:32px;font-weight:800;letter-spacing:-.04em;color:#fff;}
.total-period{font-size:11px;color:rgba(255,255,255,.3);font-family:var(--fn);}

/* CHART */
.card{background:var(--cream);border-radius:8px;padding:20px 22px;border:1px solid var(--line);margin-bottom:16px;}
.card-title{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-family:var(--fh);margin-bottom:16px;font-weight:600;}
.chart-wrap{height:140px;position:relative;}
.chart-tooltip{position:absolute;background:var(--dark);color:#fff;font-size:11px;padding:5px 10px;border-radius:4px;pointer-events:none;opacity:0;transition:opacity .1s;font-family:var(--fn);white-space:nowrap;}

/* SKELETON */
.sk{background:linear-gradient(90deg,#ede8e2 25%,#e4dfd8 50%,#ede8e2 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:3px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:600px){.topbar{padding:0 16px;}.page{padding:16px 14px 40px;}.total-amount{font-size:24px;}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">BDG<span>·</span>PULSE</div>
  <div class="topbar-right">
    <div class="live-dot"></div>
    <a class="back" href="/">← HQ</a>
  </div>
</div>

<div class="page">

  <div class="period-bar">
    <button class="period-btn" onclick="setPeriod('today',this)">Hoy</button>
    <button class="period-btn active" onclick="setPeriod('week',this)" id="btnWeek">Esta semana</button>
    <button class="period-btn" onclick="setPeriod('month',this)">Este mes</button>
    <button class="period-btn" onclick="setPeriod('30d',this)">30 días</button>
    <button class="refresh-btn" onclick="loadAll(true)"><span class="spin" id="spinIcon">↻</span> Actualizar</button>
    <span class="last-upd" id="lastUpd"></span>
  </div>

  <!-- WEEK NAV BAR -->
  <div class="week-nav-bar" id="weekNavBar">
    <button class="week-nav-arrow" onclick="shiftWeek(-1)">←</button>
    <div class="week-nav-center">
      <div class="week-nav-title" id="weekNavTitle">Semana actual</div>
      <div class="week-nav-dates" id="weekNavDates"></div>
    </div>
    <button class="week-nav-arrow" onclick="shiftWeek(1)" id="weekNavNext">→</button>
  </div>

  <!-- TOTAL -->
  <div class="total-bar">
    <div>
      <div class="total-label">GMV Total</div>
      <div class="total-period" id="totalPeriod">—</div>
    </div>
    <div class="total-amount" id="totalAmount">—</div>
  </div>

  <!-- CHANNEL TABLE -->
  <div class="channels-wrap">
    <table class="channels-table">
      <thead class="ch-head">
        <tr>
          <th>Tienda Online</th>
          <th>Palacio de Hierro</th>
          <th>MercadoLibre</th>
          <th>BDG Outlet</th>
          <th class="tiktok-col">TikTok</th>
          <th>Comercializadora</th>
          <th>Wholesale</th>
          <th>Amazon</th>
        </tr>
      </thead>
      <tbody class="ch-body" id="chBody">
        <tr>
          <td colspan="8" style="padding:32px;text-align:center;">
            <div class="sk" style="height:28px;width:60%;margin:0 auto;"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- TREND CHART -->
  <div class="card">
    <div class="card-title">Ventas diarias · Tienda Online</div>
    <div class="chart-wrap" id="chartWrap">
      <div class="sk" style="width:100%;height:100%;border-radius:6px;"></div>
    </div>
    <div class="chart-tooltip" id="tooltip"></div>
  </div>

  <!-- REPORTS -->
  <div class="card">
    <div class="card-title">Importar reportes</div>

    <!-- Step 1: Canal + fechas (siempre visible) -->
    <div class="report-form" style="margin-bottom:14px;">
      <div class="report-form-row">
        <label class="report-form-label">Canal</label>
        <select class="report-form-input" id="reportChannel">
          <option value="meli">MercadoLibre</option>
          <option value="palacio_hierro">Palacio de Hierro</option>
          <option value="comercializadora">Comercializadora</option>
          <option value="amazon">Amazon</option>
          <option value="tiktok_video">TikTok Video</option>
          <option value="tiktok_afil">TikTok Afiliados</option>
        </select>
      </div>
      <div class="report-form-row">
        <label class="report-form-label">Desde</label>
        <input type="date" class="report-form-input" id="reportDateFrom"/>
      </div>
      <div class="report-form-row">
        <label class="report-form-label">Hasta</label>
        <input type="date" class="report-form-input" id="reportDateTo"/>
      </div>
    </div>

    <!-- Step 2: Subir archivo -->
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-zone-body">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.3;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9,15 12,12 15,15"/></svg>
        <div class="drop-zone-label" id="dropLabel">Arrastra el reporte o haz clic para seleccionar</div>
        <div class="drop-zone-sub">.xlsx · .pdf</div>
      </div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.pdf" style="display:none" onchange="handleReportFile(this.files[0]);this.value=''"/>

    <!-- Step 3: Resultado + guardar -->
    <div class="report-result" id="reportResult">
      <div class="report-result-info">
        <div class="report-result-source" id="reportSource"></div>
        <div class="report-result-gmv" id="reportGMV"></div>
        <div class="report-result-sub" id="reportSub"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
        <button class="report-apply-btn" id="applyBtn" onclick="applyReport()">Guardar →</button>
        <button class="report-dismiss-btn" onclick="dismissReport()">×</button>
      </div>
    </div>
  </div>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const FB_CH = 'https://bdg-horarios-default-rtdb.firebaseio.com/bdg_horarios_v2';

// Shopify source_name → channel
const SHOPIFY_MAP = {
  web: 'tienda_online', '': 'tienda_online', null: 'tienda_online',
  pos: 'bdg_outlet',
  shopify_draft_order: 'wholesale',
  draft_order: 'wholesale',
};

let _period     = 'week';
let _weekKey    = '';
let _weekOffset = 0; // 0 = semana actual, -1 = semana pasada, etc.
let _shopify = {};  // { tienda_online: gmv, bdg_outlet: gmv, wholesale: gmv, by_day: {} }
let _manual  = {};  // { palacio_hierro: gmv, meli: gmv, ... }
let _tiktokLive = 0;
let _saveTimer  = {};

// ── DATES ─────────────────────────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function fmt(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function nowMX(){ return new Date(new Date().getTime() - 6*3600000); }

function getWeekThursday(offsetWeeks){
  const now=nowMX();
  const d=new Date(now);
  d.setDate(d.getDate()-((d.getDay()+3)%7)+(offsetWeeks*7));
  return d;
}

function dateRange(period){
  const now = nowMX();
  let min, max;
  if(period==='today'){
    const t=fmt(now); min=`${t}T00:00:00-06:00`; max=`${t}T23:59:59-06:00`;
  } else if(period==='week'){
    const thu=getWeekThursday(_weekOffset);
    const wed=new Date(thu); wed.setDate(wed.getDate()+6);
    const endDay = _weekOffset===0 ? now : wed; // semana actual: hasta hoy; pasadas: hasta miércoles
    min=`${fmt(thu)}T00:00:00-06:00`; max=`${fmt(endDay)}T23:59:59-06:00`;
    _weekKey=fmt(thu);
  } else if(period==='month'){
    const d=new Date(now.getFullYear(),now.getMonth(),1);
    min=`${fmt(d)}T00:00:00-06:00`; max=`${fmt(now)}T23:59:59-06:00`;
    _weekKey=fmt(d);
  } else {
    const d=new Date(now); d.setDate(d.getDate()-29);
    min=`${fmt(d)}T00:00:00-06:00`; max=`${fmt(now)}T23:59:59-06:00`;
    _weekKey=fmt(d);
  }
  return {min,max};
}

function periodLabel(){
  const now=nowMX();
  if(_period==='today') return fmt(now);
  if(_period==='week'){
    const thu=getWeekThursday(_weekOffset);
    const wed=new Date(thu); wed.setDate(wed.getDate()+6);
    const endDay=_weekOffset===0?now:wed;
    return `${fmt(thu)} → ${fmt(endDay)}`;
  }
  if(_period==='month') return `${now.getFullYear()}-${pad(now.getMonth()+1)}`;
  return 'Últimos 30 días';
}

function updateWeekNav(){
  const bar=document.getElementById('weekNavBar');
  const title=document.getElementById('weekNavTitle');
  const dates=document.getElementById('weekNavDates');
  const nextBtn=document.getElementById('weekNavNext');
  if(_period!=='week'){ bar.classList.remove('show'); return; }
  bar.classList.add('show');
  nextBtn.disabled=(_weekOffset===0);
  const thu=getWeekThursday(_weekOffset);
  const wed=new Date(thu); wed.setDate(wed.getDate()+6);
  const endDay=_weekOffset===0?nowMX():wed;
  if(_weekOffset===0){
    title.textContent='Semana actual';
  } else {
    title.textContent=`Hace ${Math.abs(_weekOffset)} semana${Math.abs(_weekOffset)>1?'s':''}`;
  }
  dates.textContent=`${fmt(thu)} → ${fmt(endDay)}`;
}

function shiftWeek(delta){
  const next=_weekOffset+delta;
  if(next>0) return;
  _weekOffset=next;
  updateWeekNav();
  loadAll();
}

// ── FORMAT ────────────────────────────────────────────────────────────────────
function fmtMXN(n){
  if(!n||n===0) return '—';
  return '$'+Math.round(n).toLocaleString('es-MX');
}
function fmtFull(n){
  return n.toLocaleString('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:0,maximumFractionDigits:0});
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
function setPeriod(p,btn){
  _period=p;
  if(p==='week') _weekOffset=0;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  updateWeekNav();
  loadAll();
}

async function loadAll(force=false){
  document.getElementById('spinIcon').classList.add('spinning');
  const {min,max}=dateRange(_period);
  const lsKey=`pulse_${_period}`;

  // Mostrar caché local al instante
  if(!force){
    const cached=localStorage.getItem(lsKey);
    if(cached){ try{ applyShopify(JSON.parse(cached)); }catch(_){} }
  }

  try {
    const [shopRes, manRes, fbSlots] = await Promise.all([
      fetch(`/api/shopify?date_min=${encodeURIComponent(min)}&date_max=${encodeURIComponent(max)}`),
      fetch(`/api/channels?week=${_weekKey}`),
      fetch(`${FB_CH}/slots.json`),
    ]);
    const shopData = await shopRes.json();
    _manual = (await manRes.json()) || {};

    // Calcular TikTok Live desde Firebase slots
    const slots = await fbSlots.json() || [];
    const {min:dMin, max:dMax} = dateRange(_period);
    const minD=dMin.slice(0,10), maxD=dMax.slice(0,10);
    _tiktokLive = slots
      .filter(s=>s.date>=minD && s.date<=maxD)
      .reduce((s,sl)=>s+(sl.gmv||0),0);

    // Mapear Shopify por canal
    _shopify={tienda_online:0,bdg_outlet:0,wholesale:0,by_day:shopData.by_day||{}};
    for(const [src,v] of Object.entries(shopData.by_source||{})){
      const ch=SHOPIFY_MAP[src];
      if(ch && _shopify[ch]!==undefined) _shopify[ch]+=v.gmv;
    }

    localStorage.setItem(lsKey, JSON.stringify(_shopify));
    renderChannels();
    renderChart(_shopify.by_day||{});
    document.getElementById('lastUpd').textContent =
      'Actualizado '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  } catch(e){
    console.error(e);
  } finally {
    document.getElementById('spinIcon').classList.remove('spinning');
  }
}

function applyShopify(data){
  _shopify=data;
  renderChannels();
}

// ── RENDER CHANNELS ───────────────────────────────────────────────────────────
function renderChannels(){
  const m=_manual;
  const ttVideo    = m.tiktok_video    || 0;
  const ttAfil     = m.tiktok_afil     || 0;
  const ttTotal    = (ttVideo + _tiktokLive + ttAfil);

  const total =
    (_shopify.tienda_online||0) +
    (m.palacio_hierro||0) +
    (m.meli||0) +

// ── CHART ─────────────────────────────────────────────────────────────────────
function renderChart(byDay){
  const days=Object.keys(byDay).sort();
  const wrap=document.getElementById('chartWrap');
  if(!days.length){wrap.innerHTML=`<div style="padding:32px;text-align:center;color:var(--muted);font-size:12px;">Sin datos para este período</div>`;return;}
  const vals=days.map(d=>byDay[d].gmv);
  const maxV=Math.max(...vals,1);
  const W=600,H=120,P=16;
  const step=(W-P*2)/Math.max(days.length-1,1);
  const pts=vals.map((v,i)=>({x:P+i*step,y:H-P-(v/maxV)*(H-P*2),gmv:v,day:days[i]}));
  const path=pts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const area=path+` L${pts[pts.length-1].x},${H} L${pts[0].x},${H} Z`;
  const labelIdxs=days.length<=7?days.map((_,i)=>i):[0,Math.floor(days.length/2),days.length-1];
  const labels=labelIdxs.map(i=>`<text x="${pts[i].x.toFixed(1)}" y="${H+4}" text-anchor="middle" font-size="9" fill="#9a9590" font-family="Archivo Narrow">${days[i].slice(5)}</text>`).join('');
  const dots=pts.map(p=>`<circle class="dot" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#c16452" stroke="#fff" stroke-width="1.5" data-day="${p.day}" data-gmv="${p.gmv}"/>`).join('');
  wrap.innerHTML=`
    <svg viewBox="0 0 ${W} ${H+12}" preserveAspectRatio="none" style="width:100%;height:${H+12}px;">
      <defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#c16452" stop-opacity=".15"/>
        <stop offset="100%" stop-color="#c16452" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${area}" fill="url(#g)"/>
      <path d="${path}" fill="none" stroke="#c16452" stroke-width="2" stroke-linejoin="round"/>
      ${dots}${labels}
    </svg>
    <div class="chart-tooltip" id="tooltip"></div>`;
  wrap.querySelectorAll('.dot').forEach(d=>{
    d.addEventListener('mouseenter',e=>{
      const tt=document.getElementById('tooltip');
      tt.textContent=`${e.target.dataset.day} · $${parseFloat(e.target.dataset.gmv).toLocaleString('es-MX')}`;
      tt.style.opacity=1;tt.style.left=(e.offsetX+10)+'px';tt.style.top=(e.offsetY-28)+'px';
    });
    d.addEventListener('mouseleave',()=>{document.getElementById('tooltip').style.opacity=0;});
  });
}

async function handleReportFile(file){
  if(!file) return;
  const lbl = document.getElementById('dropLabel');
  lbl.textContent = 'Procesando...';
  try {
    const isPDF  = file.name.toLowerCase().endsWith('.pdf');
    const isXLSX = /\.(xlsx|xls)$/i.test(file.name);
    let result;
    if(isPDF){
      await ensurePDFJS();
      result = await parsePDFReport(file);
    } else if(isXLSX){
      await ensureXLSX();
      result = await parseXLSXReport(file);
    } else {

    showReportResult(result, file.name);
  } catch(e) {
    console.error(e);
    showReportResult({ error: 'No se pudo leer el archivo' }, file.name);

async function ensurePDFJS(){
  if(window.pdfjsLib) return;
  await new Promise((res, rej) => {

    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';

    };

    document.head.appendChild(s);
  });
}

async function parsePDFReport(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;

  // Extraer todos los ítems de texto con posición X,Y de todas las páginas
  const allItems = [];
  for(let p = 1; p <= pdf.numPages; p++){
    const page     = await pdf.getPage(p);
    const vp       = page.getViewport({ scale: 1 });
    const content  = await page.getTextContent();
    for(const item of content.items){
      if(!item.str.trim()) continue;
      const x = item.transform[4];
      const y = vp.height - item.transform[5]; // flip Y → top-down
      allItems.push({ str: item.str.trim(), x, y });
    }
  }

  // Agrupar por fila (misma Y ± tolerancia de 4pt)
  allItems.sort((a, b) => a.y - b.y || a.x - b.x);
  const rows = [];
  let i = 0;
  while(i < allItems.length){
    const baseY = allItems[i].y;
    const rowItems = [];
    while(i < allItems.length && Math.abs(allItems[i].y - baseY) <= 4){
      rowItems.push(allItems[i++]);
    }
    rowItems.sort((a, b) => a.x - b.x);
    rows.push({ cells: rowItems.map(it => it.str), xs: rowItems.map(it => it.x) });
  }

  // Buscar la fila de encabezados
  let headerIdx = -1, headerXs = [], headers = [];
  for(let r = 0; r < Math.min(rows.length, 40); r++){
    const joined = rows[r].cells.join(' ');
    if(joined.includes('# de venta') || joined.includes('Ingresos por productos')){
      // Puede que el encabezado esté en varias filas consecutivas — unirlas
      headers = rows[r].cells;
      headerXs = rows[r].xs;
      headerIdx = r;
      break;
    }
  }
  if(headerIdx === -1) return { error: 'Formato PDF no reconocido. Verifica que sea un reporte de MercadoLibre.' };

  // Localizar columnas por posición X más cercana al encabezado
  function colX(label){
    // Buscar en las filas de encabezado combinadas
    for(let r = headerIdx; r <= Math.min(headerIdx+3, rows.length-1); r++){
      for(let c = 0; c < rows[r].cells.length; c++){
        if(rows[r].cells[c].includes(label)) return rows[r].xs[c];
      }
    }
    return null;
  }

  const xSale  = colX('# de venta');
  const xGMV   = colX('Ingresos por productos') ?? colX('Ingresos por');
  const xDate  = colX('Fecha de venta') ?? colX('Fecha');

  if(xSale == null || xGMV == null) return { error: 'No se encontraron las columnas necesarias en el PDF.' };

  // Función para obtener el valor de la celda más cercana a una X en una fila
  function cellAt(row, targetX){
    let best = null, bestDist = Infinity;
    for(let c = 0; c < row.cells.length; c++){
      const d = Math.abs(row.xs[c] - targetX);
      if(d < bestDist){ bestDist = d; best = row.cells[c]; }
    }
    return bestDist < 40 ? best : null; // tolerancia de 40pt
  }

  const seen   = new Set();
  const byWeek = {};
  let totalGMV = 0, orderCount = 0;

  for(let r = headerIdx + 1; r < rows.length; r++){
    const row    = rows[r];
    const saleId = (cellAt(row, xSale) || '').replace(/\s/g,'');
    if(!saleId || !/^\d{10,}$/.test(saleId)) continue;
    if(seen.has(saleId)) continue;

    const gmvStr = cellAt(row, xGMV) || '';
    const gmv    = parseFloat(gmvStr.replace(/,/g,'.'));
    if(isNaN(gmv) || gmv <= 0) continue;

    const dateStr = xDate != null ? (cellAt(row, xDate) || '') : '';
    const date    = parseMLDate(dateStr);
    if(!date) continue;

    const wk = getWeekKeyForDate(date);
    if(!byWeek[wk]) byWeek[wk] = { gmv:0, orders:0, units:0 };
    byWeek[wk].gmv    += gmv;
    byWeek[wk].orders++;
    seen.add(saleId);
    totalGMV += gmv;
    orderCount++;
  }

  for(const wk of Object.keys(byWeek)) byWeek[wk].gmv = Math.round(byWeek[wk].gmv*100)/100;

  if(!orderCount) return { error: 'No se detectaron ventas en el PDF. Verifica que sea el reporte correcto.' };

  return {
    channel: 'meli',
    label:   'MercadoLibre',
    gmv:     Math.round(totalGMV*100)/100,
    orders:  orderCount,
    units:   0,
    byWeek,
  };
}

// ── Helpers de fecha ─────────────────────────────────────────────────────────
const MESES = {
  'enero':1,'febrero':2,'marzo':3,'abril':4,'mayo':5,'junio':6,
  'julio':7,'agosto':8,'septiembre':9,'octubre':10,'noviembre':11,'diciembre':12
};
function parseMLDate(str){
  const m = String(str).match(/(\d{1,2}) de (\w+) de (\d{4})/);
  if(!m) return null;
  const month = MESES[m[2].toLowerCase()];
  if(!month) return null;
  return new Date(parseInt(m[3]), month-1, parseInt(m[1]));
}
function getWeekKeyForDate(date){
  const d = new Date(date);
  d.setDate(d.getDate() - ((d.getDay()+3)%7));
  return fmt(d);
}

async function parseXLSXReport(file){
  const buf  = await file.arrayBuffer();
  const wb   = XLSX.read(buf, { type: 'array' });
  const ws   = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

  // Detectar fila de encabezados MercadoLibre
  let headerIdx = -1;
  for(let i = 0; i < Math.min(rows.length, 15); i++){
    const r = rows[i].map(c => String(c));
    if(r.some(c => c.includes('# de venta')) && r.some(c => c.includes('Ingresos por productos'))){
      headerIdx = i; break;
    }
  }
  if(headerIdx === -1) return { error: 'Formato no reconocido. Por ahora se soportan reportes de MercadoLibre.' };

  const headers  = rows[headerIdx].map(c => String(c).trim());
  const colSale  = headers.indexOf('# de venta');
  const colGMV   = headers.findIndex(h => h.includes('Ingresos por productos'));
  const colDate  = headers.indexOf('Fecha de venta');
  const colUnits = headers.indexOf('Unidades');

  if(colSale < 0 || colGMV < 0) return { error: 'Columnas requeridas no encontradas' };

  const seen   = new Set();
  const byWeek = {};
  let totalGMV = 0, totalUnits = 0, orderCount = 0;
  let dateMin = null, dateMax = null;

  for(let i = headerIdx + 1; i < rows.length; i++){
    const row    = rows[i];
    const saleId = String(row[colSale] || '').trim();
    if(!saleId || !/^\d{10,}$/.test(saleId)) continue;
    if(seen.has(saleId)) continue;

    const gmv = parseFloat(row[colGMV]);
    if(isNaN(gmv) || gmv <= 0) continue;

    // Asignar a la semana correcta según la fecha de venta
    const date = colDate >= 0 ? parseMLDate(row[colDate]) : null;
    if(!date) continue; // omitir filas sin fecha válida

    const wk = getWeekKeyForDate(date);
    if(!byWeek[wk]) byWeek[wk] = { gmv:0, orders:0, units:0 };
    byWeek[wk].gmv    += gmv;
    byWeek[wk].orders++;

    seen.add(saleId);
    totalGMV += gmv;
    orderCount++;
    if(!dateMin || date < dateMin) dateMin = new Date(date);
    if(!dateMax || date > dateMax) dateMax = new Date(date);
    const u = parseFloat(colUnits >= 0 ? row[colUnits] : NaN);
    if(!isNaN(u)){ totalUnits += u; byWeek[wk].units = (byWeek[wk].units||0)+u; }
  }

  for(const wk of Object.keys(byWeek)) byWeek[wk].gmv = Math.round(byWeek[wk].gmv*100)/100;

  return {
    channel: 'meli',
    label:   'MercadoLibre',
    gmv:     Math.round(totalGMV*100)/100,
    orders:  orderCount,
    units:   totalUnits,
    byWeek,
    dateMin: dateMin ? fmt(dateMin) : null,
    dateMax: dateMax ? fmt(dateMax) : null,
  };
}

function showReportResult(result, filename){
  const el  = document.getElementById('reportResult');
  const src = document.getElementById('reportSource');
  const gmv = document.getElementById('reportGMV');
  const sub = document.getElementById('reportSub');
  const btn = document.getElementById('applyBtn');

  if(result.error){
    src.textContent = 'Error';
    gmv.className   = 'report-result-gmv report-error';
    gmv.textContent = result.error;
    sub.textContent = filename;
    if(btn) btn.style.display = 'none';
  } else {
    src.textContent = filename;
    gmv.className   = 'report-result-gmv';
    gmv.textContent = fmtFull(result.gmv);
    sub.textContent = `${result.orders} ventas detectadas`;

    // Pre-llenar canal y fechas si el usuario no las ha ingresado ya
    const fromEl = document.getElementById('reportDateFrom');
    const toEl   = document.getElementById('reportDateTo');
    if(fromEl && !fromEl.value && result.dateMin) fromEl.value = result.dateMin;
    if(toEl   && !toEl.value   && result.dateMax) toEl.value   = result.dateMax;

    if(btn){ btn.style.display = ''; btn.textContent = 'Guardar →'; btn.disabled = false; }
  }
  el.classList.add('show');
}

function dismissReport(){
  document.getElementById('reportResult').classList.remove('show');
  _reportData = null;
}

async function applyReport(){
  if(!_reportData || _reportData.error) return;

  const channel  = document.getElementById('reportChannel')?.value;
  const dateFrom = document.getElementById('reportDateFrom')?.value;
  const dateTo   = document.getElementById('reportDateTo')?.value;

  if(!channel){ alert('Selecciona el canal'); return; }
  if(!dateFrom || !dateTo){ alert('Ingresa el rango de fechas'); return; }

  const btn = document.getElementById('applyBtn');
  if(btn){ btn.textContent = 'Guardando...'; btn.disabled = true; }

  // Recalcular semanas según las fechas que ingresó el usuario
  const from = new Date(dateFrom+'T12:00:00');
  const to   = new Date(dateTo+'T12:00:00');
  const weekGMV = {}; // { weekKey → gmv }

  // Distribuir el GMV total proporcionalmente entre las semanas del rango
  // Si el reporte ya tiene desglose por semana dentro del rango, usarlo
  const byWeek = _reportData.byWeek || {};
  let covered = {};
  for(const [wk, d] of Object.entries(byWeek)){
    const wkDate = new Date(wk+'T12:00:00');
    const wkEnd  = new Date(wkDate); wkEnd.setDate(wkEnd.getDate()+6);
    if(wkDate <= to && wkEnd >= from) covered[wk] = d.gmv;
  }
  // Si no hay desglose, guardar todo el GMV en la semana de la fecha inicio
  if(!Object.keys(covered).length){
    covered[getWeekKeyForDate(from)] = _reportData.gmv;
  }

  await Promise.all(Object.entries(covered).map(([wk, gmv]) =>
    fetch('/api/channels',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ week: wk, channel, gmv })
    })
  ));

  // Actualizar campo visible si la semana actual está en el rango
  if(covered[_weekKey]){
    _manual[channel] = covered[_weekKey];
    const inp = document.getElementById(`inp_${channel}`);
    if(inp) inp.value = covered[_weekKey];
    renderTotal();
  }

  if(btn){ btn.textContent = '✓ Guardado'; }
}

      </button>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <div style="flex:1;height:1px;background:rgba(255,255,255,.08);"></div>
        <span style="font-size:10px;color:rgba(255,255,255,.18);letter-spacing:.1em;">o ingresa tu PIN</span>
        <div style="flex:1;height:1px;background:rgba(255,255,255,.08);"></div>
      </div>
      <input id="gateInput" type="password" placeholder="••••••••••" autocomplete="off" maxlength="30"
        style="width:100%;background:#141414;border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:13px 16px;font-family:'Archivo',sans-serif;font-size:16px;color:#fff;letter-spacing:.2em;text-align:center;outline:none;transition:border-color .15s;"
        onkeydown="if(event.key==='Enter')submitGate()"
        onfocus="this.style.borderColor='#c16452'"
        onblur="this.style.borderColor='rgba(255,255,255,.1)'"/>
      <div id="gateError" style="height:18px;margin-top:10px;font-size:11px;color:#d94f3a;opacity:0;transition:opacity .2s;"></div>
      <a href="/" style="display:block;margin-top:20px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.18);text-decoration:none;">← Volver al HQ</a>
    </div>`;
  document.body.appendChild(gate);
  setTimeout(()=>document.getElementById('gateInput')?.focus(),80);
}

async function signInGoogle(){
  const btn=document.getElementById('googleBtn');
  if(btn){ btn.disabled=true; btn.style.opacity='.6'; btn.textContent='Conectando...'; }
  try{
    const provider=new firebase.auth.GoogleAuthProvider();
    const result=await firebase.auth().signInWithPopup(provider);
    const email=(result.user.email||'').toLowerCase();
    if(ALLOWED_EMAILS.includes(email)){
      grantAccess(email);
    } else {
      showGateError(`Acceso no autorizado: ${email}`);
      firebase.auth().signOut();
      if(btn){ btn.disabled=false; btn.style.opacity='1'; btn.innerHTML=`<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.2 0 5.9 1.1 8.1 3.2l6-6C34.4 3.2 29.6 1 24 1 14.8 1 6.9 6.5 3.2 14.4l7 5.4C11.9 13.6 17.4 9.5 24 9.5z"/><path fill="#4285F4" d="M46.9 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.9c-.6 3-2.3 5.5-4.9 7.2l7.6 5.9c4.4-4.1 7.3-10.1 7.3-17.1z"/><path fill="#FBBC05" d="M10.2 28.4A14.7 14.7 0 0 1 9.5 24c0-1.5.2-3 .7-4.4L3.2 14.2A23 23 0 0 0 1 24c0 3.7.9 7.2 2.5 10.2l7.7-5.8z"/><path fill="#34A853" d="M24 47c5.8 0 10.7-1.9 14.2-5.2l-7.6-5.9c-2 1.3-4.6 2.1-6.6 2.1-5.5 0-10.2-3.7-11.8-8.7l-7.5 5.8C6.7 41.5 14.8 47 24 47z"/></svg> Continuar con Google`; }
    }
  }catch(e){
    if(e.code!=='auth/popup-closed-by-user'){
      showGateError('Error al iniciar sesión');
    }
    if(btn){ btn.disabled=false; btn.style.opacity='1'; btn.innerHTML=`<svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.2 0 5.9 1.1 8.1 3.2l6-6C34.4 3.2 29.6 1 24 1 14.8 1 6.9 6.5 3.2 14.4l7 5.4C11.9 13.6 17.4 9.5 24 9.5z"/><path fill="#4285F4" d="M46.9 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.9c-.6 3-2.3 5.5-4.9 7.2l7.6 5.9c4.4-4.1 7.3-10.1 7.3-17.1z"/><path fill="#FBBC05" d="M10.2 28.4A14.7 14.7 0 0 1 9.5 24c0-1.5.2-3 .7-4.4L3.2 14.2A23 23 0 0 0 1 24c0 3.7.9 7.2 2.5 10.2l7.7-5.8z"/><path fill="#34A853" d="M24 47c5.8 0 10.7-1.9 14.2-5.2l-7.6-5.9c-2 1.3-4.6 2.1-6.6 2.1-5.5 0-10.2-3.7-11.8-8.7l-7.5 5.8C6.7 41.5 14.8 47 24 47z"/></svg> Continuar con Google`; }
  }
}

function showGateError(msg){
  const err=document.getElementById('gateError');
  if(err){err.textContent=msg;err.style.opacity=1;setTimeout(()=>{err.style.opacity=0;},3000);}
}

function submitGate(){
  const val=document.getElementById('gateInput')?.value.trim();
  if(ALLOWED_PINS.includes(val)){
    grantAccess(val);
  } else {
    const inp=document.getElementById('gateInput');
    inp.style.borderColor='#d94f3a'; inp.value='';
    showGateError('Código incorrecto');
    setTimeout(()=>{inp.style.borderColor='rgba(255,255,255,.1)';},600);
  }
}

// Auto-refresh cada 5 min
setInterval(()=>loadAll(true),5*60*1000);

if(checkAuth()){ updateWeekNav(); loadAll(); initDropZone(); } else { showGate(); }
</script>
