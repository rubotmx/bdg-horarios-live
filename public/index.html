function renderAdminHistorial(){
  const past = getPastSlots();

  if(!past.length){
    document.getElementById("tabContent").innerHTML = `
      <div class="empty-state"><div class="empty-icon">📊</div>Aún no hay sesiones pasadas.<br>Navega a una semana anterior en "Sesiones" para agregar data retroactiva.</div>`;
    return;
  }

  const kpis    = histKpisHtml(past);
  const subtabs = subtabsHtml();

  let body = "";
  if(historialView === "semanas")     body = renderHistSemanas(past);
  if(historialView === "anfitrionas") body = renderHistPersonas("anfitriona", past);
  if(historialView === "backend")     body = renderHistPersonas("backend", past);
  if(historialView === "duplas")      body = renderHistDuplas(past);

  document.getElementById("tabContent").innerHTML = kpis + subtabs + body;
  // Carga GMV live en background
  loadLiveGMV();
}

// ── VISTA: SEMANAS ────────────────────────────────────────────────────────────
function renderHistSemanas(past){
  // Filtros
  const anfiMembers = STATE.members.filter(m=>m.role==="anfitriona");
  const anfiOptions = anfiMembers.map(m=>`<option value="${m.code}"${historialAnfiFilter===m.code?"selected":""}>${m.name.split(" ")[0]}</option>`).join("");

  const weekKeys = [...new Set(past.map(s=>slotWeekMon(s.date)))].sort((a,b)=>b.localeCompare(a));
  const weekOptions = weekKeys.map(k=>`<option value="${k}"${historialWeekFilter===k?"selected":""}>${weekLabel_from(k)}</option>`).join("");

  let filtered = past;
  if(historialWeekFilter !== "todas") filtered = filtered.filter(s=>slotWeekMon(s.date)===historialWeekFilter);
  if(historialAnfiFilter !== "todas") filtered = filtered.filter(s=>{
    const ap = STATE.picks.find(p=>p.slotId===s.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="anfitriona");
    return ap && ap.memberCode === historialAnfiFilter;
  });

  // Ordenar slots según selección
  if(historialSort === "gmv") filtered.sort((a,b) => (b.gmv||0) - (a.gmv||0));
  else filtered.sort((a,b) => b.date.localeCompare(a.date) || b.timeStart.localeCompare(a.timeStart));

  const byWeek = {};
  filtered.forEach(s=>{ const k=slotWeekMon(s.date); if(!byWeek[k]) byWeek[k]=[]; byWeek[k].push(s); });

  // Ordenar semanas: por fecha desc, o por GMV total desc
  const weekEntries = Object.entries(byWeek).sort(([a,sa],[b,sb]) =>
    historialSort === "gmv"
      ? sb.reduce((t,sl)=>t+(sl.gmv||0),0) - sa.reduce((t,sl)=>t+(sl.gmv||0),0)
      : b.localeCompare(a)
  );

  const weekGroups = weekEntries.map(([weekMon,slots])=>{
    const weekGmv = slots.reduce((s,sl)=>s+(sl.gmv||0),0);
    const rows = slots.map(slot=>{
      const anfiPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="anfitriona");
      const backPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="backend");
      return `<div class="hist-row">
        <div><div style="font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;">${slot.day} ${fmtDate(slot.date)}</div>
          <div class="hist-time">${slot.timeStart}–${slot.timeEnd}</div></div>
        <div class="hist-team">
          <div class="hist-person">🎙️ ${anfiPick?`${avatarHtml(anfiPick.memberCode,"sm")}<span>${memberName(anfiPick.memberCode).split(" ")[0]}</span>`:`<span style="color:var(--muted);">—</span>`}</div>
          <div class="hist-person">💻 ${backPick?`${avatarHtml(backPick.memberCode,"sm")}<span>${memberName(backPick.memberCode).split(" ")[0]}</span>`:`<span style="color:var(--muted);">—</span>`}</div>
        </div>
        <div class="hist-reporte">${slot.reporte||""}</div>
        <div style="text-align:right;">
          ${slot.gmv>0?`<div class="hist-gmv">${fmtGMV(slot.gmv)}</div><div style="font-size:10px;color:var(--muted);">${fmtGMV(slot.gmv/1.5)}/hr</div>`:`<div class="hist-gmv none">Sin GMV</div>`}
          <button class="hist-edit-btn" onclick="openReporte('${slot.id}')">✏️ Editar</button>
        </div>
      </div>`;
    }).join("");
    return `<div class="hist-week-group">
      <div class="hist-week-head"><span class="hist-week-label">${weekLabel_from(weekMon)}</span><span class="hist-week-gmv">${weekGmv>0?fmtGMV(weekGmv):"—"}</span></div>
      ${rows}
    </div>`;
  }).join("");

  return `<div class="hist-filter">
    <span style="font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;">Semana</span>
    <select onchange="historialWeekFilter=this.value;renderAdminHistorial()">
      <option value="todas">Todas las semanas</option>${weekOptions}
    </select>
    ${anfiMembers.length?`
    <span style="font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-left:8px;">Anfitriona</span>
    <select onchange="historialAnfiFilter=this.value;renderAdminHistorial()">
      <option value="todas">Todas</option>${anfiOptions}
    </select>`:""}
    <span style="font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-left:8px;">Orden</span>
    <select onchange="historialSort=this.value;renderAdminHistorial()">
      <option value="fecha" ${historialSort==="fecha"?"selected":""}>Más reciente</option>
      <option value="gmv"   ${historialSort==="gmv"  ?"selected":""}>Mayor GMV</option>
    </select>
  </div>
  ${weekGroups||`<div class="empty-state" style="padding:32px;"><div class="empty-icon">🔍</div>Sin sesiones con esos filtros.</div>`}`;
}

// ── VISTA: POR PERSONA ────────────────────────────────────────────────────────
function renderHistPersonas(role, past){
  const SESSION_H = SESSION_MINS / 60;
  const members   = STATE.members.filter(m=>m.role===role);
  if(!members.length) return `<div class="empty-state">No hay ${role==="anfitriona"?"anfitrionas":"staff backend"} registradas.</div>`;

  const medals = ["🥇","🥈","🥉"];

  const stats = members.map(m=>{
    const mySessions = past.filter(s=>{
      const p = STATE.picks.find(pk=>pk.slotId===s.id&&pk.memberCode===m.code&&pk.status!=="cancelled");
      return !!p;
    });
    const withGmv   = mySessions.filter(s=>s.gmv>0);
    const totalGmv  = withGmv.reduce((s,sl)=>s+(sl.gmv||0),0);
    const gmvPorHr  = withGmv.length ? totalGmv / (withGmv.length * SESSION_H) : 0;
    const avgGmv    = withGmv.length ? totalGmv / withGmv.length : 0;
    const best      = withGmv.sort((a,b)=>b.gmv-a.gmv)[0];
    return { m, mySessions, withGmv, totalGmv, gmvPorHr, avgGmv, best };
  }).sort((a,b)=>b.totalGmv-a.totalGmv);

  const maxGmv = stats[0]?.totalGmv || 0;

  const cards = stats.map((s,i)=>{
    const pct = maxGmv>0 ? (s.totalGmv/maxGmv*100).toFixed(0) : 0;
    const bestSlot = s.best ? STATE.slots.find(sl=>sl.id===s.best.id) : null;
    return `<div class="person-card">
      <div class="person-head">
        <span class="person-rank">${medals[i]||i+1}</span>
        ${avatarHtml(s.m.code,"md")}
        <div style="flex:1;">
          <div style="font-weight:500;font-size:14px;">${s.m.name}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">${s.m.code}</div>
          <div style="background:var(--line2);height:4px;border-radius:2px;margin-top:8px;width:100%;">
            <div style="background:var(--oxide);height:4px;border-radius:2px;width:${pct}%;"></div>
          </div>
        </div>
        <div style="text-align:right;">
          <div class="gmv-display" style="font-size:24px;">${s.totalGmv>0?fmtGMV(s.totalGmv):"—"}</div>
          ${s.gmvPorHr>0?`<div style="font-size:11px;color:var(--muted);">${fmtGMV(s.gmvPorHr)}/hr</div>`:""}
        </div>

// ── VISTA: MEJORES DUPLAS ─────────────────────────────────────────────────────
function renderHistDuplas(past){
  const SESSION_H = SESSION_MINS / 60;
  const duos = {};

  past.filter(s=>s.gmv>0).forEach(slot=>{
    const anfiPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="anfitriona");
    const backPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="backend");
    if(!anfiPick || !backPick) return;
    const key = `${anfiPick.memberCode}__${backPick.memberCode}`;
    if(!duos[key]) duos[key] = { anfiCode:anfiPick.memberCode, backCode:backPick.memberCode, sessions:0, totalGmv:0 };
    duos[key].sessions++;
    duos[key].totalGmv += slot.gmv;
  });

  const sorted = Object.values(duos)
    .map(d=>({...d, gmvPorHr: d.totalGmv/(d.sessions*SESSION_H), avgGmv: d.totalGmv/d.sessions}))
    .sort((a,b)=>b.totalGmv-a.totalGmv);

  if(!sorted.length) return `<div class="empty-state" style="padding:32px;"><div class="empty-icon">🤝</div>Registra GMV en sesiones donde ambos roles estén asignados para ver las duplas.</div>`;

  const maxGmv = sorted[0].totalGmv;
  const medals = ["🥇","🥈","🥉"];

  // Header table
  const rows = sorted.map((d,i)=>{
    const pct = (d.totalGmv/maxGmv*100).toFixed(0);
    return `<div class="duo-card">
      <div style="font-size:20px;text-align:center;">${medals[i]||i+1}</div>
      <div class="duo-pair">
        <div class="duo-person">${avatarHtml(d.anfiCode,"sm")} 🎙️ <strong>${memberName(d.anfiCode).split(" ")[0]}</strong></div>
        <div class="duo-person">${avatarHtml(d.backCode,"sm")} 💻 <strong>${memberName(d.backCode).split(" ")[0]}</strong></div>
        <div class="duo-bar-wrap"><div class="duo-bar" style="width:${pct}%;"></div></div>
      </div>
      <div class="duo-stat" style="text-align:center;">
        <div class="duo-stat-val" style="font-size:14px;">${d.sessions}</div>
        <div class="duo-stat-sub">sesiones</div>
      </div>
      <div class="duo-stat">
        <div class="duo-stat-val">${fmtGMV(d.totalGmv)}</div>
        <div class="duo-stat-sub">GMV total</div>
      </div>
      <div class="duo-stat">
        <div class="duo-stat-val" style="color:var(--oxide);">${fmtGMV(d.gmvPorHr)}</div>
        <div class="duo-stat-sub">por hora</div>
      </div>
    </div>`;
  }).join("");

  return `<div style="display:grid;grid-template-columns:32px 1fr 80px 120px 120px;gap:12px;padding:8px 18px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);">
    <div></div><div>Dupla</div><div style="text-align:center;">Ses.</div><div>GMV Total</div><div>GMV/Hr</div>
  </div>${rows}`;
}

function slotWeekMon(dateStr){
  const d = new Date(dateStr+"T12:00:00");
  const sun = new Date(d); sun.setDate(d.getDate() - d.getDay());
  return localISO(sun);
}

function weekLabel_from(sunIso){
  const d0 = sunIso;
  const end = new Date(sunIso+"T12:00:00");
  end.setDate(end.getDate()+6);
  const d6 = localISO(end);
  return `${fmtDate(d0)} – ${fmtDate(d6)}`;
}

function addAdmin(){
  const name = document.getElementById("newAdminName").value.trim();
  const code = document.getElementById("newAdminCode").value.trim().toUpperCase();
  const pass = document.getElementById("newAdminPass").value;
  const err  = document.getElementById("adminCuentaErr");
  if(name.length < 2){ err.style.display="block"; err.textContent="Nombre muy corto."; return; }
  if(code.length < 2){ err.style.display="block"; err.textContent="Código muy corto."; return; }
  if(pass.length < 6){ err.style.display="block"; err.textContent="Contraseña mínimo 6 caracteres."; return; }
  const current = getAdmins();
  if(current.find(a=>a.code===code)){ err.style.display="block"; err.textContent="Ese código ya existe."; return; }
  // Copiar defaults a STATE si aún no se ha personalizado
  if(!STATE.admins.length) STATE.admins = [...ADMINS];
  STATE.admins.push({ code, name, pass });
  logChange("Agregar admin", `${name} (${code})`);
  renderAdminCuentas();
}

function removeAdmin(idx){
  if(SESSION.code !== "RUB") return;
  if(!STATE.admins.length) STATE.admins = [...ADMINS];
  const a = STATE.admins[idx];
  if(!a) return;
  showConfirm(`¿Eliminar la cuenta de ${a.name}? Ya no podrá ingresar.`, ()=>{
    STATE.admins.splice(idx, 1);
    logChange("Eliminar admin", `${a.name} (${a.code})`);
    renderAdminCuentas();
  }, "Eliminar");
}

function editAdminPass(idx){
  if(SESSION.code !== "RUB") return;
  const current = getAdmins();
  const a = current[idx];
  if(!a) return;
  const nueva = prompt(`Nueva contraseña para ${a.name} (mínimo 6 caracteres):`);
  if(!nueva) return;
  if(nueva.length < 6){ showAlert("La contraseña debe tener al menos 6 caracteres."); return; }
  if(!STATE.admins.length) STATE.admins = [...ADMINS];
  STATE.admins[idx].pass = nueva;
  logChange("Cambiar contraseña admin", `${a.name} (${a.code})`);
  renderAdminCuentas();
}

function exportToExcel(){
  const wb = XLSX.utils.book_new();

  // ── Hoja 1: Equipo ────────────────────────────────────────────────────────
  const equipoData = [["Código","Nombre","Rol","Límite diario"]];
  STATE.members.forEach(m => {
    equipoData.push([m.code, m.name, m.role === "anfitriona" ? "Anfitriona" : "Staff Backend", memberLimit(m.role)]);
  });
  const wsEquipo = XLSX.utils.aoa_to_sheet(equipoData);
  wsEquipo["!cols"] = [{wch:10},{wch:28},{wch:16},{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsEquipo, "Equipo");

  // ── Hoja 2: Sesiones ──────────────────────────────────────────────────────
  const sesionesData = [["Fecha","Día","Inicio","Fin","Anfitriona","Backend","GMV","Reporte"]];
  [...STATE.slots]
    .sort((a,b) => a.date.localeCompare(b.date) || a.timeStart.localeCompare(b.timeStart))
    .forEach(slot => {
      const anfiPick = STATE.picks.find(p => p.slotId===slot.id && p.status!=="cancelled" && memberRole(p.memberCode)==="anfitriona");
      const backPick = STATE.picks.find(p => p.slotId===slot.id && p.status!=="cancelled" && memberRole(p.memberCode)==="backend");
      sesionesData.push([
        slot.date, slot.day, slot.timeStart, slot.timeEnd,
        anfiPick ? memberName(anfiPick.memberCode) : "",
        backPick ? memberName(backPick.memberCode) : "",
        slot.gmv > 0 ? slot.gmv : "",
        slot.reporte || ""
      ]);
    });
  const wsSesiones = XLSX.utils.aoa_to_sheet(sesionesData);
  wsSesiones["!cols"] = [{wch:12},{wch:12},{wch:8},{wch:8},{wch:22},{wch:22},{wch:12},{wch:40}];
  XLSX.utils.book_append_sheet(wb, wsSesiones, "Sesiones");

  // ── Hoja 3: Asignaciones ──────────────────────────────────────────────────
  const asignData = [["Fecha","Día","Horario","Miembro","Rol","Estado","Notas","Asignado por"]];
  [...STATE.picks]
    .filter(p => p.status !== "cancelled")
    .forEach(p => {
      const slot = STATE.slots.find(s => s.id === p.slotId);
      if(!slot) return;
      const m = STATE.members.find(mb => mb.code === p.memberCode);
      asignData.push([
        slot.date, slot.day, `${slot.timeStart}–${slot.timeEnd}`,
        m ? m.name : p.memberCode,
        m ? (m.role === "anfitriona" ? "Anfitriona" : "Backend") : "",
        p.status === "confirmed" ? "Confirmada" : "Pendiente",
        p.notes || "",
        p.by || ""
      ]);
    });
  const wsAsign = XLSX.utils.aoa_to_sheet(asignData);
  wsAsign["!cols"] = [{wch:12},{wch:12},{wch:14},{wch:22},{wch:12},{wch:12},{wch:30},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsAsign, "Asignaciones");

  // ── Hoja 4: Bitácora ──────────────────────────────────────────────────────
  if(STATE.changelog && STATE.changelog.length){
    const logData = [["Fecha","Hora","Admin","Acción","Detalle"]];
    STATE.changelog.forEach(e => {
      const dt = new Date(e.at);
      logData.push([
        dt.toLocaleDateString("es-MX"),
        dt.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}),
        `${e.adminName} (${e.adminCode})`,
        e.action, e.detail || ""
      ]);
    });
    const wsLog = XLSX.utils.aoa_to_sheet(logData);
    wsLog["!cols"] = [{wch:12},{wch:8},{wch:20},{wch:22},{wch:40}];
    XLSX.utils.book_append_sheet(wb, wsLog, "Bitácora");
  }

  // Descargar
  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `BDG_Horarios_${fecha}.xlsx`);
}

// Imágenes live por color: { "PENNY CLOG": { "Taupe": "https://..." } }
let _invColorImgs = {};

function _invParseVariants(variants, images){
  const imgMap = {};
  (images || []).forEach(img => { imgMap[img.id] = img.src; });
  const result = {};
  const colorImg = {};
  variants.forEach(v => {
    const parts = v.product_variant_title.split(" / ");
    const color = parts.length >= 2 ? parts[0] : "Default";
    const size  = parts.length >= 2 ? parts[1] : (parts[0] || "Única");
    if(!result[color]) result[color] = {};
    result[color][size] = (result[color][size] || 0) + (v.product_variant_inventory_quantity ?? 0);
    // Primera imagen de cada color
    if(!colorImg[color] && v.image_id && imgMap[v.image_id]){
      colorImg[color] = imgMap[v.image_id];
    }
  });
  return { stock: result, colorImg };
}

async function _invFetch(query){
  const res = await fetch(`/api/inventory?title=${encodeURIComponent(query)}`);
  if(!res.ok) throw new Error(`${res.status}`);
  const data = await res.json();
  const variants = [], images = [];
  (data.products || []).forEach(p => {
    (p.images || []).forEach(img => images.push(img));
    (p.variants || []).forEach(v =>
      variants.push({
        product_variant_title: v.title,
        product_variant_inventory_quantity: v.inventory_quantity ?? 0,
        image_id: v.image_id
      })
    );
  });
  return { variants, images };
}

    _invTs = new Date().toLocaleString("es-MX",{day:"numeric",month:"long",hour:"numeric",minute:"2-digit"});
    const tsEl = document.getElementById("invTs");
    if(tsEl) tsEl.textContent = `Actualizado: ${_invTs}${live === 0 ? " (cache)" : ""}`;
  } catch(e) {
    console.warn("Inventario sync error:", e);
  } finally {
    _invLoading = false;
    if(btn) btn.disabled = false;
    if(icon) icon.classList.remove("spin");
  }
  invRender();
  // Auto-refresh 30 min
  if(_invAutoTimer) clearTimeout(_invAutoTimer);
  _invAutoTimer = setTimeout(() => invSync(), 30 * 60 * 1000);
}

function invRender(){
  const wrap = document.getElementById("invTableWrap");
  if(!wrap) return;

  // Armar filas
  const rows = [];
  INV_PRODUCTS.filter(p => _invCat === "all" || p.cat === _invCat).forEach(prod => {
    const cm = _invData[prod.name] || {};
    const colors = Object.keys(cm);
    const single = colors.length === 1 && (colors[0] === "Default" || colors[0] === "Única");
    if(single){
      rows.push({prod, colorLabel:null, sizes: cm[colors[0]] || {}});
    } else {
      colors.forEach(color => rows.push({prod, colorLabel:color, sizes: cm[color] || {}}));
    }
  });

  // Todas las tallas únicas
  const sizeSet = new Set();
  rows.forEach(r => Object.keys(r.sizes).filter(k => k !== "Única").forEach(k => sizeSet.add(k)));
  const allSizes = [...sizeSet].sort((a,b) => { const na=parseInt(a),nb=parseInt(b); return isNaN(na)||isNaN(nb)?a.localeCompare(b):na-nb; });

  // Construir tabla
  let lastProd = null;
  const trs = rows.map(row => {
    const isNew = row.prod.name !== lastProd;
    lastProd = row.prod.name;
    const hasColor = !!row.colorLabel;
    // Prioridad: foto live de Shopify → fallback hardcodeado
    const liveImg = _invColorImgs[row.prod.name]?.[row.colorLabel || "Default"];
    const imgUrl = liveImg
      || (hasColor && row.prod.variantImgs?.[row.colorLabel])
      || row.prod.img;

    const thumbHtml = isNew
      ? `<img class="inv-thumb" src="${imgUrl}" onerror="this.style.display='none'" loading="lazy"/>`
      : `<div class="inv-thumb-ph"></div>`;

    const nameHtml = isNew
      ? `<div class="inv-name">${row.prod.name}</div>${hasColor ? `<div class="inv-color">${row.colorLabel}</div>` : ""}`
      : `<div class="inv-color" style="padding-left:0">${row.colorLabel || ""}</div>`;

    const sizeCells = allSizes.map(s => {
      const q = row.sizes[s];
      if(q === undefined || q === null) return `<td class="c-num"><span class="pill-inv na">—</span></td>`;
      const qd = Math.max(0,q);
      return `<td class="c-num"><span class="pill-inv ${_invQClass(qd)}">${qd}</span></td>`;
    }).join("");

    const unicaQ = row.sizes["Única"];
    const unicaCell = unicaQ !== undefined
      ? `<td class="c-num"><span class="pill-inv ${_invQClass(Math.max(0,unicaQ))}">${Math.max(0,unicaQ)}</span></td>`
      : "";

    // Total de pares para esta fila
    const rowTotal = Object.entries(row.sizes)
      .filter(([k]) => k !== "Única")
      .reduce((s,[,q]) => s + Math.max(0, q||0), 0)
      + (unicaQ !== undefined ? Math.max(0, unicaQ) : 0);

    const priceHtml = isNew
      ? `<td class="c-num" style="text-align:right;"><span class="inv-price">$${(row.prod.price||0).toLocaleString("es-MX")}</span>${row.prod.sale?`<br><span class="inv-sale">⚡ $${row.prod.sale.toLocaleString("es-MX")}</span>`:""}</td>`
      : `<td></td>`;

    return `<tr class="${!isNew?"color-row":""}">
      <td><div class="inv-prod-cell">${thumbHtml}<div>${nameHtml}</div></div></td>
      ${allSizes.length ? sizeCells : unicaCell}
      <td class="c-num" style="font-weight:700;color:var(--text);">${rowTotal}</td>
      ${priceHtml}
    </tr>`;
  }).join("");

  const sizeHeaders = allSizes.length
    ? allSizes.map(s => `<th class="c-num">${s}</th>`).join("")
    : `<th class="c-num">Stock</th>`;

  const tableHtml = `
    <table class="inv-tbl">
      <thead><tr>
        <th style="min-width:220px;">Modelo</th>
        ${sizeHeaders}
        <th class="c-num" style="font-weight:700;">Total</th>
        <th style="text-align:right;min-width:110px;">Precio</th>
      </tr></thead>
      <tbody>${trs}</tbody>
    </table>`;

  wrap.innerHTML = tableHtml;

  // También renderiza en el landing público (sin filtro de categoría)
  const pubWrap = document.getElementById("pubInvTableWrap");
  if(pubWrap){
    // Para el público: todas las categorías, misma tabla
    const pubRows = [];
    INV_PRODUCTS.forEach(prod => {
      const cm = _invData[prod.name] || {};
      const colors = Object.keys(cm);
      const single = colors.length === 1 && (colors[0] === "Default" || colors[0] === "Única");
      if(single){ pubRows.push({prod, colorLabel:null, sizes: cm[colors[0]] || {}}); }
      else { colors.forEach(color => pubRows.push({prod, colorLabel:color, sizes: cm[color] || {}})); }
    });
    const pubSizeSet = new Set();
    pubRows.forEach(r => Object.keys(r.sizes).filter(k=>k!=="Única").forEach(k=>pubSizeSet.add(k)));
    const pubSizes = [...pubSizeSet].sort((a,b)=>{const na=parseInt(a),nb=parseInt(b);return isNaN(na)||isNaN(nb)?a.localeCompare(b):na-nb;});
    let pubLastProd = null;
    const pubTrs = pubRows.map(row => {
      const isNew = row.prod.name !== pubLastProd; pubLastProd = row.prod.name;
      const liveImg = _invColorImgs[row.prod.name]?.[row.colorLabel||"Default"];
      const imgUrl = liveImg || (row.colorLabel && row.prod.variantImgs?.[row.colorLabel]) || row.prod.img;
      const thumbHtml = isNew ? `<img class="inv-thumb" src="${imgUrl}" onerror="this.style.display='none'" loading="lazy"/>` : `<div class="inv-thumb-ph"></div>`;
      const nameHtml  = isNew ? `<div class="inv-name">${row.prod.name}</div>${row.colorLabel?`<div class="inv-color">${row.colorLabel}</div>`:""}` : `<div class="inv-color">${row.colorLabel||""}</div>`;
      const sizeCells = pubSizes.map(s=>{ const q=row.sizes[s]; if(q===undefined||q===null) return `<td class="c-num"><span class="pill-inv na">—</span></td>`; const qd=Math.max(0,q); return `<td class="c-num"><span class="pill-inv ${_invQClass(qd)}">${qd}</span></td>`; }).join("");
      const unicaPubQ = row.sizes["Única"];
      const pubRowTotal = Object.entries(row.sizes).filter(([k])=>k!=="Única").reduce((s,[,q])=>s+Math.max(0,q||0),0) + (unicaPubQ !== undefined ? Math.max(0, unicaPubQ) : 0);
      const priceHtml = isNew ? `<td class="c-num" style="text-align:right;"><span class="inv-price">$${(row.prod.price||0).toLocaleString("es-MX")}</span>${row.prod.sale?`<br><span class="inv-sale">⚡ $${row.prod.sale.toLocaleString("es-MX")}</span>`:""}</td>` : `<td></td>`;
      return `<tr class="${!isNew?"color-row":""}"><td><div class="inv-prod-cell">${thumbHtml}<div>${nameHtml}</div></div></td>${pubSizes.length?sizeCells:""}<td class="c-num" style="font-weight:700;color:var(--text);">${pubRowTotal}</td>${priceHtml}</tr>`;
    }).join("");
    pubWrap.innerHTML = `<table class="inv-tbl"><thead><tr><th style="min-width:220px;">Modelo</th>${pubSizes.map(s=>`<th class="c-num">${s}</th>`).join("")}<th class="c-num" style="font-weight:700;">Total</th><th style="text-align:right;min-width:110px;">Precio</th></tr></thead><tbody>${pubTrs}</tbody></table>`;
    const tsEl = document.getElementById("pubInvTs");
    if(tsEl && _invTs) tsEl.textContent = `Actualizado: ${_invTs}`;
  }
}

function renderAdminInventario(){
  const cats = [{k:"all",label:"Todo"},{k:"clogs",label:"Clogs"},{k:"flux",label:"Flux"},{k:"acc",label:"Accesorios"}];
  document.getElementById("tabContent").innerHTML = `
    <div class="inv-toolbar">
      <div class="inv-cat-btns">
        ${cats.map(c=>`<button class="inv-cat-btn ${_invCat===c.k?"active":""}" onclick="_invCat='${c.k}';invRender();renderAdminInventario()">${c.label}</button>`).join("")}
      </div>
      <button class="inv-sync-btn" id="invSyncBtn" onclick="invSync()">
        <span id="invSyncIcon">↻</span> Actualizar
      </button>
      <span class="inv-ts" id="invTs">${_invTs ? `Actualizado: ${_invTs}` : "Cargando…"}</span>
    </div>
    <div class="inv-tbl-wrap" id="invTableWrap"></div>`;
  invRender();
  if(!_invTs) invSync();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
load();
renderPublicCal();
// Pre-carga inventario en background para que esté listo al abrir la pestaña
setTimeout(() => invSync(), 2000);
// GMV en background al cargar — actualiza sesiones pasadas sin tener que abrir Historial
setTimeout(() => loadLiveGMV(), 4000);
// Re-calcula cada hora para que la sesión actual aparezca actualizada
setInterval(() => loadLiveGMV(), 60 * 60 * 1000);
</script>
