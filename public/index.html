<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BDG · Horarios LIVE</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#F8F8F7; --surface:#FFFFFF; --surface2:#F2F2F0; --surface3:#E8E8E5;
  --line:#E0E0DC; --line2:#CBCBC6;
  --carbon:#1C1C1A; --carbon2:#2E2E2B;
  --text:#1C1C1A; --text2:#5A5A56; --muted:#9A9A94;
  --oxide:#B8432A; --oxide2:#D4573E; --oxide-l:#FAEAE7; --oxide-ll:#F5D0C8;
  --pos:#2D6A3F; --pos-l:#E8F5EC;
  --neg:#8B2020; --neg-l:#F5EAEA;
  --warn:#7A5C1E; --warn-l:#F5EDD6;
  --neu:#4A5568; --neu-l:#EDF2F7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── TOPBAR ── */
.topbar{background:var(--carbon);color:#fff;padding:0 24px;height:44px;display:flex;align-items:center;justify-content:space-between;font-size:11px;letter-spacing:.18em;text-transform:uppercase;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite;display:inline-block;margin-right:6px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── LANDING ── */
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 44px);padding:32px 16px;}
.landing-logo{height:22px;width:auto;filter:brightness(0);margin-bottom:32px;}
.landing-title{font-family:'EB Garamond',serif;font-size:28px;font-weight:500;letter-spacing:-.02em;margin-bottom:6px;text-align:center;}
.landing-sub{font-size:12px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:48px;}
.role-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:720px;}
.role-card{background:var(--surface);border:1px solid var(--line);padding:28px 32px;cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:center;width:200px;}
.role-card:hover{border-color:var(--oxide);box-shadow:0 4px 16px rgba(184,67,42,.1);}
.role-icon{font-size:28px;margin-bottom:12px;}
.role-label{font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.role-desc{font-size:11px;color:var(--muted);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(28,28,26,.5);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--line);padding:36px 32px;width:100%;max-width:380px;}
.modal h2{font-family:'EB Garamond',serif;font-size:22px;font-weight:500;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:24px;letter-spacing:.05em;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line2);font-size:13px;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus{border-color:var(--carbon);}
.field .hint{font-size:11px;color:var(--muted);margin-top:5px;}
.modal-err{font-size:12px;color:var(--neg);background:var(--neg-l);padding:8px 12px;margin-top:10px;display:none;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}

/* ── BUTTONS ── */
.btn{padding:10px 20px;font-size:12px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;transition:background .15s;}
.btn.primary{background:var(--carbon);color:#fff;}
.btn.primary:hover{background:var(--carbon2);}
.btn.accent{background:var(--oxide);color:#fff;}
.btn.accent:hover{background:var(--oxide2);}
.btn.ghost{background:none;border:1px solid var(--line2);color:var(--text2);}
.btn.ghost:hover{border-color:var(--carbon);color:var(--carbon);}
.btn.danger{background:none;border:1px solid var(--neg-l);color:var(--neg);font-size:11px;padding:6px 12px;}
.btn.danger:hover{background:var(--neg-l);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── APP SHELL ── */
#app{display:none;}
.app-header{background:var(--surface);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.app-header-left{display:flex;align-items:center;gap:16px;}
.app-logo{height:18px;filter:brightness(0);}
.app-view-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);border-left:1px solid var(--line2);padding-left:16px;}
.user-chip{font-size:12px;background:var(--surface2);border:1px solid var(--line);padding:5px 12px;color:var(--text2);letter-spacing:.06em;display:flex;align-items:center;gap:8px;}
.app-body{padding:28px;max-width:1100px;margin:0 auto;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:28px;}
.tab{padding:10px 20px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--muted);transition:color .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--oxide);border-bottom-color:var(--oxide);font-weight:600;}

/* ── SECTION ── */
.section-title{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--carbon);}
thead th{color:#fff;font-size:10px;letter-spacing:.22em;text-transform:uppercase;padding:10px 14px;font-weight:500;text-align:left;}
tbody tr{border-bottom:1px solid var(--line);}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
td{padding:10px 14px;vertical-align:middle;}
.code-badge{font-family:'EB Garamond',serif;font-size:14px;background:var(--surface2);border:1px solid var(--line2);padding:2px 10px;letter-spacing:.08em;}
.role-pill{font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;font-weight:500;}
.role-pill.anfitriona{background:var(--oxide-ll);color:var(--oxide);}
.role-pill.backend{background:var(--neu-l);color:var(--neu);}
.empty-state{text-align:center;padding:56px;color:var(--muted);font-size:13px;line-height:1.7;}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4;}

/* ── AVATAR ── */
.avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--line2);flex-shrink:0;background:var(--surface2);}
.avatar-sm{width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--line2);flex-shrink:0;}
.avatar-placeholder{width:32px;height:32px;border-radius:50%;background:var(--surface3);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);flex-shrink:0;}
.avatar-upload-wrap{position:relative;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
.avatar-upload-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.avatar-upload-btn{font-size:11px;color:var(--oxide);letter-spacing:.08em;text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;font-family:'Jost',sans-serif;}
.avatar-lg{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--line2);display:block;margin-bottom:8px;}
.avatar-lg-placeholder{width:56px;height:56px;border-radius:50%;background:var(--surface3);border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:8px;}

/* ── ADD MEMBER FORM ── */
.add-form{background:var(--surface);border:1px solid var(--line);padding:20px 24px;margin-bottom:24px;}
.add-form-title{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.form-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
.form-row .field{margin-bottom:0;flex:1;min-width:140px;}
.form-err{font-size:11px;color:var(--neg);margin-top:8px;display:none;}

/* ── WEEK NAV ── */
.week-nav{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.week-label{font-family:'EB Garamond',serif;font-size:20px;font-weight:500;}
.week-btn{width:32px;height:32px;border:1px solid var(--line2);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:border-color .15s;}
.week-btn:hover{border-color:var(--carbon);}

/* ── SESSION CARDS ── */
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:24px;}
.slot-card{background:var(--surface);border:1px solid var(--line);padding:18px 20px;position:relative;transition:border-color .15s;}
.slot-card.mine{border-color:var(--oxide);background:var(--oxide-l);}
.slot-day{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.slot-time{font-family:'EB Garamond',serif;font-size:24px;font-weight:500;margin-bottom:12px;}
.slot-spots{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.spot-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);font-size:12px;}
.spot-row.filled-mine{background:var(--oxide-l);border-color:var(--oxide-ll);}
.spot-row.filled{background:var(--surface2);}
.spot-row.open{background:var(--surface);}
.spot-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.spot-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);width:70px;flex-shrink:0;}
.spot-name{flex:1;font-weight:500;}
.spot-note{font-size:10px;color:var(--muted);font-style:italic;}
.spot-status{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;flex-shrink:0;}
.spot-status.confirmed{background:var(--pos-l);color:var(--pos);}
.spot-status.pending{background:var(--warn-l);color:var(--warn);}
.spot-status.open{background:var(--surface3);color:var(--muted);}
.slot-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.slot-select-btn{font-size:11px;padding:7px 16px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--oxide);background:none;color:var(--oxide);cursor:pointer;transition:all .15s;}
.slot-select-btn:hover{background:var(--oxide);color:#fff;}
.slot-select-btn.active{background:var(--oxide);color:#fff;}
.slot-select-btn:disabled{opacity:.4;cursor:not-allowed;border-color:var(--line2);color:var(--muted);}
.slot-delete-btn{position:absolute;top:10px;right:12px;background:var(--surface2);border:1px solid var(--line2);cursor:pointer;color:var(--muted);font-size:13px;line-height:1;transition:all .15s;z-index:10;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.slot-delete-btn:hover{background:var(--neg-l);border-color:var(--neg);color:var(--neg);}
.add-slot-card{background:none;border:1px dashed var(--line2);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;cursor:pointer;transition:border-color .15s;}
.add-slot-card:hover{border-color:var(--oxide);}
.add-slot-icon{font-size:24px;opacity:.4;margin-bottom:8px;}
.add-slot-text{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}

/* ── LIMIT BAR ── */
.limit-bar{background:var(--surface);border:1px solid var(--line);padding:14px 18px;margin-bottom:22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.limit-item{display:flex;align-items:center;gap:10px;}
.limit-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.limit-pips{display:flex;gap:5px;}
.pip{width:28px;height:8px;}
.pip.used{background:var(--oxide);}
.pip.free{background:var(--line2);}
.limit-count{font-family:'EB Garamond',serif;font-size:16px;font-weight:500;}

/* ── MY SESSIONS ── */
.my-slots{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.my-slot-row{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line2);padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;transition:border-color .15s;}
.my-slot-row.confirmed{border-left-color:var(--pos);}
.my-slot-row.pending{border-left-color:var(--warn);}
.my-slot-info{flex:1;min-width:150px;}
.my-slot-day{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px;}
.my-slot-time{font-family:'EB Garamond',serif;font-size:19px;font-weight:500;}
.my-slot-note{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic;}
.my-slot-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.confirm-btn{font-size:11px;padding:7px 14px;font-family:'Jost',sans-serif;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.confirm-btn.confirm{background:var(--pos-l);color:var(--pos);border-color:#b2d8bc;}
.confirm-btn.confirm:hover,.confirm-btn.confirm.active{background:var(--pos);color:#fff;border-color:var(--pos);}
.confirm-btn.cancel-btn{background:none;border:1px solid var(--line2);color:var(--muted);}
.confirm-btn.cancel-btn:hover{background:var(--neg-l);border-color:var(--neg);color:var(--neg);}
.notes-input{font-size:12px;border:1px solid var(--line2);padding:7px 10px;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);outline:none;width:160px;}
.notes-input:focus{border-color:var(--carbon);}

/* ── ADMIN SPOT BUTTONS ── */
.adm-spot-btn{border:none;cursor:pointer;font-size:10px;padding:3px 8px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;flex-shrink:0;}
.adm-spot-btn.conf{background:var(--pos-l);color:var(--pos);border:1px solid #b2d8bc;}
.adm-spot-btn.conf:hover{background:var(--pos);color:#fff;}
.adm-spot-btn.conf.active{background:var(--pos);color:#fff;}
.adm-spot-btn.rm{background:none;border:1px solid var(--line2);color:var(--muted);margin-left:2px;}
.adm-spot-btn.rm:hover{background:var(--neg-l);color:var(--neg);border-color:var(--neg);}
.adm-spot-btn.assign{background:var(--oxide);color:#fff;border:1px solid var(--oxide);}
.adm-spot-btn.assign:hover{background:var(--oxide2);}
.adm-select{flex:1;min-width:0;padding:3px 6px;border:1px solid var(--line2);font-size:12px;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);outline:none;}
.adm-select:focus{border-color:var(--carbon);}
.adm-tag{font-size:9px;letter-spacing:.12em;text-transform:uppercase;background:var(--neu-l);color:var(--neu);padding:2px 6px;vertical-align:middle;font-family:'Jost',sans-serif;font-weight:500;}

/* ── SUMMARY ── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.summary-card{background:var(--surface);border:1px solid var(--line);overflow:hidden;}
.sum-head{background:var(--carbon);color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;}
.sum-head-title{font-size:11px;letter-spacing:.16em;text-transform:uppercase;}
.sum-head-date{font-size:11px;opacity:.55;}
.sum-body{padding:0;}
.sum-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line);font-size:12px;}
.sum-row:last-child{border-bottom:none;}
.sum-role-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.sum-name{flex:1;}
.sum-code{font-size:11px;color:var(--muted);font-family:'EB Garamond',serif;}
.sum-status{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;flex-shrink:0;}
.sum-status.confirmed{background:var(--pos-l);color:var(--pos);}
.sum-status.pending{background:var(--warn-l);color:var(--warn);}
.sum-status.open{background:var(--surface2);color:var(--muted);}

/* ── LANDING HEADER ── */
.landing-header{background:var(--surface);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:flex-start;justify-content:flex-start;gap:16px;}
.landing-header-left{display:flex;align-items:center;gap:14px;padding-top:2px;flex-shrink:0;}
.landing-title-block{display:flex;flex-direction:column;gap:8px;border-left:1px solid var(--line2);padding-left:16px;}
.landing-title-small{font-family:'EB Garamond',serif;font-size:17px;font-weight:500;letter-spacing:-.01em;line-height:1;}
.landing-access-btns{display:flex;gap:8px;flex-wrap:wrap;}
.access-btn{padding:6px 14px;font-size:11px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line2);background:none;color:var(--text2);cursor:pointer;transition:all .15s;}
.access-btn:hover{border-color:var(--carbon);color:var(--carbon);}
.access-btn.admin-btn{background:var(--carbon);color:#fff;border-color:var(--carbon);}
.access-btn.admin-btn:hover{background:var(--carbon2);}

/* ── CALENDARIO PÚBLICO ── */
.pub-cal{width:100%;max-width:1060px;padding:28px 28px 48px;}
.pub-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.pub-cal-title{font-family:'EB Garamond',serif;font-size:22px;font-weight:500;letter-spacing:-.02em;}
.pub-week-nav{display:flex;align-items:center;gap:10px;}
.pub-week-label{font-size:13px;color:var(--text2);letter-spacing:.05em;}
.pub-week-btn{width:32px;height:32px;border:1px solid var(--line2);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.pub-week-btn:hover{border-color:var(--carbon);}
.pub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
/* ── WEEKLY CAL GRID ── */
.cwg-wrap{width:100%;overflow-x:auto;}
.cwg{width:100%;border:1px solid var(--line);border-collapse:collapse;min-width:580px;}
.cwg-row{display:grid;grid-template-columns:54px repeat(7,1fr);border-bottom:1px solid var(--line);}
.cwg-row:last-child{border-bottom:none;}
.cwg-head-row{display:grid;grid-template-columns:54px repeat(7,1fr);background:var(--carbon);}
.cwg-time{padding:7px 6px;font-size:11px;color:var(--muted);display:flex;align-items:center;justify-content:center;border-right:1px solid var(--line);font-family:'EB Garamond',serif;font-size:13px;letter-spacing:.02em;}
.cwg-head-row .cwg-time{border-right-color:rgba(255,255,255,.12);}
.cwg-dh{padding:10px 6px;border-left:1px solid rgba(255,255,255,.12);text-align:center;color:#fff;}
.cwg-dh.cwg-today{background:var(--oxide);}
.cwg-dh-name{font-size:9px;letter-spacing:.2em;text-transform:uppercase;opacity:.6;margin-bottom:2px;}
.cwg-dh-date{font-family:'EB Garamond',serif;font-size:14px;font-weight:500;}
.cwg-cell{padding:5px 7px;border-left:1px solid var(--line);min-height:50px;}
.cwg-cell.full{background:var(--pos-l);}
.cwg-cell.part{background:var(--warn-l);}
.cwg-cell.open{background:var(--surface);}
.cwg-cell.none{background:var(--bg);}
.cwg-spot{display:flex;align-items:center;gap:4px;font-size:11px;padding:2px 0;line-height:1.3;}
.cwg-sname{font-weight:500;color:var(--text);}
.cwg-libre{color:var(--muted);font-size:10px;}
.pub-empty{text-align:center;padding:32px;color:var(--muted);font-size:12px;letter-spacing:.1em;}

/* ── GMV / REPORTE ── */
.slot-report{border-top:1px solid var(--line);margin-top:14px;padding-top:14px;}
.slot-report-title{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.gmv-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.gmv-prefix{font-size:13px;color:var(--muted);flex-shrink:0;font-family:'EB Garamond',serif;}
.gmv-input{flex:1;padding:7px 10px;border:1px solid var(--line2);font-size:15px;font-family:'EB Garamond',serif;background:var(--bg);color:var(--text);outline:none;min-width:0;}
.gmv-input:focus{border-color:var(--carbon);}
.gmv-display{font-family:'EB Garamond',serif;font-size:22px;font-weight:500;color:var(--pos);}
.gmv-display.zero{color:var(--muted);font-size:14px;}
.report-input{width:100%;padding:7px 10px;border:1px solid var(--line2);font-size:12px;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);outline:none;resize:none;height:48px;display:block;box-sizing:border-box;}
.report-input:focus{border-color:var(--carbon);}
.report-save-btn{font-size:10px;padding:6px 14px;font-family:'Jost',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--carbon);background:var(--carbon);color:#fff;cursor:pointer;transition:background .15s;margin-top:8px;}
.report-save-btn:hover{background:var(--carbon2);}

/* ── HISTORIAL ── */
.hist-kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px;}
.hist-kpi{background:var(--surface);border:1px solid var(--line);padding:16px 18px;}
.hist-kpi-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.hist-kpi-val{font-family:'EB Garamond',serif;font-size:28px;font-weight:500;}
.hist-kpi-val.accent{color:var(--pos);}
.hist-week-group{margin-bottom:24px;}
.hist-week-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--carbon);color:#fff;margin-bottom:8px;}
.hist-week-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;}
.hist-week-gmv{font-family:'EB Garamond',serif;font-size:16px;opacity:.85;}
.hist-row{background:var(--surface);border:1px solid var(--line);border-bottom:none;padding:12px 16px;display:grid;grid-template-columns:90px 1fr 1fr 120px;gap:12px;align-items:start;font-size:12px;}
.hist-row:last-child{border-bottom:1px solid var(--line);}
.hist-row:hover{background:var(--surface2);}
.hist-time{font-family:'EB Garamond',serif;font-size:15px;font-weight:500;}
.hist-team{display:flex;flex-direction:column;gap:3px;}
.hist-person{display:flex;align-items:center;gap:6px;font-size:12px;}
.hist-reporte{font-size:11px;color:var(--muted);font-style:italic;padding-top:2px;}
.hist-gmv{font-family:'EB Garamond',serif;font-size:18px;font-weight:500;color:var(--pos);text-align:right;}
.hist-gmv.none{color:var(--muted);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.1em;}
.hist-edit-btn{font-size:10px;color:var(--oxide);letter-spacing:.08em;text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;font-family:'Jost',sans-serif;margin-top:4px;display:block;}
.hist-filter{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.hist-filter select{padding:7px 10px;border:1px solid var(--line2);font-size:12px;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);outline:none;}
.hist-filter select:focus{border-color:var(--carbon);}
/* ── HISTORIAL SUBTABS ── */
.hist-subtabs{display:flex;gap:0;margin-bottom:22px;border:1px solid var(--line2);overflow:hidden;}
.hist-subtab{padding:9px 18px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;background:none;border:none;border-right:1px solid var(--line2);font-family:'Jost',sans-serif;color:var(--muted);transition:all .15s;flex:1;text-align:center;}
.hist-subtab:last-child{border-right:none;}
.hist-subtab:hover{background:var(--surface2);color:var(--text);}
.hist-subtab.active{background:var(--carbon);color:#fff;}
/* ── DUPLAS / PERSONAS ── */
.person-card{background:var(--surface);border:1px solid var(--line);margin-bottom:10px;overflow:hidden;}
.person-head{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line);}
.person-rank{font-size:24px;width:32px;text-align:center;flex-shrink:0;}
.person-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0;border-top:none;}
.person-stat{padding:12px 18px;border-right:1px solid var(--line);border-top:1px solid var(--line);}
.person-stat:last-child{border-right:none;}
.person-stat-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.person-stat-val{font-family:'EB Garamond',serif;font-size:20px;font-weight:500;}
.person-stat-val.accent{color:var(--pos);}
.duo-card{background:var(--surface);border:1px solid var(--line);padding:16px 18px;margin-bottom:8px;display:grid;grid-template-columns:32px 1fr 1fr 1fr 1fr;gap:12px;align-items:center;}
.duo-card:hover{background:var(--surface2);}
.duo-pair{display:flex;flex-direction:column;gap:4px;}
.duo-person{display:flex;align-items:center;gap:8px;font-size:12px;}
.duo-stat{text-align:right;}

.duo-stat-sub{font-size:10px;color:var(--muted);}
.duo-bar-wrap{height:4px;background:var(--line2);border-radius:2px;margin-top:8px;}
.duo-bar{height:4px;background:var(--oxide);border-radius:2px;}

/* ── MODAL REPORTE ── */
.modal-field-group{display:flex;flex-direction:column;gap:12px;margin-bottom:4px;}

@media(max-width:600px){
  .role-cards{flex-direction:column;align-items:center;}
  .role-card{width:100%;max-width:320px;}
  .form-row{flex-direction:column;}
  .app-body{padding:16px;}
  .limit-bar{flex-direction:column;align-items:flex-start;gap:12px;}
  .hist-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<script>
// ── CONSTANTES ────────────────────────────────────────────────────────────────
const ADMIN_PASS   = "bdgadmin2026";
const MAX_ANFI     = 2;   // sesiones máx por DÍA para anfitrionas
const DEFAULT_TIMES = ["08:30","10:00","11:30","13:00","14:30","16:00","17:30","19:00"]; // 8 sesiones × 1.5h = 8:30am–8:30pm
const MAX_BACKEND  = 3;   // sesiones máx por DÍA para backend
const SESSION_MINS = 90;  // duración fija en minutos

// ── ESTADO ────────────────────────────────────────────────────────────────────
let STATE = {
  members: [],  // { code, name, role }
  slots:   [],  // { id, day, date, timeStart, timeEnd }
  picks:   [],  // { slotId, memberCode, status, notes }  status: pending|confirmed|cancelled
};
let SESSION = { role: null, code: null, name: null };
let pendingAccessRole = null;
let pendingNotesSlotId = null;
let currentWeekOffset = 0;
let memberWeekOffset  = 0;
let previewedCode     = null;
let pendingReporteSlotId = null;

// ── PERSISTENCIA ──────────────────────────────────────────────────────────────
function save(){ localStorage.setItem("bdg_horarios_v2", JSON.stringify(STATE)); }
function load(){
  const raw = localStorage.getItem("bdg_horarios_v2");
  if(raw){ try{ STATE = JSON.parse(raw); }catch(e){} }
}

// ── FOTOS DE PERFIL ───────────────────────────────────────────────────────────
function getPhoto(code){ return localStorage.getItem("bdg_photo_" + code) || null; }
function setPhoto(code, dataUrl){ localStorage.setItem("bdg_photo_" + code, dataUrl); }

function uploadPhoto(code, afterFn){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*";
  inp.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setPhoto(code, ev.target.result); if(afterFn) afterFn(); };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function avatarHtml(code, size="sm"){
  const photo = getPhoto(code);
  const cls   = size === "lg" ? "avatar-lg" : size === "md" ? "avatar" : "avatar-sm";
  const phCls = size === "lg" ? "avatar-lg-placeholder" : "avatar-placeholder";
  if(photo) return `<img src="${photo}" class="${cls}" alt=""/>`;
  const m = STATE.members.find(mb=>mb.code===code);
  const ini = m ? m.name.trim()[0].toUpperCase() : "?";
  return `<div class="${phCls}">${ini}</div>`;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function uid(){ return "s" + Date.now() + Math.random().toString(36).slice(2,5); }

function localISO(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

function fmtDate(d){
  if(!d) return "—";
  const [,m,day] = d.split("-");
  const ms = ["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return `${parseInt(day)} ${ms[parseInt(m)]}`;
}

function addMins(time, mins){
  const [h,mi] = time.split(":").map(Number);
  const total = h*60 + mi + mins;
  return `${String(Math.floor(total/60)%24).padStart(2,"0")}:${String(total%60).padStart(2,"0")}`;
}

function getWeekDates(offset=0){
  const now = new Date();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (now.getDay()||7) + 1 + offset*7);
  monday.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    return localISO(d);
  });
}

function weekLabel(offset){
  const [d0,d6] = [getWeekDates(offset)[0], getWeekDates(offset)[6]];
  return `${fmtDate(d0)} – ${fmtDate(d6)}`;
}

// ── AUTO-CÓDIGO (difícil de adivinar) ─────────────────────────────────────────
function generateCode(name){
  const base  = name.trim().split(/\s+/)[0].toUpperCase().replace(/[^A-Z]/g,"").slice(0,3).padEnd(3,"X");
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // sin I,O,0,1 para evitar confusión
  let code;
  do {
    code = base + Array.from({length:4}, ()=> chars[Math.floor(Math.random()*chars.length)]).join("");
  } while(STATE.members.find(m => m.code === code));
  return code;
}

// ── LÍMITES SEMANALES ─────────────────────────────────────────────────────────
function dayPickCount(memberCode, date){
  return STATE.picks.filter(p => {
    if(p.memberCode !== memberCode || p.status === "cancelled") return false;
    const slot = STATE.slots.find(s => s.id === p.slotId);
    return slot && slot.date === date;
  }).length;
}

function memberLimit(role){ return role === "anfitriona" ? MAX_ANFI : MAX_BACKEND; }

// ── MODALES ───────────────────────────────────────────────────────────────────
function closeModal(id){ document.getElementById(id).style.display="none"; }

function showConfirm(msg, onOk, okLabel="Eliminar"){
  const cancelBtn = document.getElementById("confirmModal").querySelector(".btn.ghost");
  cancelBtn.style.display = "";
  document.getElementById("confirmMsg").textContent = msg;
  document.getElementById("confirmOkBtn").textContent = okLabel;
  document.getElementById("confirmOkBtn").onclick = () => { closeModal("confirmModal"); onOk(); };
  document.getElementById("confirmModal").style.display = "flex";
}

function showAlert(msg){
  const cancelBtn = document.getElementById("confirmModal").querySelector(".btn.ghost");
  cancelBtn.style.display = "none";
  document.getElementById("confirmMsg").textContent = msg;
  document.getElementById("confirmOkBtn").textContent = "Entendido";
  document.getElementById("confirmOkBtn").onclick = () => closeModal("confirmModal");
  document.getElementById("confirmModal").style.display = "flex";
}

function openAccess(role){
  pendingAccessRole = role;
  document.getElementById("accessErr").style.display="none";
  document.getElementById("adminPass").value="";
  document.getElementById("memberCode").value="";
  if(role === "admin"){
    document.getElementById("modalTitle").textContent = "Acceso Admin";
    document.getElementById("modalSub").textContent   = "Ingresa la contraseña de administradora";
    document.getElementById("adminPassField").style.display = "block";
    document.getElementById("codeField").style.display      = "none";
    setTimeout(()=>document.getElementById("adminPass").focus(),100);
  } else {
    document.getElementById("modalTitle").textContent = role === "anfitriona" ? "Anfitriona" : "Staff Backend";
    document.getElementById("modalSub").textContent   = "Ingresa tu código personal";
    document.getElementById("adminPassField").style.display = "none";
    document.getElementById("codeField").style.display      = "block";
    setTimeout(()=>document.getElementById("memberCode").focus(),100);
  }
  document.getElementById("accessModal").style.display="flex";
}

function submitAccess(){
  const err = document.getElementById("accessErr");
  err.style.display="none";
  if(pendingAccessRole === "admin"){
    if(document.getElementById("adminPass").value !== ADMIN_PASS){
      err.style.display="block"; err.textContent="Contraseña incorrecta."; return;
    }
    SESSION = { role:"admin", code:"ADMIN", name:"Administradora" };
  } else {
    const raw    = document.getElementById("memberCode").value.trim().toUpperCase();
    const member = STATE.members.find(m => m.code===raw && m.role===pendingAccessRole);
    if(!member){
      err.style.display="block";
      err.textContent="Código no encontrado. Verifica con tu administradora."; return;
    }
    SESSION = { role: pendingAccessRole, code: member.code, name: member.name };
  }
  closeModal("accessModal");
  renderApp();
}

function doLogout(){
  SESSION = { role:null, code:null, name:null };
  document.getElementById("app").style.display    = "none";
  document.getElementById("landing").style.display = "block";
}

// ── APP SHELL ─────────────────────────────────────────────────────────────────
function renderApp(){
  document.getElementById("landing").style.display = "none";
  document.getElementById("app").style.display     = "block";
  const labels = { admin:"Administradora", anfitriona:"Anfitriona", backend:"Staff Backend" };
  document.getElementById("appViewLabel").textContent = labels[SESSION.role];
  const chipPhoto = SESSION.role!=="admin" ? avatarHtml(SESSION.code,"sm") : "";
  document.getElementById("userChip").innerHTML = SESSION.role==="admin"
    ? "⚙️ Admin"
    : `${chipPhoto}<span>${SESSION.name} · ${SESSION.code}</span>`;
  SESSION.role === "admin" ? renderAdmin() : renderMember();
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function renderAdmin(tab="equipo"){
  const today = new Date().toISOString().slice(0,10);
  const pastWithGmv = STATE.slots.filter(s=>s.date < today && s.gmv > 0).length;
  document.getElementById("appBody").innerHTML = `
    <div class="tabs">
      <div class="tab ${tab==="equipo"?"active":""}"  onclick="renderAdmin('equipo')">Equipo</div>
      <div class="tab ${tab==="sesiones"?"active":""}" onclick="renderAdmin('sesiones')">Sesiones</div>
      <div class="tab ${tab==="resumen"?"active":""}"  onclick="renderAdmin('resumen')">Resumen</div>
      <div class="tab ${tab==="historial"?"active":""}" onclick="renderAdmin('historial')">Historial${pastWithGmv>0?` <span style="font-size:9px;background:var(--pos-l);color:var(--pos);padding:1px 5px;vertical-align:middle;">${pastWithGmv}</span>`:""}
      </div>
    </div>
    <div id="tabContent"></div>`;
  if(tab==="equipo")   renderAdminEquipo();
  if(tab==="sesiones") renderAdminSesiones();
  if(tab==="resumen")  renderAdminResumen();
  if(tab==="historial") renderAdminHistorial();
}

// TAB: EQUIPO
function renderAdminEquipo(){
  const anfiTotal = STATE.members.filter(m=>m.role==="anfitriona").length;
  const backTotal = STATE.members.filter(m=>m.role==="backend").length;
  document.getElementById("tabContent").innerHTML = `
    <div class="add-form">
      <div class="add-form-title">Agregar persona al equipo</div>
      <div class="form-row">
        <div class="field"><label>Nombre completo</label>
          <input id="newName" type="text" placeholder="ej. Ana García" maxlength="40"
            oninput="previewCode()" onkeydown="if(event.key==='Enter')addMember()"/></div>

function previewCode(){
  const name = document.getElementById("newName").value;
  if(name.trim().length >= 2){
    previewedCode = generateCode(name);
    document.getElementById("codePreview").value = previewedCode;
  } else {
    previewedCode = null;
    document.getElementById("codePreview").value = "—";
  }
}

function addMember(){
  const name = document.getElementById("newName").value.trim();
  const role = document.getElementById("newRole").value;
  const err  = document.getElementById("memberErr");
  if(name.length < 2){ err.style.display="block"; err.textContent="Escribe un nombre válido."; return; }
  const code = previewedCode || generateCode(name);
  previewedCode = null;
  STATE.members.push({ code, name, role });
  save(); renderAdminEquipo();
}

function removeMember(code){
  const m = STATE.members.find(mb=>mb.code===code);
  showConfirm(`¿Eliminar a ${m?m.name:"esta persona"}? También se borrarán sus selecciones.`, ()=>{
    STATE.members = STATE.members.filter(mb=>mb.code!==code);
    STATE.picks   = STATE.picks.filter(p=>p.memberCode!==code);
    save(); renderAdminEquipo();
  });
}

// TAB: SESIONES
// Genera 8 sesiones × 7 días para la semana indicada (si no existen ya)
function generateDefaultWeek(offset){
  const weekDates = getWeekDates(offset);
  const DAYS = ["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
  let added = 0;
  weekDates.forEach((date, di) => {
    DEFAULT_TIMES.forEach(start => {
      const exists = STATE.slots.find(s => s.date === date && s.timeStart === start);
      if(!exists){
        STATE.slots.push({ id: uid(), day: DAYS[di], date, timeStart: start, timeEnd: addMins(start, SESSION_MINS) });
        added++;
      }
    });
  });
  if(added > 0){ save(); renderAdmin("sesiones"); renderPublicCal(); }
}

function clearWeek(offset){
  const weekDates   = getWeekDates(offset);
  const today       = new Date().toISOString().slice(0,10);
  const protected_  = STATE.slots.filter(s => weekDates.includes(s.date) && s.date < today && s.gmv > 0);
  const msg = protected_.length > 0
    ? `Esta semana tiene ${protected_.length} sesión${protected_.length!==1?"es":""} pasadas con GMV registrado. Solo se limpiarán las sesiones futuras.`
    : "¿Limpiar todas las sesiones futuras de esta semana? Las selecciones también se borrarán.";
  showConfirm(msg, ()=>{
    const toRemove = STATE.slots
      .filter(s => weekDates.includes(s.date) && s.date >= today)
      .map(s => s.id);
    STATE.slots = STATE.slots.filter(s => !toRemove.includes(s.id));
    STATE.picks = STATE.picks.filter(p => !toRemove.includes(p.slotId));
    save(); renderAdmin("sesiones"); renderPublicCal();
  }, "Limpiar");
}

function renderAdminSesiones(){
  const weekDates = getWeekDates(currentWeekOffset);
  const weekSlots = STATE.slots
    .filter(s=>weekDates.includes(s.date))
    .sort((a,b)=>a.date.localeCompare(b.date)||a.timeStart.localeCompare(b.timeStart));

  // Auto-generar si la semana está vacía
  if(weekSlots.length === 0){
    generateDefaultWeek(currentWeekOffset);
    return; // renderAdminSesiones se vuelve a llamar desde generateDefaultWeek
  }

  const totalSlots = weekDates.reduce((n, date) => n + DEFAULT_TIMES.length, 0); // 56
  const missing = totalSlots - weekSlots.length;

  document.getElementById("tabContent").innerHTML = `
    <div class="week-nav" style="flex-wrap:wrap;gap:10px;">
      <button class="week-btn" onclick="changeWeek(-1)">‹</button>
      <div class="week-label">${weekLabel(currentWeekOffset)}</div>
      <button class="week-btn" onclick="changeWeek(1)">›</button>
      ${currentWeekOffset!==0?`<button class="btn ghost" style="font-size:11px;padding:6px 12px;" onclick="currentWeekOffset=0;renderAdmin('sesiones')">Semana actual</button>`:""}
      <span style="font-size:11px;color:var(--muted);">${weekSlots.length} sesion${weekSlots.length!==1?"es":""}</span>
      <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
        <label style="font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;">Ir a fecha</label>
        <input type="date" id="jumpToDate" style="padding:5px 8px;border:1px solid var(--line2);font-size:12px;font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);outline:none;" onchange="jumpToWeek(this.value)"/>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
      ${missing > 0 ? `<button class="btn ghost" style="font-size:11px;" onclick="generateDefaultWeek(${currentWeekOffset})">↺ Restaurar default (${missing} sesion${missing!==1?"es":""})</button>` : ""}
      <button class="btn danger" style="padding:8px 14px;" onclick="clearWeek(${currentWeekOffset})">Limpiar semana</button>
    </div>
    <div class="slots-grid" id="slotsGrid"></div>`;

  const grid = document.getElementById("slotsGrid");

  const anfiMembers = STATE.members.filter(m=>m.role==="anfitriona");
  const backMembers = STATE.members.filter(m=>m.role==="backend");

  weekSlots.forEach(slot=>{
    const anfiPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="anfitriona");
    const backPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="backend");
    const anfiName = anfiPick ? memberName(anfiPick.memberCode) : null;
    const backName = backPick ? memberName(backPick.memberCode) : null;

    const spotHtml = (icon, label, pick, name, role) => {
      const members = role==="anfitriona" ? anfiMembers : backMembers;
      const selId   = `sel_${role}_${slot.id}`;
      if(pick && name){
        const isConf = pick.status==="confirmed";
        const byAdmin = pick.by === "admin";
        return `<div class="spot-row filled">
          <span class="spot-icon">${icon}</span>
          <span class="spot-label">${label}</span>
          <span class="spot-name">${name}${byAdmin?' <span class="adm-tag">Admin</span>':""}</span>
          <span class="spot-status ${pick.status}">${isConf?"✓ Conf.":"Pend."}</span>
          <button class="adm-spot-btn conf${isConf?" active":""}" onclick="adminConfirmPick('${slot.id}','${pick.memberCode}')" title="${isConf?"Marcar pendiente":"Confirmar"}">✓ Conf</button>
          <button class="adm-spot-btn rm" onclick="adminRemovePick('${slot.id}','${pick.memberCode}')" title="Quitar asignación">×</button>
        </div>`;
      } else {
        const opts = members.length
          ? members.map(m=>`<option value="${m.code}">${m.name}</option>`).join("")
          : `<option value="" disabled>Sin miembros</option>`;
        return `<div class="spot-row open">
          <span class="spot-icon">${icon}</span>
          <span class="spot-label">${label}</span>
          <select id="${selId}" class="adm-select"><option value="">— libre —</option>${opts}</select>
          <button class="adm-spot-btn assign" onclick="adminAssign('${slot.id}','${role}')">Asignar</button>
        </div>`;
      }
    };

    const isPast = slot.date < new Date().toISOString().slice(0,10);
    const gmvFmt = slot.gmv > 0 ? fmtGMV(slot.gmv) : null;

    const div = document.createElement("div");
    div.className = "slot-card";
    div.innerHTML = `
      <button class="slot-delete-btn" onclick="deleteSlot('${slot.id}')" title="Eliminar sesión">🗑</button>
      <div class="slot-day">${slot.day} · ${fmtDate(slot.date)}${isPast?` <span style="font-size:9px;background:var(--surface3);color:var(--muted);padding:1px 5px;vertical-align:middle;letter-spacing:.1em;">PASADO</span>`:""}</div>
      <div class="slot-time">${slot.timeStart} – ${slot.timeEnd}</div>
      <div class="slot-spots">
        ${spotHtml("🎙️","Anfitriona",anfiPick,anfiName,"anfitriona")}
        ${spotHtml("💻","Backend",backPick,backName,"backend")}
      </div>
      <div class="slot-report">
        <div class="slot-report-title">Reporte · GMV</div>
        ${gmvFmt
          ? `<div class="gmv-display">${gmvFmt}</div>${slot.reporte?`<div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;">📝 ${slot.reporte}</div>`:""}`
          : `<div style="font-size:11px;color:var(--muted);">Sin reporte registrado</div>`}
        <button class="report-save-btn" style="margin-top:10px;" onclick="openReporte('${slot.id}')">
          ${gmvFmt ? "✏️ Editar reporte" : "+ Agregar reporte"}
        </button>
      </div>`;
    grid.appendChild(div);
  });

  const addCard = document.createElement("div");
  addCard.className = "add-slot-card";
  addCard.onclick = openSlotModal;
  addCard.innerHTML = `<div class="add-slot-icon">＋</div><div class="add-slot-text">Nueva sesión</div>`;
  grid.appendChild(addCard);
}

function changeWeek(d){ currentWeekOffset+=d; renderAdmin("sesiones"); }

function jumpToWeek(dateStr){
  if(!dateStr) return;
  const target = new Date(dateStr + "T12:00:00");
  const now    = new Date();
  const monday = new Date(now); monday.setDate(now.getDate() - (now.getDay()||7) + 1);
  monday.setHours(0,0,0,0);
  const diff = Math.floor((target - monday) / (7 * 24 * 60 * 60 * 1000));
  currentWeekOffset = diff;
  renderAdmin("sesiones");
}

function openSlotModal(){
  const dates = getWeekDates(currentWeekOffset);
  document.getElementById("slotDate").value  = dates[0];
  document.getElementById("slotStart").value = "19:00";
  document.getElementById("slotErr").style.display = "none";
  syncDayFromDate();
  updateEndPreview();
  document.getElementById("slotModal").style.display = "flex";
  setTimeout(()=>document.getElementById("slotDate").focus(),100);
}

function updateEndPreview(){
  const start = document.getElementById("slotStart").value;
  if(start) document.getElementById("endPreview").textContent = "Termina a las " + addMins(start, SESSION_MINS);
}

function syncDayFromDate(){
  const dateVal = document.getElementById("slotDate").value;
  if(!dateVal) return;
  const d = new Date(dateVal + "T12:00:00");
  const DAYS = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  document.getElementById("slotDay").value = DAYS[d.getDay()];
}

function saveSlot(){
  const date  = document.getElementById("slotDate").value;
  const start = document.getElementById("slotStart").value;
  const err   = document.getElementById("slotErr");
  if(!date || !start){ err.style.display="block"; err.textContent="Completa la fecha y hora."; return; }
  err.style.display="none";
  syncDayFromDate();
  STATE.slots.push({
    id: uid(),
    day: document.getElementById("slotDay").value,
    date, timeStart: start, timeEnd: addMins(start, SESSION_MINS)
  });
  save(); closeModal("slotModal"); renderAdmin("sesiones"); renderPublicCal();
}

function deleteSlot(id){
  STATE.slots = STATE.slots.filter(s=>s.id!==id);
  STATE.picks = STATE.picks.filter(p=>p.slotId!==id);
  save(); renderAdmin("sesiones"); renderPublicCal();
}

function renderAdminResumen(){

  if(!sorted.length){
    document.getElementById("tabContent").innerHTML = `<div class="empty-state"><div class="empty-icon">📅</div>No hay sesiones creadas aún.<br>Ve a la pestaña Sesiones para agregar.</div>`;
    return;
  }
  const cards = sorted.map(slot=>{
    const anfiPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="anfitriona");
    const backPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="backend");
    const rows = [
      { icon:"🎙️", label:"Anfitriona", pick:anfiPick },
      { icon:"💻",  label:"Backend",    pick:backPick },
    ].map(({icon,label,pick})=>{
      if(!pick) return `<div class="sum-row"><span class="sum-role-icon">${icon}</span><span class="sum-name" style="color:var(--muted)">${label} — libre</span><span class="sum-status open">Libre</span></div>`;
      const m = STATE.members.find(mb=>mb.code===pick.memberCode);
      const note = pick.notes ? ` <span style="color:var(--muted);font-size:11px;font-style:italic;">· ${pick.notes}</span>` : "";
      return `<div class="sum-row">
        <span class="sum-role-icon">${icon}</span>
        <span class="sum-name"><strong>${m?m.name:pick.memberCode}</strong>${note}</span>
        <span class="sum-code">${pick.memberCode}</span>
        <span class="sum-status ${pick.status}">${pick.status==="confirmed"?"✓ Conf.":"Pendiente"}</span>
      </div>`;
    }).join("");
    return `<div class="summary-card">
      <div class="sum-head">
        <span class="sum-head-title">${slot.day} · ${slot.timeStart}–${slot.timeEnd}</span>
        <span class="sum-head-date">${fmtDate(slot.date)}</span>
      </div>
      <div class="sum-body">${rows}</div>
    </div>`;
  }).join("");
  const totalGmv = sorted.reduce((s,sl)=>s+(sl.gmv||0),0);
  document.getElementById("tabContent").innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">
      <div class="section-title" style="margin-bottom:0;">${sorted.length} sesion${sorted.length!==1?"es":""} · ${sorted.filter(s=>{const wp=STATE.picks.filter(p=>p.slotId===s.id&&p.status!=="cancelled");return wp.length===2;}).length} completas</div>

    </div>
    <div class="summary-grid">${cards}</div>`;
}

            </div>
            <div class="slot-actions">
              ${mine
                ? `<button class="slot-select-btn active" onclick="cancelPick('${slot.id}')">✓ Seleccionada · Quitar</button>`
                : `<button class="slot-select-btn" onclick="selectSlot('${slot.id}')" ${atLimit?"disabled title='Límite del día alcanzado'":""}>
                    ${atLimit?"Límite del día":"Seleccionar"}
                  </button>`}
            </div>
          </div>`;
        }).join("")}</div>`}

    ${buildMemberLeaderboard()}`;
}

function buildMemberLeaderboard(){
  const board = buildLeaderboard().filter(b => b.role === SESSION.role);
  if(board.length === 0 || board.every(b=>b.gmvTotal===0)) return "";
  const myRank = board.findIndex(b=>b.code===SESSION.code);
  const medals = ["🥇","🥈","🥉"];
  const roleLabel = SESSION.role==="anfitriona" ? "Anfitrionas" : "Staff Backend";
  const rows = board.map((b,i)=>{
    const isMe = b.code === SESSION.code;
    const pct  = board[0].gmvTotal > 0 ? (b.gmvTotal/board[0].gmvTotal)*100 : 0;
    return `<div style="background:${isMe?"var(--oxide-l)":"var(--surface)"};border:1px solid ${isMe?"var(--oxide)":"var(--line)"};padding:12px 16px;margin-bottom:6px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span style="font-size:18px;width:24px;text-align:center;">${medals[i]||i+1}</span>
        ${avatarHtml(b.code,"md")}
        <div style="flex:1;min-width:0;">
          <div style="font-weight:500;font-size:13px;">${isMe?"✨ Tú":""}${b.name.split(" ")[0]}</div>
          <div style="font-size:10px;color:var(--muted);">${b.sesiones} sesión${b.sesiones!==1?"es":""}</div>
        </div>
        <div style="text-align:right;">
          <div class="gmv-display" style="font-size:16px;">${b.gmvTotal>0?fmtGMV(b.gmvTotal):"—"}</div>
          ${b.gmvPorHora>0?`<div style="font-size:10px;color:var(--muted);">${fmtGMV(b.gmvPorHora)}/hr</div>`:""}
        </div>
      </div>
      <div style="background:var(--line2);height:3px;border-radius:2px;">
        <div style="background:${isMe?"var(--oxide)":"var(--carbon)"};height:3px;border-radius:2px;width:${pct.toFixed(0)}%;"></div>
      </div>
    </div>`;
  }).join("");
  return `<div style="margin-top:32px;border-top:1px solid var(--line);padding-top:24px;">
    <div class="section-title" style="margin-bottom:14px;">🏆 Ranking ${roleLabel} · GMV acumulado</div>
    ${myRank>=0?`<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">Tu posición: <strong>#${myRank+1}</strong> de ${board.length}</div>`:""}
    ${rows}
    <div style="font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:.1em;">GMV de sesiones donde participaste · ${SESSION_MINS/60}h por sesión</div>
  </div>`;
}

function memberRole(code){ const m=STATE.members.find(mb=>mb.code===code); return m?m.role:null; }
function memberName(code){ const m=STATE.members.find(mb=>mb.code===code); return m?m.name:code; }

function selectSlot(slotId){
  if(STATE.picks.find(p=>p.slotId===slotId&&p.memberCode===SESSION.code&&p.status!=="cancelled")) return;
  const slot  = STATE.slots.find(s=>s.id===slotId);
  const limit = memberLimit(SESSION.role);
  const count = dayPickCount(SESSION.code, slot.date);
  if(count >= limit){ showAlert(`Ya tienes ${limit} sesion${limit!==1?"es":""} ese día (límite diario).`); return; }
  STATE.picks.push({ slotId, memberCode:SESSION.code, status:"pending", notes:"" });
  save(); renderMember(); renderPublicCal();
}

function cancelPick(slotId){
  STATE.picks = STATE.picks.filter(p=>!(p.slotId===slotId&&p.memberCode===SESSION.code));
  save(); renderMember(); renderPublicCal();
}

function memberChangeWeek(d, reset=false){
  if(reset){ memberWeekOffset = 0; }
  else {
    const next = memberWeekOffset + d;
    if(next < 0) return;
    memberWeekOffset = next;
  }
  renderMember();
}

function setPickStatus(slotId, status){
  const idx = STATE.picks.findIndex(pk => pk.slotId===slotId && pk.memberCode===SESSION.code);
  if(idx >= 0){ STATE.picks[idx].status = status; save(); renderMember(); renderPublicCal(); }
}

function adminAssign(slotId, role){
  const selId = `sel_${role}_${slotId}`;
  const el = document.getElementById(selId);
  if(!el || !el.value) return;
  const memberCode = el.value;

// ── CALENDARIO PÚBLICO ───────────────────────────────────────────────────────
let pubWeekOffset = 0;
const DAYS_SHORT = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];

function renderPublicCal(){
  const weekDates = getWeekDates(pubWeekOffset);
  const today     = localISO(new Date());

  document.getElementById("pubWeekLabel").textContent = weekLabel(pubWeekOffset);

  // Solo hacia adelante
  const backBtn = document.getElementById("pubBackBtn");
  if(backBtn) backBtn.style.visibility = pubWeekOffset <= 0 ? "hidden" : "visible";

  const grid = document.getElementById("pubGrid");

  // Cabecera de días
  let headCols = `<div class="cwg-time"></div>`;
  weekDates.forEach((date, i) => {
    const isTod = date === today;
    headCols += `<div class="cwg-dh${isTod?" cwg-today":""}">
      <div class="cwg-dh-name">${DAYS_SHORT[i]}</div>
      <div class="cwg-dh-date">${fmtDate(date)}</div>
    </div>`;
  });

  // Filas por horario
  let rows = "";
  DEFAULT_TIMES.forEach(time => {
    let cells = `<div class="cwg-time">${time}</div>`;
    weekDates.forEach(date => {
      const slot = STATE.slots.find(s => s.date === date && s.timeStart === time);
      if(!slot){ cells += `<div class="cwg-cell none"></div>`; return; }
      const anfiPick = STATE.picks.find(p => p.slotId===slot.id && p.status!=="cancelled" && memberRole(p.memberCode)==="anfitriona");
      const backPick = STATE.picks.find(p => p.slotId===slot.id && p.status!=="cancelled" && memberRole(p.memberCode)==="backend");
      const cls = (anfiPick && backPick) ? "full" : (anfiPick || backPick) ? "part" : "open";
      const anfiTxt = anfiPick
        ? avatarHtml(anfiPick.memberCode,"sm") + '<span class="cwg-sname">' + memberName(anfiPick.memberCode).split(" ")[0] + "</span>"
        : '<span class="cwg-libre">Libre</span>';
      const backTxt = backPick
        ? avatarHtml(backPick.memberCode,"sm") + '<span class="cwg-sname">' + memberName(backPick.memberCode).split(" ")[0] + "</span>"
        : '<span class="cwg-libre">Libre</span>';
      cells += '<div class="cwg-cell ' + cls + '">'
        + '<div class="cwg-spot">🎙 ' + anfiTxt + '</div>'
        + '<div class="cwg-spot">💻 ' + backTxt + '</div>'
        + '</div>';
    });
    rows += `<div class="cwg-row">${cells}</div>`;
  });

  grid.innerHTML = `<div class="cwg-wrap"><div class="cwg-head-row">${headCols}</div>${rows}</div>`;
}

function pubChangeWeek(d){
  const next = pubWeekOffset + d;
  if(next < 0) return;
  pubWeekOffset = next;
  renderPublicCal();
}

function getSunSatWeek(offset){
  // Calcula semana real Dom→Sáb para el offset dado
  const monDates = getWeekDates(offset); // [Lun...Dom]
  const monday   = new Date(monDates[0] + "T12:00:00");
  const sunday   = new Date(monday);
  sunday.setDate(monday.getDate() - 1); // domingo anterior al lunes
  return Array.from({length:7}, (_,i) => {
    const d = new Date(sunday);
    d.setDate(sunday.getDate() + i);
    return localISO(d);
  }); // [Dom, Lun, Mar, Mié, Jue, Vie, Sáb]
}

function exportCalendarImage(){
  const dates    = getSunSatWeek(pubWeekOffset);
  const dayNames = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

  // ── Contar sesiones y horas de la semana ──────────────────────
  const weekSlots = STATE.slots.filter(s => dates.includes(s.date));
  const totalSes  = weekSlots.length;
  const totalHrs  = (totalSes * SESSION_MINS / 60);
  const totalHrsStr = totalHrs % 1 === 0 ? totalHrs + "h" : totalHrs.toFixed(1) + "h";

  const SCALE   = 2;
  const TW      = 72;
  const CW      = 110;
  const HDR     = 90;
  const TITL    = 56;
  const RH      = 52;
  const FOOT    = 56;    // footer resumen
  const PAD     = 20;
  const W       = PAD + TW + CW * 7 + PAD;
  const H       = TITL + HDR + RH * DEFAULT_TIMES.length + FOOT + PAD;

  const canvas  = document.createElement("canvas");
  canvas.width  = W * SCALE;
  canvas.height = H * SCALE;
  const c       = canvas.getContext("2d");
  c.scale(SCALE, SCALE);

  const COL = {
    bg:      "#FAF9F6",
    carbon:  "#1C1C1A",
    muted:   "#888880",
    line:    "#E5E0D8",
    blocked: "#C4A882",
    blockedT:"#3D2E1E",
    accent:  "#9C6B3C",
  };

  // Fondo
  c.fillStyle = COL.bg;
  c.fillRect(0, 0, W, H);

  // ── Título ────────────────────────────────────────────────────
  c.fillStyle = COL.carbon;
  c.font = `bold 14px Arial`;
  c.textAlign = "left";
  c.fillText("BDG — Horarios TikTok LIVE", PAD + TW, 26);

  c.fillStyle = COL.muted;
  c.font = `11px Arial`;
  const rangeLabel = `${dayNames[0]} ${fmtDate(dates[0])}  –  ${dayNames[6]} ${fmtDate(dates[6])}`;
  c.fillText(rangeLabel, PAD + TW, 44);

  c.fillStyle = COL.accent;
  c.font = `bold 11px Arial`;
  c.textAlign = "right";
  c.fillText("baladigala.com", W - PAD, 44);
  c.textAlign = "left";

  c.strokeStyle = COL.line;
  c.lineWidth = 1;
  c.beginPath(); c.moveTo(PAD, TITL - 8); c.lineTo(W - PAD, TITL - 8); c.stroke();

  // ── Cabecera días ─────────────────────────────────────────────
  const hdrY = TITL;
  c.fillStyle = COL.carbon;
  c.fillRect(PAD, hdrY, TW + CW * 7, HDR);

  dayNames.forEach((name, i) => {
    const x = PAD + TW + CW * i;

    c.strokeStyle = "rgba(255,255,255,0.12)";
    c.lineWidth = 1;
    c.beginPath(); c.moveTo(x, hdrY); c.lineTo(x, hdrY + HDR); c.stroke();

    c.fillStyle = "rgba(255,255,255,0.5)";
    c.font = `9px Arial`;
    c.textAlign = "center";
    c.fillText(name.toUpperCase(), x + CW / 2, hdrY + 22);

    const dayNum = dates[i] ? dates[i].split("-")[2].replace(/^0/,"") : "";
    const monStr = fmtDate(dates[i]).split(" ")[1] || "";

    c.fillStyle = "#FFFFFF";
    c.font = `bold 20px Georgia`;
    c.fillText(dayNum, x + CW / 2, hdrY + 50);

    c.fillStyle = "rgba(255,255,255,0.45)";
    c.font = `10px Arial`;
    c.fillText(monStr, x + CW / 2, hdrY + 68);
  });

  // ── Filas de horario ──────────────────────────────────────────
  DEFAULT_TIMES.forEach((time, ri) => {
    const y = TITL + HDR + RH * ri;

    c.fillStyle = ri % 2 === 0 ? "#F2EFE9" : COL.bg;
    c.fillRect(PAD, y, TW, RH);
    c.strokeStyle = COL.line;
    c.lineWidth = 1;
    c.strokeRect(PAD, y, TW, RH);
    c.fillStyle = COL.muted;
    c.font = `11px Georgia`;
    c.textAlign = "center";
    c.fillText(time, PAD + TW / 2, y + RH / 2 + 4);

    dates.forEach((date, ci) => {
      const x = PAD + TW + CW * ci;
      const slot = date ? STATE.slots.find(s => s.date === date && s.timeStart === time) : null;

      if(!slot){
        c.fillStyle = ri % 2 === 0 ? "#F7F5F1" : COL.bg;
        c.fillRect(x, y, CW, RH);
      } else {
        c.fillStyle = COL.blocked;
        c.fillRect(x, y, CW, RH);
        c.fillStyle = COL.blockedT;
        c.font = `bold 10px Arial`;
        c.textAlign = "center";
        c.fillText("● LIVE", x + CW / 2, y + RH / 2 - 5);
        c.font = `10px Arial`;
        c.fillText(`${time} – ${slot.timeEnd}`, x + CW / 2, y + RH / 2 + 10);
      }

      c.strokeStyle = COL.line;
      c.lineWidth = 0.5;
      c.strokeRect(x, y, CW, RH);
    });
  });

  // ── Footer resumen ────────────────────────────────────────────
  const footY = TITL + HDR + RH * DEFAULT_TIMES.length;

  c.fillStyle = COL.carbon;
  c.fillRect(0, footY, W, FOOT + PAD);

  // Pill: sesiones
  const pill1X = PAD + TW;
  const pill2X = pill1X + 180;

  // Sesiones
  c.fillStyle = "rgba(255,255,255,0.08)";
  c.beginPath();
  c.roundRect ? c.roundRect(pill1X, footY + 14, 160, 28, 4) : c.rect(pill1X, footY + 14, 160, 28);
  c.fill();
  c.fillStyle = "rgba(255,255,255,0.45)";
  c.font = `10px Arial`;
  c.textAlign = "left";
  c.fillText("SESIONES", pill1X + 10, footY + 24);
  c.fillStyle = "#FFFFFF";
  c.font = `bold 16px Georgia`;
  c.fillText(totalSes, pill1X + 10, footY + 36);

  // Horas
  c.fillStyle = "rgba(255,255,255,0.08)";
  c.beginPath();
  c.roundRect ? c.roundRect(pill2X, footY + 14, 160, 28, 4) : c.rect(pill2X, footY + 14, 160, 28);
  c.fill();
  c.fillStyle = "rgba(255,255,255,0.45)";
  c.font = `10px Arial`;
  c.fillText("HORAS EN VIVO", pill2X + 10, footY + 24);
  c.fillStyle = "#FFFFFF";
  c.font = `bold 16px Georgia`;
  c.fillText(totalHrsStr, pill2X + 10, footY + 36);

  // Leyenda color
  c.fillStyle = COL.blocked;
  c.fillRect(W - PAD - 110, footY + 18, 12, 12);
  c.fillStyle = "rgba(255,255,255,0.5)";
  c.font = `10px Arial`;
  c.textAlign = "left";
  c.fillText("= Horario bloqueado", W - PAD - 93, footY + 28);

  // ── Descargar ─────────────────────────────────────────────────
  const link = document.createElement("a");
  link.download = `BDG-Horarios-${dates[0]}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

// ── FORMAT GMV ────────────────────────────────────────────────────────────────
function fmtGMV(n){
  if(!n || n <= 0) return "—";
  return "$" + Number(n).toLocaleString("es-MX", {minimumFractionDigits:0, maximumFractionDigits:0});
}

// ── LEADERBOARD (GMV por persona) ─────────────────────────────────────────────
function buildLeaderboard(){
  const SESSION_H = SESSION_MINS / 60;
  const board = {};
  STATE.members.forEach(m => { board[m.code] = { code:m.code, name:m.name, role:m.role, gmvTotal:0, sesiones:0 }; });
  STATE.slots.forEach(slot => {
    if(!slot.gmv || slot.gmv <= 0) return;
    const share = slot.gmv; // GMV completo va a cada persona que trabajó esa sesión
    ["anfitriona","backend"].forEach(role => {
      const pick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)===role);
      if(pick && board[pick.memberCode]){
        board[pick.memberCode].gmvTotal  += share;
        board[pick.memberCode].sesiones  += 1;
      }
    });
  });
  return Object.values(board)
    .filter(b => b.sesiones > 0 || STATE.picks.some(p=>p.memberCode===b.code&&p.status!=="cancelled"))
    .map(b => ({ ...b, gmvPorHora: b.sesiones > 0 ? b.gmvTotal / (b.sesiones * SESSION_H) : 0 }))
    .sort((a,b) => b.gmvTotal - a.gmvTotal);
}

function leaderboardHtml(role){
  const today = new Date().toISOString().slice(0,10);
  const all   = buildLeaderboard().filter(b=>b.role===role);
  if(!all.length) return `<div style="color:var(--muted);font-size:12px;padding:16px 0;">Sin datos aún</div>`;
  const medals = ["🥇","🥈","🥉"];
  return all.map((b,i)=>{
    const pct = all[0].gmvTotal > 0 ? (b.gmvTotal / all[0].gmvTotal) * 100 : 0;
    return `<div style="background:var(--surface);border:1px solid var(--line);padding:14px 16px;margin-bottom:8px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
        <span style="font-size:20px;">${medals[i]||"·"}</span>
        ${avatarHtml(b.code,"md")}
        <div style="flex:1;min-width:0;">
          <div style="font-weight:500;font-size:13px;">${b.name}</div>
          <div style="font-size:10px;color:var(--muted);letter-spacing:.1em;">${b.sesiones} sesión${b.sesiones!==1?"es":""}</div>
        </div>
        <div style="text-align:right;">
          <div class="gmv-display" style="font-size:18px;">${b.gmvTotal>0?fmtGMV(b.gmvTotal):"—"}</div>
          ${b.gmvPorHora>0?`<div style="font-size:10px;color:var(--muted);">${fmtGMV(b.gmvPorHora)}/hr</div>`:""}
        </div>
      </div>
      <div style="background:var(--line2);height:4px;border-radius:2px;">
        <div style="background:var(--oxide);height:4px;border-radius:2px;width:${pct.toFixed(0)}%;transition:width .4s;"></div>
      </div>
    </div>`;
  }).join("");
}

}

function renderAdminHistorial(){
  const past = getPastSlots();

  if(!past.length){
    document.getElementById("tabContent").innerHTML = `
      <div class="empty-state"><div class="empty-icon">📊</div>Aún no hay sesiones pasadas.<br>Navega a una semana anterior en "Sesiones" para agregar data retroactiva.</div>`;
    return;
  }

  const kpis    = histKpisHtml(past);
  const subtabs = subtabsHtml();

  let body = "";
  if(historialView === "semanas")     body = renderHistSemanas(past);
  if(historialView === "anfitrionas") body = renderHistPersonas("anfitriona", past);
  if(historialView === "backend")     body = renderHistPersonas("backend", past);
  if(historialView === "duplas")      body = renderHistDuplas(past);

  document.getElementById("tabContent").innerHTML = kpis + subtabs + body;
}

// ── VISTA: SEMANAS ────────────────────────────────────────────────────────────
function renderHistSemanas(past){
  // Filtros
  const anfiMembers = STATE.members.filter(m=>m.role==="anfitriona");
  const anfiOptions = anfiMembers.map(m=>`<option value="${m.code}"${historialAnfiFilter===m.code?"selected":""}>${m.name.split(" ")[0]}</option>`).join("");

  const weekKeys = [...new Set(past.map(s=>slotWeekMon(s.date)))].sort((a,b)=>b.localeCompare(a));
  const weekOptions = weekKeys.map(k=>`<option value="${k}"${historialWeekFilter===k?"selected":""}>${weekLabel_from(k)}</option>`).join("");

  let filtered = past;
  if(historialWeekFilter !== "todas") filtered = filtered.filter(s=>slotWeekMon(s.date)===historialWeekFilter);
  if(historialAnfiFilter !== "todas") filtered = filtered.filter(s=>{
    const ap = STATE.picks.find(p=>p.slotId===s.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="anfitriona");
    return ap && ap.memberCode === historialAnfiFilter;
  });

  const byWeek = {};
  filtered.forEach(s=>{ const k=slotWeekMon(s.date); if(!byWeek[k]) byWeek[k]=[]; byWeek[k].push(s); });

  const weekGroups = Object.entries(byWeek).sort(([a],[b])=>b.localeCompare(a)).map(([weekMon,slots])=>{
    const weekGmv = slots.reduce((s,sl)=>s+(sl.gmv||0),0);
    const rows = slots.map(slot=>{
      const anfiPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="anfitriona");
      const backPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="backend");
      return `<div class="hist-row">
        <div><div style="font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;">${slot.day} ${fmtDate(slot.date)}</div>
          <div class="hist-time">${slot.timeStart}–${slot.timeEnd}</div></div>
        <div class="hist-team">
          <div class="hist-person">🎙️ ${anfiPick?`${avatarHtml(anfiPick.memberCode,"sm")}<span>${memberName(anfiPick.memberCode).split(" ")[0]}</span>`:`<span style="color:var(--muted);">—</span>`}</div>
          <div class="hist-person">💻 ${backPick?`${avatarHtml(backPick.memberCode,"sm")}<span>${memberName(backPick.memberCode).split(" ")[0]}</span>`:`<span style="color:var(--muted);">—</span>`}</div>
        </div>
        <div class="hist-reporte">${slot.reporte||""}</div>
        <div style="text-align:right;">
          ${slot.gmv>0?`<div class="hist-gmv">${fmtGMV(slot.gmv)}</div><div style="font-size:10px;color:var(--muted);">${fmtGMV(slot.gmv/1.5)}/hr</div>`:`<div class="hist-gmv none">Sin GMV</div>`}
          <button class="hist-edit-btn" onclick="openReporte('${slot.id}')">✏️ Editar</button>
        </div>
      </div>`;
    }).join("");
    return `<div class="hist-week-group">
      <div class="hist-week-head"><span class="hist-week-label">${weekLabel_from(weekMon)}</span><span class="hist-week-gmv">${weekGmv>0?fmtGMV(weekGmv):"—"}</span></div>
      ${rows}
    </div>`;
  }).join("");

  return `<div class="hist-filter">
    <span style="font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;">Semana</span>
    <select onchange="historialWeekFilter=this.value;renderAdminHistorial()">
      <option value="todas">Todas las semanas</option>${weekOptions}
    </select>
    ${anfiMembers.length?`
    <span style="font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-left:8px;">Anfitriona</span>
    <select onchange="historialAnfiFilter=this.value;renderAdminHistorial()">
      <option value="todas">Todas</option>${anfiOptions}
    </select>`:""}
  </div>
  ${weekGroups||`<div class="empty-state" style="padding:32px;"><div class="empty-icon">🔍</div>Sin sesiones con esos filtros.</div>`}`;
}

// ── VISTA: POR PERSONA ────────────────────────────────────────────────────────
function renderHistPersonas(role, past){
  const SESSION_H = SESSION_MINS / 60;
  const members   = STATE.members.filter(m=>m.role===role);
  if(!members.length) return `<div class="empty-state">No hay ${role==="anfitriona"?"anfitrionas":"staff backend"} registradas.</div>`;

  const medals = ["🥇","🥈","🥉"];

  const stats = members.map(m=>{
    const mySessions = past.filter(s=>{
      const p = STATE.picks.find(pk=>pk.slotId===s.id&&pk.memberCode===m.code&&pk.status!=="cancelled");
      return !!p;
    });
    const withGmv   = mySessions.filter(s=>s.gmv>0);
    const totalGmv  = withGmv.reduce((s,sl)=>s+(sl.gmv||0),0);
    const gmvPorHr  = withGmv.length ? totalGmv / (withGmv.length * SESSION_H) : 0;
    const avgGmv    = withGmv.length ? totalGmv / withGmv.length : 0;
    const best      = withGmv.sort((a,b)=>b.gmv-a.gmv)[0];
    return { m, mySessions, withGmv, totalGmv, gmvPorHr, avgGmv, best };
  }).sort((a,b)=>b.totalGmv-a.totalGmv);

  const maxGmv = stats[0]?.totalGmv || 0;

  const cards = stats.map((s,i)=>{
    const pct = maxGmv>0 ? (s.totalGmv/maxGmv*100).toFixed(0) : 0;
    const bestSlot = s.best ? STATE.slots.find(sl=>sl.id===s.best.id) : null;
    return `<div class="person-card">
      <div class="person-head">
        <span class="person-rank">${medals[i]||i+1}</span>
        ${avatarHtml(s.m.code,"md")}
        <div style="flex:1;">
          <div style="font-weight:500;font-size:14px;">${s.m.name}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">${s.m.code}</div>
          <div style="background:var(--line2);height:4px;border-radius:2px;margin-top:8px;width:100%;">
            <div style="background:var(--oxide);height:4px;border-radius:2px;width:${pct}%;"></div>
          </div>
        </div>
        <div style="text-align:right;">
          <div class="gmv-display" style="font-size:24px;">${s.totalGmv>0?fmtGMV(s.totalGmv):"—"}</div>
          ${s.gmvPorHr>0?`<div style="font-size:11px;color:var(--muted);">${fmtGMV(s.gmvPorHr)}/hr</div>`:""}
        </div>
      </div>
      <div class="person-stats">
        <div class="person-stat"><div class="person-stat-label">Sesiones totales</div><div class="person-stat-val">${s.mySessions.length}</div></div>
        <div class="person-stat"><div class="person-stat-label">Con GMV</div><div class="person-stat-val">${s.withGmv.length}</div></div>
        <div class="person-stat"><div class="person-stat-label">Promedio / sesión</div><div class="person-stat-val">${s.avgGmv>0?fmtGMV(s.avgGmv):"—"}</div></div>
        <div class="person-stat"><div class="person-stat-label">Mejor sesión</div><div class="person-stat-val accent">${s.best?fmtGMV(s.best.gmv):"—"}${bestSlot?`<span style="font-size:11px;color:var(--muted);font-family:'Jost',sans-serif;font-weight:400;"> · ${fmtDate(bestSlot.date)}</span>`:""}</div></div>
      </div>
    </div>`;
  }).join("");

  return cards;
}

// ── VISTA: MEJORES DUPLAS ─────────────────────────────────────────────────────
function renderHistDuplas(past){
  const SESSION_H = SESSION_MINS / 60;
  const duos = {};

  past.filter(s=>s.gmv>0).forEach(slot=>{
    const anfiPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="anfitriona");
    const backPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="backend");
    if(!anfiPick || !backPick) return;
    const key = `${anfiPick.memberCode}__${backPick.memberCode}`;
    if(!duos[key]) duos[key] = { anfiCode:anfiPick.memberCode, backCode:backPick.memberCode, sessions:0, totalGmv:0 };
    duos[key].sessions++;
    duos[key].totalGmv += slot.gmv;
  });

  const sorted = Object.values(duos)
    .map(d=>({...d, gmvPorHr: d.totalGmv/(d.sessions*SESSION_H), avgGmv: d.totalGmv/d.sessions}))
    .sort((a,b)=>b.totalGmv-a.totalGmv);

  if(!sorted.length) return `<div class="empty-state" style="padding:32px;"><div class="empty-icon">🤝</div>Registra GMV en sesiones donde ambos roles estén asignados para ver las duplas.</div>`;

  const maxGmv = sorted[0].totalGmv;
  const medals = ["🥇","🥈","🥉"];

  // Header table
  const rows = sorted.map((d,i)=>{
    const pct = (d.totalGmv/maxGmv*100).toFixed(0);
    return `<div class="duo-card">
      <div style="font-size:20px;text-align:center;">${medals[i]||i+1}</div>
      <div class="duo-pair">
        <div class="duo-person">${avatarHtml(d.anfiCode,"sm")} 🎙️ <strong>${memberName(d.anfiCode).split(" ")[0]}</strong></div>
        <div class="duo-person">${avatarHtml(d.backCode,"sm")} 💻 <strong>${memberName(d.backCode).split(" ")[0]}</strong></div>
        <div class="duo-bar-wrap"><div class="duo-bar" style="width:${pct}%;"></div></div>
      </div>
      <div class="duo-stat" style="text-align:center;">
        <div class="duo-stat-val" style="font-size:14px;">${d.sessions}</div>
        <div class="duo-stat-sub">sesiones</div>
      </div>
      <div class="duo-stat">
        <div class="duo-stat-val">${fmtGMV(d.totalGmv)}</div>
        <div class="duo-stat-sub">GMV total</div>
      </div>
      <div class="duo-stat">
        <div class="duo-stat-val" style="color:var(--oxide);">${fmtGMV(d.gmvPorHr)}</div>
        <div class="duo-stat-sub">por hora</div>
      </div>
    </div>`;
  }).join("");

  return `<div style="display:grid;grid-template-columns:32px 1fr 80px 120px 120px;gap:12px;padding:8px 18px;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);">
    <div></div><div>Dupla</div><div style="text-align:center;">Ses.</div><div>GMV Total</div><div>GMV/Hr</div>
  </div>${rows}`;
}

function slotWeekMon(dateStr){
  const d = new Date(dateStr+"T12:00:00");
  const mon = new Date(d); mon.setDate(d.getDate() - (d.getDay()||7) + 1);
  return localISO(mon);
}

function weekLabel_from(mondayIso){
  const d0 = mondayIso;
  const end = new Date(mondayIso+"T12:00:00");
  end.setDate(end.getDate()+6);
  const d6 = localISO(end);
  return `${fmtDate(d0)} – ${fmtDate(d6)}`;
}
