<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BDG · Horarios LIVE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,400;9..40,700;9..40,900&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  /* BDG Design System */
  --db:#202945; --sb:#C8D7DB; --gray:#E0DDDA; --pink:#E6B7A2; --gold:#D0AE2B; --ow:#F9F8F6;
  --fn:'DM Sans',sans-serif; --fi:'Cormorant Garamond',serif; --tr:0.20em;
  /* Aliases */
  --bg:var(--ow);
  --surface:#FFFFFF; --surface2:#F2F2F0; --surface3:#E8E8E5;
  --line:var(--gray); --line2:#CBCBC6;
  --carbon:var(--db); --carbon2:#2C3D6E;
  --text:var(--db); --text2:#5A607A; --muted:#9A9A9E;
  --oxide:var(--gold); --oxide2:#B89826; --oxide-l:rgba(208,174,43,.12); --oxide-ll:rgba(208,174,43,.2);
  --pos:#2D6A3F; --pos-l:#E8F5EC;
  --neg:#8B2020; --neg-l:#F5EAEA;
  --warn:#7A5C1E; --warn-l:#F5EDD6;
  --neu:#4A5568; --neu-l:#EDF2F7;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* ── TOPBAR ── */
.topbar{background:var(--db);padding:9px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);display:inline-block;}
.topbar-txt{font-size:9px;letter-spacing:var(--tr);text-transform:uppercase;color:rgba(255,255,255,0.4);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── LANDING ── */
#landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 44px);padding:32px 16px;}
.landing-logo{height:22px;width:auto;filter:brightness(0);margin-bottom:32px;}
.landing-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;letter-spacing:-.02em;margin-bottom:6px;text-align:center;}
.landing-sub{font-size:12px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:48px;}
.role-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:720px;}
.role-card{background:var(--surface);border:1px solid var(--line);padding:28px 32px;cursor:pointer;transition:border-color .15s,box-shadow .15s;text-align:center;width:200px;}
.role-card:hover{border-color:var(--oxide);box-shadow:0 4px 16px rgba(184,67,42,.1);}
.role-icon{font-size:28px;margin-bottom:12px;}
.role-label{font-size:13px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.role-desc{font-size:11px;color:var(--muted);}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(28,28,26,.5);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:var(--surface);border:1px solid var(--line);padding:36px 32px;width:100%;max-width:380px;}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;margin-bottom:4px;}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:24px;letter-spacing:.05em;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-bottom:6px;}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line2);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
.field input:focus,.field select:focus{border-color:var(--carbon);}
.field .hint{font-size:11px;color:var(--muted);margin-top:5px;}
.modal-err{font-size:12px;color:var(--neg);background:var(--neg-l);padding:8px 12px;margin-top:10px;display:none;}
.modal-actions{display:flex;gap:10px;margin-top:16px;}

/* ── BUTTONS ── */
.btn{padding:10px 20px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;transition:background .15s;}
.btn.primary{background:var(--carbon);color:#fff;}
.btn.primary:hover{background:var(--carbon2);}
.btn.accent{background:var(--oxide);color:#fff;}
.btn.accent:hover{background:var(--oxide2);}
.btn.ghost{background:none;border:1px solid var(--line2);color:var(--text2);}
.btn.ghost:hover{border-color:var(--carbon);color:var(--carbon);}
.btn.danger{background:none;border:1px solid var(--neg-l);color:var(--neg);font-size:11px;padding:6px 12px;}
.btn.danger:hover{background:var(--neg-l);}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── APP SHELL ── */
#app{display:none;}
.app-header{background:var(--surface);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;}
.app-header-left{display:flex;align-items:center;gap:16px;}
.app-logo{height:18px;filter:brightness(0);}
.app-view-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);border-left:1px solid var(--line2);padding-left:16px;}
.user-chip{font-size:12px;background:var(--surface2);border:1px solid var(--line);padding:5px 12px;color:var(--text2);letter-spacing:.06em;display:flex;align-items:center;gap:8px;}
.app-body{padding:28px;max-width:1100px;margin:0 auto;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:28px;}
.tab{padding:10px 20px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--muted);transition:color .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--oxide);border-bottom-color:var(--oxide);font-weight:600;}

/* ── SECTION ── */
.section-title{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--carbon);}
thead th{color:#fff;font-size:10px;letter-spacing:.22em;text-transform:uppercase;padding:10px 14px;font-weight:500;text-align:left;}
tbody tr{border-bottom:1px solid var(--line);}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
td{padding:10px 14px;vertical-align:middle;}
.code-badge{font-family:'Cormorant Garamond',serif;font-size:14px;background:var(--surface2);border:1px solid var(--line2);padding:2px 10px;letter-spacing:.08em;}
.role-pill{font-size:10px;letter-spacing:.14em;text-transform:uppercase;padding:3px 10px;font-weight:500;}
.role-pill.anfitriona{background:var(--oxide-ll);color:var(--oxide);}
.role-pill.backend{background:var(--neu-l);color:var(--neu);}
.empty-state{text-align:center;padding:56px;color:var(--muted);font-size:13px;line-height:1.7;}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4;}

/* ── AVATAR ── */
.avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--line2);flex-shrink:0;background:var(--surface2);}
.avatar-sm{width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--line2);flex-shrink:0;}
.avatar-placeholder{width:32px;height:32px;border-radius:50%;background:var(--surface3);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);flex-shrink:0;}
.avatar-upload-wrap{position:relative;cursor:pointer;display:inline-flex;align-items:center;gap:8px;}
.avatar-upload-wrap input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.avatar-upload-btn{font-size:11px;color:var(--oxide);letter-spacing:.08em;text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;font-family:'DM Sans',sans-serif;}
.avatar-lg{width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--line2);display:block;margin-bottom:8px;}
.avatar-lg-placeholder{width:56px;height:56px;border-radius:50%;background:var(--surface3);border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:8px;}

/* ── ADD MEMBER FORM ── */
.add-form{background:var(--surface);border:1px solid var(--line);padding:20px 24px;margin-bottom:24px;}
.add-form-title{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.form-row{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;}
.form-row .field{margin-bottom:0;flex:1;min-width:140px;}
.form-err{font-size:11px;color:var(--neg);margin-top:8px;display:none;}

/* ── WEEK NAV ── */
.week-nav{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.week-label{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;}
.week-btn{width:32px;height:32px;border:1px solid var(--line2);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:border-color .15s;}
.week-btn:hover{border-color:var(--carbon);}

/* ── SESSION CARDS ── */
.slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:24px;}
.slot-card{background:var(--surface);border:1px solid var(--line);padding:18px 20px;position:relative;transition:border-color .15s;}
.slot-card.mine{border-color:var(--oxide);background:var(--oxide-l);}
.slot-day{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.slot-time{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;margin-bottom:12px;}
.slot-spots{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.spot-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border:1px solid var(--line);font-size:12px;}
.spot-row.filled-mine{background:var(--oxide-l);border-color:var(--oxide-ll);}
.spot-row.filled{background:var(--surface2);}
.spot-row.open{background:var(--surface);}
.spot-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.spot-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);width:70px;flex-shrink:0;}
.spot-name{flex:1;font-weight:500;}
.spot-note{font-size:10px;color:var(--muted);font-style:italic;}
.spot-status{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:2px 7px;flex-shrink:0;}
.spot-status.confirmed{background:var(--pos-l);color:var(--pos);}
.spot-status.pending{background:var(--warn-l);color:var(--warn);}
.spot-status.open{background:var(--surface3);color:var(--muted);}
.slot-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.slot-select-btn{font-size:11px;padding:7px 16px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--oxide);background:none;color:var(--oxide);cursor:pointer;transition:all .15s;}
.slot-select-btn:hover{background:var(--oxide);color:#fff;}
.slot-select-btn.active{background:var(--oxide);color:#fff;}
.slot-select-btn:disabled{opacity:.4;cursor:not-allowed;border-color:var(--line2);color:var(--muted);}
.slot-delete-btn{position:absolute;top:10px;right:12px;background:var(--surface2);border:1px solid var(--line2);cursor:pointer;color:var(--muted);font-size:13px;line-height:1;transition:all .15s;z-index:10;width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.slot-delete-btn:hover{background:var(--neg-l);border-color:var(--neg);color:var(--neg);}
.add-slot-card{background:none;border:1px dashed var(--line2);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;cursor:pointer;transition:border-color .15s;}
.add-slot-card:hover{border-color:var(--oxide);}
.add-slot-icon{font-size:24px;opacity:.4;margin-bottom:8px;}
.add-slot-text{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}

/* ── LIMIT BAR ── */
.limit-bar{background:var(--surface);border:1px solid var(--line);padding:14px 18px;margin-bottom:22px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.limit-item{display:flex;align-items:center;gap:10px;}
.limit-label{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.limit-pips{display:flex;gap:5px;}
.pip{width:28px;height:8px;}
.pip.used{background:var(--oxide);}
.pip.free{background:var(--line2);}
.limit-count{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;}

/* ── MY SESSIONS ── */
.my-slots{display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.my-slot-row{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--line2);padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;transition:border-color .15s;}
.my-slot-row.confirmed{border-left-color:var(--pos);}
.my-slot-row.pending{border-left-color:var(--warn);}
.my-slot-info{flex:1;min-width:150px;}
.my-slot-day{font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px;}
.my-slot-time{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;}
.my-slot-note{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic;}
.my-slot-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.confirm-btn{font-size:11px;padding:7px 14px;font-family:'DM Sans',sans-serif;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:1px solid transparent;transition:all .15s;}
.confirm-btn.confirm{background:var(--pos-l);color:var(--pos);border-color:#b2d8bc;}
.confirm-btn.confirm:hover,.confirm-btn.confirm.active{background:var(--pos);color:#fff;border-color:var(--pos);}
.confirm-btn.cancel-btn{background:none;border:1px solid var(--line2);color:var(--muted);}
.confirm-btn.cancel-btn:hover{background:var(--neg-l);border-color:var(--neg);color:var(--neg);}
.notes-input{font-size:12px;border:1px solid var(--line2);padding:7px 10px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;width:160px;}
.notes-input:focus{border-color:var(--carbon);}

/* ── ADMIN SPOT BUTTONS ── */
.adm-spot-btn{border:none;cursor:pointer;font-size:10px;padding:3px 8px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;flex-shrink:0;}
.adm-spot-btn.conf{background:var(--pos-l);color:var(--pos);border:1px solid #b2d8bc;}
.adm-spot-btn.conf:hover{background:var(--pos);color:#fff;}
.adm-spot-btn.conf.active{background:var(--pos);color:#fff;}
.adm-spot-btn.rm{background:none;border:1px solid var(--line2);color:var(--muted);margin-left:2px;}
.adm-spot-btn.rm:hover{background:var(--neg-l);color:var(--neg);border-color:var(--neg);}
.adm-spot-btn.assign{background:var(--oxide);color:#fff;border:1px solid var(--oxide);}
.adm-spot-btn.assign:hover{background:var(--oxide2);}
.adm-select{flex:1;min-width:0;padding:3px 6px;border:1px solid var(--line2);font-size:12px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;}
.adm-select:focus{border-color:var(--carbon);}
.adm-tag{font-size:9px;letter-spacing:.12em;text-transform:uppercase;background:var(--neu-l);color:var(--neu);padding:2px 6px;vertical-align:middle;font-family:'DM Sans',sans-serif;font-weight:500;}

/* ── SUMMARY ── */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;}
.summary-card{background:var(--surface);border:1px solid var(--line);overflow:hidden;}
.sum-head{background:var(--carbon);color:#fff;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;}
.sum-head-title{font-size:11px;letter-spacing:.16em;text-transform:uppercase;}
.sum-head-date{font-size:11px;opacity:.55;}
.sum-body{padding:0;}
.sum-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--line);font-size:12px;}
.sum-row:last-child{border-bottom:none;}
.sum-role-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.sum-name{flex:1;}
.sum-code{font-size:11px;color:var(--muted);font-family:'Cormorant Garamond',serif;}
.sum-status{font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;flex-shrink:0;}
.sum-status.confirmed{background:var(--pos-l);color:var(--pos);}
.sum-status.pending{background:var(--warn-l);color:var(--warn);}
.sum-status.open{background:var(--surface2);color:var(--muted);}

/* ── LANDING HEADER ── */
.landing-header{background:var(--surface);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:flex-start;justify-content:flex-start;gap:16px;}
.landing-header-left{display:flex;align-items:center;gap:14px;padding-top:2px;flex-shrink:0;}
.landing-title-block{display:flex;flex-direction:column;gap:8px;border-left:1px solid var(--line2);padding-left:16px;}
.landing-title-small{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;letter-spacing:-.01em;line-height:1;}
.landing-access-btns{display:flex;gap:8px;flex-wrap:wrap;}
.access-btn{padding:6px 14px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line2);background:none;color:var(--text2);cursor:pointer;transition:all .15s;}
.access-btn:hover{border-color:var(--carbon);color:var(--carbon);}
.access-btn.admin-btn{background:var(--carbon);color:#fff;border-color:var(--carbon);}
.access-btn.admin-btn:hover{background:var(--carbon2);}

/* ── CALENDARIO PÚBLICO ── */
.pub-cal{width:100%;max-width:1060px;padding:28px 28px 48px;}
.pub-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.pub-cal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;letter-spacing:-.02em;}
.pub-week-nav{display:flex;align-items:center;gap:10px;}
.pub-week-label{font-size:13px;color:var(--text2);letter-spacing:.05em;}
.pub-week-btn{width:32px;height:32px;border:1px solid var(--line2);background:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.pub-week-btn:hover{border-color:var(--carbon);}
.pub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
/* ── WEEKLY CAL GRID ── */
.cwg-wrap{width:100%;overflow-x:auto;background:var(--db);border-radius:2px;}
.cwg-row{display:grid;grid-template-columns:48px repeat(7,minmax(0,1fr));border-bottom:1px solid rgba(255,255,255,.06);}
.cwg-row:last-child{border-bottom:none;}
.cwg-head-row{display:grid;grid-template-columns:48px repeat(7,minmax(0,1fr));background:rgba(255,255,255,.04);}
.cwg-time{padding:0 6px;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,.06);font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:.02em;color:rgba(255,255,255,.25);background:rgba(0,0,0,.12);}
.cwg-head-row .cwg-time{border-right-color:rgba(255,255,255,.08);}
.cwg-dh{padding:14px 8px 12px;border-left:1px solid rgba(255,255,255,.08);text-align:center;}
.cwg-dh.cwg-today .cwg-dh-date{color:var(--gold);}
.cwg-dh-name{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:5px;font-weight:700;}
.cwg-dh.cwg-today .cwg-dh-name{color:var(--gold);}
.cwg-dh-date{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:500;color:#fff;line-height:1;}
.cwg-dh-month{font-size:9px;color:rgba(255,255,255,.25);margin-top:4px;letter-spacing:.08em;text-transform:uppercase;}

/* Celda vacía */
.cwg-cell{border-left:1px solid rgba(255,255,255,.06);min-height:100px;position:relative;display:flex;align-items:stretch;}
.cwg-cell.blocked{background:linear-gradient(135deg,#1d2640 0%,#202945 100%);}
.cwg-cell.blocked::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold) 0%,rgba(208,174,43,.4) 100%);}
.cwg-cell.open{background:rgba(255,255,255,.03);}
.cwg-cell.none{background:rgba(255,255,255,.015);}

/* Contenido de celda LIVE */
.cwg-live{display:flex;flex-direction:column;padding:10px 10px 12px 14px;width:100%;gap:0;}
.cwg-live-header{display:flex;align-items:baseline;gap:6px;margin-bottom:9px;}
.cwg-live-tag{font-size:7px;font-weight:900;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);}
.cwg-live-time{font-size:14px;color:#fff;font-family:'Cormorant Garamond',serif;font-weight:500;line-height:1;opacity:.9;}
.cwg-live-divider{width:100%;height:1px;background:rgba(255,255,255,.08);margin-bottom:9px;}

/* Filas de persona */
.cwg-live-names{display:flex;flex-direction:column;gap:6px;}
.cwg-live-person{display:flex;align-items:center;gap:7px;}
.cwg-av{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(208,174,43,.5);flex-shrink:0;background:rgba(255,255,255,.06);}
.cwg-av-ph{width:26px;height:26px;border-radius:50%;background:rgba(208,174,43,.12);border:1.5px solid rgba(208,174,43,.35);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(208,174,43,.9);flex-shrink:0;font-family:'DM Sans',sans-serif;}
.cwg-person-info{display:flex;flex-direction:column;gap:1px;min-width:0;}
.cwg-person-name{font-size:10px;color:rgba(255,255,255,.9);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.cwg-person-role{font-size:8px;color:rgba(208,174,43,.65);letter-spacing:.08em;text-transform:uppercase;font-weight:500;line-height:1;}
.pub-empty{text-align:center;padding:32px;color:var(--muted);font-size:12px;letter-spacing:.1em;}

/* ── GMV / REPORTE ── */
.slot-report{border-top:1px solid var(--line);margin-top:14px;padding-top:14px;}
.slot-report-title{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.gmv-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.gmv-prefix{font-size:13px;color:var(--muted);flex-shrink:0;font-family:'Cormorant Garamond',serif;}
.gmv-input{flex:1;padding:7px 10px;border:1px solid var(--line2);font-size:15px;font-family:'Cormorant Garamond',serif;background:var(--bg);color:var(--text);outline:none;min-width:0;}
.gmv-input:focus{border-color:var(--carbon);}
.gmv-display{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:500;color:var(--pos);}
.gmv-display.zero{color:var(--muted);font-size:14px;}
.report-input{width:100%;padding:7px 10px;border:1px solid var(--line2);font-size:12px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;resize:none;height:48px;display:block;box-sizing:border-box;}
.report-input:focus{border-color:var(--carbon);}
.report-save-btn{font-size:10px;padding:6px 14px;font-family:'DM Sans',sans-serif;font-weight:500;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--carbon);background:var(--carbon);color:#fff;cursor:pointer;transition:background .15s;margin-top:8px;}
.report-save-btn:hover{background:var(--carbon2);}

/* ── HISTORIAL ── */
.hist-kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px;}
.hist-kpi{background:var(--surface);border:1px solid var(--line);padding:16px 18px;}
.hist-kpi-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.hist-kpi-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;}
.hist-kpi-val.accent{color:var(--pos);}
.hist-week-group{margin-bottom:24px;}
.hist-week-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--carbon);color:#fff;margin-bottom:8px;}
.hist-week-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;}
.hist-week-gmv{font-family:'Cormorant Garamond',serif;font-size:16px;opacity:.85;}
.hist-row{background:var(--surface);border:1px solid var(--line);border-bottom:none;padding:12px 16px;display:grid;grid-template-columns:90px 1fr 1fr 120px;gap:12px;align-items:start;font-size:12px;}
.hist-row:last-child{border-bottom:1px solid var(--line);}
.hist-row:hover{background:var(--surface2);}
.hist-time{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;}
.hist-team{display:flex;flex-direction:column;gap:3px;}
.hist-person{display:flex;align-items:center;gap:6px;font-size:12px;}
.hist-reporte{font-size:11px;color:var(--muted);font-style:italic;padding-top:2px;}
.hist-gmv{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--pos);text-align:right;}
.hist-gmv.none{color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:.1em;}
.hist-edit-btn{font-size:10px;color:var(--oxide);letter-spacing:.08em;text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;font-family:'DM Sans',sans-serif;margin-top:4px;display:block;}
.hist-filter{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap;}
.hist-filter select{padding:7px 10px;border:1px solid var(--line2);font-size:12px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;}
.hist-filter select:focus{border-color:var(--carbon);}
/* ── HISTORIAL SUBTABS ── */
.hist-subtabs{display:flex;gap:0;margin-bottom:22px;border:1px solid var(--line2);overflow:hidden;}
.hist-subtab{padding:9px 18px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;background:none;border:none;border-right:1px solid var(--line2);font-family:'DM Sans',sans-serif;color:var(--muted);transition:all .15s;flex:1;text-align:center;}
.hist-subtab:last-child{border-right:none;}
.hist-subtab:hover{background:var(--surface2);color:var(--text);}
.hist-subtab.active{background:var(--carbon);color:#fff;}
/* ── DUPLAS / PERSONAS ── */
.person-card{background:var(--surface);border:1px solid var(--line);margin-bottom:10px;overflow:hidden;}
.person-head{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line);}
.person-rank{font-size:24px;width:32px;text-align:center;flex-shrink:0;}
.person-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0;border-top:none;}
.person-stat{padding:12px 18px;border-right:1px solid var(--line);border-top:1px solid var(--line);}
.person-stat:last-child{border-right:none;}
.person-stat-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.person-stat-val{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:500;}
.person-stat-val.accent{color:var(--pos);}
.duo-card{background:var(--surface);border:1px solid var(--line);padding:16px 18px;margin-bottom:8px;display:grid;grid-template-columns:32px 1fr 1fr 1fr 1fr;gap:12px;align-items:center;}
.duo-card:hover{background:var(--surface2);}
.duo-pair{display:flex;flex-direction:column;gap:4px;}
.duo-person{display:flex;align-items:center;gap:8px;font-size:12px;}
.duo-stat{text-align:right;}
.duo-stat-val{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:500;color:var(--pos);}
.duo-stat-sub{font-size:10px;color:var(--muted);}
.duo-bar-wrap{height:4px;background:var(--line2);border-radius:2px;margin-top:8px;}
.duo-bar{height:4px;background:var(--oxide);border-radius:2px;}

/* ── MODAL REPORTE ── */
.modal-field-group{display:flex;flex-direction:column;gap:12px;margin-bottom:4px;}

@media(max-width:600px){
  .role-cards{flex-direction:column;align-items:center;}
  .role-card{width:100%;max-width:320px;}
  .form-row{flex-direction:column;}
  .app-body{padding:16px;}
  .limit-bar{flex-direction:column;align-items:flex-start;gap:12px;}
  .hist-row{grid-template-columns:1fr 1fr;}
}

/* ── INVENTARIO TAB ── */
.inv-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.inv-ts{font-size:11px;color:var(--muted);margin-left:auto;}
.inv-tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:2px;}
.inv-tbl{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap;}
.inv-tbl th{background:var(--surface2);padding:8px 10px;text-align:left;font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;color:var(--muted);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:1;}
.inv-tbl th.c-num{text-align:center;min-width:44px;}
.inv-tbl td{padding:7px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
.inv-tbl td.c-num{text-align:center;}
.inv-tbl tr:last-child td{border-bottom:none;}
.inv-tbl tr.color-row td{background:var(--surface2);padding-top:5px;padding-bottom:5px;}
.inv-tbl tr:hover td{background:rgba(208,174,43,.04);}
.inv-prod-cell{display:flex;align-items:center;gap:10px;}
.inv-thumb{width:40px;height:40px;object-fit:cover;border-radius:1px;flex-shrink:0;background:var(--surface2);}
.inv-thumb-ph{width:40px;height:40px;background:var(--surface3);border-radius:1px;flex-shrink:0;}
.inv-name{font-weight:600;font-size:12px;color:var(--text);}
.inv-color{font-size:10px;color:var(--text2);}
.pill-inv{display:inline-block;min-width:28px;text-align:center;padding:2px 6px;border-radius:2px;font-size:11px;font-weight:600;}
.pill-inv.ok {background:var(--pos-l);color:var(--pos);}
.pill-inv.low{background:var(--warn-l);color:var(--warn);}
.pill-inv.out{background:var(--surface3);color:var(--muted);}
.pill-inv.neg{background:var(--neg-l);color:var(--neg);}
.pill-inv.na {color:var(--muted);}
.inv-price{font-size:11px;color:var(--text2);}
.inv-sale{font-size:11px;font-weight:600;color:var(--oxide2);}
.inv-cat-btns{display:flex;gap:6px;flex-wrap:wrap;}
.inv-cat-btn{padding:5px 12px;font-size:9px;letter-spacing:.15em;text-transform:uppercase;border:1px solid var(--line2);background:none;cursor:pointer;color:var(--muted);font-family:var(--fn);}
.inv-cat-btn.active{background:var(--carbon);color:#fff;border-color:var(--carbon);}
.inv-sync-btn{padding:6px 14px;font-size:9px;letter-spacing:.15em;text-transform:uppercase;border:none;background:var(--carbon);color:#fff;cursor:pointer;font-family:var(--fn);display:flex;align-items:center;gap:5px;}
.inv-sync-btn:disabled{opacity:.45;cursor:not-allowed;}
.spin{animation:inv-spin 1s linear infinite;display:inline-block;}
@keyframes inv-spin{to{transform:rotate(360deg)}}
</style>

<script>
// ── CONSTANTES ────────────────────────────────────────────────────────────────
const ADMINS = [
  { code:"MIR", name:"Miranda",  pass:"miranda2026"  },
  { code:"JAC", name:"Jackie",   pass:"jackie2026"   },
  { code:"RUB", name:"Rubén",    pass:"ruben2026"    },
];
const MAX_ANFI     = 2;   // sesiones máx por DÍA para anfitrionas
const DEFAULT_TIMES = ["08:30","10:00","11:30","13:00","14:30","16:00","17:30","19:00"]; // 8 sesiones × 1.5h = 8:30am–8:30pm
const MAX_BACKEND  = 3;   // sesiones máx por DÍA para backend
const SESSION_MINS = 90;  // duración fija en minutos

// ── ESTADO ────────────────────────────────────────────────────────────────────
let STATE = {
  members:   [],  // { code, name, role }
  slots:     [],  // { id, day, date, timeStart, timeEnd }
  picks:     [],  // { slotId, memberCode, status, notes }  status: pending|confirmed|cancelled
  changelog: [],  // { at, adminCode, adminName, action, detail }
  admins:    [],  // { code, name, pass } — gestionado por Rubén
};

// Retorna lista activa de admins (STATE sobreescribe defaults)
function getAdmins(){ return STATE.admins && STATE.admins.length ? STATE.admins : ADMINS; }
let SESSION = { role: null, code: null, name: null };
let pendingAccessRole = null;
let pendingNotesSlotId = null;
let currentWeekOffset = 0;
let memberWeekOffset  = 0;
let filterDate        = null; // null = semana completa, "YYYY-MM-DD" = solo ese día
let previewedCode     = null;
let pendingReporteSlotId = null;

// ── FIREBASE CONFIG ───────────────────────────────────────────────────────────
// Reemplaza estos valores con los de tu proyecto Firebase
// (Firebase Console → Project Settings → Your apps → Web app → firebaseConfig)
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD6ZcB618WZ_pSE3CPgOFdwl60_PafDTec",
  authDomain:        "bdg-horarios.firebaseapp.com",
  databaseURL:       "https://bdg-horarios-default-rtdb.firebaseio.com",
  projectId:         "bdg-horarios",
  storageBucket:     "bdg-horarios.firebasestorage.app",
  messagingSenderId: "888593583878",
  appId:             "1:888593583878:web:65b1955ae0613558d3d887",
};
const FB_PATH = "bdg_horarios_v2"; // nodo raíz en Realtime Database

let _db = null;           // referencia Firebase Database
let _fbReady = false;     // true cuando Firebase está conectado
let _fbWriting = false;   // true mientras nosotros escribimos (evita re-render propio)
let currentAdminTab = "equipo"; // tab activo en vista admin

function initFirebase(){
  try {
    if(FIREBASE_CONFIG.apiKey.startsWith("REEMPLAZA")) return;
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    _db = firebase.database();

    _db.ref(FB_PATH).on("value", snap => {
      if(_fbWriting) return; // escribimos nosotros, ignorar eco

      const remote = snap.val();

      if(!_fbReady){
        _fbReady = true;
        if(remote){
          // Firebase tiene datos → siempre es la fuente de verdad
          _applyRemote(remote);
        } else {
          // Firebase vacío (primera vez) → subir datos locales si los hay
          if((STATE.slots||[]).length > 0) _pushToFirebase();
        }
        return;
      }

      // Actualización en tiempo real de otro dispositivo → aplicar siempre
      if(remote) _applyRemote(remote);
    });
  } catch(e) {
    console.warn("Firebase init error:", e);
  }
}

function _applyRemote(remote){
  STATE = remote;
  if(!STATE.members)   STATE.members   = [];
  if(!STATE.slots)     STATE.slots     = [];
  if(!STATE.picks)     STATE.picks     = [];
  if(!STATE.changelog) STATE.changelog = [];
  if(!STATE.admins)    STATE.admins    = [];
  if(!STATE.photos)    STATE.photos    = {};
  // Rechazar datos de prueba que vengan de Firebase
  const hadTestMembers = STATE.members.some(m => TEST_CODES.has(m.code));
  if(hadTestMembers){
    console.warn("_applyRemote: datos de prueba detectados en Firebase — ignorando y limpiando");
    STATE.members = STATE.members.filter(m => !TEST_CODES.has(m.code));
    STATE.picks   = STATE.picks.filter(p => !TEST_CODES.has(p.memberCode));
    // Si no quedan miembros reales, no sobreescribir localStorage
    if(STATE.members.length === 0) return;
  }
  migrateSlotDays();
  localStorage.setItem("bdg_horarios_v2", JSON.stringify(STATE));
  if(document.getElementById("app").style.display !== "none"){
    if(SESSION.role === "admin") renderAdmin(currentAdminTab);
    else if(SESSION.role) renderMember();
  }
  renderPublicCal();
}

// Códigos de miembros de prueba — NUNCA deben llegar a Firebase
const TEST_CODES = new Set(["ANAT3S1","LUIT3S2"]);

function _sanitizeBeforePush(){
  // Elimina miembros de prueba de STATE antes de subir
  if(Array.isArray(STATE.members)){
    const before = STATE.members.length;
    STATE.members = STATE.members.filter(m => !TEST_CODES.has(m.code));
    if(STATE.members.length < before) console.warn("_sanitizeBeforePush: miembros de prueba eliminados antes del push");
  }
  // Elimina picks asociados a miembros de prueba
  if(Array.isArray(STATE.picks)){
    STATE.picks = STATE.picks.filter(p => !TEST_CODES.has(p.memberCode));
  }
}

function _pushToFirebase(){
  if(!_db) return;
  _sanitizeBeforePush();
  _fbWriting = true;
  _db.ref(FB_PATH).set(STATE)
    .catch(e => console.warn("Firebase write error:", e))
    .finally(() => setTimeout(() => { _fbWriting = false; }, 1000));
}

// ── PERSISTENCIA ──────────────────────────────────────────────────────────────
function save(){
  if(!STATE.members)   STATE.members   = [];
  if(!STATE.slots)     STATE.slots     = [];
  if(!STATE.picks)     STATE.picks     = [];
  if(!STATE.changelog) STATE.changelog = [];
  if(!STATE.photos)    STATE.photos    = {};
  STATE.lastModified = Date.now(); // timestamp para resolver conflictos
  localStorage.setItem("bdg_horarios_v2", JSON.stringify(STATE));
  _pushToFirebase();
}

function load(){
  const raw = localStorage.getItem("bdg_horarios_v2");
  if(raw){ try{ STATE = JSON.parse(raw); }catch(e){} }
  if(!STATE.members)      STATE.members      = [];
  if(!STATE.slots)        STATE.slots        = [];
  if(!STATE.picks)        STATE.picks        = [];
  if(!STATE.changelog)    STATE.changelog    = [];
  if(!STATE.admins)       STATE.admins       = [];
  if(!STATE.photos)       STATE.photos       = {};
  if(!STATE.lastModified) STATE.lastModified = 0;
  // Migrar fotos viejas de localStorage individual a STATE
  STATE.members.forEach(m => {
    if(!STATE.photos[m.code]){
      const old = localStorage.getItem("bdg_photo_" + m.code);
      if(old){ STATE.photos[m.code] = old; }
    }
  });
  migrateSlotDays();
  initFirebase();
}

// ── AUDIT TRAIL ───────────────────────────────────────────────────────────────
function logChange(action, detail){
  if(!SESSION.code) return;
  if(!STATE.changelog) STATE.changelog = [];
  STATE.changelog.unshift({
    at:        new Date().toISOString(),
    adminCode: SESSION.code,
    adminName: SESSION.name,
    action,
    detail
  });
  // Keep at most 200 entries
  if(STATE.changelog.length > 200) STATE.changelog.length = 200;
  save();
}

// Deriva siempre el nombre del día desde la fecha — corrige datos históricos incorrectos
const DAYS_ES = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
function dayFromDate(dateStr){ return DAYS_ES[new Date(dateStr + "T12:00:00").getDay()]; }
function migrateSlotDays(){
  let changed = false;
  STATE.slots.forEach(slot => {
    if(!slot.date) return;
    const correct = dayFromDate(slot.date);
    if(slot.day !== correct){ slot.day = correct; changed = true; }
  });
  if(changed) save();
}

// ── FOTOS DE PERFIL ───────────────────────────────────────────────────────────
function getPhoto(code){ return (STATE.photos && STATE.photos[code]) || null; }
function setPhoto(code, dataUrl){
  if(!STATE.photos) STATE.photos = {};
  STATE.photos[code] = dataUrl;
  save(); // sincroniza la foto a Firebase para todos los dispositivos
}

function uploadPhoto(code, afterFn){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*";
  inp.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => { setPhoto(code, ev.target.result); if(afterFn) afterFn(); };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function avatarHtml(code, size="sm"){
  const photo = getPhoto(code);
  const cls   = size === "lg" ? "avatar-lg" : size === "md" ? "avatar" : "avatar-sm";
  const phCls = size === "lg" ? "avatar-lg-placeholder" : "avatar-placeholder";
  if(photo) return `<img src="${photo}" class="${cls}" alt=""/>`;
  const m = STATE.members.find(mb=>mb.code===code);
  const ini = m ? m.name.trim()[0].toUpperCase() : "?";
  return `<div class="${phCls}">${ini}</div>`;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function uid(){ return "s" + Date.now() + Math.random().toString(36).slice(2,5); }

function localISO(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}

function fmtDate(d){
  if(!d) return "—";
  const [,m,day] = d.split("-");
  const ms = ["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return `${parseInt(day)} ${ms[parseInt(m)]}`;
}

function addMins(time, mins){
  const [h,mi] = time.split(":").map(Number);
  const total = h*60 + mi + mins;
  return `${String(Math.floor(total/60)%24).padStart(2,"0")}:${String(total%60).padStart(2,"0")}`;
}

function getWeekDates(offset=0){
  const now = new Date();
  const sun = new Date(now);
  sun.setDate(now.getDate() - now.getDay() + offset * 7);
  sun.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{
    const d = new Date(sun); d.setDate(sun.getDate()+i);
    return localISO(d);
  }); // [Dom, Lun, Mar, Mié, Jue, Vie, Sáb]
}

function weekLabel(offset){
  const [d0,d6] = [getWeekDates(offset)[0], getWeekDates(offset)[6]];
  return `${fmtDate(d0)} – ${fmtDate(d6)}`;
}

// ── AUTO-CÓDIGO (difícil de adivinar) ─────────────────────────────────────────
function generateCode(name){
  const base  = name.trim().split(/\s+/)[0].toUpperCase().replace(/[^A-Z]/g,"").slice(0,3).padEnd(3,"X");
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // sin I,O,0,1 para evitar confusión
  let code;
  do {
    code = base + Array.from({length:4}, ()=> chars[Math.floor(Math.random()*chars.length)]).join("");
  } while(STATE.members.find(m => m.code === code));
  return code;
}

// ── LÍMITES SEMANALES ─────────────────────────────────────────────────────────
function dayPickCount(memberCode, date){
  return STATE.picks.filter(p => {
    if(p.memberCode !== memberCode || p.status === "cancelled") return false;
    const slot = STATE.slots.find(s => s.id === p.slotId);
    return slot && slot.date === date;
  }).length;
}

// TAB: SESIONES
// Genera 8 sesiones × 7 días para la semana indicada (si no existen ya)
function generateDefaultWeek(offset){
  const weekDates = getWeekDates(offset);
  const DAYS = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  let added = 0;
  weekDates.forEach((date, di) => {
    DEFAULT_TIMES.forEach(start => {
      const exists = STATE.slots.find(s => s.date === date && s.timeStart === start);
      if(!exists){
        STATE.slots.push({ id: uid(), day: dayFromDate(date), date, timeStart: start, timeEnd: addMins(start, SESSION_MINS) });
        added++;
      }
    });
  });
  if(added > 0){ save(); renderAdmin("sesiones"); renderPublicCal(); }
}

function clearWeek(offset){
  const weekDates   = getWeekDates(offset);
  const today       = new Date().toISOString().slice(0,10);
  const protected_  = STATE.slots.filter(s => weekDates.includes(s.date) && s.date < today && s.gmv > 0);
  const msg = protected_.length > 0
    ? `Esta semana tiene ${protected_.length} sesión${protected_.length!==1?"es":""} pasadas con GMV registrado. Solo se limpiarán las sesiones futuras.`
    : "¿Limpiar todas las sesiones futuras de esta semana? Las selecciones también se borrarán.";
  showConfirm(msg, ()=>{
    const toRemove = STATE.slots
      .filter(s => weekDates.includes(s.date) && s.date >= today)
      .map(s => s.id);
    STATE.slots = STATE.slots.filter(s => !toRemove.includes(s.id));
    STATE.picks = STATE.picks.filter(p => !toRemove.includes(p.slotId));
    save(); renderAdmin("sesiones"); renderPublicCal();
  }, "Limpiar");
}

      <div class="week-label">${weekLabel(currentWeekOffset)}</div>

      ${currentWeekOffset!==0?`<button class="btn ghost" style="font-size:11px;padding:6px 12px;" onclick="filterDate=null;currentWeekOffset=0;renderAdmin('sesiones')">Semana actual</button>`:""}
      <span style="font-size:11px;color:var(--muted);">${weekSlots.length} sesion${weekSlots.length!==1?"es":""}</span>
      <div style="display:flex;align-items:center;gap:8px;margin-left:auto;">
        <label style="font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;">Ir a fecha</label>
        <input type="date" id="jumpToDate" style="padding:5px 8px;border:1px solid var(--line2);font-size:12px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);outline:none;" onchange="jumpToWeek(this.value)"/>

      ${missing > 0 ? `<button class="btn ghost" style="font-size:11px;" onclick="generateDefaultWeek(${currentWeekOffset})">↺ Restaurar default (${missing} sesion${missing!==1?"es":""})</button>` : ""}

function renderSlotCard(slot, grid, anfiMembers, backMembers){
  const anfiPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="anfitriona");
  const backPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="backend");
  const anfiName = anfiPick ? memberName(anfiPick.memberCode) : null;
  const backName = backPick ? memberName(backPick.memberCode) : null;

  const spotHtml = (icon, label, pick, name, role) => {
    const members = role==="anfitriona" ? anfiMembers : backMembers;
    const selId   = `sel_${role}_${slot.id}`;
    if(pick && name){
      const isConf = pick.status==="confirmed";
      const byAdmin = pick.by && pick.by !== "member";
      return `<div class="spot-row filled">
        <span class="spot-icon">${icon}</span>
        <span class="spot-label">${label}</span>
        <span class="spot-name">${name}${byAdmin?' <span class="adm-tag">Admin</span>':""}</span>
        <span class="spot-status ${pick.status}">${isConf?"✓ Conf.":"Pend."}</span>
        <button class="adm-spot-btn conf${isConf?" active":""}" onclick="adminConfirmPick('${slot.id}','${pick.memberCode}')" title="${isConf?"Marcar pendiente":"Confirmar"}">✓ Conf</button>
        <button class="adm-spot-btn rm" onclick="adminRemovePick('${slot.id}','${pick.memberCode}')" title="Quitar asignación">×</button>
      </div>`;
    } else {
      const opts = members.length
        ? members.map(m=>`<option value="${m.code}">${m.name}</option>`).join("")
        : `<option value="" disabled>Sin miembros</option>`;
      return `<div class="spot-row open">
        <span class="spot-icon">${icon}</span>
        <span class="spot-label">${label}</span>
        <select id="${selId}" class="adm-select"><option value="">— libre —</option>${opts}</select>
        <button class="adm-spot-btn assign" onclick="adminAssign('${slot.id}','${role}')">Asignar</button>
      </div>`;
    }
  };

  const isPast = slot.date < localISO(new Date());
  const gmvFmt = slot.gmv > 0 ? fmtGMV(slot.gmv) : null;
  const div = document.createElement("div");
  div.className = "slot-card";
  div.innerHTML = `
    <button class="slot-delete-btn" onclick="deleteSlot('${slot.id}')" title="Eliminar sesión">🗑</button>
    <div class="slot-day">${slot.day} · ${fmtDate(slot.date)}${isPast?` <span style="font-size:9px;background:var(--surface3);color:var(--muted);padding:1px 5px;vertical-align:middle;letter-spacing:.1em;">PASADO</span>`:""}</div>
    <div class="slot-time">${slot.timeStart} – ${slot.timeEnd}</div>
    <div class="slot-spots">
      ${spotHtml("🎙️","Anfitriona",anfiPick,anfiName,"anfitriona")}
      ${spotHtml("💻","Backend",backPick,backName,"backend")}
    </div>
    <div class="slot-report">
      <div class="slot-report-title">Reporte · GMV</div>
      ${gmvFmt
        ? `<div class="gmv-display">${gmvFmt}</div>${slot.reporte?`<div style="font-size:11px;color:var(--muted);margin-top:4px;font-style:italic;">📝 ${slot.reporte}</div>`:""}`
        : `<div style="font-size:11px;color:var(--muted);">Sin reporte registrado</div>`}
      <button class="report-save-btn" style="margin-top:10px;" onclick="openReporte('${slot.id}')">
        ${gmvFmt ? "✏️ Editar reporte" : "+ Agregar reporte"}
      </button>
    </div>`;
  grid.appendChild(div);
}

function changeWeek(d){ filterDate=null; currentWeekOffset+=d; renderAdmin("sesiones"); }

function jumpToWeek(dateStr){
  if(!dateStr) return;
  filterDate = dateStr;
  // Calcular el offset de semana para que generateDefaultWeek funcione si es necesario
  const target = new Date(dateStr + "T12:00:00");
  const targetSun = new Date(target);
  targetSun.setDate(target.getDate() - target.getDay());
  targetSun.setHours(0,0,0,0);
  const now = new Date();
  const thisSun = new Date(now);
  thisSun.setDate(now.getDate() - now.getDay());
  thisSun.setHours(0,0,0,0);
  const diffDays = Math.round((targetSun - thisSun) / 86400000);
  currentWeekOffset = Math.round(diffDays / 7);
  renderAdmin("sesiones");
  const inp = document.getElementById("jumpToDate");
  if(inp) inp.value = dateStr;
}

function openSlotModal(){
  const dates = getWeekDates(currentWeekOffset);
  document.getElementById("slotDate").value  = dates[0];
  document.getElementById("slotStart").value = "19:00";
  document.getElementById("slotErr").style.display = "none";
  syncDayFromDate();
  updateEndPreview();
  document.getElementById("slotModal").style.display = "flex";
  setTimeout(()=>document.getElementById("slotDate").focus(),100);
}

function updateEndPreview(){
  const start = document.getElementById("slotStart").value;
  if(start) document.getElementById("endPreview").textContent = "Termina a las " + addMins(start, SESSION_MINS);
}

function syncDayFromDate(){
  const dateVal = document.getElementById("slotDate").value;
  if(!dateVal) return;
  const d = new Date(dateVal + "T12:00:00");
  const DAYS = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  document.getElementById("slotDay").value = DAYS[d.getDay()];
}

function saveSlot(){
  const date  = document.getElementById("slotDate").value;
  const start = document.getElementById("slotStart").value;
  const err   = document.getElementById("slotErr");
  if(!date || !start){ err.style.display="block"; err.textContent="Completa la fecha y hora."; return; }
  err.style.display="none";
  syncDayFromDate();
  const newSlot = { id: uid(), day: document.getElementById("slotDay").value, date, timeStart: start, timeEnd: addMins(start, SESSION_MINS) };
  STATE.slots.push(newSlot);
  logChange("Crear sesión", `${newSlot.day} ${date} ${start}–${newSlot.timeEnd}`);
  closeModal("slotModal"); renderAdmin("sesiones"); renderPublicCal();
}

function deleteSlot(id){
  const slot = STATE.slots.find(s=>s.id===id);
  STATE.slots = STATE.slots.filter(s=>s.id!==id);
  STATE.picks = STATE.picks.filter(p=>p.slotId!==id);
  logChange("Eliminar sesión", slot ? `${slot.day} ${slot.date} ${slot.timeStart}–${slot.timeEnd}` : id);
  renderAdmin("sesiones"); renderPublicCal();
}

// ── GMV PERSONAL ──────────────────────────────────────────────────────────────
function renderMemberGmv(){
  // Solo anfitrionas ven esto (ellas son las que generan el GMV en vivo)
  if(SESSION.role !== "anfitriona") return "";

  const today = localISO(new Date());

  // Sesiones pasadas donde esta anfitriona estuvo y hay GMV registrado
  const gmvSlots = STATE.picks
    .filter(p => p.memberCode === SESSION.code && p.status !== "cancelled")
    .map(p => STATE.slots.find(s => s.id === p.slotId))
    .filter(s => s && s.date < today && s.gmv > 0)
    .sort((a,b) => b.date.localeCompare(b.date) || b.timeStart.localeCompare(a.timeStart));

  const totalGmv   = gmvSlots.reduce((sum, s) => sum + (s.gmv || 0), 0);
  const totalSes   = gmvSlots.length;

  // Semana actual
  const weekDates  = getWeekDates(0);
  const weekGmv    = gmvSlots.filter(s => weekDates.includes(s.date)).reduce((sum,s)=>sum+(s.gmv||0),0);
  const weekSes    = gmvSlots.filter(s => weekDates.includes(s.date)).length;

  if(totalSes === 0) return `
    <div style="background:var(--surface);border:1px solid var(--line);padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;gap:14px;">
      <div style="font-size:28px;">💰</div>
      <div>
        <div style="font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Mis ventas</div>
        <div style="font-size:13px;color:var(--text2);">Aún no hay sesiones con venta registrada.</div>
      </div>
    </div>`;

  // Últimas 3 sesiones con GMV
  const recentRows = gmvSlots.slice(0,3).map(s => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);">
      <div>

// ── MEMBER VIEW ───────────────────────────────────────────────────────────────
function renderMember(){
  const body         = document.getElementById("appBody");
  const member       = STATE.members.find(m=>m.code===SESSION.code);
  const limit        = memberLimit(SESSION.role);
  const myActivePicks= STATE.picks.filter(p=>p.memberCode===SESSION.code&&p.status!=="cancelled");

  // Filter available slots by the current member week
  const memberWeekDates = getWeekDates(memberWeekOffset);
  const available = STATE.slots
    .filter(s=>{
      if(!memberWeekDates.includes(s.date)) return false;
      const alreadyMine = myActivePicks.find(p=>p.slotId===s.id);
      if(alreadyMine) return true;
      const spotTaken = STATE.picks.find(p=>p.slotId===s.id&&p.status!=="cancelled"&&memberRole(p.memberCode)===SESSION.role);

    .sort((a,b)=>a.date.localeCompare(b.date)||a.timeStart.localeCompare(b.timeStart));

  const emoji       = SESSION.role==="anfitriona" ? "🎙️" : "💻";

  // Limit bar — muestra sesiones de hoy vs límite diario
  const today = new Date().toISOString().slice(0,10);
  const todayCount = dayPickCount(SESSION.code, today);
  const pips = Array.from({length:limit},(_,i)=>`<div class="pip ${i<todayCount?"used":"free"}"></div>`).join("");

  const memberPhoto = avatarHtml(SESSION.code, "lg");
  body.innerHTML = `
    <div style="margin-bottom:24px;display:flex;align-items:flex-start;gap:18px;">
      <div style="display:flex;flex-direction:column;align-items:center;">
        ${memberPhoto}
        <button class="avatar-upload-btn" onclick="uploadPhoto('${SESSION.code}', ()=>renderMember())">Cambiar foto</button>
      </div>
      <div>
        <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;margin-bottom:4px;">
          Hola, ${SESSION.name.split(" ")[0]} ${emoji}
        </div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;">${roleLabel} · ${SESSION.code}</div>
      </div>
    </div>

    <div class="limit-bar">
      <div class="limit-item">
        <span class="limit-label">Hoy</span>
        <div class="limit-pips">${pips}</div>
        <span class="limit-count">${todayCount} / ${limit}</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;">
        <span style="font-size:12px;color:var(--muted);">Máx ${limit} sesiones por día</span>
        <span style="font-size:11px;color:var(--muted);">${overallCount} sesion${overallCount!==1?"es":""} seleccionada${overallCount!==1?"s":""} en total</span>
      </div>

    ${renderMemberGmv()}

    ${myActivePicks.length > 0 ? `
      <div class="section-title" style="margin-bottom:12px;">Mis sesiones (${myActivePicks.length})</div>
      <div class="my-slots">${myActivePicks.map(p=>{
        const slot = STATE.slots.find(s=>s.id===p.slotId);
        if(!slot) return "";
        // other person in same slot
        const otherRole  = SESSION.role==="anfitriona"?"backend":"anfitriona";
        const otherPick  = STATE.picks.find(op=>op.slotId===slot.id&&op.status!=="cancelled"&&memberRole(op.memberCode)===otherRole);
        const otherName  = otherPick ? memberName(otherPick.memberCode) : null;
        const otherIcon  = SESSION.role==="anfitriona"?"💻":"🎙️";

          <div class="my-slot-info">

            <div style="font-size:11px;color:var(--muted);margin-top:4px;">
              ${otherIcon} ${otherName ? `Con ${otherName}` : "Sin pareja asignada aún"}

            ${p.notes?`<div class="my-slot-note">📝 ${p.notes}</div>`:""}
          </div>
          <div class="my-slot-actions">
            <button class="confirm-btn confirm ${p.status==="confirmed"?"active":""}" onclick="setPickStatus('${slot.id}','confirmed')">✓ Confirmar</button>
            <button class="confirm-btn cancel-btn" onclick="cancelPick('${slot.id}')">Quitar</button>
            <button class="btn ghost" style="font-size:11px;padding:6px 12px;" onclick="openNotes('${slot.id}')">📝</button>

        </div>`;

      : `<div class="slots-grid">${available.map(slot=>{
          const mine      = myActivePicks.find(p=>p.slotId===slot.id);

          return `<div class="slot-card ${mine?"mine":""}">

                <span class="spot-name">${mine ? SESSION.name : "Libre"}</span>

              </div>
              <div class="spot-row ${otherName?"filled":"open"}">
                <span class="spot-icon">${otherIcon}</span>
                <span class="spot-label">${SESSION.role==="anfitriona"?"Backend":"Anfitriona"}</span>
                <span class="spot-name">${otherName||"Libre"}</span>

              </div>

              ${mine

                : `<button class="slot-select-btn" onclick="selectSlot('${slot.id}')" ${atLimit?"disabled title='Límite del día alcanzado'":""}>

function buildMemberLeaderboard(){
  const board = buildLeaderboard().filter(b => b.role === SESSION.role);
  if(board.length === 0 || board.every(b=>b.gmvTotal===0)) return "";
  const myRank = board.findIndex(b=>b.code===SESSION.code);
  const medals = ["🥇","🥈","🥉"];
  const roleLabel = SESSION.role==="anfitriona" ? "Anfitrionas" : "Staff Backend";
  const rows = board.map((b,i)=>{
    const isMe = b.code === SESSION.code;
    const pct  = board[0].gmvTotal > 0 ? (b.gmvTotal/board[0].gmvTotal)*100 : 0;
    return `<div style="background:${isMe?"var(--oxide-l)":"var(--surface)"};border:1px solid ${isMe?"var(--oxide)":"var(--line)"};padding:12px 16px;margin-bottom:6px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span style="font-size:18px;width:24px;text-align:center;">${medals[i]||i+1}</span>
        ${avatarHtml(b.code,"md")}
        <div style="flex:1;min-width:0;">
          <div style="font-weight:500;font-size:13px;">${isMe?"✨ Tú":""}${b.name.split(" ")[0]}</div>
          <div style="font-size:10px;color:var(--muted);">${b.sesiones} sesión${b.sesiones!==1?"es":""}</div>
        </div>
        <div style="text-align:right;">
          <div class="gmv-display" style="font-size:16px;">${b.gmvTotal>0?fmtGMV(b.gmvTotal):"—"}</div>
          ${b.gmvPorHora>0?`<div style="font-size:10px;color:var(--muted);">${fmtGMV(b.gmvPorHora)}/hr</div>`:""}
        </div>
      </div>
      <div style="background:var(--line2);height:3px;border-radius:2px;">
        <div style="background:${isMe?"var(--oxide)":"var(--carbon)"};height:3px;border-radius:2px;width:${pct.toFixed(0)}%;"></div>
      </div>
    </div>`;
  }).join("");
  return `<div style="margin-top:32px;border-top:1px solid var(--line);padding-top:24px;">
    <div class="section-title" style="margin-bottom:14px;">🏆 Ranking ${roleLabel} · GMV acumulado</div>
    ${myRank>=0?`<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">Tu posición: <strong>#${myRank+1}</strong> de ${board.length}</div>`:""}
    ${rows}
    <div style="font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:.1em;">GMV de sesiones donde participaste · ${SESSION_MINS/60}h por sesión</div>
  </div>`;
}

function memberRole(code){ const m=STATE.members.find(mb=>mb.code===code); return m?m.role:null; }
function memberName(code){ const m=STATE.members.find(mb=>mb.code===code); return m?m.name:code; }

function selectSlot(slotId){
  if(STATE.picks.find(p=>p.slotId===slotId&&p.memberCode===SESSION.code&&p.status!=="cancelled")) return;
  const slot  = STATE.slots.find(s=>s.id===slotId);
  const limit = memberLimit(SESSION.role);
  const count = dayPickCount(SESSION.code, slot.date);
  if(count >= limit){ showAlert(`Ya tienes ${limit} sesion${limit!==1?"es":""} ese día (límite diario).`); return; }
  STATE.picks.push({ slotId, memberCode:SESSION.code, status:"pending", notes:"" });
  save(); renderMember(); renderPublicCal();
}

function cancelPick(slotId){
  STATE.picks = STATE.picks.filter(p=>!(p.slotId===slotId&&p.memberCode===SESSION.code));
  save(); renderMember(); renderPublicCal();
}

function memberChangeWeek(d, reset=false){
  if(reset){ memberWeekOffset = 0; }
  else {
    const next = memberWeekOffset + d;
    if(next < 0) return;
    memberWeekOffset = next;
  }
  renderMember();
}

function setPickStatus(slotId, status){
  const idx = STATE.picks.findIndex(pk => pk.slotId===slotId && pk.memberCode===SESSION.code);
  if(idx >= 0){ STATE.picks[idx].status = status; save(); renderMember(); renderPublicCal(); }
}

// ── ADMIN ASIGNAR / CONFIRMAR ─────────────────────────────────────────────────
function adminAssign(slotId, role){
  const selId = `sel_${role}_${slotId}`;
  const el = document.getElementById(selId);
  if(!el || !el.value) return;
  const memberCode = el.value;
  const slot  = STATE.slots.find(s=>s.id===slotId);
  const limit = memberLimit(role);
  const count = dayPickCount(memberCode, slot.date);
  if(STATE.picks.find(p=>p.slotId===slotId&&p.memberCode===memberCode&&p.status!=="cancelled")) return;
  const slot2 = STATE.slots.find(s=>s.id===slotId);
  const doAssign = () => {
    STATE.picks.push({ slotId, memberCode, status:"confirmed", notes:"", by:SESSION.code });
    logChange("Asignar", `${memberName(memberCode)} → ${slot2?slot2.day+" "+slot2.date+" "+slot2.timeStart:slotId}`);
    renderAdmin("sesiones"); renderPublicCal();
  };
  if(count >= limit){
    showConfirm(`⚠️ ${memberName(memberCode)} ya tiene ${count} sesión${count!==1?"es":""} ese día (límite: ${limit}). ¿Asignar de todos modos?`, doAssign, "Asignar de todos modos");
    return;
  }
  doAssign();
}

function adminConfirmPick(slotId, memberCode){
  const p = STATE.picks.find(p=>p.slotId===slotId&&p.memberCode===memberCode&&p.status!=="cancelled");
  if(p){
    const slot2 = STATE.slots.find(s=>s.id===slotId);
    p.status = p.status==="confirmed" ? "pending" : "confirmed";
    save();
    logChange(p.status==="confirmed"?"Confirmar asignación":"Pendiente asignación", `${memberName(memberCode)} · ${slot2?slot2.day+" "+slot2.timeStart:slotId}`);
    renderAdmin("sesiones"); renderPublicCal();
  }
}

function adminRemovePick(slotId, memberCode){
  const name = memberName(memberCode);
  const slot2 = STATE.slots.find(s=>s.id===slotId);
  showConfirm(`¿Quitar la asignación de ${name}?`, ()=>{
    STATE.picks = STATE.picks.filter(p=>!(p.slotId===slotId&&p.memberCode===memberCode));
    save();
    logChange("Quitar asignación", `${name} · ${slot2?slot2.day+" "+slot2.timeStart:slotId}`);
    renderAdmin("sesiones"); renderPublicCal();
  }, "Quitar");
}

// ── NOTES ─────────────────────────────────────────────────────────────────────
function openNotes(slotId){
  const slot = STATE.slots.find(s=>s.id===slotId);
  const pick = STATE.picks.find(p=>p.slotId===slotId&&p.memberCode===SESSION.code);
  pendingNotesSlotId = slotId;
  document.getElementById("notesModalSub").textContent = slot ? `${slot.day} · ${slot.timeStart}–${slot.timeEnd}` : "";
  document.getElementById("notesInput").value = pick?.notes || "";
  document.getElementById("notesModal").style.display = "flex";
  setTimeout(()=>document.getElementById("notesInput").focus(),100);
}
function saveNotes(){
  if(!pendingNotesSlotId) return;
  const p = STATE.picks.find(p=>p.slotId===pendingNotesSlotId&&p.memberCode===SESSION.code);
  if(p){ p.notes=document.getElementById("notesInput").value.trim(); save(); }
  closeModal("notesModal"); pendingNotesSlotId=null; renderMember();
}

// ── CALENDARIO PÚBLICO ───────────────────────────────────────────────────────
let pubWeekOffset = 0;
const DAYS_SHORT = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];


function renderPublicCal(){
  const weekDates = getWeekDates(pubWeekOffset);
  const today     = localISO(new Date());

  document.getElementById("pubWeekLabel").textContent = weekLabel(pubWeekOffset);

  // Solo hacia adelante
  const backBtn = document.getElementById("pubBackBtn");
  if(backBtn) backBtn.style.visibility = pubWeekOffset <= 0 ? "hidden" : "visible";

  const grid = document.getElementById("pubGrid");

  // Cabecera de días
  let headCols = `<div class="cwg-time"></div>`;
  weekDates.forEach((date, i) => {
    const isTod = date === today;
    const [,mm,dd] = date.split("-");
    const ms = ["","Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    headCols += `<div class="cwg-dh${isTod?" cwg-today":""}">
      <div class="cwg-dh-name">${DAYS_SHORT[i]}</div>
      <div class="cwg-dh-date">${parseInt(dd)}</div>
      <div class="cwg-dh-month">${ms[parseInt(mm)]}</div>
    </div>`;
  });

  // Filas por horario
  let rows = "";
  DEFAULT_TIMES.forEach(time => {
    let cells = `<div class="cwg-time">${time}</div>`;
    weekDates.forEach(date => {
      const slot = STATE.slots.find(s => s.date === date && s.timeStart === time);
      if(!slot){ cells += `<div class="cwg-cell none"></div>`; return; }
      const anfiPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="anfitriona");
      const backPick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)==="backend");
      const anfiName = anfiPick ? memberName(anfiPick.memberCode) : null;
      const backName = backPick ? memberName(backPick.memberCode) : null;
      const calAvatar = code => {
        const photo = getPhoto(code);
        const m = STATE.members.find(mb=>mb.code===code);
        const ini = m ? m.name.trim()[0].toUpperCase() : "?";
        return photo
          ? `<img src="${photo}" class="cwg-av" alt=""/>`
          : `<div class="cwg-av-ph">${ini}</div>`;
      };
      const personRow = (pick, name, roleLabel) => `
        <div class="cwg-live-person">
          ${calAvatar(pick.memberCode)}
          <div class="cwg-person-info">
            <div class="cwg-person-name">${name}</div>
            <div class="cwg-person-role">${roleLabel}</div>
          </div>
        </div>`;
      const hasNames = anfiPick || backPick;
      cells += `<div class="cwg-cell blocked">
        <div class="cwg-live">
          <div class="cwg-live-header">
            <span class="cwg-live-tag">● LIVE</span>
            <span class="cwg-live-time">${time}–${slot.timeEnd}</span>
          </div>
          ${hasNames ? `<div class="cwg-live-divider"></div><div class="cwg-live-names">
            ${anfiPick ? personRow(anfiPick, anfiName, "Anfitriona") : ""}
            ${backPick ? personRow(backPick, backName, "Backend") : ""}
          </div>` : ""}
        </div>
      </div>`;
    });
    rows += `<div class="cwg-row">${cells}</div>`;
  });

  grid.innerHTML = `<div class="cwg-wrap"><div class="cwg-head-row">${headCols}</div>${rows}</div>`;
}

function pubChangeWeek(d){
  const next = pubWeekOffset + d;
  if(next < 0) return;
  pubWeekOffset = next;
  renderPublicCal();
}


function exportCalendarImage(){
  const logoEl = document.querySelector('.topbar img');
  function doExport(logoImg){
    _drawCalendarCanvas(logoImg);
  }
  if(logoEl && logoEl.src){
    const img = new Image();
    img.onload  = () => doExport(img);
    img.onerror = () => doExport(null);
    img.src = logoEl.src;
  } else {
    doExport(null);
  }
}

function _drawCalendarCanvas(logoImg){
  const dates    = getWeekDates(pubWeekOffset);
  const dayNames = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

  const weekSlots   = STATE.slots.filter(s => dates.includes(s.date));
  const totalSes    = weekSlots.length;
  const totalHrs    = totalSes * SESSION_MINS / 60;
  const totalHrsStr = totalHrs % 1 === 0 ? totalHrs + "h" : totalHrs.toFixed(1) + "h";

  // ── Layout ────────────────────────────────────────────────────
  const SCALE = 2;
  const M     = 28;    // margen exterior
  const TW    = 68;    // columna de horas
  const CW    = 108;   // ancho de cada día
  const TOPB  = 42;    // topbar marca
  const TITL  = 58;    // título + fecha
  const HDR   = 82;    // cabecera de días
  const RH    = 50;    // altura por fila horaria
  const FOOT  = 60;    // footer stats
  const IW    = TW + CW * 7;            // ancho interior
  const IH    = TOPB + TITL + HDR + RH * DEFAULT_TIMES.length + FOOT; // alto interior
  const W     = IW + M * 2;             // ancho total con márgenes
  const H     = IH + M * 2;

  const canvas = document.createElement("canvas");
  canvas.width  = W * SCALE;
  canvas.height = H * SCALE;
  const c = canvas.getContext("2d");
  c.scale(SCALE, SCALE);

  // ── Paleta BDG ────────────────────────────────────────────────
  const DB   = "#202945";
  const GOLD = "#D0AE2B";
  const OW   = "#F9F8F6";
  const SF2  = "#F2F2F0";
  const LINE = "#E0DDDA";
  const MUT  = "#9A9A9E";

  // ── Fondo exterior (margen) ────────────────────────────────────
  c.fillStyle = OW;
  c.fillRect(0, 0, W, H);

  // Sombra suave interior
  c.shadowColor = "rgba(32,41,69,0.14)";
  c.shadowBlur  = 18;
  c.fillStyle   = "#FFFFFF";
  c.fillRect(M, M, IW, IH);
  c.shadowBlur  = 0;

  // Helper: coordenadas relativas al interior
  const X = dx => M + dx;
  const Y = dy => M + dy;

  // ── 1. Topbar ─────────────────────────────────────────────────
  c.fillStyle = DB;
  c.fillRect(X(0), Y(0), IW, TOPB);

  if(logoImg && logoImg.naturalWidth){
    const lh  = 14;

  c.lineWidth = 1;
  c.beginPath(); c.moveTo(X(0), Y(TOPB + TITL - 1)); c.lineTo(X(IW), Y(TOPB + TITL - 1)); c.stroke();

  // ── 3. Cabecera días ──────────────────────────────────────────
  const hdrY = TOPB + TITL;

  c.fillStyle = DB;
  c.fillRect(X(0), Y(hdrY), IW, HDR);

  dayNames.forEach((name, i) => {

    c.fillStyle = alt ? SF2 : OW;

  // ── 5. Footer stats ───────────────────────────────────────────
  const footY = Y(hdrY + HDR + RH * DEFAULT_TIMES.length);
  c.fillStyle = DB;
  c.fillRect(X(0), footY, IW, FOOT);
  c.fillStyle = GOLD;

  c.font = `700 8px 'DM Sans', Arial`;
  c.textAlign = "left";
  c.fillText("SESIONES", s1x, footY + 22);
  c.fillStyle = GOLD;
  c.font = `900 22px 'DM Sans', Arial`;
  c.fillText(totalSes, s1x, footY + 46);

  const s2x = X(TW + 140);
  c.fillStyle = "rgba(255,255,255,0.4)";

  c.fillText("HORAS EN VIVO", s2x, footY + 22);
  c.fillStyle = GOLD;
  c.font = `900 22px 'DM Sans', Arial`;
  c.fillText(totalHrsStr, s2x, footY + 46);

  c.fillStyle = "rgba(255,255,255,0.1)";
  c.font = `700 12px 'DM Sans', Arial`;
  c.textAlign = "right";
  c.fillText("@baladigala", X(IW - 14), footY + FOOT/2 + 5);

  // ── Descargar ─────────────────────────────────────────────────
  const link = document.createElement("a");
  link.download = `BDG-Horarios-${dates[0]}.png`;
  link.href = canvas.toDataURL("image/png");
  link.click();
}

// ── FORMAT GMV ────────────────────────────────────────────────────────────────
function fmtGMV(n){
  if(!n || n <= 0) return "—";
  return "$" + Number(n).toLocaleString("es-MX", {minimumFractionDigits:0, maximumFractionDigits:0});
}

// ── REPORTE DE SESIÓN ─────────────────────────────────────────────────────────
function openReporte(slotId){
  const slot = STATE.slots.find(s=>s.id===slotId);
  if(!slot) return;
  pendingReporteSlotId = slotId;
  document.getElementById("reporteModalSub").textContent = `${slot.day} · ${fmtDate(slot.date)} · ${slot.timeStart}–${slot.timeEnd}`;
  document.getElementById("reporteGmv").value    = slot.gmv   || "";
  document.getElementById("reporteNotas").value  = slot.reporte || "";
  document.getElementById("reporteModal").style.display = "flex";
  setTimeout(()=>document.getElementById("reporteGmv").focus(),100);
}

function saveReporte(){
  if(!pendingReporteSlotId) return;
  const slot = STATE.slots.find(s=>s.id===pendingReporteSlotId);
  if(slot){
    const raw = parseFloat(document.getElementById("reporteGmv").value);
    slot.gmv    = isNaN(raw) ? 0 : raw;
    slot.reporte = document.getElementById("reporteNotas").value.trim();
  }
  closeModal("reporteModal");
  pendingReporteSlotId = null;
  save();
  renderAdmin("sesiones");
}

// ── LEADERBOARD (GMV por persona) ─────────────────────────────────────────────
function buildLeaderboard(){
  const SESSION_H = SESSION_MINS / 60;
  const board = {};
  STATE.members.forEach(m => { board[m.code] = { code:m.code, name:m.name, role:m.role, gmvTotal:0, sesiones:0 }; });
  STATE.slots.forEach(slot => {
    if(!slot.gmv || slot.gmv <= 0) return;
    const share = slot.gmv; // GMV completo va a cada persona que trabajó esa sesión
    ["anfitriona","backend"].forEach(role => {
      const pick = STATE.picks.find(p=>p.slotId===slot.id&&p.status!=="cancelled"&&memberRole(p.memberCode)===role);
      if(pick && board[pick.memberCode]){
        board[pick.memberCode].gmvTotal  += share;
        board[pick.memberCode].sesiones  += 1;
      }
    });
  });
  return Object.values(board)
    .filter(b => b.sesiones > 0 || STATE.picks.some(p=>p.memberCode===b.code&&p.status!=="cancelled"))
    .map(b => ({ ...b, gmvPorHora: b.sesiones > 0 ? b.gmvTotal / (b.sesiones * SESSION_H) : 0 }))
    .sort((a,b) => b.gmvTotal - a.gmvTotal);
}

function leaderboardHtml(role){
  const today = new Date().toISOString().slice(0,10);
  const all   = buildLeaderboard().filter(b=>b.role===role);
  if(!all.length) return `<div style="color:var(--muted);font-size:12px;padding:16px 0;">Sin datos aún</div>`;
  const medals = ["🥇","🥈","🥉"];
  return all.map((b,i)=>{
    const pct = all[0].gmvTotal > 0 ? (b.gmvTotal / all[0].gmvTotal) * 100 : 0;

      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">

// ── HISTORIAL ─────────────────────────────────────────────────────────────────
let historialWeekFilter = "todas";
let historialAnfiFilter = "todas";
let historialSort       = "fecha";    // fecha | gmv
let historialView       = "semanas";  // semanas | anfitrionas | backend | duplas
let _gmvSyncing = false;

async function loadLiveGMV(){
  if(_gmvSyncing) return;
  const past = getPastSlots();
  if(!past.length) return;
  _gmvSyncing = true;

  // Mostrar indicador
  const ind = document.getElementById("gmvLiveInd");
  if(ind){ ind.style.display="inline"; }

  try {
    // Rango: primer slot pasado → hoy
    const dates = past.map(s=>s.date).sort();
    const dateMin = dates[0]    + "T00:00:00-06:00";
    const dateMax = dates[dates.length-1] + "T23:59:59-06:00";

    const res  = await fetch(`/api/orders?date_min=${encodeURIComponent(dateMin)}&date_max=${encodeURIComponent(dateMax)}`);
    if(!res.ok) throw new Error(`orders API ${res.status}`);
    const { orders } = await res.json();

    // Calcular GMV por slot
    let changed = false;
    past.forEach(slot => {
      const tStart = new Date(`${slot.date}T${slot.timeStart}:00`);
      const tEnd   = new Date(`${slot.date}T${slot.timeEnd}:00`);
      const inRange = orders.filter(o => {
        const t = new Date(o.created_at.slice(0,19)); // strip tz — already -06:00
        return t >= tStart && t < tEnd;
      });
      const gmv    = Math.round(inRange.reduce((s,o)=>s+parseFloat(o.total_price),0)*100)/100;
      const n      = inRange.length;
      if(slot.gmv !== gmv || slot.orders !== n){
        slot.gmv    = gmv;
        slot.orders = n;
        changed = true;
      }
    });

    if(changed){
      STATE.lastModified = Date.now();
      localStorage.setItem("bdg_horarios_v2", JSON.stringify(STATE));
      _pushToFirebase();
    }
    // Re-render si el tab sigue abierto
    if(currentAdminTab === "historial") renderAdminHistorial();
    if(currentAdminTab === "resumen")   renderAdminResumen();
  } catch(e){
    console.warn("loadLiveGMV error:", e);
  } finally {
    _gmvSyncing = false;
    const ind2 = document.getElementById("gmvLiveInd");
    if(ind2) ind2.style.display="none";
  }
}
function getPastSlots(){
  const now   = new Date();
  const today = now.toISOString().slice(0,10);
  const hhmm  = now.toTimeString().slice(0,5);
  // Incluye semana actual: días pasados + sesiones de hoy que ya terminaron
  return STATE.slots
    .filter(s => s.date < today || (s.date === today && s.timeEnd <= hhmm))
    .sort((a,b) => b.date.localeCompare(a.date) || b.timeStart.localeCompare(a.timeStart));
}

  return `<div class="hist-kpis">
    <div class="hist-kpi"><div class="hist-kpi-label">GMV Total <span id="gmvLiveInd" style="display:none;font-size:9px;letter-spacing:.1em;color:var(--muted);animation:inv-spin 1.2s linear infinite;display:none;">↻</span></div><div class="hist-kpi-val accent">${totalGmv>0?fmtGMV(totalGmv):"—"}</div></div>
    <div class="hist-kpi"><div class="hist-kpi-label">Promedio / sesión</div><div class="hist-kpi-val">${avgGmv>0?fmtGMV(avgGmv):"—"}</div></div>
    <div class="hist-kpi"><div class="hist-kpi-label">Sesiones</div><div class="hist-kpi-val">${past.length}</div></div>

function subtabsHtml(){
  const views = [
    {id:"semanas",     label:"Por semana"},
    {id:"anfitrionas", label:"🎙️ Anfitrionas"},
    {id:"backend",     label:"💻 Backend"},
    {id:"duplas",      label:"🤝 Mejores Duplas"},
  ];
  return `<div class="hist-subtabs">${views.map(v=>
    `<button class="hist-subtab${historialView===v.id?" active":""}" onclick="historialView='${v.id}';renderAdminHistorial()">${v.label}</button>`
  ).join("")}</div>`;
