<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>BDG · PDH Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;900&family=Jost:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F4F2EF;
  --surface:#FFFFFF;
  --border:#E4E0DB;
  --border2:#EDEAE6;
  --text:#0E0E0E;
  --muted:#8A857F;
  --muted2:#C2BCB6;
  --terra:#c16452;
  --terra-light:#fdf0ed;
  --terra-dark:#9d4f3f;
  --green-bg:#EBF5EE;--green-txt:#1B6E3E;
  --amber-bg:#FFF8E6;--amber-txt:#B75000;
  --red-bg:#FDECEA;--red-txt:#C62828;
  --zero-bg:#EBEBEB;--zero-txt:#9A9590;
  --blue:#3a7bd5;
  --fn:'Archivo',sans-serif;
  --fl:'Jost',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fn);overflow:hidden;}
body{display:flex;flex-direction:column;}

/* ── TOPBAR ── */
.topbar{
  height:48px;background:#0E0E0E;
  display:flex;align-items:center;padding:0 20px;
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0;gap:12px;
}
.logo{font-family:var(--fl);font-size:14px;font-weight:700;color:#fff;letter-spacing:.18em;}
.logo span{color:var(--terra);}
.topbar-divider{width:1px;height:20px;background:rgba(255,255,255,.12);flex-shrink:0;}
.topbar-sub{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.32);}
.tp-date{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:.06em;margin-left:4px;}
.topbar-right{margin-left:auto;}
.btn-back{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.28);text-decoration:none;transition:color .12s;}
.btn-back:hover{color:var(--terra);}

/* ── CONTROLS ── */
.controls{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--surface);
  overflow-x:auto;scrollbar-width:none;
}
.controls::-webkit-scrollbar{display:none;}
.ctrl-label{font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);white-space:nowrap;flex-shrink:0;}
.ctrl-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 4px;}
.seg{display:flex;gap:4px;flex-shrink:0;}
.seg-btn{
  padding:5px 13px;border:1px solid var(--border);
  border-radius:999px;background:var(--surface);
  font-family:var(--fn);font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;white-space:nowrap;
  transition:all .14s;
}
.seg-btn:hover{border-color:var(--terra);color:var(--terra-dark);}
.seg-btn.active{background:var(--terra);color:#fff;border-color:var(--terra);}

/* ── KPI STRIP ── */
.kpi-strip{
  display:flex;gap:1px;background:var(--border);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.kpi-cell{flex:1;padding:12px 16px;background:var(--surface);}
.kpi-lbl{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:4px;}
.kpi-val{font-size:20px;font-weight:900;letter-spacing:-.03em;line-height:1;color:var(--text);}
.kpi-val.hi{color:var(--terra);}
.kpi-val.good{color:var(--green-txt);}
.kpi-val.warn{color:var(--amber-txt);}
.kpi-val.alert{color:var(--red-txt);}
.kpi-sub{font-size:8px;color:var(--muted2);margin-top:3px;}

/* ── TABLE WRAP ── */
.table-wrap{flex:1;overflow:auto;position:relative;}
table{width:100%;border-collapse:collapse;min-width:860px;}
thead th{
  position:sticky;top:0;z-index:10;
  background:#0E0E0E;
  font-family:var(--fn);font-size:8px;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:rgba(255,255,255,.5);
  padding:10px 10px;border-bottom:none;white-space:nowrap;text-align:center;
}
thead th:first-child{text-align:left;position:sticky;left:0;z-index:20;background:#0E0E0E;padding-left:16px;}
thead th.th-total{color:rgba(255,255,255,.7);background:#1a1a1a;}
thead th.th-bodega{color:var(--terra);background:#1a1a1a;}

/* Model rows */
tr.model-row{cursor:pointer;transition:background .1s;}
tr.model-row:hover{background:#FAFAF9;}
tr.model-row td{padding:8px 10px;border-bottom:1px solid var(--border2);}
tr.model-row td:first-child{position:sticky;left:0;background:var(--surface);z-index:5;padding-left:16px;}
tr.model-row:hover td:first-child{background:#FAFAF9;}

/* Product image */
.prod-thumb{width:38px;height:38px;border-radius:5px;object-fit:cover;background:var(--bg);flex-shrink:0;border:1px solid var(--border2);}
.prod-thumb-ph{width:38px;height:38px;border-radius:5px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid var(--border2);}

/* Size sub-rows */
tr.size-row{display:none;}
tr.size-row.open{display:table-row;}
tr.size-row td{padding:6px 10px;border-bottom:1px solid var(--border2);background:#FAFAF9;}
tr.size-row td:first-child{position:sticky;left:0;background:#F4F2EF;z-index:5;padding-left:16px;}

/* Cells */
.model-name{font-size:11px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;}
.chevron{font-size:8px;color:var(--muted2);transition:transform .15s;flex-shrink:0;}
.chevron.open{transform:rotate(90deg);}
.cat-badge{font-size:7px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.08em;flex-shrink:0;}
.cat-A{background:var(--terra-light);color:var(--terra-dark);}
.cat-B{background:#EEF4FF;color:#2a5cbf;}
.cat-C{background:var(--zero-bg);color:var(--muted);}

.sz-lbl{font-size:9px;font-weight:700;color:var(--muted);padding-left:28px;}

/* Inventory cells */
.inv-cell{text-align:center;font-size:12px;font-weight:800;letter-spacing:-.02em;line-height:1;}
.inv-cell.sz{font-size:11px;}

/* Stock color tiers */
.c0{color:var(--zero-txt);}
.c1{color:var(--red-txt);}
.c2{color:var(--amber-txt);}
.c3{color:#2a7a4a;}
.c4{color:var(--green-txt);}

/* Restock tiers */
.r0{color:var(--muted2);}
.r1{color:#5b8de8;}
.r2{color:var(--blue);}
.r3{color:#2a5cbf;font-weight:900;}

/* Total col */
td.td-total{text-align:center;background:#F8F7F5;}
td.td-bodega{text-align:center;background:var(--terra-light);}
.bodega-val{font-size:12px;font-weight:800;color:var(--terra-dark);}
.bodega-val.zero{color:var(--muted2);}
.faltante-lbl{font-size:7px;color:var(--red-txt);font-weight:700;}
.sobrante-lbl{font-size:7px;color:var(--green-txt);font-weight:700;}

/* Store header accent colors */
.th-ec {border-top:2px solid #5b9cf6;}
.th-len{border-top:2px solid #3ecf8e;}
.th-coy{border-top:2px solid #c8943a;}
.th-pol{border-top:2px solid var(--terra);}
.th-sat{border-top:2px solid #8b5cf6;}
.th-gdl{border-top:2px solid #e05252;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px;}

/* ── APARADORES ── */
.apr-wrap{flex:1;overflow:auto;display:none;padding:16px;gap:10px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));align-items:start;background:var(--bg);}
.apr-wrap.show{display:grid;}
.apr-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.apr-body{max-height:420px;overflow-y:auto;padding:8px;}
.apr-header{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:var(--surface);
}
.apr-store-name{font-size:12px;font-weight:700;letter-spacing:.02em;color:var(--text);}
.apr-store-total{font-size:9px;color:var(--muted);letter-spacing:.04em;}
.apr-model{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;transition:background .1s;}
.apr-model:hover{background:var(--bg);}
.apr-thumb{width:34px;height:34px;border-radius:4px;object-fit:cover;background:var(--bg);flex-shrink:0;border:1px solid var(--border2);}
.apr-thumb-ph{width:34px;height:34px;border-radius:4px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.apr-model-info{flex:1;min-width:0;}
.apr-model-name{font-size:9px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;letter-spacing:.02em;}
.apr-sizes{display:flex;gap:3px;flex-wrap:wrap;}
.apr-sz{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;line-height:1.3;}
.apr-sz.c0{background:var(--zero-bg);color:var(--zero-txt);}
.apr-sz.c1{background:var(--red-bg);color:var(--red-txt);}
.apr-sz.c2{background:var(--amber-bg);color:var(--amber-txt);}
.apr-sz.c3{background:var(--green-bg);color:#2a7a4a;}
.apr-sz.c4{background:var(--green-bg);color:var(--green-txt);}
.apr-no-stock{font-size:8px;color:var(--muted2);padding:10px;text-align:center;}

/* Aparador store accent */
.apr-card[data-store="CE"]  .apr-header{border-top:3px solid #5b9cf6;}
.apr-card[data-store="LEN"] .apr-header{border-top:3px solid #3ecf8e;}
.apr-card[data-store="COY"] .apr-header{border-top:3px solid #c8943a;}
.apr-card[data-store="POL"] .apr-header{border-top:3px solid var(--terra);}
.apr-card[data-store="SAT"] .apr-header{border-top:3px solid #8b5cf6;}
.apr-card[data-store="GDL"] .apr-header{border-top:3px solid #e05252;}

/* hidden */
.hidden{display:none!important;}
</style>
</head>

// ── State ─────────────────────────────────────────────────────────────────────
function setMode(m) {
  _mode = m;
  document.querySelectorAll('#modeSeg .seg-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  const isApr = m === 'apr';
  document.getElementById('aprWrap').classList.toggle('show', isApr);
  document.getElementById('tableWrap').style.display = isApr ? 'none' : '';
  render();
}
function setCat(c) {
  _cat = c;
  document.querySelectorAll('#catSeg .seg-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === c));
  render();
}

// ── Color helpers ─────────────────────────────────────────────────────────────
function invClass(v) {
  if (v <= 0)  return 'c0';
  if (v === 1) return 'c1';
  if (v <= 3)  return 'c2';
  if (v <= 6)  return 'c3';
  return 'c4';
}
function rstClass(v) {
  if (!v || v <= 0) return 'r0';
  if (v <= 2)       return 'r1';
  if (v <= 5)       return 'r2';
  return 'r3';
}
function vtaClass(v) {
  if (!v || v <= 0)  return 'c0';
  if (v <= 5)        return 'c2';
  if (v <= 15)       return 'c3';
  return 'c4';
}

}

// ── KPI Strip ─────────────────────────────────────────────────────────────────
function renderKPIs(models) {
  const totalInv  = models.reduce((s, [, d]) => s + Object.values(d.tallas).reduce((a, t) => a + t.ti, 0), 0);
  const totalRst  = models.reduce((s, [, d]) => s + Object.values(d.tallas).reduce((a, t) => a + t.tr, 0), 0);
  const totalVta  = models.reduce((s, [, d]) => s + Object.values(d.tallas).reduce((a, t) => a + t.tv, 0), 0);
  const totalFalt = models.reduce((s, [, d]) => s + Object.values(d.tallas).reduce((a, t) => a + (t.fa < 0 ? t.fa : 0), 0), 0);

  document.getElementById('kpiStrip').innerHTML = `
    <div class="kpi-cell">
      <div class="kpi-lbl">Modelos</div>
      <div class="kpi-val hi">${models.length}</div>
      <div class="kpi-sub">${_cat === 'ALL' ? '17 total' : 'Cat. '+_cat}</div>
    </div>
    <div class="kpi-cell">
      <div class="kpi-lbl">Inv. Total PDH</div>
      <div class="kpi-val">${totalInv}</div>
      <div class="kpi-sub">pares en tiendas</div>
    </div>
    <div class="kpi-cell">
      <div class="kpi-lbl">Restock Propuesto</div>
      <div class="kpi-val warn">${totalRst}</div>
      <div class="kpi-sub">pares pendientes</div>
    </div>
    <div class="kpi-cell">
      <div class="kpi-lbl">Ventas Acum.</div>
      <div class="kpi-val good">${totalVta}</div>
      <div class="kpi-sub">pares vendidos</div>
    </div>
    <div class="kpi-cell">
      <div class="kpi-lbl">Faltante Total</div>
      <div class="kpi-val alert">${Math.abs(totalFalt)}</div>
      <div class="kpi-sub">pares sin cubrir</div>
    </div>`;
}

// ── Aparadores render ─────────────────────────────────────────────────────────

  const wrap = document.getElementById('aprWrap');
  wrap.innerHTML = '';

  for (const st of STORES) {
    // For each store, gather models that have inventory there
    const storeModels = models.map(([name, d]) => {
      const sizes = SIZES.map(t => ({ t, inv: d.tallas[t]?.s[st.inv] || 0 }));
      const totalInv = sizes.reduce((s, x) => s + x.inv, 0);
      return { name, d, sizes, totalInv };

    const card = document.createElement('div');

    card.dataset.store = st.key;

    const modelsHtml = storeModels.length === 0
      ? `<div class="apr-no-stock">Sin inventario</div>`

            `<span class="apr-sz ${invClass(inv)}" title="T${t}: ${inv} par${inv !== 1 ? 'es' : ''}">T${t} <b>${inv}</b></span>`
          ).join('');
          return `<div class="apr-model">
            ${imgEl}
            <div class="apr-model-info">
              <div class="apr-model-name">${name}</div>
              <div class="apr-sizes">${szBadges}</div>
            </div>
          </div>`;
        }).join('');

    card.innerHTML = `
      <div class="apr-header">
        <div class="apr-store-name">${st.label}</div>
        <div class="apr-store-total">${storeModels.length} modelos · ${totalPares} pares</div>
      </div>
      <div class="apr-body">${modelsHtml}</div>`;

    wrap.appendChild(card);
  }
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const models = Object.entries(DATA).filter(([, d]) => _cat === 'ALL' || d.cat === _cat);
  renderKPIs(models);

  if (_mode === 'apr') { renderAparadores(models); return; }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  for (const [name, d] of models) {
    const isOpen = _open.has(name);

    // Aggregate values per store
    const storeVals = STORES.map(st => {
      const inv = SIZES.reduce((s, t) => s + (d.tallas[t]?.s[st.inv] || 0), 0);
      const rst = SIZES.reduce((s, t) => s + (d.tallas[t]?.s[st.rst] || 0), 0);
      const tv  = SIZES.reduce((s, t) => s + (d.tallas[t]?.tv || 0), 0); // only in total
      return {inv, rst};
    });

    const totalInv = SIZES.reduce((s, t) => s + (d.tallas[t]?.ti || 0), 0);
    const totalRst = SIZES.reduce((s, t) => s + (d.tallas[t]?.tr || 0), 0);
    const totalVta = SIZES.reduce((s, t) => s + (d.tallas[t]?.tv || 0), 0);
    const bodega   = SIZES.reduce((s, t) => s + (d.tallas[t]?.bo || 0), 0);
    const faltante = SIZES.reduce((s, t) => s + (d.tallas[t]?.fa || 0), 0);

    const storeCells = storeVals.map(sv => {
      if (_mode === 'inv') {
        return `<td class="inv-cell"><span class="${invClass(sv.inv)}">${sv.inv}</span></td>`;
      } else if (_mode === 'rst') {
        return `<td class="inv-cell"><span class="${rstClass(sv.rst)}">${sv.rst > 0 ? sv.rst : '—'}</span></td>`;
      } else {
        // ventas: we only have per-model total, not per-store — show dash
        return `<td class="inv-cell"><span class="c0">—</span></td>`;
      }
    }).join('');

    const totalCell = _mode === 'inv'
      ? `<span class="${invClass(totalInv)}">${totalInv}</span>`
      : _mode === 'rst'
        ? `<span class="${rstClass(totalRst)}">${totalRst > 0 ? totalRst : '—'}</span>`
        : `<span class="${vtaClass(totalVta)}">${totalVta}</span>`;

    const faltEl = faltante < 0
      ? `<div class="faltante-lbl">${faltante} falt.</div>`
      : faltante > 0
        ? `<div class="sobrante-lbl">+${faltante}</div>`
        : '';

    // Model row
    const imgUrl = IMAGES[name] || null;
    const imgEl  = imgUrl
      ? `<img class="prod-thumb" src="${imgUrl}" loading="lazy" crossorigin="anonymous" onerror="this.style.display='none'"/>`
      : `<div class="prod-thumb-ph">👟</div>`;

    const mRow = document.createElement('tr');
    mRow.className = 'model-row';
    mRow.dataset.model = name;
    mRow.innerHTML = `
      <td>
        <div class="model-name">
          <span class="chevron ${isOpen ? 'open' : ''}">▶</span>
          ${imgEl}
          <span class="cat-badge cat-${d.cat}">${d.cat}</span>
          ${name}
        </div>
      </td>
      ${storeCells}
      <td class="inv-cell td-total">${totalCell}</td>
      <td class="td-bodega">
        <div class="bodega-val ${bodega === 0 ? 'zero' : ''}">${bodega}</div>
        ${faltEl}
      </td>`;
    mRow.addEventListener('click', () => toggleRow(name));
    tbody.appendChild(mRow);

    // Size rows
    for (const t of SIZES) {
      const td = d.tallas[t];
      if (!td) continue;

      const szStoreCells = STORES.map(st => {
        const inv = td.s[st.inv] || 0;
        const rst = td.s[st.rst] || 0;
        if (_mode === 'inv') {
          return `<td class="inv-cell sz"><span class="${invClass(inv)}">${inv}</span></td>`;
        } else if (_mode === 'rst') {
          return `<td class="inv-cell sz"><span class="${rstClass(rst)}">${rst > 0 ? rst : '—'}</span></td>`;
        } else {
          return `<td class="inv-cell sz"><span class="c0">—</span></td>`;
        }
      }).join('');

      const szTotal = _mode === 'inv'
        ? `<span class="${invClass(td.ti)}">${td.ti}</span>`
        : _mode === 'rst'
          ? `<span class="${rstClass(td.tr)}">${td.tr > 0 ? td.tr : '—'}</span>`
          : `<span class="${vtaClass(td.tv)}">${td.tv}</span>`;

      const szFalt = td.fa < 0
        ? `<div class="faltante-lbl">${td.fa}</div>`
        : td.fa > 0 ? `<div class="sobrante-lbl">+${td.fa}</div>` : '';

      const szRow = document.createElement('tr');
      szRow.className = `size-row ${isOpen ? 'open' : ''}`;
      szRow.dataset.model = name;
      szRow.innerHTML = `
        <td><div class="sz-lbl">T${t}</div></td>
        ${szStoreCells}
        <td class="inv-cell sz td-total">${szTotal}</td>
        <td class="td-bodega">
          <div class="bodega-val ${td.bo === 0 ? 'zero' : ''}" style="font-size:11px;">${td.bo}</div>
          ${szFalt}
        </td>`;
      tbody.appendChild(szRow);
    }
  }
}

function toggleRow(name) {
  if (_open.has(name)) {
    _open.delete(name);
  } else {
    _open.add(name);
  }
  // Update chevron + size rows without full re-render
  document.querySelectorAll(`[data-model="${CSS.escape(name)}"]`).forEach(el => {
    if (el.classList.contains('model-row')) {
      el.querySelector('.chevron').classList.toggle('open', _open.has(name));
    } else {
      el.classList.toggle('open', _open.has(name));
    }
  });
}

render();
</script>
</body>
</html>
