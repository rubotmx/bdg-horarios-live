<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>BDG · PDH Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080808;--s1:#0f0f0f;--s2:#141414;--s3:#1c1c1c;
  --line:rgba(255,255,255,.07);--muted:rgba(255,255,255,.22);--sub:rgba(255,255,255,.5);
  --terra:#c16452;--green:#3ecf8e;--yellow:#f5c518;--blue:#5b9cf6;--red:#f26b6b;--purple:#a78bfa;
  --f:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:#e8e4de;font-family:var(--f);overflow:hidden;}
body{display:flex;flex-direction:column;}

/* ── TOPBAR ── */
.topbar{height:44px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0;gap:12px;}
.tp-left{display:flex;align-items:center;gap:10px;}
.tp-tag{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:2px 8px;border:1px solid var(--line);border-radius:3px;}
.tp-date{font-size:9px;color:var(--muted);}
.btn-back{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .12s;}
.btn-back:hover{color:#fff;}

/* ── CONTROLS ── */
.controls{height:40px;padding:0 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--s1);}
.seg{display:flex;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:5px;overflow:hidden;}
.seg-btn{padding:4px 12px;font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .12s;border:none;background:transparent;font-family:var(--f);}
.seg-btn.active{background:rgba(255,255,255,.1);color:#e8e4de;}
.ctrl-sep{width:1px;height:20px;background:var(--line);flex-shrink:0;}
.ctrl-label{font-size:8px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}

/* ── KPI STRIP ── */
.kpi-strip{display:flex;border-bottom:1px solid var(--line);flex-shrink:0;}
.kpi-cell{flex:1;padding:10px 16px;border-right:1px solid var(--line);}
.kpi-cell:last-child{border-right:none;}
.kpi-lbl{font-size:6.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px;}
.kpi-val{font-size:16px;font-weight:900;letter-spacing:-.03em;line-height:1;}
.kpi-sub{font-size:8px;color:var(--muted);margin-top:2px;}

/* ── TABLE WRAP ── */
.table-wrap{flex:1;overflow:auto;position:relative;}
table{width:100%;border-collapse:collapse;min-width:860px;}
thead th{position:sticky;top:0;z-index:10;background:var(--s2);font-size:7.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--line);white-space:nowrap;text-align:center;}
thead th:first-child{text-align:left;position:sticky;left:0;z-index:20;background:var(--s2);}
thead th.th-total{color:var(--sub);background:rgba(255,255,255,.03);}
thead th.th-bodega{color:var(--terra);background:rgba(193,100,82,.06);}

/* Model rows */
tr.model-row{cursor:pointer;transition:background .1s;}
tr.model-row:hover{background:rgba(255,255,255,.025);}
tr.model-row td{padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);}
tr.model-row td:first-child{position:sticky;left:0;background:var(--bg);z-index:5;}
tr.model-row:hover td:first-child{background:#0d0d0d;}

/* Size sub-rows */
tr.size-row{display:none;}
tr.size-row.open{display:table-row;}
tr.size-row td{padding:5px 10px;border-bottom:1px solid rgba(255,255,255,.025);background:rgba(255,255,255,.015);}
tr.size-row td:first-child{position:sticky;left:0;background:rgba(20,20,20,1);z-index:5;}

/* Cells */
.model-name{font-size:11px;font-weight:700;color:#e8e4de;display:flex;align-items:center;gap:7px;}
.chevron{font-size:8px;color:var(--muted);transition:transform .15s;flex-shrink:0;}
.chevron.open{transform:rotate(90deg);}
.cat-badge{font-size:7px;font-weight:800;padding:1px 5px;border-radius:3px;letter-spacing:.08em;flex-shrink:0;}
.cat-A{background:rgba(245,197,24,.12);color:var(--yellow);}
.cat-B{background:rgba(91,156,246,.12);color:var(--blue);}
.cat-C{background:rgba(167,139,250,.12);color:var(--purple);}

.sz-lbl{font-size:9px;font-weight:700;color:var(--muted);padding-left:22px;}

/* Inventory cells */
.inv-cell{text-align:center;font-size:12px;font-weight:800;letter-spacing:-.02em;line-height:1;}
.inv-cell.sz{font-size:11px;}
.inv-cell .restock-pill{display:block;font-size:6.5px;font-weight:700;color:var(--blue);margin-top:1px;letter-spacing:.05em;}

/* Color tiers for inv_disp */
.c0{color:rgba(242,107,107,.6);}
.c1{color:var(--yellow);}
.c2{color:rgba(255,255,255,.45);}
.c3{color:rgba(62,207,142,.6);}
.c4{color:var(--green);}

/* Color tiers for restock */
.r0{color:rgba(255,255,255,.15);}
.r1{color:rgba(91,156,246,.7);}
.r2{color:var(--blue);}
.r3{color:#7db8ff;font-size:14px;}

/* Total col */
td.td-total{text-align:center;background:rgba(255,255,255,.02);}
td.td-bodega{text-align:center;background:rgba(193,100,82,.04);}
.bodega-val{font-size:12px;font-weight:800;color:var(--terra);}
.bodega-val.zero{color:rgba(255,255,255,.15);}
.faltante-lbl{font-size:7px;color:var(--red);font-weight:700;}
.sobrante-lbl{font-size:7px;color:var(--green);font-weight:700;}

/* Store header colors */
.th-ec{border-top:2px solid rgba(91,156,246,.35);}
.th-len{border-top:2px solid rgba(62,207,142,.35);}
.th-coy{border-top:2px solid rgba(245,197,24,.35);}
.th-pol{border-top:2px solid rgba(193,100,82,.35);}
.th-sat{border-top:2px solid rgba(167,139,250,.35);}
.th-gdl{border-top:2px solid rgba(242,107,107,.35);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px;}

/* hidden */
.hidden{display:none!important;}
</style>
</head>

0]},"25":{"tv":4,"ti":12,"tr":6,"bo":0,"fa":0,"s":[3,0,0,3,0,0,3,0,3,0,0,3,3,0]},"26":{"tv":2,"ti":13,"tr":5,"bo":0,"fa":0,"s":[3,0,0,3,0,0,2,1,2,1,3,0,3,0]},"27":{"tv":3,"ti":12,"tr":6,"bo":0,"fa":0,"s":[3,0,0,3,0,0,3,0,2,1,2,1,2,1]}}},"Penny Black Suede":{"sku":"BDGPENBLA","cat":"C","tallas":{"23":{"tv":1,"ti":14,"tr":4,"bo":0,"fa":0,"s":[3,0,0,3,0,0,3,0,3,0,2,1,3,0]},"24":{"tv":5,"ti":10,"tr":8,"bo":0,"fa":0,"s":[3,0,0,3,0,0,3,0,1,2,0,3,3,0]},"25":{"tv":4,"ti":12,"tr":6,"bo":0,"fa":0,"s":[3,0,0,3,0,0,3,0,1,2,2,1,3,0]},"26":{"tv":0,"ti":15,"tr":3,"bo":0,"fa":0,"s":[3,0,0,3,0,0,3,0,3,0,3,0,3,0]},"27":{"tv":1,"ti":14,"tr":4,"bo":0,"fa":0,"s":[3,0,0,3,0,0,3,0,3,0,3,0,2,1]}}},"Penny Brown":{"sku":"BDGPENBR23MX","cat":"C","tallas":{"23":{"tv":1,"ti":14,"tr":4,"bo":0,"fa":0,"s":[2,1,0,3,0,0,3,0,3,0,3,0,3,0]},"24":{"tv":5,"ti":10,"tr":8,"bo":0,"fa":0,"s":[3,0,0,3,0,0,2,1,0,3,2,1,3,0]},"25":{"tv":5,"ti":9,"tr":9,"bo":0,"fa":0,"s":[0,3,0,3,0,0,2,1,2,1,2,1,3,0]},"26":{"tv":5,"ti":10,"tr":8,"bo":0,"fa":0,"s":[2,1,0,3,0,0,2,1,1,2,3,0,2,1]},"27":{"tv":4,"ti":12,"tr":6,"bo":0,"fa":0,"s":[2,1,0,3,0,0,3,0,1,2,3,0,3,0]}}},"Penny Taupe":{"sku":"BDGPENTAU23MX","cat":"C","tallas":{"23":{"tv":2,"ti":13,"tr":5,"bo":0,"fa":0,"s":[2,1,0,3,0,0,3,0,3,0,2,1,3,0]},"24":{"tv":5,"ti":12,"tr":6,"bo":0,"fa":0,"s":[3,0,0,3,0,0,3,0,1,2,2,1,3,0]},"25":{"tv":4,"ti":10,"tr":8,"bo":0,"fa":0,"s":[2,1,0,3,0,0,1,2,3,0,2,1,2,1]},"26":{"tv":2,"ti":12,"tr":6,"bo":0,"fa":0,"s":[2,1,0,3,0,0,2,1,2,1,3,0,3,0]},"27":{"tv":2,"ti":13,"tr":5,"bo":0,"fa":0,"s":[3,0,0,3,0,0,3,0,2,1,3,0,2,1]}}}};

// s indices: CE[0,1] LEN[2,3] MTY[4,5] COY[6,7] POL[8,9] SAT[10,11] GDL[12,13]
const STORES = [
  {key:'CE',  label:'EC',         inv:0, rst:1, vtaKey:'cedis_ecommerce'},
  {key:'LEN', label:'León',       inv:2, rst:3},
  {key:'COY', label:'Coyoacán',   inv:6, rst:7},
  {key:'POL', label:'Polanco',    inv:8, rst:9},
  {key:'SAT', label:'Satélite',   inv:10,rst:11},
  {key:'GDL', label:'Guadalajara',inv:12,rst:13},
];
const SIZES = [23,24,25,26,27];

let _mode = 'inv'; // inv | rst | vta
let _cat  = 'ALL';
let _open = new Set();

// ── State ─────────────────────────────────────────────────────────────────────
function setMode(m) {
  _mode = m;
  document.querySelectorAll('#modeSeg .seg-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  render();
}
function setCat(c) {
  _cat = c;
  document.querySelectorAll('#catSeg .seg-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === c));
  render();
}

// ── Color helpers ─────────────────────────────────────────────────────────────
function invClass(v) {
  if (v <= 0)  return 'c0';
  if (v === 1) return 'c1';
  if (v <= 3)  return 'c2';
  if (v <= 6)  return 'c3';
  return 'c4';
}
function rstClass(v) {
  if (!v || v <= 0) return 'r0';
  if (v <= 2)       return 'r1';
  if (v <= 5)       return 'r2';
  return 'r3';
}
function vtaClass(v) {
  if (!v || v <= 0)  return 'c0';
  if (v <= 5)        return 'c2';
  if (v <= 15)       return 'c3';
  return 'c4';
}

// ── Per-store value aggregated across all sizes ───────────────────────────────
function storeAgg(modelData, storeIdx, isInv) {
  return SIZES.reduce((s, t) => s + (modelData.tallas[t]?.s[storeIdx] || 0), 0);
}
function storeVta(modelData, storeIdx) {
  // ventas_acum from total (approximation — we don't have per-store ventas split in compact data)
  // We'll show total ventas in "total" col; per-store ventas not stored in compact form
  return null;
}

// ── KPI Strip ─────────────────────────────────────────────────────────────────
function renderKPIs(models) {
  const totalInv  = models.reduce((s, [, d]) => s + Object.values(d.tallas).reduce((a, t) => a + t.ti, 0), 0);
  const totalRst  = models.reduce((s, [, d]) => s + Object.values(d.tallas).reduce((a, t) => a + t.tr, 0), 0);
  const totalVta  = models.reduce((s, [, d]) => s + Object.values(d.tallas).reduce((a, t) => a + t.tv, 0), 0);
  const totalFalt = models.reduce((s, [, d]) => s + Object.values(d.tallas).reduce((a, t) => a + (t.fa < 0 ? t.fa : 0), 0), 0);

  document.getElementById('kpiStrip').innerHTML = `
    <div class="kpi-cell">
      <div class="kpi-lbl">Modelos</div>
      <div class="kpi-val">${models.length}</div>
      <div class="kpi-sub">${_cat === 'ALL' ? '17 total' : 'Cat. '+_cat}</div>
    </div>
    <div class="kpi-cell">
      <div class="kpi-lbl">Inv. Total PDH</div>
      <div class="kpi-val" style="color:var(--blue)">${totalInv}</div>
      <div class="kpi-sub">pares en tiendas</div>
    </div>
    <div class="kpi-cell">
      <div class="kpi-lbl">Restock Propuesto</div>
      <div class="kpi-val" style="color:var(--yellow)">${totalRst}</div>
      <div class="kpi-sub">pares pendientes</div>
    </div>
    <div class="kpi-cell">
      <div class="kpi-lbl">Ventas Acum.</div>
      <div class="kpi-val" style="color:var(--green)">${totalVta}</div>
      <div class="kpi-sub">pares vendidos</div>
    </div>
    <div class="kpi-cell">
      <div class="kpi-lbl">Faltante Total</div>
      <div class="kpi-val" style="color:var(--red)">${Math.abs(totalFalt)}</div>
      <div class="kpi-sub">pares sin cubrir</div>
    </div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const models = Object.entries(DATA).filter(([, d]) => _cat === 'ALL' || d.cat === _cat);
  renderKPIs(models);

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  for (const [name, d] of models) {
    const isOpen = _open.has(name);

    // Aggregate values per store
    const storeVals = STORES.map(st => {
      const inv = SIZES.reduce((s, t) => s + (d.tallas[t]?.s[st.inv] || 0), 0);
      const rst = SIZES.reduce((s, t) => s + (d.tallas[t]?.s[st.rst] || 0), 0);
      const tv  = SIZES.reduce((s, t) => s + (d.tallas[t]?.tv || 0), 0); // only in total
      return {inv, rst};
    });

    const totalInv = SIZES.reduce((s, t) => s + (d.tallas[t]?.ti || 0), 0);
    const totalRst = SIZES.reduce((s, t) => s + (d.tallas[t]?.tr || 0), 0);
    const totalVta = SIZES.reduce((s, t) => s + (d.tallas[t]?.tv || 0), 0);
    const bodega   = SIZES.reduce((s, t) => s + (d.tallas[t]?.bo || 0), 0);
    const faltante = SIZES.reduce((s, t) => s + (d.tallas[t]?.fa || 0), 0);

    const storeCells = storeVals.map(sv => {
      if (_mode === 'inv') {
        return `<td class="inv-cell"><span class="${invClass(sv.inv)}">${sv.inv}</span></td>`;
      } else if (_mode === 'rst') {
        return `<td class="inv-cell"><span class="${rstClass(sv.rst)}">${sv.rst > 0 ? sv.rst : '—'}</span></td>`;
      } else {
        // ventas: we only have per-model total, not per-store — show dash
        return `<td class="inv-cell"><span class="c0">—</span></td>`;
      }
    }).join('');

    const totalCell = _mode === 'inv'
      ? `<span class="${invClass(totalInv)}">${totalInv}</span>`
      : _mode === 'rst'
        ? `<span class="${rstClass(totalRst)}">${totalRst > 0 ? totalRst : '—'}</span>`
        : `<span class="${vtaClass(totalVta)}">${totalVta}</span>`;

    const faltEl = faltante < 0
      ? `<div class="faltante-lbl">${faltante} falt.</div>`
      : faltante > 0
        ? `<div class="sobrante-lbl">+${faltante}</div>`
        : '';

    // Model row
    const mRow = document.createElement('tr');
    mRow.className = 'model-row';
    mRow.dataset.model = name;
    mRow.innerHTML = `
      <td>
        <div class="model-name">
          <span class="chevron ${isOpen ? 'open' : ''}">▶</span>
          <span class="cat-badge cat-${d.cat}">${d.cat}</span>
          ${name}
        </div>
      </td>
      ${storeCells}
      <td class="inv-cell td-total">${totalCell}</td>
      <td class="td-bodega">
        <div class="bodega-val ${bodega === 0 ? 'zero' : ''}">${bodega}</div>
        ${faltEl}
      </td>`;
    mRow.addEventListener('click', () => toggleRow(name));
    tbody.appendChild(mRow);

    // Size rows
    for (const t of SIZES) {
      const td = d.tallas[t];
      if (!td) continue;

      const szStoreCells = STORES.map(st => {
        const inv = td.s[st.inv] || 0;
        const rst = td.s[st.rst] || 0;
        if (_mode === 'inv') {
          const pill = rst > 0 ? `<span class="restock-pill">+${rst} rst</span>` : '';
          return `<td class="inv-cell sz"><span class="${invClass(inv)}">${inv}</span>${pill}</td>`;
        } else if (_mode === 'rst') {
          return `<td class="inv-cell sz"><span class="${rstClass(rst)}">${rst > 0 ? rst : '—'}</span></td>`;
        } else {
          return `<td class="inv-cell sz"><span class="c0">—</span></td>`;
        }
      }).join('');

      const szTotal = _mode === 'inv'
        ? `<span class="${invClass(td.ti)}">${td.ti}</span>`
        : _mode === 'rst'
          ? `<span class="${rstClass(td.tr)}">${td.tr > 0 ? td.tr : '—'}</span>`
          : `<span class="${vtaClass(td.tv)}">${td.tv}</span>`;

      const szFalt = td.fa < 0
        ? `<div class="faltante-lbl">${td.fa}</div>`
        : td.fa > 0 ? `<div class="sobrante-lbl">+${td.fa}</div>` : '';

      const szRow = document.createElement('tr');
      szRow.className = `size-row ${isOpen ? 'open' : ''}`;
      szRow.dataset.model = name;
      szRow.innerHTML = `
        <td><div class="sz-lbl">T${t}</div></td>
        ${szStoreCells}
        <td class="inv-cell sz td-total">${szTotal}</td>
        <td class="td-bodega">
          <div class="bodega-val ${td.bo === 0 ? 'zero' : ''}" style="font-size:11px;">${td.bo}</div>
          ${szFalt}
        </td>`;
      tbody.appendChild(szRow);
    }
  }
}

function toggleRow(name) {
  if (_open.has(name)) {
    _open.delete(name);
  } else {
    _open.add(name);
  }
  // Update chevron + size rows without full re-render
  document.querySelectorAll(`[data-model="${CSS.escape(name)}"]`).forEach(el => {
    if (el.classList.contains('model-row')) {
      el.querySelector('.chevron').classList.toggle('open', _open.has(name));
    } else {
      el.classList.toggle('open', _open.has(name));
    }
  });
}

render();
</script>
