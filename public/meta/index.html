<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="/favicon.ico"/>
<meta name="robots" content="noindex, nofollow"/>
<title>BDG · Meta</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&family=Jost:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--terra:#c16452;--dark:#171717;--dark2:#3a3a3a;--body-txt:#5c5c5c;--beige:#faf2e6;--cream:#ffffff;--line:#ddd8d0;--line2:#cbc5bc;--muted:#9a9590;--fn:'Archivo Narrow',sans-serif;--fh:'Archivo',sans-serif;--fl:'Jost',sans-serif;--r:3px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fn);background:var(--beige);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--dark);padding:0 32px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-logo{font-family:var(--fl);font-size:18px;font-weight:700;color:#fff;letter-spacing:.12em;}
.topbar-logo span{color:var(--terra);}
.back{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.45);font-family:var(--fh);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .12s;}
.back:hover{color:#fff;}
.main{flex:1;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:80px 40px;}
.eyebrow{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;font-family:var(--fh);}
.title{font-family:var(--fh);font-size:56px;font-weight:700;letter-spacing:-.03em;color:var(--dark);line-height:1;margin-bottom:16px;}
.desc{font-size:15px;color:var(--body-txt);line-height:1.6;max-width:380px;margin-bottom:32px;}
.badge{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border:1px solid var(--line2);background:var(--cream);font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-family:var(--fh);font-weight:600;color:var(--muted);border-radius:var(--r);}
.footer{padding:24px 40px;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-family:var(--fh);border-top:1px solid var(--line);}
@media(max-width:600px){.topbar{padding:0 20px;}.main{padding:48px 20px;}.title{font-size:36px;}.footer{padding:20px;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">BDG<span>·</span>HQ</div>
  <a class="back" href="/">← Volver al HQ</a>
</div>
<div class="main">
  <div class="eyebrow">Módulo 04 · Bala Di Gala</div>
  <div class="title">Meta</div>
  <div class="desc">Seguimiento de objetivos y metas del equipo. Progreso mensual y targets.</div>
  <div class="badge">⏳ &nbsp;Próximamente</div>
</div>
<div class="footer">© Bala Di Gala · Confidencial</div>
</body>
</html>
