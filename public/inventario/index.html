<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="/favicon.ico"/>
<meta name="robots" content="noindex, nofollow"/>
<title>BDG · Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;500;600;700&family=Archivo:wght@400;500;600;700;800;900&family=Jost:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --terra:#c16452;--dark:#171717;
  --beige:#f0ece6;--cream:#fff;--line:#e8e2da;--muted:#9a9590;
  --green:#3a9e6f;--red:#d94f3a;--orange:#e08240;
  --fn:'Archivo Narrow',sans-serif;--fh:'Archivo',sans-serif;--fl:'Jost',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fn);background:var(--beige);color:var(--dark);min-height:100vh;}

.topbar{background:var(--dark);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:var(--fl);font-size:17px;font-weight:700;color:#fff;letter-spacing:.12em;}
.topbar-logo span{color:var(--terra);}
.back{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:var(--fh);text-decoration:none;transition:color .12s;}
.back:hover{color:#fff;}

.page{max-width:1000px;margin:0 auto;padding:24px 20px 60px;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.tg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--cream);}
.tb{padding:6px 14px;font-family:var(--fh);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border:none;background:transparent;cursor:pointer;color:var(--muted);transition:all .12s;white-space:nowrap;}
.tb.active{background:var(--dark);color:#fff;}
.tb:not(:last-child){border-right:1px solid var(--line);}
.search-input{padding:6px 13px;border-radius:6px;border:1px solid var(--line);background:var(--cream);font-family:var(--fn);font-size:12px;color:var(--dark);outline:none;width:180px;transition:border-color .12s;}
.search-input:focus{border-color:var(--terra);}
.toolbar-meta{margin-left:auto;font-size:10px;color:var(--muted);font-family:var(--fn);}

/* CATEGORY CHIPS */
.cat-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;}
.cat-chip{padding:5px 14px;border-radius:20px;border:1px solid var(--line);background:var(--cream);font-family:var(--fh);font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;color:var(--dark);}
.cat-chip.active,.cat-chip:hover{background:var(--dark);color:#fff;border-color:var(--dark);}

/* SUMMARY CHIPS */
.summary-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.sum-chip{padding:10px 14px;border-radius:6px;background:var(--cream);border:1px solid var(--line);min-width:90px;}
.sum-chip .sv{font-family:var(--fh);font-size:22px;font-weight:900;color:var(--dark);line-height:1;}
.sum-chip .sl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-family:var(--fh);margin-top:2px;}
.sum-chip.hi .sv{color:var(--terra);}
.sum-chip.neg .sv{color:var(--red);}

/* ── CONSOLIDADO ─────────────────────────────────────────────────────── */
.consolidado-wrap{background:var(--cream);border-radius:10px;border:1px solid var(--line);overflow:hidden;margin-bottom:20px;}
.consolidado-header{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px;}
.consolidado-title{font-family:var(--fh);font-size:13px;font-weight:800;color:var(--dark);}
.consolidado-sub{font-size:10px;color:var(--muted);font-family:var(--fn);}
.size-consolidado{display:flex;flex-wrap:wrap;gap:8px;padding:16px 18px;}
.sc-cell{display:flex;flex-direction:column;align-items:center;min-width:60px;padding:10px 10px 8px;border-radius:6px;border:1px solid var(--line);background:#faf7f4;gap:2px;}
.sc-cell .scc-size{font-size:9px;font-family:var(--fh);font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;}
.sc-cell .scc-qty{font-size:24px;font-family:var(--fh);font-weight:900;color:var(--dark);line-height:1;}
.sc-cell .scc-prods{font-size:8px;color:var(--muted);font-family:var(--fn);}
.sc-cell.pos{border-color:rgba(58,158,111,.3);background:#f0faf5;}
.sc-cell.pos .scc-qty{color:var(--green);}
.sc-cell.neg-cell{border-color:rgba(217,79,58,.25);background:#fdf3f1;}
.sc-cell.neg-cell .scc-qty{color:var(--red);}
.sc-cell.zero .scc-qty{color:#ccc;}

/* ── PRODUCT LIST ────────────────────────────────────────────────────── */
.product-list{display:flex;flex-direction:column;gap:2px;}
.product-row{background:var(--cream);border-radius:8px;border:1px solid var(--line);overflow:hidden;transition:box-shadow .15s;}
.product-row:hover{box-shadow:0 2px 10px rgba(0,0,0,.07);}
.product-header{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;user-select:none;}
.product-thumb{width:40px;height:40px;border-radius:4px;object-fit:cover;background:#f0ece6;flex-shrink:0;}
.product-thumb-ph{width:40px;height:40px;border-radius:4px;background:#ede8e2;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.product-thumb-ph svg{opacity:.2;}
.product-name{font-family:var(--fh);font-size:13px;font-weight:800;color:var(--dark);flex:1;line-height:1.2;}
.product-cat-tag{font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-family:var(--fh);margin-top:1px;}
.product-total{font-family:var(--fh);font-size:20px;font-weight:900;min-width:40px;text-align:right;flex-shrink:0;}
.product-total.pst{color:var(--dark);}
.product-total.ngt{color:var(--red);}
.product-total.zro{color:var(--muted);}
.product-total.low{color:var(--orange);}
.chevron{font-size:9px;color:var(--muted);transition:transform .16s;flex-shrink:0;margin-left:2px;}
.product-row.open .chevron{transform:rotate(180deg);}

.size-grid-wrap{display:none;padding:0 16px 14px 68px;}
.product-row.open .size-grid-wrap{display:block;}
.size-grid{display:flex;flex-wrap:wrap;gap:5px;padding-top:2px;}
.sz-chip{display:flex;flex-direction:column;align-items:center;padding:5px 8px 4px;border-radius:5px;border:1px solid var(--line);background:#faf7f4;min-width:50px;gap:1px;}
.sz-chip .szl{font-size:9px;font-family:var(--fh);font-weight:700;color:var(--muted);letter-spacing:.06em;}
.sz-chip .szq{font-size:16px;font-family:var(--fh);font-weight:900;color:var(--dark);line-height:1;}
.sz-chip.pos{border-color:rgba(58,158,111,.3);background:#f0faf5;} .sz-chip.pos .szq{color:var(--green);}
.sz-chip.neg{border-color:rgba(217,79,58,.25);background:#fdf3f1;} .sz-chip.neg .szq{color:var(--red);}
.sz-chip.zro{opacity:.45;}
.sz-chip .szr{font-size:7.5px;color:var(--muted);font-family:var(--fn);}

/* Skeleton */
.sk{background:linear-gradient(90deg,#ede8e2 25%,#e4dfd8 50%,#ede8e2 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:600px){
  .topbar{padding:0 16px;} .page{padding:16px 12px 40px;}
  .size-grid-wrap{padding-left:16px;}
  .search-input{width:130px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">BDG<span>·</span>INVENTARIO</div>
  <a class="back" href="/">← HQ</a>
</div>

<div class="page">

  <div class="toolbar">
    <div class="tg">
      <button class="tb active" onclick="setMode('positive',this)">Sin negativos</button>
      <button class="tb" onclick="setMode('all',this)">Con negativos</button>
    </div>
    <div class="tg">
      <button class="tb active" id="btnList" onclick="setView('list',this)">Lista</button>
      <button class="tb" id="btnCons" onclick="setView('consolidado',this)">Consolidado</button>
    </div>
    <input class="search-input" id="searchInput" type="text" placeholder="Buscar..." oninput="render()"/>
    <span class="toolbar-meta" id="toolbarMeta"></span>
  </div>

  <div class="cat-bar" id="catBar"></div>
  <div class="summary-row" id="summaryRow"></div>
  <div id="consolidadoWrap" style="display:none;"></div>
  <div class="product-list" id="productList"></div>

</div>

<script>
let _products = [];
let _mode     = 'positive'; // 'positive' | 'all'
let _view     = 'list';     // 'list' | 'consolidado'
let _cat      = 'todos';    // 'todos' | 'botas' | 'calzado' | 'sneakers' | 'jackets' | 'complementos'

// ── CATEGORY DETECTION ───────────────────────────────────────────────────────
function getCategory(p){
  const t = (p.product_type || '').toLowerCase();
  const n = (p.title || '').toLowerCase();
  if(t.includes('bota') || n.includes('bota')) return 'botas';
  if((t.includes('piel') || t.includes('gamuza')) &&
     (t.includes('suela de cuero') || t.includes('suela pre') || t.includes('suela de caucho'))) return 'botas';
  if(t.includes('sintético') && t.includes('suela pre')) return 'botas';
  if(t.includes('calzado')) return 'calzado';
  if(t.includes('sneaker') || n.includes('sneaker')) return 'sneakers';
  if(t.includes('jacket') || n.includes('jacket')) return 'jackets';
  if(t.includes('complemento') || t.includes('necklace') || t.includes('tarjeta') || n.includes('necklace')) return 'complementos';
  return 'otro';
}

function effectiveQty(qty){ return _mode === 'positive' ? Math.max(0, qty) : qty; }

// Extract clean numeric size from option1 like "25 PRESALE" → "25", "23 LAST CHANCE" → "23"
function extractSize(option1){
  const s = String(option1 || '').trim();
  const m = s.match(/^(\d{2}(?:\.\d)?)/);
  return m ? m[1] : s;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  const skHtml = Array(8).fill(0).map(() => `
    <div style="background:#fff;border-radius:8px;border:1px solid #e8e2da;padding:11px 16px;display:flex;gap:12px;align-items:center;margin-bottom:2px;">
      <div class="sk" style="width:40px;height:40px;border-radius:4px;flex-shrink:0;"></div>
      <div style="flex:1;"><div class="sk" style="height:13px;width:55%;margin-bottom:6px;"></div><div class="sk" style="height:9px;width:30%;"></div></div>
      <div class="sk" style="width:32px;height:22px;border-radius:4px;"></div>
    </div>`).join('');
  document.getElementById('productList').innerHTML = skHtml;

  try {
    const res = await fetch('/api/shopify?mode=products');
    if (!res.ok) throw new Error(`Error ${res.status}`);
    const data = await res.json();
    _products = (data.products || []).filter(p => p.status === 'active');
    _products.sort((a, b) => a.title.localeCompare(b.title));
    buildCatBar();
    render();
  } catch (e) {
    document.getElementById('productList').innerHTML =
      `<div style="text-align:center;padding:60px 20px;color:#b85c4a;">
        <div style="font-size:24px;margin-bottom:12px;">⚠️</div>
        <div style="font-weight:700;margin-bottom:6px;">No se pudo cargar el inventario</div>
        <div style="font-size:12px;opacity:.6;">${e.message}</div>
        <button onclick="init()" style="margin-top:18px;padding:8px 20px;background:#c16452;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;">Reintentar</button>
      </div>`;
  }
}

function buildCatBar(){
  const cats = {};
  for(const p of _products){ const c = getCategory(p); cats[c] = (cats[c]||0)+1; }
  const order = ['todos','botas','calzado','sneakers','jackets','complementos','otro'];
  const labels = {todos:'Todos',botas:'Botas',calzado:'Calzado',sneakers:'Sneakers',jackets:'Jackets',complementos:'Complementos',otro:'Otro'};
  const bar = document.getElementById('catBar');
  const total = _products.length;
  bar.innerHTML = order
    .filter(c => c === 'todos' || cats[c] > 0)
    .map(c => {
      const n = c === 'todos' ? total : (cats[c]||0);
      return `<button class="cat-chip${c===_cat?' active':''}" onclick="setCat('${c}',this)">${labels[c]} <span style="opacity:.5;font-weight:400">${n}</span></button>`;
    }).join('');
}

// ── CONTROLS ─────────────────────────────────────────────────────────────────
function setMode(m, btn){ _mode=m; document.querySelectorAll('.tb').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }
function setView(v, btn){ _view=v; document.querySelectorAll('.tb').forEach(b=>{ if(b.id==='btnList'||b.id==='btnCons') b.classList.remove('active'); }); btn.classList.add('active'); render(); }
function setCat(c, btn){ _cat=c; document.querySelectorAll('.cat-chip').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); render(); }

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const query = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const filtered = _products.filter(p => {
    if(_cat !== 'todos' && getCategory(p) !== _cat) return false;
    if(query && !p.title.toLowerCase().includes(query)) return false;
    return true;
  });

  // Summary stats
  let totalUnits=0, totalNeg=0, totalSkus=0;
  for(const p of filtered){
    for(const v of (p.variants||[])){
      const q = v.inventory_quantity??0;
      totalUnits += effectiveQty(q);
      if(q < 0) totalNeg++;
      totalSkus++;
    }
  }
  document.getElementById('toolbarMeta').textContent = `${filtered.length} modelos`;
  document.getElementById('summaryRow').innerHTML = `
    <div class="sum-chip hi"><div class="sv">${totalUnits.toLocaleString('es-MX')}</div><div class="sl">Unidades</div></div>
    <div class="sum-chip"><div class="sv">${filtered.length}</div><div class="sl">Modelos</div></div>
    <div class="sum-chip"><div class="sv">${totalSkus}</div><div class="sl">SKUs</div></div>
    ${totalNeg>0?`<div class="sum-chip neg"><div class="sv">${totalNeg}</div><div class="sl">SKUs neg.</div></div>`:''}
  `;

  document.getElementById('consolidadoWrap').style.display = _view==='consolidado' ? '' : 'none';
  document.getElementById('productList').style.display     = _view==='list' ? '' : 'none';

  if(_view === 'consolidado') renderConsolidado(filtered);
  else renderList(filtered);
}

// ── CONSOLIDADO ───────────────────────────────────────────────────────────────
function renderConsolidado(filtered){
  // Build: { size → { total, products } }
  const sizeMap = {};
  for(const p of filtered){
    for(const v of (p.variants||[])){
      const raw  = v.inventory_quantity??0;
      const eff  = effectiveQty(raw);
      const size = extractSize(v.option1 || v.title);
      if(!sizeMap[size]) sizeMap[size] = { total:0, products:new Set(), negCount:0 };
      sizeMap[size].total    += eff;
      sizeMap[size].products.add(p.title);
      if(raw < 0) sizeMap[size].negCount++;
    }
  }

  // Sort sizes: numeric first (asc), then alphabetical
  const sizes = Object.keys(sizeMap).sort((a,b)=>{
    const na=parseFloat(a), nb=parseFloat(b);
    if(!isNaN(na)&&!isNaN(nb)) return na-nb;
    if(!isNaN(na)) return -1;
    if(!isNaN(nb)) return 1;
    return a.localeCompare(b);
  });

  const cells = sizes.map(sz => {
    const {total, products, negCount} = sizeMap[sz];
    const cls = total > 0 ? 'pos' : total < 0 ? 'neg-cell' : 'zero';
    const negNote = negCount > 0 && _mode==='positive' ? `<div class="scc-prods" style="color:var(--red)">${negCount} neg</div>` : '';
    return `<div class="sc-cell ${cls}">
      <div class="scc-size">${sz}</div>
      <div class="scc-qty">${total}</div>
      <div class="scc-prods">${products.size} mod.</div>
      ${negNote}
    </div>`;
  }).join('');

  const catLabel = _cat === 'todos' ? 'Todos los modelos' : _cat.charAt(0).toUpperCase()+_cat.slice(1);
  document.getElementById('consolidadoWrap').innerHTML = `
    <div class="consolidado-wrap">
      <div class="consolidado-header">
        <div class="consolidado-title">Consolidado por talla</div>
        <div class="consolidado-sub">${catLabel} · ${filtered.length} modelos · modo: ${_mode==='positive'?'sin negativos':'con negativos'}</div>
      </div>
      <div class="size-consolidado">${cells || '<div style="padding:8px;color:var(--muted);font-size:12px;">Sin datos</div>'}</div>
    </div>`;
}

// ── LIST ──────────────────────────────────────────────────────────────────────
function renderList(filtered){
  if(!filtered.length){
    document.getElementById('productList').innerHTML = '<div style="text-align:center;padding:50px 20px;color:var(--muted);font-family:var(--fn);">Sin resultados</div>';
    return;
  }

  const catLabels={botas:'Bota',calzado:'Calzado',sneakers:'Sneaker',jackets:'Jacket',complementos:'Complemento',otro:'Otro'};

  document.getElementById('productList').innerHTML = filtered.map((p, idx) => {
    const variants = p.variants||[];
    const img      = p.images?.[0]?.src;
    const total    = variants.reduce((s,v) => s+effectiveQty(v.inventory_quantity??0), 0);
    const hasNeg   = variants.some(v=>(v.inventory_quantity??0)<0);
    const totalCls = total<=0 ? 'zro' : total<=5 ? 'low' : hasNeg&&_mode==='all' ? 'ngt' : 'pst';
    const catTag   = catLabels[getCategory(p)]||'';

    const imgHtml = img
      ? `<img class="product-thumb" src="${img}" loading="lazy" alt="${p.title}"/>`
      : `<div class="product-thumb-ph"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>`;

    const chips = variants.map(v => {
      const raw = v.inventory_quantity??0;
      const eff = effectiveQty(raw);
      const cls = eff>0?'pos':eff<0?'neg':'zro';
      const lbl = extractSize(v.option1||v.title);
      const negNote = (raw<0&&_mode==='positive') ? `<div class="szr">${raw}</div>` : '';
      return `<div class="sz-chip ${cls}"><div class="szl">${lbl}</div><div class="szq">${eff}</div>${negNote}</div>`;
    }).join('');

    return `<div class="product-row" id="pr${idx}">
      <div class="product-header" onclick="toggle(${idx})">
        ${imgHtml}
        <div style="flex:1;min-width:0;">
          <div class="product-name">${p.title}</div>
          ${catTag?`<div class="product-cat-tag">${catTag}</div>`:''}
        </div>
        <div class="product-total ${totalCls}">${total}</div>
        <div class="chevron">▼</div>
      </div>
      <div class="size-grid-wrap"><div class="size-grid">${chips}</div></div>
    </div>`;
  }).join('');
}

function toggle(idx){ document.getElementById('pr'+idx)?.classList.toggle('open'); }
init();
</script>
</body>
</html>
