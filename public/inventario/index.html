<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="/favicon.ico"/>
<meta name="robots" content="noindex, nofollow"/>
<title>BDG · Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f4f2;
  --surface:#ffffff;
  --border:#e8e5e1;
  --border2:#f0ede9;
  --text:#111;
  --muted:#9a9590;
  --muted2:#c5c0ba;
  --green-bg:#e8f5ee;
  --green-txt:#1a7a4a;
  --red-bg:#fce9e7;
  --red-txt:#c93a28;
  --zero-bg:#f2f1ef;
  --zero-txt:#b0aba5;
  --blue:#3a7bd5;
  --terra:#c16452;
  --fn:'Inter',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--fn);}

/* ── TOPBAR ──────────────────────────────────────────────────────── */
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:0;position:sticky;top:0;z-index:100;}
.logo{font-size:15px;font-weight:800;letter-spacing:-.01em;color:var(--text);margin-right:28px;}
.nav-tabs{display:flex;gap:0;}
.nav-tab{padding:0 18px;height:52px;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;text-decoration:none;transition:color .12s;}
.nav-tab svg{opacity:.5;}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text);}
.nav-tab.active svg{opacity:1;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.back{font-size:11px;color:var(--muted);text-decoration:none;transition:color .12s;}
.back:hover{color:var(--text);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--terra);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ── PAGE ────────────────────────────────────────────────────────── */
.page{max-width:1100px;margin:0 auto;padding:28px 24px 60px;}

/* ── TITLE ROW ───────────────────────────────────────────────────── */
.title-row{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.page-title{font-size:26px;font-weight:800;letter-spacing:-.02em;flex:1;}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted2);pointer-events:none;}
.search-input{padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-family:var(--fn);font-size:13px;color:var(--text);outline:none;width:220px;transition:border-color .12s;}
.search-input:focus{border-color:#aaa;}
.search-input::placeholder{color:var(--muted2);}
.filter-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-family:var(--fn);font-size:13px;color:var(--text);cursor:pointer;transition:border-color .12s;font-weight:500;}
.filter-btn:hover{border-color:#aaa;}
.filter-btn.active{background:var(--text);color:#fff;border-color:var(--text);}
.filter-btn.active svg{color:#fff;}

/* ── SUMMARY CHIPS ───────────────────────────────────────────────── */
.summary-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.sum-chip{padding:10px 16px;border-radius:8px;background:var(--surface);border:1px solid var(--border);}
.sum-chip .sv{font-size:20px;font-weight:800;color:var(--text);line-height:1;}
.sum-chip .sl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.sum-chip.neg .sv{color:var(--red-txt);}

/* ── TABLE ───────────────────────────────────────────────────────── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.inv-table{width:100%;border-collapse:collapse;}
.inv-table thead th{
  padding:10px 10px;
  font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border);text-align:center;white-space:nowrap;
}
.inv-table thead th.col-model{text-align:left;padding-left:16px;}
.inv-table thead th.col-core{padding-right:16px;}

.inv-table tbody tr{border-bottom:1px solid var(--border2);transition:background .1s;}
.inv-table tbody tr:last-child{border-bottom:none;}
.inv-table tbody tr:hover{background:#faf9f8;}

.col-model-cell{display:flex;align-items:center;gap:10px;padding:10px 10px 10px 16px;}
.thumb{width:32px;height:32px;border-radius:4px;object-fit:cover;background:var(--bg);flex-shrink:0;}
.thumb-ph{width:32px;height:32px;border-radius:4px;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted2);}
.model-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;}

/* Size badge */
.sz-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;
  font-size:12px;font-weight:700;line-height:1;
}
.sz-badge.pos{background:var(--green-bg);color:var(--green-txt);}
.sz-badge.neg{background:var(--red-bg);color:var(--red-txt);}
.sz-badge.zero{background:var(--zero-bg);color:var(--zero-txt);}
.sz-badge.total{background:#f0f0f0;color:#555;font-size:13px;width:36px;height:36px;}
.sz-badge.total.pos{background:var(--green-bg);color:var(--green-txt);}
.sz-badge.total.neg{background:var(--red-bg);color:var(--red-txt);}

td.sz-cell{text-align:center;padding:4px 6px;}
td.core-cell{text-align:center;padding:4px 16px 4px 6px;}

/* CORE icon */
.core-check{color:var(--blue);cursor:pointer;font-size:16px;line-height:1;}
.core-x{color:var(--muted2);cursor:pointer;font-size:16px;line-height:1;}

/* Skeleton */
.sk{background:linear-gradient(90deg,#edebe8 25%,#e4e2de 50%,#edebe8 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}

@media(max-width:700px){
  .page{padding:16px 12px 40px;}
  .search-input{width:140px;}
  .model-name{font-size:11px;}
  .sz-badge{width:26px;height:26px;font-size:10px;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">BALADIGALA</div>
  <nav class="nav-tabs">
    <a class="nav-tab active" href="/inventario/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Bodega
    </a>
    <a class="nav-tab" href="/oc/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
      Órdenes de Compra
    </a>
  </nav>
  <div class="topbar-right">
    <a class="back" href="/">← HQ</a>
    <div class="avatar">R</div>
  </div>
</div>

<div class="page">

  <!-- TITLE ROW -->
  <div class="title-row">
    <div class="page-title">Stock</div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search" oninput="render()"/>
    </div>
    <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Filter
    </button>
  </div>

  <!-- SUMMARY -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table class="inv-table">
      <thead>
        <tr id="tableHead">
          <th class="col-model">MODELO</th>
          <th>—</th>
          <th>TOTAL</th>
          <th class="col-core">CORE</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="10" style="padding:32px;">
          <div class="sk" style="height:36px;margin-bottom:8px;"></div>
          <div class="sk" style="height:36px;margin-bottom:8px;"></div>
          <div class="sk" style="height:36px;margin-bottom:8px;"></div>
          <div class="sk" style="height:36px;margin-bottom:8px;"></div>
          <div class="sk" style="height:36px;"></div>
        </td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
let _products = [];
let _mode     = 'positive'; // 'positive' | 'all'
let _core     = JSON.parse(localStorage.getItem('bdg_core') || '{}');

// Modelos visibles — solo estos aparecen en la tabla
const ALLOWED_MODELS = new Set([
  'BALA BLACK',
  'BECCA VINTAGE BLACK',
  'DALLAS BLACK',
  'DALLAS CAMEL',
  'FENIX CHOCOLATE',
  'FENIX TAUPE',
  'HUDSON BLACK',
  'HUDSON BLACK HONEY x Clinique',
  'HUDSON BLUE',
  'LEGACY STUDS',
  'LEGACY TAUPE',
  'LYRA SILVER',
  'MEXICO IS THE SHIT x BDG',
  'MONARCH CHERRY RED',
  'NOVA BLACK',
  'TYRO BLACK',
  'HUDSON CHOCOLATE CC X BDG',
  'TAURI BLACK',
].map(s => s.toLowerCase()));

function effectiveQty(qty){ return _mode === 'positive' ? Math.max(0, qty) : qty; }

function extractSize(option1){
  const s = String(option1 || '').trim();
  const m = s.match(/^(\d{2}(?:\.\d)?)/);
  return m ? m[1] : s;
}

function toggleFilter(){
  _mode = _mode === 'positive' ? 'all' : 'positive';
  const btn = document.getElementById('filterBtn');
  btn.classList.toggle('active', _mode === 'all');
  btn.innerHTML = _mode === 'all'
    ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg> Con negativos`
    : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg> Filter`;
  render();
}

function toggleCore(title, e){
  e.stopPropagation();
  _core[title] = !_core[title];
  localStorage.setItem('bdg_core', JSON.stringify(_core));
  render();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  try {
    const res = await fetch('/api/shopify?mode=products');
    if (!res.ok) throw new Error(`Error ${res.status}`);
    const data = await res.json();
    _products = (data.products || []).filter(p =>
      p.status === 'active' && ALLOWED_MODELS.has(p.title.toLowerCase())
    );
    _products.sort((a, b) => a.title.localeCompare(b.title));
    render();
  } catch (e) {
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="10"><div class="empty">
        <div style="font-size:24px;margin-bottom:12px;">⚠️</div>
        <div style="font-weight:700;margin-bottom:6px;">No se pudo cargar el inventario</div>
        <div style="font-size:12px;">${e.message}</div>
        <button onclick="init()" style="margin-top:16px;padding:8px 20px;background:var(--terra);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--fn);">Reintentar</button>
      </div></td></tr>`;
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const query    = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const filtered = _products.filter(p => !query || p.title.toLowerCase().includes(query));

  // Collect all unique numeric sizes across filtered products
  const sizeSet = new Set();
  for(const p of filtered){
    for(const v of (p.variants || [])){
      const sz = extractSize(v.option1 || v.title);
      if(/^\d{2}$/.test(sz)) sizeSet.add(sz);
    }
  }
  const sizes = Array.from(sizeSet).sort((a,b) => parseFloat(a) - parseFloat(b));

  // Summary
  let totalUnits = 0, totalNeg = 0;
  for(const p of filtered){
    for(const v of (p.variants || [])){
      const q = v.inventory_quantity ?? 0;
      totalUnits += effectiveQty(q);
      if(q < 0) totalNeg++;
    }
  }
  document.getElementById('summaryRow').innerHTML = `
    <div class="sum-chip"><div class="sv">${totalUnits.toLocaleString('es-MX')}</div><div class="sl">Unidades</div></div>
    <div class="sum-chip"><div class="sv">${filtered.length}</div><div class="sl">Modelos</div></div>
    ${totalNeg > 0 ? `<div class="sum-chip neg"><div class="sv">${totalNeg}</div><div class="sl">SKUs neg.</div></div>` : ''}
  `;

  // Table header
  document.getElementById('tableHead').innerHTML = `
    <th class="col-model">MODELO</th>
    ${sizes.map(sz => `<th>${sz}</th>`).join('')}
    <th>TOTAL</th>
    <th class="col-core">CORE</th>
  `;

  // Table rows
  if(!filtered.length){
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="${sizes.length + 3}"><div class="empty">Sin resultados</div></td></tr>`;
    return;
  }

  const rows = filtered.map(p => {
    const variants  = p.variants || [];
    const img       = p.images?.[0]?.src;

    // Build size → qty map
    const sizeMap = {};
    for(const v of variants){
      const sz  = extractSize(v.option1 || v.title);
      const raw = v.inventory_quantity ?? 0;
      sizeMap[sz] = (sizeMap[sz] || 0) + raw;
    }

    const total    = sizes.reduce((s, sz) => s + effectiveQty(sizeMap[sz] ?? 0), 0);
    const isCore   = !!_core[p.title];

    const thumbHtml = img
      ? `<img class="thumb" src="${img}" loading="lazy" alt="${p.title}" onerror="this.outerHTML='<div class=thumb-ph>👟</div>'"/>`
      : `<div class="thumb-ph"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>`;

    const sizeCells = sizes.map(sz => {
      const raw = sizeMap[sz];
      if(raw === undefined) return `<td class="sz-cell"><span class="sz-badge zero">—</span></td>`;
      const eff = effectiveQty(raw);
      const cls = eff > 0 ? 'pos' : eff < 0 ? 'neg' : 'zero';
      return `<td class="sz-cell"><span class="sz-badge ${cls}">${eff}</span></td>`;
    }).join('');

    const totalCls = total > 0 ? 'pos' : total < 0 ? 'neg' : 'zero';
    const coreHtml = isCore
      ? `<span class="core-check" onclick="toggleCore('${p.title.replace(/'/g,"\\'")}',event)" title="Core · clic para quitar">✓</span>`
      : `<span class="core-x"    onclick="toggleCore('${p.title.replace(/'/g,"\\'")}',event)" title="No core · clic para marcar">✕</span>`;

    return `<tr>
      <td>
        <div class="col-model-cell">
          ${thumbHtml}
          <div class="model-name">${p.title}</div>
        </div>
      </td>
      ${sizeCells}
      <td class="sz-cell"><span class="sz-badge total ${totalCls}">${total}</span></td>
      <td class="core-cell">${coreHtml}</td>
    </tr>`;
  }).join('');

  document.getElementById('tableBody').innerHTML = rows;
}

init();
</script>
</body>
</html>
