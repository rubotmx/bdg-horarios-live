<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="/favicon.ico"/>
<meta name="robots" content="noindex, nofollow"/>
<title>BDG · Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;900&family=Jost:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F4F2EF;
  --surface:#FFFFFF;
  --border:#E4E0DB;
  --border2:#EDEAE6;
  --text:#0E0E0E;
  --muted:#8A857F;
  --muted2:#C2BCB6;
  --terra:#c16452;
  --terra-light:#fdf0ed;
  --terra-dark:#9d4f3f;
  --green-bg:#EBF5EE;--green-txt:#1B6E3E;
  --amber-bg:#FFF8E6;--amber-txt:#B75000;
  --red-bg:#FDECEA;--red-txt:#C62828;
  --zero-bg:#EBEBEB;--zero-txt:#9A9590;
  --fn:'Archivo',sans-serif;
  --fl:'Jost',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fn);}

/* ── TOPBAR ── */
.topbar{
  height:48px;background:#0E0E0E;
  display:flex;align-items:center;padding:0 20px;
  position:sticky;top:0;z-index:200;
  border-bottom:1px solid rgba(255,255,255,.06);
  gap:12px;flex-shrink:0;
}
.logo{font-family:var(--fl);font-size:14px;font-weight:700;color:#fff;letter-spacing:.18em;}
.logo span{color:var(--terra);}
.topbar-divider{width:1px;height:20px;background:rgba(255,255,255,.12);flex-shrink:0;}
.topbar-sub{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.32);font-family:var(--fn);}
.topbar-right{margin-left:auto;}
.back{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.28);text-decoration:none;transition:color .12s;}
.back:hover{color:var(--terra);}

/* ── STICKY CONTROLS ── */
.controls{
  position:sticky;top:48px;z-index:190;
  background:#fff;border-bottom:1px solid var(--border);
}
.search-bar{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;border-bottom:1px solid var(--border2);
}
.search-ico{color:var(--muted2);flex-shrink:0;}
.search-input{
  flex:1;border:none;outline:none;background:none;
  font-family:var(--fn);font-size:13px;color:var(--text);
}
.search-input::placeholder{color:var(--muted2);}
.search-clear{
  color:var(--muted2);cursor:pointer;font-size:18px;
  line-height:1;display:none;transition:color .12s;
}
.search-clear.show{display:block;}
.search-clear:hover{color:var(--text);}

/* Tabs */
.tabs-row{display:flex;border-bottom:1px solid var(--border);}
.tab{
  flex:1;padding:11px 0;
  font-family:var(--fn);font-size:11px;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);background:none;border:none;
  border-bottom:2px solid transparent;cursor:pointer;
  transition:all .14s;
}
.tab.active{color:var(--terra);border-bottom-color:var(--terra);}

/* Filter pills */
.filters-row{
  display:flex;gap:6px;padding:10px 16px;
  overflow-x:auto;scrollbar-width:none;
}
.filters-row::-webkit-scrollbar{display:none;}
.filter-pill{
  display:flex;align-items:center;gap:5px;
  padding:5px 13px;border:1px solid var(--border);
  border-radius:999px;background:#fff;
  font-family:var(--fn);font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;white-space:nowrap;
  transition:all .14s;flex-shrink:0;
}
.filter-pill:hover{border-color:var(--terra);color:var(--terra-dark);}
.filter-pill.active{background:var(--terra);color:#fff;border-color:var(--terra);}

/* ── SUMMARY ── */
.summary-strip{
  display:flex;gap:1px;background:var(--border);
  border-bottom:2px solid var(--border);
}
.sum-chip{
  flex:1;padding:14px 16px;background:var(--surface);min-width:0;
}
.sum-chip .sv{
  font-size:24px;font-weight:900;color:var(--text);
  line-height:1;letter-spacing:-.03em;
}
.sum-chip .sl{
  font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);margin-top:4px;font-weight:600;
}
.sum-chip.alert .sv{color:var(--red-txt);}
.sum-chip.hi .sv{color:var(--terra);}

/* ── CARDS ── */
.cards-list{display:flex;flex-direction:column;gap:1px;background:var(--border);}

.prod-card{
  background:var(--surface);
  padding:14px 16px 16px;
}

.card-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:13px;
}
.prod-thumb{
  width:54px;height:54px;border-radius:5px;
  object-fit:cover;flex-shrink:0;background:var(--bg);
  border:1px solid var(--border2);
}
.thumb-ph{
  width:54px;height:54px;border-radius:5px;
  background:var(--bg);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;border:1px solid var(--border2);
}
.card-meta{flex:1;min-width:0;}
.prod-name{
  font-size:12px;font-weight:700;
  color:var(--text);letter-spacing:.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  margin-bottom:4px;text-transform:uppercase;
}
.color-pill{
  display:inline-flex;align-items:center;gap:4px;
  font-size:9px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);
  background:var(--bg);border:1px solid var(--border);
  border-radius:999px;padding:2px 8px;
}
.color-swatch{
  width:8px;height:8px;border-radius:50%;
  border:1px solid rgba(0,0,0,.12);flex-shrink:0;display:inline-block;
}

/* Total top-right */
.card-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.card-total{display:flex;flex-direction:column;align-items:flex-end;}
.total-num{
  font-size:22px;font-weight:900;line-height:1;
  letter-spacing:-.04em;
}
.total-num.good    {color:var(--green-txt);}
.total-num.low     {color:var(--amber-txt);}
.total-num.critical{color:var(--red-txt);}
.total-num.zero    {color:var(--zero-txt);}
.total-lbl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);margin-top:1px;}

/* Core toggle */
.core-btn{
  width:30px;height:30px;border-radius:50%;
  border:1.5px solid var(--border);background:#fff;
  cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .14s;
}
.core-btn.active{background:var(--terra);border-color:var(--terra);color:#fff;}
.core-btn:not(.active){color:var(--muted2);}
.core-btn:not(.active):hover{border-color:var(--terra);color:var(--terra);}

/* ── SIZES ROW ── */
.sizes-row{display:flex;gap:4px;align-items:flex-end;}
.sz-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.sz-lbl{font-size:9px;font-weight:600;letter-spacing:.06em;color:var(--muted2);}
.sz-item.key .sz-lbl{color:var(--terra);font-weight:700;}

.sz-val{
  width:100%;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;height:36px;
  transition:opacity .12s;
}
.sz-item.key .sz-val{height:44px;font-size:15px;font-weight:900;}

/* Stock levels */
.sz-val.good    {background:var(--green-bg);color:var(--green-txt);}
.sz-val.low     {background:var(--amber-bg);color:var(--amber-txt);}
.sz-val.critical{background:var(--red-bg);  color:var(--red-txt);font-weight:900;}
.sz-val.zero    {background:var(--zero-bg); color:var(--zero-txt);}
.sz-val.neg     {background:var(--red-txt); color:#fff;}
.sz-val.empty   {background:var(--bg);      color:var(--muted2);font-weight:400;}

/* Critical pulse */
@keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.55}}
.sz-val.critical{animation:pulse-red 1.8s ease-in-out infinite;}

/* ── MISC VARIANTS ── */
.misc-variants{display:flex;flex-direction:column;gap:4px;}
.misc-variant{display:flex;align-items:center;justify-content:space-between;padding:2px 0;}
.misc-vname{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.02em;}

/* ── EMPTY / ERROR ── */
.empty-state{
  text-align:center;padding:64px 24px;
  color:var(--muted);font-size:14px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}

/* Skeleton */
.sk{
  background:linear-gradient(90deg,#EDEBE8 25%,#E5E2DE 50%,#EDEBE8 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:4px;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Fade in */
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.prod-card{animation:fadeUp .22s ease both;}

/* Desktop */
@media(min-width:640px){
  .controls,.summary-strip,.cards-list{max-width:600px;margin-left:auto;margin-right:auto;}
  .topbar{padding:0 28px;}
}
</style>
</head>

<script>
let _products      = [];
let _clogsProducts = [];
let _othersProducts = [];
let _mode          = 'positive';   // 'positive' | 'all'
let _filterCompl   = false;
let _sortByStock   = false;
let _tab           = 'all';        // 'all' | 'main' | 'clogs' | 'others' | 'misc'
let _allProducts   = [];
let _miscProducts  = [];
let _core          = JSON.parse(localStorage.getItem('bdg_core') || '{}');

const KEY_SIZES      = new Set(['24','25']);
const CLOGS_KEYWORDS = ['penny','frankie','parker'];

const COLOR_MAP = {
  'black':          '#1a1a1a',
  'negro':          '#1a1a1a',
  'black x honey':  'linear-gradient(135deg,#1a1a1a 50%,#c8943a 50%)',
  'brown':          '#7b4f2e',
  'taupe':          '#b5a090',
  'olivo':          '#6b7a42',
  'terracota':      '#c16452',
  'honey':          '#c8943a',
  'camel':          '#c19a6b',
  'sand':           '#d4bc94',
  'white':          '#f0ede9',
  'ivory':          '#f5f0e6',
  'silver':         '#b0b8c1',
  'chocolate':      '#4a2c1a',
  'cognac':         '#a0522d',
  'red':            '#c93a28',
  'blue':           '#3a7bd5',
};

const ALLOWED_MODELS = [
  'BALA BLACK','BECCA VINTAGE BLACK','DALLAS BLACK','DALLAS CAMEL',
  'FENIX CHOCOLATE','FENIX TAUPE','HUDSON BLACK','HUDSON BLACK HONEY x Clinique',
  'HUDSON BLUE','LEGACY STUDS','LEGACY TAUPE','LYRA SILVER',
  'MEXICO IS THE SHIT x BDG','MONARCH CHERRY RED','NOVA BLACK',
  'TYRO BLACK','HUDSON CHOCOLATE CC X BDG','TAURI BLACK',
];
const ALLOWED_SET = new Set(ALLOWED_MODELS.map(s => s.toLowerCase()));

function hasSizes(p){
  return (p.variants||[]).some(v => /^\d{2}$/.test(extractSizeFromVariant(v)));
}

function effectiveQty(qty){ return _mode === 'positive' ? Math.max(0, qty) : qty; }

function stockClass(qty){
  if(qty === null || qty === undefined) return 'empty';
  if(qty < 0)  return 'neg';
  if(qty === 0) return 'zero';
  if(qty <= 2)  return 'critical';
  if(qty <= 9)  return 'low';
  return 'good';
}

function totalClass(n){
  if(n <= 0) return 'zero';
  if(n <= 2)  return 'critical';
  if(n <= 9)  return 'low';
  return 'good';
}

function extractSizeFromVariant(v){
  const opts = [v.option1, v.option2, v.title].map(o => String(o||'').trim());
  for(const o of opts){ const m = o.match(/^(\d{2}(?:\.\d)?)$/); if(m) return m[1]; }
  return opts[0];
}

function swatchFor(colorName){
  const key = colorName.toLowerCase().trim();
  const val = COLOR_MAP[key];
  if(!val) return '';
  return `<span class="color-swatch" style="background:${val}"></span>`;
}

// ── CONTROLS ─────────────────────────────────────────────────────────────────
function switchTab(tab){
  _tab = tab;
  document.getElementById('tabAll').classList.toggle('active',    tab === 'all');
  document.getElementById('tabMain').classList.toggle('active',   tab === 'main');
  document.getElementById('tabClogs').classList.toggle('active',  tab === 'clogs');
  document.getElementById('tabOthers').classList.toggle('active', tab === 'others');
  document.getElementById('tabMisc').classList.toggle('active',   tab === 'misc');
  render();
}
function toggleFilter(){
  _mode = _mode === 'positive' ? 'all' : 'positive';
  document.getElementById('filterBtn').classList.toggle('active', _mode === 'all');
  render();
}
function toggleCompletos(){
  _filterCompl = !_filterCompl;
  document.getElementById('completosBtn').classList.toggle('active', _filterCompl);
  render();
}
function toggleSort(){
  _sortByStock = !_sortByStock;
  document.getElementById('sortBtn').classList.toggle('active', _sortByStock);
  render();
}
function toggleCore(title, e){
  e.stopPropagation();
  _core[title] = !_core[title];
  localStorage.setItem('bdg_core', JSON.stringify(_core));
  render();
}
function onSearch(){
  const val = document.getElementById('searchInput').value;
  document.getElementById('searchClear').classList.toggle('show', val.length > 0);
  render();
}
function clearSearch(){
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('show');
  render();
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  try {
    const res  = await fetch('/api/shopify?mode=products');
    if(!res.ok) throw new Error(`Error ${res.status}`);
    const data = await res.json();
    const all  = (data.products || []).filter(p => p.status === 'active');

    // Separate sized vs non-sized products upfront
    const sized = all.filter(hasSizes);
    _miscProducts = all.filter(p => !hasSizes(p)).sort((a,b) => a.title.localeCompare(b.title));

    _products = sized.filter(p => ALLOWED_SET.has(p.title.toLowerCase()));
    _products.sort((a,b) => a.title.localeCompare(b.title));

    _clogsProducts = sized.filter(p => {
      const tl = p.title.toLowerCase();
      return CLOGS_KEYWORDS.some(k => tl.includes(k)) && !ALLOWED_SET.has(tl);
    });
    _clogsProducts.sort((a,b) => a.title.localeCompare(b.title));

    // Otros: sized products NOT in core
    _othersProducts = sized.filter(p => !ALLOWED_SET.has(p.title.toLowerCase()));
    _othersProducts.sort((a,b) => a.title.localeCompare(b.title));

    // Todos: all sized products
    _allProducts = [...sized].sort((a,b) => a.title.localeCompare(b.title));

    render();
  } catch(e){
    document.getElementById('cardsList').innerHTML =
      `<div class="prod-card">
        <div class="empty-state">
          <div style="font-size:32px;">⚠️</div>
          <div style="font-weight:700;color:var(--text);">${e.message}</div>
          <button onclick="init()" style="padding:9px 22px;background:var(--terra);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:var(--fn);font-weight:700;font-size:12px;letter-spacing:.08em;">Reintentar</button>
        </div>
      </div>`;
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const query = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const base  = _tab === 'all'    ? _allProducts
              : _tab === 'clogs'  ? _clogsProducts
              : _tab === 'others' ? _othersProducts
              : _tab === 'misc'   ? _miscProducts
              : _products;

  // Collect sizes across all products in tab
  const sizeSet = new Set();
  for(const p of base)
    for(const v of (p.variants||[])){
      const sz = extractSizeFromVariant(v);
      if(/^\d{2}$/.test(sz)) sizeSet.add(sz);
    }
  const sizes = Array.from(sizeSet).sort((a,b) => parseFloat(a) - parseFloat(b));

  // Filter
  let filtered = base.filter(p => !query || p.title.toLowerCase().includes(query));
  if(_filterCompl){
    filtered = filtered.filter(p => {
      const sizeMap = {};
      for(const v of (p.variants||[])){
        const sz = extractSizeFromVariant(v);
        sizeMap[sz] = (sizeMap[sz]||0) + (v.inventory_quantity??0);
      }
      return sizes.every(sz => (sizeMap[sz]??0) >= 1);
    });
  }

  // ── Expand all products into flat items (one per color or one per product) ──
  const imgByIdGlobal = {};
  for(const p of filtered) for(const img of (p.images||[])) imgByIdGlobal[img.id] = img.src;

  let items = []; // { p, color, sizeMap, imgSrc, total, isMisc }

  if(_tab === 'misc'){
    for(const p of filtered){
      const total = (p.variants||[]).reduce((s,v) => s + effectiveQty(v.inventory_quantity??0), 0);
      items.push({ p, total, isMisc: true });
    }
  } else {
    for(const p of filtered){
      const hasColors = (p.variants||[]).some(v =>
        v.option2 && /^\d{2}$/.test(String(v.option2||'').trim())
      );
      if(hasColors){
        const colorMap = {}, colorImgs = {};
        for(const v of (p.variants||[])){
          const color = String(v.option1||'').trim();
          const sz    = extractSizeFromVariant(v);
          if(!colorMap[color]){ colorMap[color] = {}; colorImgs[color] = v.image_id || null; }
          colorMap[color][sz] = (colorMap[color][sz]||0) + (v.inventory_quantity??0);
        }
        for(const [color, sizeMap] of Object.entries(colorMap)){
          const total  = sizes.reduce((s,sz) => s + effectiveQty(sizeMap[sz]??0), 0);
          const imgSrc = (colorImgs[color] && imgByIdGlobal[colorImgs[color]]) || p.images?.[0]?.src || null;
          items.push({ p, color, sizeMap, imgSrc, total, isMisc: false });
        }
      } else {
        const sizeMap = {};
        for(const v of (p.variants||[])){
          const sz = extractSizeFromVariant(v);
          sizeMap[sz] = (sizeMap[sz]||0) + (v.inventory_quantity??0);
        }
        const total  = sizes.reduce((s,sz) => s + effectiveQty(sizeMap[sz]??0), 0);
        const imgSrc = p.images?.[0]?.src || null;
        items.push({ p, color: null, sizeMap, imgSrc, total, isMisc: false });
      }
    }
  }

  // Sort each individual card by its own stock total
  if(_sortByStock) items.sort((a,b) => b.total - a.total);

  // Summary stats
  let totalUnits = 0, criticalModels = 0;
  for(const p of filtered){
    let hasCritical = false;
    for(const v of (p.variants||[])){
      const q = v.inventory_quantity??0;
      totalUnits += effectiveQty(q);
      if(q >= 0 && q <= 2) hasCritical = true;
    }
    if(hasCritical) criticalModels++;
  }

  document.getElementById('summaryRow').innerHTML = `
    <div class="sum-chip hi"><div class="sv">${totalUnits.toLocaleString('es-MX')}</div><div class="sl">Unidades</div></div>
    <div class="sum-chip"><div class="sv">${items.length}</div><div class="sl">Modelos</div></div>
    ${criticalModels > 0
      ? `<div class="sum-chip alert"><div class="sv">${criticalModels}</div><div class="sl">Críticos</div></div>`
      : ''}
  `;

  if(!items.length){
    document.getElementById('cardsList').innerHTML =
      `<div class="prod-card"><div class="empty-state">Sin resultados</div></div>`;
    return;
  }

  // ── MISC tab render ───────────────────────────────────────────────────────
  if(_tab === 'misc'){
    document.getElementById('cardsList').innerHTML = items.map(({ p, total }, idx) => {
      const imgSrc = p.images?.[0]?.src;
      const thumb  = imgSrc
        ? `<img class="prod-thumb" src="${imgSrc}" loading="lazy" alt="${p.title}" onerror="this.outerHTML='<div class=thumb-ph>📦</div>'"/>`
        : `<div class="thumb-ph">📦</div>`;
      const variants = (p.variants||[]).filter(v => v.title !== 'Default Title');
      const variantRows = variants.length
        ? variants.map(v => {
            const q   = effectiveQty(v.inventory_quantity??0);
            const cls = stockClass(v.inventory_quantity??0);
            return `<div class="misc-variant">
              <span class="misc-vname">${v.title}</span>
              <span class="sz-val ${cls}" style="min-width:44px;padding:0 10px;height:30px;font-size:12px;border-radius:4px;">${q}</span>
            </div>`;
          }).join('')
        : `<div class="misc-variant"><span class="misc-vname" style="color:var(--muted2);">Sin variantes</span></div>`;
      return `<div class="prod-card" style="animation-delay:${idx*0.025}s">
        <div class="card-header">
          ${thumb}
          <div class="card-meta"><div class="prod-name">${p.title}</div></div>
          <div class="card-right">
            <div class="card-total">
              <div class="total-num ${totalClass(total)}">${total}</div>
              <div class="total-lbl">total</div>
            </div>
          </div>
        </div>
        <div class="misc-variants">${variantRows}</div>
      </div>`;
    }).join('');
    return;
  }

  // ── Regular tabs render ───────────────────────────────────────────────────
  document.getElementById('cardsList').innerHTML = items.map(({ p, color, sizeMap, imgSrc, total }, idx) => {
    const hasColor  = color !== null;
    const titleSafe = hasColor ? (p.title+' '+color).replace(/'/g,"\\'") : p.title.replace(/'/g,"\\'");
    const isCore    = !!_core[titleSafe];
    const thumb     = imgSrc
      ? `<img class="prod-thumb" src="${imgSrc}" loading="lazy" alt="${p.title}" onerror="this.outerHTML='<div class=thumb-ph>👟</div>'"/>`
      : `<div class="thumb-ph">👟</div>`;
    const sizeCells = sizes.map(sz => {
      const raw = sizeMap[sz];
      const eff = raw !== undefined ? effectiveQty(raw) : null;
      const cls = eff === null ? 'empty' : stockClass(eff);
      return `<div class="sz-item${KEY_SIZES.has(sz)?' key':''}">
        <div class="sz-lbl">${sz}</div>
        <div class="sz-val ${cls}">${eff === null ? '—' : eff}</div>
      </div>`;
    }).join('');

    return `<div class="prod-card" style="animation-delay:${idx*0.025}s">
      <div class="card-header">
        ${thumb}
        <div class="card-meta">
          <div class="prod-name">${p.title}</div>
          ${hasColor ? `<div class="color-pill">${swatchFor(color)}${color}</div>` : ''}
        </div>
        <div class="card-right">
          <div class="card-total">
            <div class="total-num ${totalClass(total)}">${total}</div>
            <div class="total-lbl">total</div>
          </div>
          <button class="core-btn${isCore?' active':''}" onclick="toggleCore('${titleSafe}',event)">${isCore?'★':'☆'}</button>
        </div>
      </div>
      <div class="sizes-row">${sizeCells}</div>
    </div>`;
  }).join('');
}

init();
</script>
</body>
</html>
