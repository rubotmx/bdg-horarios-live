<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="/favicon.ico"/>
<meta name="robots" content="noindex, nofollow"/>
<title>El Palacio de Hierro · Inventario BDG</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F5F2;--surface:#FFFFFF;--border:#E2DDD8;--border2:#EDE9E5;
  --text:#0A0A0A;--muted:#8A847E;--muted2:#C2BCB6;
  --gold:#B49A47;--gold-light:#F5EDD6;--gold-dark:#8C7835;
  --green-bg:#EAF4EE;--green-txt:#1B6E3E;
  --red-bg:#FAECEA;--red-txt:#B83327;
  --zero-bg:#F0EDE9;--zero-txt:#A8A29C;
  --orange:#C47A2A;
  --serif:'Playfair Display',Georgia,serif;
  --fn:'Inter',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fn);}

/* ── TOPBAR PDH ── */
.topbar{height:64px;background:#0A0A0A;display:flex;align-items:center;padding:0 32px;position:sticky;top:0;z-index:100;gap:20px;}
.pdh-brand{display:flex;flex-direction:column;align-items:flex-start;gap:1px;}
.pdh-crown{font-size:14px;color:var(--gold);letter-spacing:.3em;line-height:1;}
.pdh-name{font-family:var(--serif);font-size:13px;font-weight:600;color:#fff;letter-spacing:.22em;text-transform:uppercase;line-height:1;}
.pdh-divider{width:1px;height:28px;background:rgba(255,255,255,.15);}
.pdh-sub{font-size:9px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);opacity:.85;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px;}
.back{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4);text-decoration:none;transition:color .12s;}
.back:hover{color:var(--gold);}

/* ── PAGE ── */
.page{max-width:1160px;margin:0 auto;padding:32px 28px 80px;}

/* ── TITLE ROW ── */
.title-row{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;padding-bottom:20px;border-bottom:1px solid var(--border);}
.page-title{font-family:var(--serif);font-size:28px;font-weight:600;letter-spacing:.01em;flex:1;color:var(--text);}
.page-title span{font-size:13px;font-family:var(--fn);font-weight:400;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-left:10px;vertical-align:middle;}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted2);pointer-events:none;}
.search-input{padding:9px 14px 9px 34px;border:1px solid var(--border);border-radius:0;background:var(--surface);font-family:var(--fn);font-size:12px;color:var(--text);outline:none;width:210px;transition:border-color .15s;letter-spacing:.02em;}
.search-input:focus{border-color:var(--gold);}
.search-input::placeholder{color:var(--muted2);}

/* Buttons */
.btn-toolbar{display:flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:0;background:var(--surface);font-family:var(--fn);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;font-weight:500;white-space:nowrap;transition:all .15s;}
.btn-toolbar:hover{border-color:var(--gold);color:var(--gold-dark);}
.btn-toolbar.active{background:var(--text);color:var(--gold);border-color:var(--text);}

/* ── SUMMARY ── */
.summary-row{display:flex;gap:1px;margin-bottom:28px;background:var(--border);border:1px solid var(--border);}
.sum-chip{flex:1;padding:16px 20px;background:var(--surface);}
.sum-chip .sv{font-family:var(--serif);font-size:24px;font-weight:600;color:var(--text);line-height:1;}
.sum-chip .sl{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:5px;font-weight:500;}
.sum-chip.neg .sv{color:var(--red-txt);}
.sum-chip.gold .sv{color:var(--gold-dark);}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);overflow:hidden;}
.inv-table{width:100%;border-collapse:collapse;}
.inv-table thead th{
  padding:12px 10px;font-size:9px;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:#fff;border-bottom:none;
  text-align:center;white-space:nowrap;background:#0A0A0A;
}
.inv-table thead th.col-model{text-align:left;padding-left:20px;}
.inv-table thead th.col-core{padding-right:20px;color:var(--gold);}
.inv-table tbody tr{border-bottom:1px solid var(--border2);transition:background .12s;}
.inv-table tbody tr:last-child{border-bottom:none;}
.inv-table tbody tr:hover{background:#FDFCFB;}
.col-model-cell{display:flex;align-items:center;gap:12px;padding:11px 10px 11px 20px;}
.thumb{width:38px;height:38px;border-radius:2px;object-fit:cover;background:var(--bg);flex-shrink:0;}
.thumb-ph{width:38px;height:38px;border-radius:2px;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted2);}
.model-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;letter-spacing:.01em;}

/* Size badges */
.sz-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:0;font-size:12px;font-weight:600;font-family:var(--fn);}
.sz-badge.pos{background:var(--gold-light);color:var(--gold-dark);}
.sz-badge.neg{background:var(--red-bg);color:var(--red-txt);}
.sz-badge.zero{background:var(--zero-bg);color:var(--zero-txt);}
.sz-badge.total{width:36px;height:36px;font-size:13px;background:#0A0A0A;color:#fff;font-weight:700;}
.sz-badge.total.pos{background:var(--gold-dark);color:#fff;}
.sz-badge.total.neg{background:var(--red-txt);color:#fff;}

td.sz-cell{text-align:center;padding:4px 6px;vertical-align:middle;}
td.core-cell{text-align:center;padding:4px 20px 4px 6px;}
.core-check{color:var(--gold);cursor:pointer;font-size:16px;}
.core-x{color:var(--muted2);cursor:pointer;font-size:16px;}

/* Color pill (para clogs) */
.color-pill{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:0;padding:2px 7px;margin-top:3px;}
.color-swatch{width:8px;height:8px;border-radius:50%;border:1px solid rgba(0,0,0,.15);flex-shrink:0;display:inline-block;}
.thumb-indent{width:38px;height:38px;flex-shrink:0;}

/* Sz wrap */
.sz-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.pv-dot{font-size:8px;font-weight:600;color:var(--orange);background:rgba(196,122,42,.1);padding:1px 4px;letter-spacing:.04em;}

/* Skeleton */
.sk{background:linear-gradient(90deg,#EDEBE8 25%,#E5E2DE 50%,#EDEBE8 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:0;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty{text-align:center;padding:70px 20px;color:var(--muted);font-family:var(--serif);font-style:italic;font-size:15px;}

@media(max-width:700px){
  .page{padding:20px 16px 60px;}
  .search-input{width:140px;}
  .model-name{font-size:11px;}
  .sz-badge{width:26px;height:26px;font-size:10px;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="pdh-brand">
    <div class="pdh-crown">♛</div>
    <div class="pdh-name">El Palacio de Hierro</div>
  </div>
  <div class="pdh-divider"></div>
  <div class="pdh-sub">Inventario BDG</div>
  <div class="topbar-right">
    <a class="back" href="/">← HQ</a>
  </div>
</div>


<div class="page">

  <!-- TITLE ROW -->
  <div class="title-row">
    <div class="page-title">Bodega <span>BDG × PDH</span></div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar..." oninput="render()"/>
    </div>
    <button class="btn-toolbar" id="completosBtn" onclick="toggleCompletos()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Completos
    </button>
    <button class="btn-toolbar" id="filterBtn" onclick="toggleFilter()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Negativos
    </button>
    <button class="btn-toolbar" id="clogsBtn" onclick="toggleClogs()">
      🪵 Clogs
    </button>
  </div>

  <!-- SUMMARY -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table class="inv-table">
      <thead><tr id="tableHead">
        <th class="col-model">MODELO</th>
        <th>—</th><th>TOTAL</th><th class="col-core">CORE</th>
      </tr></thead>
      <tbody id="tableBody">
        <tr><td colspan="10" style="padding:32px;">
          <div class="sk" style="height:40px;margin-bottom:8px;"></div>
          <div class="sk" style="height:40px;margin-bottom:8px;"></div>
          <div class="sk" style="height:40px;margin-bottom:8px;"></div>
          <div class="sk" style="height:40px;margin-bottom:8px;"></div>
          <div class="sk" style="height:40px;"></div>
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let _products      = [];
let _clogsProducts = [];
let _mode          = 'positive';  // 'positive' | 'all'
let _filterCompl   = false;
let _showClogs     = false;
let _core          = JSON.parse(localStorage.getItem('bdg_core') || '{}');

const CLOGS_KEYWORDS = ['penny', 'frankie', 'parker'];

const COLOR_MAP = {
  'black':       '#1a1a1a',
  'negro':       '#1a1a1a',
  'black x honey':'linear-gradient(135deg,#1a1a1a 50%,#c8943a 50%)',
  'brown':       '#7b4f2e',
  'taupe':       '#b5a090',
  'olivo':       '#6b7a42',
  'terracota':   '#c16452',
  'honey':       '#c8943a',
  'camel':       '#c19a6b',
  'sand':        '#d4bc94',
  'white':       '#f0ede9',
  'ivory':       '#f5f0e6',
  'silver':      '#b0b8c1',
  'chocolate':   '#4a2c1a',
  'cognac':      '#a0522d',
  'red':         '#c93a28',
  'blue':        '#3a7bd5',
};

function swatchFor(colorName) {
  const key = colorName.toLowerCase().trim();
  const val = COLOR_MAP[key];
  if (!val) return '';
  const style = val.startsWith('linear')
    ? `background:${val}`
    : `background:${val}`;
  return `<span class="color-swatch" style="${style}"></span>`;
}

const ALLOWED_MODELS = [
  'BALA BLACK','BECCA VINTAGE BLACK','DALLAS BLACK','DALLAS CAMEL',
  'FENIX CHOCOLATE','FENIX TAUPE','HUDSON BLACK','HUDSON BLACK HONEY x Clinique',
  'HUDSON BLUE','LEGACY STUDS','LEGACY TAUPE','LYRA SILVER',
  'MEXICO IS THE SHIT x BDG','MONARCH CHERRY RED','NOVA BLACK',
  'TYRO BLACK','HUDSON CHOCOLATE CC X BDG','TAURI BLACK',
];
const ALLOWED_SET = new Set(ALLOWED_MODELS.map(s => s.toLowerCase()));

function effectiveQty(qty){ return _mode === 'positive' ? Math.max(0, qty) : qty; }

// Extrae talla de una variante — busca en option1 y option2, devuelve el que sea número de 2 dígitos
function extractSizeFromVariant(v){
  const opts = [v.option1, v.option2, v.title].map(o => String(o||'').trim());
  for(const o of opts){ const m = o.match(/^(\d{2}(?:\.\d)?)$/); if(m) return m[1]; }
  return opts[0]; // fallback
}
// Mantiene compatibilidad con llamadas que pasan string directamente
function extractSize(s){ const m = String(s||'').trim().match(/^(\d{2}(?:\.\d)?)/); return m ? m[1] : String(s||'').trim(); }

// ── TOGGLES ──────────────────────────────────────────────────────────────────
function toggleFilter(){
  _mode = _mode === 'positive' ? 'all' : 'positive';
  document.getElementById('filterBtn').classList.toggle('active', _mode === 'all');
  render();
}
function toggleCompletos(){
  _filterCompl = !_filterCompl;
  document.getElementById('completosBtn').classList.toggle('active', _filterCompl);
  render();
}
function toggleClogs(){
  _showClogs = !_showClogs;
  document.getElementById('clogsBtn').classList.toggle('active', _showClogs);
  render();
}
function toggleCore(title, e){
  e.stopPropagation();
  _core[title] = !_core[title];
  localStorage.setItem('bdg_core', JSON.stringify(_core));
  render();
}


// ── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  try {
    const res  = await fetch('/api/shopify?mode=products');
    if(!res.ok) throw new Error(`Error ${res.status}`);
    const data = await res.json();
    const all  = (data.products || []).filter(p => p.status === 'active');

    _products = all.filter(p => ALLOWED_SET.has(p.title.toLowerCase()));
    _products.sort((a,b) => a.title.localeCompare(b.title));

    _clogsProducts = all.filter(p => {
      const tl = p.title.toLowerCase();
      return CLOGS_KEYWORDS.some(k => tl.includes(k)) && !ALLOWED_SET.has(tl);
    });
    _clogsProducts.sort((a,b) => a.title.localeCompare(b.title));

    render();
  } catch(e){
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="10"><div class="empty">
        <div style="font-size:24px;margin-bottom:10px;">⚠️</div>
        <div style="font-weight:700;">${e.message}</div>
        <button onclick="init()" style="margin-top:14px;padding:8px 20px;background:var(--terra);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:var(--fn);">Reintentar</button>
      </div></td></tr>`;
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const query = (document.getElementById('searchInput')?.value||'').toLowerCase();

  // Combine product lists
  const base = _showClogs ? [..._products, ..._clogsProducts] : _products;

  // Collect sizes
  const sizeSet = new Set();
  for(const p of base)
    for(const v of (p.variants||[])){ const sz=extractSizeFromVariant(v); if(/^\d{2}$/.test(sz)) sizeSet.add(sz); }
  const sizes = Array.from(sizeSet).sort((a,b)=>parseFloat(a)-parseFloat(b));

  // Filter
  let filtered = base.filter(p => !query || p.title.toLowerCase().includes(query));
  if(_filterCompl){
    filtered = filtered.filter(p => {
      const sizeMap = {};
      for(const v of (p.variants||[])){ const sz=extractSizeFromVariant(v); sizeMap[sz]=(sizeMap[sz]||0)+(v.inventory_quantity??0); }
      return sizes.every(sz => (sizeMap[sz]??0) >= 1);
    });
  }

  // Summary
  let totalUnits=0, totalNeg=0;
  for(const p of filtered){
    for(const v of (p.variants||[])){
      const q = v.inventory_quantity??0;
      totalUnits += effectiveQty(q);
      if(q<0) totalNeg++;
    }
  }

  document.getElementById('summaryRow').innerHTML = `
    <div class="sum-chip gold"><div class="sv">${totalUnits.toLocaleString('es-MX')}</div><div class="sl">Unidades en bodega</div></div>
    <div class="sum-chip"><div class="sv">${filtered.length}</div><div class="sl">Modelos</div></div>
    ${_showClogs?`<div class="sum-chip"><div class="sv">${_clogsProducts.length}</div><div class="sl">Modelos Clogs</div></div>`:''}
    ${totalNeg>0?`<div class="sum-chip neg"><div class="sv">${totalNeg}</div><div class="sl">SKUs negativos</div></div>`:''}
  `;

  // Header
  document.getElementById('tableHead').innerHTML = `
    <th class="col-model">MODELO</th>
    ${sizes.map(sz=>`<th>${sz}</th>`).join('')}
    <th>TOTAL</th><th class="col-core">CORE</th>`;

  if(!filtered.length){
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="${sizes.length+3}"><div class="empty">Sin resultados</div></td></tr>`;
    return;
  }

  document.getElementById('tableBody').innerHTML = filtered.flatMap(p => {
    const img = p.images?.[0]?.src;
    const thumb = img
      ? `<img class="thumb" src="${img}" loading="lazy" alt="${p.title}" onerror="this.outerHTML='<div class=thumb-ph>👟</div>'"/>`
      : `<div class="thumb-ph"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>`;

    // Detect if product has colors (option1 is non-numeric = color)
    const hasColors = (p.variants||[]).some(v => v.option2 && /^\d{2}$/.test(String(v.option2||'').trim()));

    if(hasColors){
      // Build image map: image_id → src
      const imgById = {};
      for(const img of (p.images||[])) imgById[img.id] = img.src;

      // Group variants by color (option1), track first variant's image_id per color
      const colorMap  = {};
      const colorImgs = {};
      for(const v of (p.variants||[])){
        const color = String(v.option1||'').trim();
        const sz    = extractSizeFromVariant(v);
        if(!colorMap[color]){ colorMap[color] = {}; colorImgs[color] = v.image_id || null; }
        colorMap[color][sz] = (colorMap[color][sz]||0) + (v.inventory_quantity??0);
      }

      return Object.entries(colorMap).map(([color, sizeMap]) => {
        const total   = sizes.reduce((s,sz)=>s+effectiveQty(sizeMap[sz]??0),0);
        const totalCl = total>0?'pos':total<0?'neg':'zero';
        const titleSafe = (p.title+' '+color).replace(/'/g,"\\'");
        const isCore  = !!_core[titleSafe];
        const coreHtml = isCore
          ? `<span class="core-check" onclick="toggleCore('${titleSafe}',event)">✓</span>`
          : `<span class="core-x"    onclick="toggleCore('${titleSafe}',event)">✕</span>`;

        const sizeCells = sizes.map(sz => {
          const raw = sizeMap[sz];
          const eff = raw !== undefined ? effectiveQty(raw) : null;
          const cls = eff === null ? 'zero' : eff>0?'pos':eff<0?'neg':'zero';
          return `<td class="sz-cell"><span class="sz-badge ${cls}">${eff === null ? '—' : eff}</span></td>`;
        }).join('');

        // Imagen específica del color via image_id, fallback a primera imagen del producto
        const colorImgSrc = (colorImgs[color] && imgById[colorImgs[color]]) || p.images?.[0]?.src || null;
        const colorThumb  = colorImgSrc
          ? `<img class="thumb" src="${colorImgSrc}" loading="lazy" alt="${color}" onerror="this.outerHTML='<div class=thumb-ph>👟</div>'"/>`
          : `<div class="thumb-ph"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>`;

        const pill = `<div class="color-pill">${swatchFor(color)}${color}</div>`;
        const nameCell = `${colorThumb}<div><div class="model-name">${p.title}</div>${pill}</div>`;

        return `<tr>
          <td><div class="col-model-cell">${nameCell}</div></td>
          ${sizeCells}
          <td class="sz-cell"><span class="sz-badge total ${totalCl}">${total}</span></td>
          <td class="core-cell">${coreHtml}</td>
        </tr>`;
      });
    }

    // Standard single-row product
    const sizeMap = {};
    for(const v of (p.variants||[])){ const sz=extractSizeFromVariant(v); sizeMap[sz]=(sizeMap[sz]||0)+(v.inventory_quantity??0); }
    const total   = sizes.reduce((s,sz)=>s+effectiveQty(sizeMap[sz]??0),0);
    const totalCl = total>0?'pos':total<0?'neg':'zero';
    const isCore  = !!_core[p.title];
    const titleSafe = p.title.replace(/'/g,"\\'");
    const coreHtml  = isCore
      ? `<span class="core-check" onclick="toggleCore('${titleSafe}',event)">✓</span>`
      : `<span class="core-x"    onclick="toggleCore('${titleSafe}',event)">✕</span>`;
    const sizeCells = sizes.map(sz => {
      const raw = sizeMap[sz];
      const eff = raw !== undefined ? effectiveQty(raw) : null;
      const cls = eff === null ? 'zero' : eff>0?'pos':eff<0?'neg':'zero';
      return `<td class="sz-cell"><span class="sz-badge ${cls}">${eff === null ? '—' : eff}</span></td>`;
    }).join('');

    return [`<tr>
      <td><div class="col-model-cell">${thumb}<div class="model-name">${p.title}</div></div></td>
      ${sizeCells}
      <td class="sz-cell"><span class="sz-badge total ${totalCl}">${total}</span></td>
      <td class="core-cell">${coreHtml}</td>
    </tr>`];
  }).join('');
}

init();
</script>
</body>
</html>
