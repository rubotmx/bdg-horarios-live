<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="/favicon.ico"/>
<meta name="robots" content="noindex, nofollow"/>
<title>BDG · Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f4f2;--surface:#fff;--border:#e8e5e1;--border2:#f0ede9;
  --text:#111;--muted:#9a9590;--muted2:#c5c0ba;
  --green-bg:#e8f5ee;--green-txt:#1a7a4a;
  --red-bg:#fce9e7;--red-txt:#c93a28;
  --zero-bg:#f2f1ef;--zero-txt:#b0aba5;
  --blue:#3a7bd5;--terra:#c16452;--orange:#e07d2a;
  --fn:'Inter',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--fn);}

/* ── TOPBAR ── */
.topbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100;}
.nav-tabs{display:flex;}
.nav-tab{padding:0 18px;height:52px;display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;text-decoration:none;transition:color .12s;}
.nav-tab svg{opacity:.5;}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text);}
.nav-tab.active svg{opacity:1;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.back{font-size:11px;color:var(--muted);text-decoration:none;}
.back:hover{color:var(--text);}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--terra);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* ── PAGE ── */
.page{max-width:1100px;margin:0 auto;padding:28px 24px 60px;}

/* ── TITLE ROW ── */
.title-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.page-title{font-size:26px;font-weight:800;letter-spacing:-.02em;flex:1;}
.search-wrap{position:relative;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted2);pointer-events:none;}
.search-input{padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-family:var(--fn);font-size:13px;color:var(--text);outline:none;width:200px;transition:border-color .12s;}
.search-input:focus{border-color:#aaa;}
.search-input::placeholder{color:var(--muted2);}

/* Buttons */
.btn-toolbar{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-family:var(--fn);font-size:13px;color:var(--text);cursor:pointer;font-weight:500;white-space:nowrap;transition:all .12s;}
.btn-toolbar:hover{border-color:#aaa;}
.btn-toolbar.active{background:var(--text);color:#fff;border-color:var(--text);}
.btn-preventa{background:var(--terra);color:#fff;border-color:var(--terra);}
.btn-preventa:hover{background:#b05848;border-color:#b05848;}

/* ── SUMMARY ── */
.summary-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.sum-chip{padding:10px 16px;border-radius:8px;background:var(--surface);border:1px solid var(--border);}
.sum-chip .sv{font-size:20px;font-weight:800;color:var(--text);line-height:1;}
.sum-chip .sl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.sum-chip.neg .sv{color:var(--red-txt);}
.sum-chip.orange .sv{color:var(--orange);}

/* ── TABLE ── */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.inv-table{width:100%;border-collapse:collapse;}
.inv-table thead th{padding:10px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);text-align:center;white-space:nowrap;}
.inv-table thead th.col-model{text-align:left;padding-left:16px;}
.inv-table thead th.col-core{padding-right:16px;}
.inv-table tbody tr{border-bottom:1px solid var(--border2);transition:background .1s;}
.inv-table tbody tr:last-child{border-bottom:none;}
.inv-table tbody tr:hover{background:#faf9f8;}
.col-model-cell{display:flex;align-items:center;gap:10px;padding:10px 10px 10px 16px;}
.thumb{width:32px;height:32px;border-radius:4px;object-fit:cover;background:var(--bg);flex-shrink:0;}
.thumb-ph{width:32px;height:32px;border-radius:4px;background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted2);}
.model-name{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;}

/* Size badges */
.sz-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-size:12px;font-weight:700;}
.sz-badge.pos{background:var(--green-bg);color:var(--green-txt);}
.sz-badge.neg{background:var(--red-bg);color:var(--red-txt);}
.sz-badge.zero{background:var(--zero-bg);color:var(--zero-txt);}
.sz-badge.total{width:36px;height:36px;font-size:13px;background:#f0f0f0;color:#555;}
.sz-badge.total.pos{background:var(--green-bg);color:var(--green-txt);}
.sz-badge.total.neg{background:var(--red-bg);color:var(--red-txt);}

td.sz-cell{text-align:center;padding:4px 6px;vertical-align:middle;}
td.core-cell{text-align:center;padding:4px 16px 4px 6px;}
.core-check{color:var(--blue);cursor:pointer;font-size:16px;}
.core-x{color:var(--muted2);cursor:pointer;font-size:16px;}

/* Preventa indicator under badge */
.sz-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.pv-dot{font-size:9px;font-weight:700;color:var(--orange);background:rgba(224,125,42,.12);border-radius:3px;padding:1px 4px;line-height:1.4;}

/* ── PREVENTA MODAL ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-start;justify-content:center;padding-top:60px;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:520px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18);}
.modal-head{padding:20px 22px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-title{font-size:16px;font-weight:800;letter-spacing:-.01em;}
.modal-close{font-size:20px;cursor:pointer;color:var(--muted);line-height:1;background:none;border:none;font-family:inherit;padding:0;}
.modal-close:hover{color:var(--text);}

/* Form */
.modal-form{padding:18px 22px;border-bottom:1px solid var(--border);flex-shrink:0;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.field label{display:block;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.field select,.field input{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-family:var(--fn);font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .12s;}
.field select:focus,.field input:focus{border-color:#aaa;}
.field-full{grid-column:1/-1;}
.btn-add{width:100%;padding:10px;background:var(--terra);color:#fff;border:none;border-radius:8px;font-family:var(--fn);font-size:13px;font-weight:700;cursor:pointer;transition:background .12s;}
.btn-add:hover{background:#b05848;}

/* Preventa list */
.pv-list{overflow-y:auto;flex:1;padding:8px 0;}
.pv-empty{text-align:center;padding:30px;color:var(--muted);font-size:13px;}
.pv-group{padding:0 22px 12px;}
.pv-group-name{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:10px 0 6px;border-top:1px solid var(--border2);margin-top:4px;}
.pv-group:first-child .pv-group-name{border-top:none;margin-top:0;}
.pv-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;background:var(--bg);margin-bottom:4px;}
.pv-talla{font-size:11px;font-weight:800;background:rgba(224,125,42,.15);color:var(--orange);padding:3px 8px;border-radius:20px;}
.pv-qty{font-size:14px;font-weight:800;color:var(--text);min-width:28px;}
.pv-note{font-size:12px;color:var(--muted);flex:1;}
.pv-date{font-size:10px;color:var(--muted2);}
.pv-del{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;border-radius:4px;transition:color .12s;}
.pv-del:hover{color:var(--red-txt);}

/* Skeleton */
.sk{background:linear-gradient(90deg,#edebe8 25%,#e4e2de 50%,#edebe8 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:4px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}

@media(max-width:700px){
  .page{padding:16px 12px 40px;}
  .search-input{width:130px;}
  .model-name{font-size:11px;}
  .sz-badge{width:26px;height:26px;font-size:10px;}
  .form-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="/" style="display:flex;align-items:center;text-decoration:none;margin-right:20px;">
    <img src="https://baladigala.com/cdn/shop/files/TIPOGRAFIA_0eeef2c9-8447-407e-940f-5d63c2a8467c.webp?v=1737764437&width=610" alt="Bala Di Gala" style="height:22px;width:auto;display:block;"/>
  </a>
  <nav class="nav-tabs">
    <a class="nav-tab active" href="/inventario/">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Bodega
    </a>
  </nav>
  <div class="topbar-right">
    <a class="back" href="/">← HQ</a>
    <div class="avatar">R</div>
  </div>
</div>

<!-- PREVENTA MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📦 Preventas</div>
      <button class="modal-close" onclick="closePvModal()">×</button>
    </div>
    <div class="modal-form">
      <div class="form-grid">
        <div class="field field-full">
          <label>Modelo</label>
          <select id="pvModel"></select>
        </div>
        <div class="field">
          <label>Talla</label>
          <select id="pvSize">
            <option>23</option><option>24</option><option>25</option>
            <option>26</option><option>27</option>
          </select>
        </div>
        <div class="field">
          <label>Cantidad</label>
          <input id="pvQty" type="number" min="1" value="1"/>
        </div>
        <div class="field field-full">
          <label>Nota (opcional)</label>
          <input id="pvNote" type="text" placeholder="ej. Cliente Marta, pedido #123"/>
        </div>
      </div>
      <button class="btn-add" onclick="addPreventa()">+ Agregar preventa</button>
    </div>
    <div class="pv-list" id="pvList"></div>
  </div>
</div>

<div class="page">

  <!-- TITLE ROW -->
  <div class="title-row">
    <div class="page-title">Stock</div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Buscar..." oninput="render()"/>
    </div>
    <button class="btn-toolbar" id="completosBtn" onclick="toggleCompletos()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Completos
    </button>
    <button class="btn-toolbar" id="filterBtn" onclick="toggleFilter()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Negativos
    </button>
    <button class="btn-toolbar btn-preventa" onclick="openPvModal()">
      + Preventa
    </button>
  </div>

  <!-- SUMMARY -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- TABLE -->
  <div class="table-wrap">
    <table class="inv-table">
      <thead><tr id="tableHead">
        <th class="col-model">MODELO</th>
        <th>—</th><th>TOTAL</th><th class="col-core">CORE</th>
      </tr></thead>
      <tbody id="tableBody">
        <tr><td colspan="10" style="padding:32px;">
          <div class="sk" style="height:40px;margin-bottom:8px;"></div>
          <div class="sk" style="height:40px;margin-bottom:8px;"></div>
          <div class="sk" style="height:40px;margin-bottom:8px;"></div>
          <div class="sk" style="height:40px;margin-bottom:8px;"></div>
          <div class="sk" style="height:40px;"></div>
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let _products      = [];
let _mode          = 'positive';  // 'positive' | 'all'
let _filterCompl   = false;
let _core          = JSON.parse(localStorage.getItem('bdg_core')      || '{}');
let _preventas     = JSON.parse(localStorage.getItem('bdg_preventas') || '[]');

const ALLOWED_MODELS = [
  'BALA BLACK','BECCA VINTAGE BLACK','DALLAS BLACK','DALLAS CAMEL',
  'FENIX CHOCOLATE','FENIX TAUPE','HUDSON BLACK','HUDSON BLACK HONEY x Clinique',
  'HUDSON BLUE','LEGACY STUDS','LEGACY TAUPE','LYRA SILVER',
  'MEXICO IS THE SHIT x BDG','MONARCH CHERRY RED','NOVA BLACK',
  'TYRO BLACK','HUDSON CHOCOLATE CC X BDG','TAURI BLACK',
];
const ALLOWED_SET = new Set(ALLOWED_MODELS.map(s => s.toLowerCase()));

function effectiveQty(qty){ return _mode === 'positive' ? Math.max(0, qty) : qty; }
function extractSize(s){ const m = String(s||'').trim().match(/^(\d{2}(?:\.\d)?)/); return m ? m[1] : String(s||'').trim(); }
function savePv(){ localStorage.setItem('bdg_preventas', JSON.stringify(_preventas)); }

// ── TOGGLES ──────────────────────────────────────────────────────────────────
function toggleFilter(){
  _mode = _mode === 'positive' ? 'all' : 'positive';
  document.getElementById('filterBtn').classList.toggle('active', _mode === 'all');
  render();
}
function toggleCompletos(){
  _filterCompl = !_filterCompl;
  document.getElementById('completosBtn').classList.toggle('active', _filterCompl);
  render();
}
function toggleCore(title, e){
  e.stopPropagation();
  _core[title] = !_core[title];
  localStorage.setItem('bdg_core', JSON.stringify(_core));
  render();
}

// ── PREVENTA MODAL ────────────────────────────────────────────────────────────
function openPvModal(){
  // Populate model select
  const sel = document.getElementById('pvModel');
  sel.innerHTML = ALLOWED_MODELS.map(m => `<option value="${m}">${m}</option>`).join('');
  document.getElementById('modalBackdrop').classList.add('open');
  renderPvList();
}
function closePvModal(){ document.getElementById('modalBackdrop').classList.remove('open'); }
function closeModal(e){ if(e.target === document.getElementById('modalBackdrop')) closePvModal(); }

function addPreventa(){
  const model = document.getElementById('pvModel').value;
  const size  = document.getElementById('pvSize').value;
  const qty   = parseInt(document.getElementById('pvQty').value) || 1;
  const note  = document.getElementById('pvNote').value.trim();
  if(!model || !size) return;
  _preventas.push({
    id:    Date.now(),
    model, size, qty, note,
    date:  new Date().toLocaleDateString('es-MX', {day:'2-digit',month:'short'})
  });
  savePv();
  document.getElementById('pvNote').value = '';
  document.getElementById('pvQty').value  = '1';
  renderPvList();
  render();
}

function deletePreventa(id){
  _preventas = _preventas.filter(p => p.id !== id);
  savePv();
  renderPvList();
  render();
}

function renderPvList(){
  const el = document.getElementById('pvList');
  if(!_preventas.length){
    el.innerHTML = '<div class="pv-empty">No hay preventas registradas.</div>';
    return;
  }
  // Group by model
  const byModel = {};
  for(const p of _preventas){
    if(!byModel[p.model]) byModel[p.model] = [];
    byModel[p.model].push(p);
  }
  el.innerHTML = Object.entries(byModel).map(([model, items]) => `
    <div class="pv-group">
      <div class="pv-group-name">${model}</div>
      ${items.map(p => `
        <div class="pv-item">
          <span class="pv-talla">T${p.size}</span>
          <span class="pv-qty">×${p.qty}</span>
          <span class="pv-note">${p.note || '—'}</span>
          <span class="pv-date">${p.date}</span>
          <button class="pv-del" onclick="deletePreventa(${p.id})">×</button>
        </div>`).join('')}
    </div>`).join('');
}

// Build preventa lookup: model → size → total qty
function pvMap(){
  const map = {};
  for(const p of _preventas){
    if(!map[p.model]) map[p.model] = {};
    map[p.model][p.size] = (map[p.model][p.size] || 0) + p.qty;
  }
  return map;
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init(){
  try {
    const res  = await fetch('/api/shopify?mode=products');
    if(!res.ok) throw new Error(`Error ${res.status}`);
    const data = await res.json();
    _products  = (data.products || []).filter(p =>
      p.status === 'active' && ALLOWED_SET.has(p.title.toLowerCase())
    );
    _products.sort((a,b) => a.title.localeCompare(b.title));
    render();
  } catch(e){
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="10"><div class="empty">
        <div style="font-size:24px;margin-bottom:10px;">⚠️</div>
        <div style="font-weight:700;">${e.message}</div>
        <button onclick="init()" style="margin-top:14px;padding:8px 20px;background:var(--terra);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:var(--fn);">Reintentar</button>
      </div></td></tr>`;
  }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const query = (document.getElementById('searchInput')?.value||'').toLowerCase();
  const pv    = pvMap();

  // Collect sizes
  const sizeSet = new Set();
  for(const p of _products)
    for(const v of (p.variants||[])){ const sz=extractSize(v.option1||v.title); if(/^\d{2}$/.test(sz)) sizeSet.add(sz); }
  const sizes = Array.from(sizeSet).sort((a,b)=>parseFloat(a)-parseFloat(b));

  // Filter
  let filtered = _products.filter(p => !query || p.title.toLowerCase().includes(query));
  if(_filterCompl){
    filtered = filtered.filter(p => {
      const sizeMap = {};
      for(const v of (p.variants||[])){ const sz=extractSize(v.option1||v.title); sizeMap[sz]=(sizeMap[sz]||0)+(v.inventory_quantity??0); }
      return sizes.every(sz => (sizeMap[sz]??0) >= 1);
    });
  }

  // Summary
  let totalUnits=0, totalNeg=0, totalPv=0;
  for(const p of filtered){
    for(const v of (p.variants||[])){
      const q = v.inventory_quantity??0;
      totalUnits += effectiveQty(q);
      if(q<0) totalNeg++;
    }
  }
  for(const m of Object.values(pv)) for(const q of Object.values(m)) totalPv += q;

  document.getElementById('summaryRow').innerHTML = `
    <div class="sum-chip"><div class="sv">${totalUnits.toLocaleString('es-MX')}</div><div class="sl">Unidades</div></div>
    <div class="sum-chip"><div class="sv">${filtered.length}</div><div class="sl">Modelos</div></div>
    ${totalNeg>0?`<div class="sum-chip neg"><div class="sv">${totalNeg}</div><div class="sl">SKUs neg.</div></div>`:''}
    ${totalPv>0?`<div class="sum-chip orange"><div class="sv">${totalPv}</div><div class="sl">En preventa</div></div>`:''}
  `;

  // Header
  document.getElementById('tableHead').innerHTML = `
    <th class="col-model">MODELO</th>
    ${sizes.map(sz=>`<th>${sz}</th>`).join('')}
    <th>TOTAL</th><th class="col-core">CORE</th>`;

  if(!filtered.length){
    document.getElementById('tableBody').innerHTML =
      `<tr><td colspan="${sizes.length+3}"><div class="empty">Sin resultados</div></td></tr>`;
    return;
  }

  document.getElementById('tableBody').innerHTML = filtered.map(p => {
    const img     = p.images?.[0]?.src;
    const sizeMap = {};
    for(const v of (p.variants||[])){ const sz=extractSize(v.option1||v.title); sizeMap[sz]=(sizeMap[sz]||0)+(v.inventory_quantity??0); }
    const total   = sizes.reduce((s,sz)=>s+effectiveQty(sizeMap[sz]??0),0);
    const totalCl = total>0?'pos':total<0?'neg':'zero';
    const isCore  = !!_core[p.title];
    const pvMod   = pv[p.title] || {};

    const thumb = img
      ? `<img class="thumb" src="${img}" loading="lazy" alt="${p.title}" onerror="this.outerHTML='<div class=thumb-ph>👟</div>'"/>`
      : `<div class="thumb-ph"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg></div>`;

    const sizeCells = sizes.map(sz => {
      const raw = sizeMap[sz];
      const eff = raw !== undefined ? effectiveQty(raw) : null;
      const cls = eff === null ? 'zero' : eff>0?'pos':eff<0?'neg':'zero';
      const num = eff === null ? '—' : eff;
      const pvQ = pvMod[sz];
      const pvBadge = pvQ ? `<div class="pv-dot">P:${pvQ}</div>` : '';
      return `<td class="sz-cell"><div class="sz-wrap"><span class="sz-badge ${cls}">${num}</span>${pvBadge}</div></td>`;
    }).join('');

    const titleSafe = p.title.replace(/'/g,"\\'");
    const coreHtml  = isCore
      ? `<span class="core-check" onclick="toggleCore('${titleSafe}',event)">✓</span>`
      : `<span class="core-x"    onclick="toggleCore('${titleSafe}',event)">✕</span>`;

    return `<tr>
      <td><div class="col-model-cell">${thumb}<div class="model-name">${p.title}</div></div></td>
      ${sizeCells}
      <td class="sz-cell"><span class="sz-badge total ${totalCl}">${total}</span></td>
      <td class="core-cell">${coreHtml}</td>
    </tr>`;
  }).join('');
}

init();
</script>
</body>
</html>
