<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BDG · Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;900&family=Jost:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --terra:#c16452;--terra-dark:#9d4f3f;
  --fn:'Archivo',sans-serif;--fl:'Jost',sans-serif;
}
html,body{min-height:100%;background:#0e0e0e;font-family:var(--fn);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}

.logo{font-family:var(--fl);font-size:18px;font-weight:700;color:#fff;letter-spacing:.2em;margin-bottom:32px;text-align:center;}
.logo span{color:var(--terra);}

.card{background:#fff;border-radius:12px;padding:36px 32px;width:100%;max-width:380px;}
.card-title{font-size:18px;font-weight:900;color:#0e0e0e;margin-bottom:4px;letter-spacing:-.02em;}
.card-sub{font-size:12px;color:#8A857F;margin-bottom:28px;}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#0e0e0e;}
.field input{
  padding:12px 14px;border:1.5px solid #E4E0DB;border-radius:7px;
  font-family:var(--fn);font-size:14px;color:#0e0e0e;outline:none;
  transition:border-color .14s;background:#fff;
}
.field input:focus{border-color:var(--terra);}
.field input.err{border-color:#C62828;}

.btn{
  width:100%;padding:13px;background:var(--terra);color:#fff;border:none;
  border-radius:7px;font-family:var(--fn);font-size:13px;font-weight:700;
  letter-spacing:.06em;cursor:pointer;transition:background .14s;margin-top:8px;
}
.btn:hover{background:var(--terra-dark);}
.btn:disabled{opacity:.5;cursor:default;}

.error-box{
  background:#FDECEA;border:1px solid #f5c6c1;border-radius:7px;
  padding:10px 14px;font-size:12px;color:#C62828;font-weight:600;
  margin-top:14px;display:none;
}
.error-box.show{display:block;}

.footer-link{
  text-align:center;margin-top:20px;font-size:12px;color:#8A857F;
}
.footer-link a{color:var(--terra);text-decoration:none;font-weight:700;}
.footer-link a:hover{text-decoration:underline;}

.pending-screen{display:none;text-align:center;padding:8px 0;}
.pending-icon{font-size:40px;margin-bottom:12px;}
.pending-title{font-size:16px;font-weight:900;color:#0e0e0e;margin-bottom:6px;}
.pending-sub{font-size:12px;color:#8A857F;line-height:1.6;}

.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;
  display:inline-block;margin-right:8px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="logo">BDG<span>·</span>HQ</div>

<div class="card">
  <div id="loginForm">
    <div class="card-title">Iniciar sesión</div>
    <div class="card-sub">Ingresa tus credenciales para continuar</div>

    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') login()"/>
    </div>

    <div class="error-box" id="errorBox"></div>

    <button class="btn" id="loginBtn" onclick="login()">Iniciar sesión</button>
  </div>

  <div class="pending-screen" id="pendingScreen">
    <div class="pending-icon">⏳</div>
    <div class="pending-title">Cuenta pendiente de aprobación</div>
    <div class="pending-sub">Tu solicitud de acceso fue recibida.<br>El administrador te notificará cuando esté activa.</div>
  </div>
</div>

<div class="footer-link">¿No tienes cuenta? <a href="/register/">Regístrate aquí</a></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            "AIzaSyD6ZcB618WZ_pSE3CPgOFdwl60_PafDTec",
  authDomain:        "bdg-horarios.firebaseapp.com",
  projectId:         "bdg-horarios",
  storageBucket:     "bdg-horarios.firebasestorage.app",
  messagingSenderId: "888593583878",
  appId:             "1:888593583878:web:65b1955ae0613558d3d887"
});
const auth = firebase.auth();
const db   = firebase.firestore();

// Si ya está logueado y aprobado, ir al HQ
auth.onAuthStateChanged(async user => {
  if(!user) return;
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    if(doc.exists && doc.data().status === 'approved'){
      const redir = new URLSearchParams(location.search).get('from') || '/';
      window.location.href = redir;
    }
  } catch(e) {}
});

async function login(){
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('password').value;
  const btn   = document.getElementById('loginBtn');
  const err   = document.getElementById('errorBox');

  if(!email || !pass){ showError('Completa todos los campos.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Verificando…';
  err.classList.remove('show');

  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    const uid  = cred.user.uid;
    const snap = await db.collection('users').doc(uid).get();

    if(!snap.exists){
      await auth.signOut();
      showError('Usuario no encontrado. Regístrate primero.');
      return;
    }

    const data = snap.data();

    if(data.status === 'pending'){
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('pendingScreen').style.display = 'block';
      await auth.signOut();
      return;
    }

    if(data.status === 'rejected'){
      await auth.signOut();
      showError('Tu solicitud fue rechazada. Contacta al administrador.');
      return;
    }

    // Log acceso
    await db.collection('logs').add({
      uid,
      email: data.email,
      nombre: data.nombre,
      module: 'login',
      action: 'login',
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });

    // Guardar sesión en localStorage para que módulos puedan leerla rápido
    localStorage.setItem('bdg_user', JSON.stringify({
      uid, email: data.email, nombre: data.nombre,
      role: data.role, modules: data.modules || []
    }));

    const redir = new URLSearchParams(location.search).get('from') || '/';
    window.location.href = redir;

  } catch(e){
    const msgs = {
      'auth/user-not-found':    'No existe una cuenta con ese correo.',
      'auth/wrong-password':    'Contraseña incorrecta.',
      'auth/invalid-email':     'Correo inválido.',
      'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde.',
    };
    showError(msgs[e.code] || e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Iniciar sesión';
  }
}

function showError(msg){
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('show');
}
</script>
</body>
</html>
